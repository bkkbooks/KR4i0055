body:
  text: 唐音癸籖巻二十三明胡震亨撰詁箋八韋應物睢陽感懷詩盛稱張廵忠烈且云宿將降賊庭儒生獨全義儒生謂廵宿將則謂許逺也當時城陷廵遇害賦議生致一人洛陽乃以逺行逺卒不屈中途死廵子去疾欲專以為父功上書謂逺心有向背請追奪官爵詔下尚書省以二人忠烈並著不可妄輕重議乃罷然時論猶紛紜不齊至元和中韓愈為文力辯之始定蘇州此詩正作於議論未定之前不可為二人定評也顧况有囝詩一章畧曰囝生閩方閩吏得之乃絶其陽郎罷别囝吾悔生汝人勸不舉果獲是苦囝别郎罷心摧血下隔地絶天及至黄泉不得在郎罷前囝音蹇閩俗呼子為囝呼父為郎罷此為唐閹宦作也唐宦官多出閩中小兒私割者號私白諸道毎嵗買獻之於朝故當時號閩為中官區藪備載唐書宦官傳時中貴人初秉權作燄况詩若憐之亦若簡賤之寓有微意在劉長卿過賈誼宅秋草獨尋人去後寒林空見日斜時初讀之似海語不知其最確切也誼鵩賦云四月孟夏庚子日斜野鳥入室主人將去日斜人去即用誼語畧無㾗跡徐興公李益聽曉角無限塞鴻飛不度秋風吹入小單于大角曲名有小單于詳前樂通此借云吹入小單于處去與李白江城五月落梅花同一用法也元白白詩鞍馬呼教住骰盤喝遣輸長驅波捲白連擲采成盧注骰盤捲白波莫走鞍馬皆酒令又打嫌調笑易飲訝巻波遲注抛打曲有調笑令飲酒曲有巻白波元詩能唱犯聲歌偏精變籌義叫噪擲骰盤生擰攝觥使又曲庇桃根盞横講捎雲式又籌著隨宜放投盤止罰啀紅娘留醉打觥使及醒差注舞引紅娘抛打曲名酒中觥使席上古職讀兩家詩句唐飲客章程可槩見孟東野孟詩用字之竒者如品松抓挐指爪􅀈􅀈均也寒溪柧椾吃無力柧棱木即觚椾即箋言畏寒觚箋蹇吃無力峽哀踔􅀈猿相過踔足蹋也犬食曰􅀈借以狀猿之行冬日凍馬四蹄吃陟卓難自收陟卓﨑嶇獨立之貎又好用叠字如􅰵􅰵家道路􅰵􅰵即曄曄抱山冷殑殑殑殑即兢兢至嵩少玉峻峻伊雒碧華華強強上聲攬所慿諸類又自以意叠之幾成杜撰總好竒過耳孟佳處詎在是李賀宋書廢帝景和二年鑄二銖錢形式轉細無輪郭如今之剪鑿者謂之來子錢李賀榆穿來子眼桞斷舞兒腰謂榆莢似此小錢也擬庾肩吾還自㑹稽歌脉脉辭金魚羇臣守迍賤金魚舊以魚袋釋梁無其制也庾乃簡文宫僚東宫舊事中庶子掌門鑰鑰施懸魚云辭金魚自指舊署言耳上雲樂八月一日君前舞舊注引齊諧記八月一日赤松子採栢藥事為解此非也一日當作五日上雲樂乃俳樂獻夀之辭以千秋名節始𤣥宗𤣥宗以八月五日生是日讌樂為盛故賀擬辭用之他帝即無有此月一日生者故知字誤也盧仝月蝕詩新書言其譏切元和逆黨考之不合按此詩叙有年月云元和庚寅則吐突承璀討王承宗無功而歸之嵗也初憲宗信用承璀令典神策拜大帥專征及敗衂仍不加罪寵任如故有太隂養蟾蜍為所食之象故取以比諷恒州陣斬酈定進頂骨脆甚春蔓菁定進者承璀驍將初交戰即被殺師因氣折無功詳見承宗傳此正實紀其事處其云官爵奉董秦者秦史思明降將歸正賜屬籍封王後竟附朱泚為逆是時承宗蒙赦復官爵正與秦同仝以其反覆必叛故又借秦為比通閲前後為承璀而作甚明若云逆黨則搆逆時去此尚逺安得預為譏切乎韓集亦載此詩删改過半題云效玉川子作謙不敢當改也然此詩麤縱至竟不可名詩或如送窮乞巧等製入文類於體為愜惜韓公更少此一改耳劉禹錫文宗挽歌聖情悲望處兄日下西山人君兄日姊月出春秋感精符武宗以弟及故用之今本作沉日是淺學所改又劉有公主下嫁詩天母親調粉日兄憐賜花云宋吳復齋云禹錫與劉子厚詩有桞家新様元和脚之句脚字人多不曉髙子勉嘗舉以問山谷山谷云取其字製之新有徐僊者學山谷書陳無已贈詩亦有肯學黄家元祐脚之句愚謂脚字即當㑹様字意解之自明張祐集有孟才人詩序稱才人以歌笙獲寵武宗帝疾亟為帝歌河滿子曲甫發聲腸斷而絶事與其人后妃傳無之傳惟載王才人者武宗寵之欲立為后弗果帝大漸即自經於幄中王弇州疑而欲合為一然所引李衛公兩朝獻替記王才人自以驕妬忤㫖不良死若孟才人以義死故一時詩人咏之其各是一人明矣賈島桑乾絶句謝枋得注云旅寓并州十年一旦别去豈能無情故望并州以為故鄉也讀之不覺失笑此島自思鄉作耳其意恨乆客并州逺隔故鄉今非惟不能歸反北渡桑乾還望并州又是故鄉矣豈念并州哉念咸陽之不得歸云耳謝注有分毫相似否王世懋杜牧有絶句云杜詩韓筆愁來讀似倩麻姑癢處㧓稱文為筆始六朝人沈約傳云謝𤣥暉善為詩任彦昇工於筆約兼而有之又梁簡文帝與湘東王書論文章之弊亦分詩與筆為言牧所本也許渾靖恭里感事詩題不明斥為何人其句云乾坤三事貴華夏一夫寃此惟退相可以當之文宗朝宋申錫謀去宦官反為宦官所搆謫死考本傳有王守澄欲遣騎就靖恭里屠申錫家語知此詩為申錫作無疑渾凌歊臺詩湘潭雲盡暮山出巴蜀雪消春水來以地里考之湘潭當作江潭按凌歊臺在今當塗黄山直踞大江之上西望大江上源則博望山與梁山稱為天門者兩崖中豁楚蜀逺通其水眞有從巴蜀雪消而來之勢稍東直瞰牛渚磯磯水深黒不測是云江潭而潭上諸山叠叠環峙薄暮嵐消山見則暮山雲盡而出尤對岸眞景之的的者宋人郭功甫姑熟詩牛渚對峙凌歊臺長江倒挂天門開從來題咏者大都不出此二景而渾獨善寫之最為工盡若湘潭去此甚逺矣可因字之偶誤遂謂渾詩果爾乎昔賢如用修弇州並不疑湘字為譌欲改暮山山字從煙那有是處用修又襲方囘之説以宋祖裕節儉渾三千歌舞句為誣譏渾無史學不知宋二武皆稱祖武帝髙祖孝武帝世祖地志稱孝武登此臺置離宫而本紀亦載其幸南豫州者再校獵姑熟者一與地志合是嘗嗤髙祖裕為田舍翁者三千歌舞宜有之無史學竟屬何人耶百年便作萬年計又似約畧孝武後人借南苑三百年痴想槩入之以盡宋事要使寛展耳古作者使事别有深㑹在未可輕議李商隠昔楚襄王與宋玉遊髙唐之上見雲氣之異問宋玉玉曰昔先王夢遊髙唐與神女遇玉為髙唐之賦先王謂懷王也宋玉是夜夢見神女寤而白王王令玉言其狀使為神女賦文選玉王二字各誤後人遂云襄王夢神女其實非也古樂府詩有之本是巫山來無人覩容色惟有楚懷王曽言夢相識李義山亦云襄王枕上原無夢莫枉陽臺一片雲足以互證西谿叢語古樂府清溪小姑曲云開門白水側近橋梁小姑所居獨處無郎唐李義山詩神女生涯元是夢小姑居處本無郎小姑蔣子文第三妹也楊炯少姨廟碑云虞帝二妃湘水之波瀾未歇蔣侯三妺青溪之軌跡可尋升菴詩話莫愁者郢州石城人今郢有莫愁村畫工傳其貎好事者多寫寄四逺古詞莫愁在何處莫愁石城西艇子打兩槳催送莫愁來者是也李義山馬嵬詩如何四紀為天子不及盧家有莫愁此莫愁者洛陽人梁武帝河中之水歌洛陽女兒名莫愁十五嫁為盧家婦盧家蘭室桂為梁中有鬱金蘇合香者是也古有兩莫愁在容齋三筆利州江潭作自注感夢金輪所蜀志則天父士彠為利州都督泊舟江潭后母感龍交娠后然史不載其事雖建寺賜眞容不聞别有祠設豈后欲諱之耶自擕明月移燈疾欲赴行雲散錦遥言龍銜珠為燈而散鱗錦以交合龍性滛義山為代寫其滛工美得未曽有散錦本木華海賦中語以錦瑟為眞瑟者痴以為令狐楚青衣以為商隠莊事楚狎綯必綯青衣亦痴商隠情詩借詩中兩字為題者儘多不獨錦瑟胡元瑞云錦瑟一篇是義山有感而作大槩無題中語但首句畧用錦瑟引起耳宋人認作咏物以適怨清和字面附㑹穿鑿遂令本意懵然且至此情可待成追憶處更説不通學者試盡屏此等議論只將題面作青衣詩意作追憶讀之當自踴躍張喬文苑英華載喬七松亭一詩有已比子眞棲谷口豈同陶令臥江邉之句題不着為何人作考唐史鄭少師薫退居隠巖手植七松自號七松處士云異代可與五桞先生作對喬詩盖為薫作陶令一聮亦政用薫語也喬咸通中應舉薰以其詩苦道眞嘗延之門下見鄭谷集註可互證陸龜蒙雜諷云紅蠶縁枯桑童麋來觸犀歌鵞慘於冰赤舌可燒城皆用太𤣥語困學紀聞唐彥謙葉夢得石林詩話以楊大年劉子儀喜唐彦謙題漢髙帝廟云耳聞明主提三尺眼見愚民盗一坏語皆歇後如三尺律三尺喙皆可何獨劒乎愚按漢髙帝紀曰吾以布衣提三尺取天下又韓安國傳髙帝曰提三尺取天下者朕也皆無劒字唯注曰三尺謂劒也出處既如此則詩家用其本語何為不可庚溪詩話司空圖耐忍居士歌咄諾休休莫莫咄拒物之聲諾敬言也圖隠身不出其本懷姑為擬議之辭先叱之隨諾之因以休休莫莫自决耳與咄嗟二字自不同劉貢父及王楙各有辨俱不明聊為正之附訂譌沈佺期答魑魅詩既作魑魅問不應托影答辭宋之問紫禁僊輿詰旦來左傳詰朝相見謂明早也今以為今日李迥秀詰旦重門聞警蹕誤亦同陳子昻吾聞中山相乃屬放麑翁秦西巴乃孟孫氏之臣非中山相李白繞朝贈士㑹策指方策之策也白臨行相贈繞朝鞭誤以鞭為策山隂道士如相見應寫黄庭換白鵞誤以道徳經為黄庭經醉過東山引浩浩洪流之詠誤以稽康詩為謝安詩杜甫諸將詩用玉魚金盌本沈炯茂陵玉盌遂出人間語以上有玉魚字遂易作金盌何顒好不忘細學何顒免興孤凡兩用於佛寺當時周顒因周妻何肉語失憶其姓而誤衛鶴乗軒指軒車之軒云軒墀曽寵鶴誤乗槎至天河海上客也奉使虛隨八月槎誤為漢之張騫劉越石為胡騎所圍中夜奏胡笳賊流涕解圍去胡騎中宵堪北走誤用為笛詩又贈爾秦人策莫鞭轅下駒誤與李白同顧况燕作巢避戊已見博物志驗之信况四言燕燕於巢綴緝維戊誤用張籍衛青不敗由天幸李廣無功為數竒史記天幸乃霍去病非衛青又漢書音義數音朔則亦不可與天屬對成都曲錦江近西煙水緑新雨山頭茘枝熟萬里橋邊多酒家遊人愛向誰家宿似未嘗至成都者成都無山亦無茘枝然此詩自不礙其風致白樂天長恨歌云峩眉山下少人行旌旗無光日色薄峩眉在嘉州與幸蜀路全無交涉劉禹錫踏歌行為是襄王故宫地至今猶是細腰多墨子云楚靈王好細腰韓非子云楚莊王好細腰凡兩見不聞襄王杜牧珊瑚破髙齊作婢舂黄糜按李詢得珊瑚其母令青衣而舂無糜字牧趂韻撰造非事實又有詩甘羅昔作秦丞相史記羅年十二事秦相文信侯後封上卿未嘗為秦相北史彭城王浟傳云昔甘羅為秦相未聞能書儀禮䟽云甘羅十二相秦未必要至五十知此謬循襲巳乆李商隠史記載秦始皇封泰山風雨暴至休樹下封其樹為五大夫五大夫者秦官名第九爵也商隠五松驛詩獨下長亭念故秦五松不見見輿薪名驛者誤商隠復誤雖然前此庾信已有山封五樹松句矣許渾冀州記緱氏僊人廟者昔王僑為柏人令於此登僊渾詩王子求僊月滿臺又可憐緱嶺登僊子猶自吹笙醉碧桃則以王僑為王子喬金陵懷古石燕拂雲晴亦雨江豚吹浪夜還風石燕出零陵非出金陵其物遇雨則飛止還為石晴何縁得飛取對偶工緻而非其實陸龜蒙藥名詩云烏啄蠧根回乃是烏喙非烏啄也又斷續玉琴哀藥名止有續斷無斷續唐音癸籖巻二十三
