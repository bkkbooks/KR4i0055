body:
  text: 唐音癸籤卷十七明胡震亨撰詁箋二洞案鄭谷詩端簡爐香裏濡毫洞案邊宋景文云凡朝會排正仗吏供洞案設前殿兩螭首間案上設燎香爐修注官夾案立其名為洞人多不知豫疑通朱漆為案故名洞云景文此解恐未是洞洞敬也案列於中以起人敬或其取義歟遁叟下同鬬班元微之詩鬬班雲洶湧開扇雉參差朝班左右合為鬬班武后紀御殿日昧爽宰相兩省官鬬班於香案前俟扇開通事贊拜正元詩所云也唐百官志尚輦局大朝會扇一百五十六常朝不全設惟左右扇三許渾有秋日候扇詩蓋即所謂俟扇開贊拜者今本作候朝淺人所改勘契元酬樂天待漏詩未勘銀臺契先排浴殿關唐制殿門啓閉設魚契對較魚契者刻檀為魚金飾鱗鬛别刻檀板為坎足以容魚一置門使所一留宫中發鑰較勘相同始開謂之勘契銀臺者銀臺門也學士院在銀臺門內浴堂殿又在蓬萊殿東未開銀臺門巳召對浴堂殿先排關而入言其近君之密也劉鄴亦有待漏詩玉堂簾外漏遲遲明月初沉勘契時藥樹唐正衙宣政殿庭皆植松開成中詔入閣賜對官班退立東邊松樹下是也殿門外復有藥樹元微之詩云松間待制應全逺藥樹監搜可得知自晉魏以來凡入殿奏事官以御史一人立殿門外搜索而後許入謂之監搜御史立藥樹下至唐猶然太和中始罷之石林燕語罘罳余見前輩詩語稱罘罳及余時有所作詩俱似殿閣簷角網今考漢書文帝紀未央宫東闕罘罳災崔豹注云罘罳屏也復也顔師古云連闕曲覆重刻垣墉之處其形果然一曰屏劉熙釋名云罘罳在外門罘復也臣將入請事於此復重思也古今注云罘罳復思也合板為之亦築土為之每闕殿舍皆有焉郡國亦樹之合諸説觀之大抵是屏牆之類段成式云士林間多呼殿榱為復護雀網為罘罳誤據此其非簷角網可知矣第所釋之義終未明耳宛委餘編白間杜詩當寧陷玉座白間剝畫蟲文選景福殿賦云皎皎白間微微列錢注白間窗也墨莊漫録瓊澀蔡衡仲一日舉溫庭筠華清宫詩澀浪浮瓊砌晴陽上綵斿之句問豫曰澀浪何語也豫曰子不觀營造法式乎宫牆基自地上一丈餘疊石凹入如崖隒狀謂之疊澀石多作水紋謂之澀浪衡仲歎曰不通朩經知澀浪為何等語耶因語豫曰古人賦景福靈光含元者一一皆通朩經也升菴外集彤騶禇亮詩彤騶出禁中蓋謂伍伯服赤幘唱騶出禁中也中華古今注漢制伍百服赤幘纁衣韋韎率其伍以導引鄭良孺夕烽杜夕烽來不近每日報平安唐兵部烽式云冦賊不滿五百人放烽一炬得蕃界事宜知欲南入放兩炬蕃賊五百騎以上放三炬千人放四炬餘冦萬人亦四炬其放烽一炬至所管州縣鎮止兩炬以上者並至京元放煙火處即録狀馳驛奏聞若依式放烽至京訖賊回者放烽一炬報平安凡放烽報賊者三應三滅告平安者兩應兩滅遁叟過馬韓偓詩云外使進鷹初得按中官過馬不教嘶有自注云上每乘馬必中官馭以進謂之過馬既乘之躞蹀嘶鳴也今北都使宅尚有過馬廳蓋唐時方鎮亦僣效之因而名廳事云春明退朝録六印杜瘦馬行細看六印帶官字考唐六典凡在牧馬以小官字印印右膊以年辰印印右髀以監名印印尾側二歲以飛字印印左髀膊細馬次馬以龍形印印項左送尚乘者印三花及飛字印外又有風字印官馬賜人者以賜字印配諸軍及充傳送驛者以出字印印凡八此云六印意賜配者不在數耳遁叟十家唐女妓入宜春院謂之內人亦曰前頭人謂在上前也骨肉居教坊謂之內人家有請俸其得幸者謂之十家鄭嵎津陽門詩十家三國爭光輝蓋家雖多亦以十家呼之三國秦韓虢國也鄭良孺拔河戲中宗清明節幸梨園命侍臣為拔河戲韋承慶等應制獻詩其法以大麻絙兩頭繫十餘小索每索數人執之以挽力弱為輸玄宗亦行之有詩謂俗傳此戲必致年豐云遁叟白打錢王建詩寒食內人長白打庫中先散與金錢韋莊詩內官初賜清明火上相關分白打錢齊雲論白打蹴踘戲也兩人對踢為白打三人角踢為官場又丁晉公有白打大􅰟厮焦氏筆乘兩省杜甫退朝詩宫中每出歸東省贈岑參詩君隨丞相後我往日華東按唐制宣政殿前東廊曰日華門門東門下省在焉西廊曰月華門門西中書省在焉兩省遺補以東西分左右時杜為左拾遺岑為右補闕故其詩云云政事堂設中書省中宰相共議政事於此故岑之出又為隨丞相後也遁叟下同黃閣杜贈嚴武詩扈聖登黃閣明公獨妙年武時為給事中王伯厚云給事中屬門下省開元中改為黃門省故名黃閣此非是漢舊儀宰相聽事閣曰黃閣給事分判省事得借稱黃閣也詩題稱嚴為閣老六典云中書舍人在省以年深一人為閣老判本省雜事給事之在東省其判事與中舍對秩抑又可借稱閣老矣伯厚又引通鑑王涯亦嘗稱給事中鄭蕭韓佽為閣老此為得之三署禮闈唐人贈省郎詩多用三署及禮闈如沈佺期三署有光輝分曹值禮闈之類官之有郎自秦始秦置三署諸郎隸焉故稱郎者猶本所始漢制尚書郎主作文書起草更直建禮門爾雅宫中門謂之闈兹去建稱禮蓋省文梁武詔禮闈凌替郎置備員建禮之稱禮闈舊矣哀烏漢書天文志五帝坐後聚十五星為哀烏郎位晉志亦作依烏所謂郎官上應列宿者此也儲光羲贈韋昭應詩有我哀烏郎正用此近刻儲集者不知所出改哀烏為哀鳯殊堪捧腹御史擢省郎唐御史以擢省郎為美遷故蘇味道有賀故人崔馬二御史拜省郎詩極致豔羡之意蓋其時遷轉之法自如此御史職雖雄緊於唐尚未為尊也司空圖為分司御史盧擕贈之詩曰姓氏司空貴官銜御史卑老夫如且在不用嘆屯竒可證小説有改卑字為尊者亦見今日官制妄疑之耳試檢舊唐書司空本傳自明翰林院唐翰林院本內供奉藝能技術雜居之所以辭臣待書詔其間乃藝能之一爾開元以前猶未有學士之稱或曰翰林待詔或曰翰林供奉如李太白猶稱供奉自張垍為學士始别建學士院於翰林院之南則與翰林院分而為二然猶冒翰林之名蓋唐有𢎞文館學士麗正殿學士故此特以翰林别之其後遂以名官訖不可改俗稱翰林學士為坡者蓋唐德宗時嘗移學士院於金鑾坡上故稱鑾坡唐制學士院無常處駕在大內則置於明福門在興慶宫則置於金門不專在翰林院然明福金門不以為稱不常居之爾石林燕語粗官寄語長安舊冠蓋粗官到底是男兒宣武節度王彥威詩也粗官寄與真拋却賴有詩情合得嘗忠武節度薛能詩也唐人舊俗不歷臺省出領廉車節鎮者呼為粗官然能故歷臺省者何云云大率時情重內輕外厭薄戎旃雖以節使之尊自目乃爾遁叟下同一麾筆談謂今人守郡用顔延年一麾乃出守誤自杜牧始此説亦未為是觀三國志擁麾守郡文選建麾作牧此語在牧之前久矣漢制太守車兩幡所謂麾也唐人如杜子美柳子厚劉夢得皆用之謂之誤不可五馬唐人咏太守多用五馬如人生五馬貴五馬爛生光之類甚多或引詩孑孑干旟良馬五之以太守比州長之建旟為解則本篇四之六之又何獨不用也宋龐機先云古制朝臣乘駟馬車漢時太守出則增一馬遁齋間覽及學林新編引之然不如潘子真之説為確子真云禮天子六馬左右驂三公九卿駟馬左驂漢制九卿秩中二千石亦右驂太守則駟馬而巳其有功德加秩中二千石者亦右驂故以五馬為太守之美稱云胡仔中和樂職王褒傳益州刺史王襄使褒作中和樂職宣布三詩此是監司領朝廷德化無與太守事今人頌太守治政往往用之似失考中和者言政教隆平得中和之道樂職者謂百官萬姓樂得其常道宣布者謂德化周洽遍四海各為篇名張曲江任洪州日有詩曰樂職在中和此語尤謬野客叢談鶴俸皮日休新秋即事酒坊吏到常先見鶴俸符來每探支注云吳都有鶴料案殊未詳鶴俸之説曾文彥和博學之士有次韻趙仲美詩云寧羡一囊供鶴料會看千里躍龍媒注云唐幕府官俸謂之鶴料墨莊漫録為按竇友封元相武昌幕府有詩云邑人興謗易莫遣鶴支錢驅雞荀恱申鑒曰覩孺子之驅雞而見御民之術孺子之驅雞急則驚緩則滯馴則安此泛言治術然其用之縣令則始韋蘇州之驅雞嘗理邑後許渾亦有遁迹驅雞吏之句遁叟下同簿尉杜送髙適詩脫身簿尉中始與捶楚辭韓愈詩判司卑官不堪説未免捶楚塵埃間杜牧詩參軍與縣尉塵土驚劻勷一語不中治笞箠身滿瘡據此唐時卑官不免笞撻正與今代同史稱代宗命劉晏考所部刺史有罪者五品以上刻治六品杖訖奏聞豈但簿尉巳哉帖職皇甫曽贈國子柳博士兼領太常博士詩博士本秦官求才帖職難以兼官為帖職也員外檢校等名太宗定官額其後復有員外置又有特置同正員檢校兼守判知之類又有置使之名或因事而置事已則罷或遂置而不廢其名類頗多節使幕僚至檢校中丞往往而是末葉鎮帥無不檢校台司如薛能詩舊將已為三僕射之類踰濫至此官稱别名唐人好以它名標榜官稱今漫疏一二於此太尉為掌武司徒為五教司空為空土侍中為大貂散騎常侍為小貂御史大夫為亞台為亞相中丞為獨坐為中憲侍御史為端公雜端殿中為副端諫議為大坡大諫補闕為中諫又曰補衮拾遺為小諫給事郎為夕郎夕拜知制誥為三字起居郎為左螭舍人為右螭又並為修注吏部尚書為大天禮部為大儀兵部為大戎刑部為大秋工部為大起吏部郎為小天選郎為省眼禮部郎為小儀為南省舍人今曰南宫刑部郎為小秋祠部為冰廳屯田為田曹水部為水曹太常卿曰樂卿少卿為少常奉常鴻臚為客卿大理為棘卿評事為廷平將作監為大匠少監為少匠祕書監為大蓬少監為少蓬左右司為都公太子庶子為宫相宰相相呼為堂老兩省相呼為閣老尚書丞郎為曹長御史拾遺為院長下至縣令曰明府丞曰贊府贊公尉曰少府少公少仙云容齋四筆唐音癸籤卷十七
