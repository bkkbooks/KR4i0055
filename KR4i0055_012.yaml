body:
  text: 唐音癸籤卷十二明胡震亨撰樂通一雅樂調唐樂律吕主旋宫之法以五音加二變一宫二商三角四變徴五徴六羽七變宫各十二調為雅樂八十四調唐書樂志云旋宫之法因五音生二變因變徴為正徵因變宫為清宫七音起黃鍾終南呂迭為綱紀黃鍾之律管長九寸王於中宫土半之四寸五分與清宫合五音之首也加以二變循環無間其聲繇濁至清為一均凡十二宫調皆正宫也正宫聲之下無復濁音故五音以宫為尊十二商調調有下聲一為宫也十二角調調有下聲二宫商也十二徴調調有下聲三宫商角也十二羽調調有下聲四宫商角徴也十二變徴調居角音之後正徴之前十二變宮調在羽音之後清宫之前雅樂成調無出七聲本宫遞相用樂章則隨律定均合以笙磬節以鐘鼓云俗樂調唐俗樂其源亦本於雅樂宫調七曰正宫高宫中吕宫道調宫南吕宫仙吕宫黃鍾宫商調七曰越調大食調高大食調雙調小食調歇指調林鍾商角調七曰大食角高大食角雙角小食角歇指角林鍾角越角羽調七曰中吕調正平調高平調仙吕調黃鍾羽般涉調是為俗樂二十八調樂志云俗樂調皆從濁至清迭更其聲下則益濁上則益清慢者過節急者流蕩其宫調應夾鍾之律十二和雅樂之曲曰十二和和云者取大樂與天地同和也十二法天成數也一曰豫和以降天神冬至祀圜丘上辛祈穀孟夏雩季秋享明堂朝日夕月巡狩告於圜丘燔柴告至封祀泰山類於上帝皆以圜鍾為宫三奏黃鍾為角太蔟為徴姑洗為羽各一奏五郊迎氣黃帝以黃鍾為宫赤帝以函鍾為徴白帝以太蔟為商黑帝以南吕為羽青帝以姑洗為角二曰順和以降地祗夏至祭方丘孟冬祭神州地祗春秋巡狩告社宜於社禪社首皆以函鍾為宫太蔟為商姑洗為徴南吕為羽各三奏望於山川以蕤賓為宫三奏三曰永和以降人鬼時享禘祫有事而告謁於廟皆以黃鍾為宫三奏大吕為角太蔟為徴應鍾為羽各二奏祀先農皇太子釋奠皆以姑洗為宫送神各以其曲蠟兼天地人以黃鍾奏豫和㽔賔姑洗太蔟奏順和無射夷則奏永和以降神而送神以豫和四曰肅和登歌以奠玉帛天神以大吕為宫地祗以應鍾為宫宗廟以圜鍾為宫祀先農釋奠以南吕為宫望於山川以函鍾為宫五曰雍和凡祭祀以入俎天神之俎以黃鍾為宫地祗之俎以太蔟為宫人鬼之俎以無射為宫又以徹俎凡祭祀俎入之後接神之曲亦如之六曰壽和以酌獻飲福以黃鍾為宮七曰太和以為行節凡祭祀天子入門而即位與其升降至於還次行則作止則止其在朝廷天子將自內出撞黃鍾之鍾右五鍾應乃奏之禮畢興而入撞蕤賔之鍾左五鍾應乃奏之皆以黃鍾為宫又皇帝駕出太極門奏采茨至嘉德門止還亦然八曰舒和以出入二舞及朝賀皇太子王公之出入以太蔟之商九曰昭和皇帝皇太子以舉酒十曰休和皇帝以飯以肅拜三老皇太子亦以飯皆以其月之律為宫十一曰正和皇后以受冊受朝十二曰承和皇太子在其宫有㑹則奏之凡四十八曲開元中又造裓和三公升殿㑹訖下階屨行奏豐和享先農宣和祀孔宣父齊太公廟奏煌煌冲和𤣥元太清官奏大厯中以豫和同國諱改曰元和二舞二舞一曰治康文舞也一曰凱安武舞也舞八佾六十四人凱安六變一變象龍興參墟二變象克定關中三變象東夏賔服四變象江淮平五變象獫狁伏六變復位以崇象兵還振旅後以治康犯高宗諱改化康以用之郊廟宴饗各有曲郊廟初獻作文舞亞獻終獻作武舞太廟降神以文舞每室酌獻各用其廟之舞詳後凡元正冬至大朝㑹設饗二舞並陳於庭以次作廟舞獻祖廟舞曰光大懿祖曰長發太祖曰大基後改大政世祖曰大成高祖曰大明太宗曰崇德高宗曰鈞天中宗曰太和睿宗曰景雲𤣥宗曰廣運肅宗曰惟新代宗曰保大德宗曰文明順宗曰大順憲宗曰象德穆宗曰和寧敬宗曰大鈞文宗曰文成武宗曰大定昭宗曰咸寧各有曲懿僖二廟闕不著𤣥元太清宫舞混成紫極曲十部伎十部伎燕饗設之所以備華夷也一曰宴樂伎二曰清樂伎三曰西涼伎四曰天竺伎五曰高麗伎六曰龜兹伎七曰安國伎八曰疏勒伎九曰高昌伎十曰康國伎各有曲初唐仍隋舊燕饗設九部伎貞觀中伐高昌得其樂增為十部燕樂隋舊樂也清樂即清商曲南朝舊樂也樂志云清商曲武后時猶存六十三曲後存有辭者三十七曲白雪公莫巴渝明君聲鳳將雛四時歌明之君阿鐸舞歡白鳩團白紵懊子夜吳前溪子及聞扇憹長史烏督護棲夜飛讀曲估客烏夜啼雅石城壺莫愁林襄陽三楊伴歌驍常歡州舟采桑之春江花月夜時玉樹後庭花無堂堂曲泛龍明君雅歌四歌四有聲辭七上林十鳳雛共四四曲平調伎清調詳瑟調內平折茂命嘯天西凉以下夷樂郭倩云寶已後宴樂西涼龜兹部著録者二百餘曲而清樂天竺諸部不在焉鼓吹曲鼓吹軍樂也唐用以備鹵簿之儀一鼓吹部二羽葆部三鐃吹部四大橫吹部五小橫吹部凡八十五曲今書云七十五曲或字之誤鼓吹部三十六曲掆鼓十曲一驚雷震二猛獸駭三鷙鳥擊四龍媒蹀五靈夔吼六鵰鶚爭七壯士奮怒八熊羆哮吼九石墜崖十波蕩壑開元禮義羅曰掆鼓小鼓也先作之以引大鼓猶雅樂之有朄六典掆鼓夾金鉦律書樂圗云曲辭今無傳大鼓十五曲一元驎合邏二元驎他固夜三元驎跋至慮三曲嚴用晨曰嚴一元咳大至遊二阿列乾三破逵析利紇四賀羽真五鳴都路跋六他勃鳴路跋七相雷析追八元咳赤賴九赤咳赤賴十吐咳乞物真十一貪大訐十二賀粟胡真十二曲警用夜曰警一通考曰大鼓即古鼖鼓六典曰晨嚴三通夜警衆曲轉次而振晨嚴之曲按諸曲名似奚契語考隋志大鼓亦十五曲其詞本之鮮卑意唐仍其舊爾小鼓九曲一漁陽二雞子三警鼓四三鳴五合節六覆參七步鼓八南陽㑹星九單搖陳氏樂書唐樂圖小鼓一大鼓上負一小鼓卧之律書小鼓九曲一曲馬上用八曲嚴用長鳴一曲中鳴一曲長鳴中鳴角也樂書唐鹵簿角或以竹朩或以皮非有定制長鳴一曲三聲一龍吟聲二彪吼聲三阿聲茂中鳴一曲三聲有一蕩聲小二牙聲梅三送聲郭倩云唐大角曲大單于單于大花小梅花其聲猶有存者羽葆部十八曲一太和二休和三七德四騶虞五基王化六纂唐風七厭炎精八肇皇運九躍龍飛十殄馬邑十一興晉陽十二濟渭險十三應聖期十四御宸極十五寧兆庶十六服遐荒十七龍池十八破陳樂樂書羽葆鼓五綵重蓋架垂流蘇植羽六典羽葆鼓夾歌簫笳德按柳子厚嘗以魏晉後代有鐃歌鼓吹曲紀受命功唐獨無有補撰曲十二表上之今諸曲自基王業至服遐荒高祖太宗功德具在何言無也龍池𤣥宗潛邸瑞應破陳樂在龍池後意亦𤣥宗小破陳樂曲觀二曲綴末則知此十八曲者開元帝所定無疑矣其先之太和休和者唐雅十二和其七用以祀其二后及太子用之惟昭和及此二和用之天子或因而襲其名為曲未可知騶虞者古訓騶御虞人禮天子教于田獵命七騶咸駕射則歌以為節宜用為鹵簿曲名而七德一曲即神功破陳樂武舞之名太宗所用得天下歌之尤以昭功德也諸曲倫次之目或未必如魏晉以來所傳者之整比然遵用久矣一代典制故自無闕也子厚之曲雖表上未聞施用蓋所謂雖善不尊不尊不信者而至謂有司本無其曲為之補撰非夫偶疏於考據則亦其急於自衒而姑為之說爾安得以言出柳州遂信之乎鐃吹部七曲一破陳樂二上車三行車四向城五平安六歡樂七太平律書樂圖鐃軍樂六典曰鐃鼓夾歌簫笳樂書又曰七曲各有亂大橫吹部二十四曲一悲風二遊絃三間絃明君四吳明君五古明君六長樂聲七五調聲八烏夜啼九望鄉十跨鞍十一間君十二瑟調十三止息十四天女怨十五楚客十六楚妃歎十七霜鴻引十八楚歌十九胡箶聲二十辭漢二十一對月二十二胡笳明君二十三湘妃怨二十四沈湘六典曰大橫吹有節鼓夾笛簫觱篥笳桃皮觱篥陳氏樂書引唐樂圖所載二十四曲名與此不同附記曰樂圗云大橫吹二十四曲內三曲馬上警嚴用之一歡樂樹二曰空口蓮三曰賀六渾其餘二十一曲備擬所用一曰靈泉雀二曰達和若輪空三曰白淨王子四曰他賢逸勤五曰鳴和羅純羽􅀈六曰歎度熱七曰吐久利飩比倫八曰𤣥比敦九曰植普離十曰胡笛爾笛十一曰鳴羅特罰十二曰比久汰大汗十三曰於理真斤十四曰素和斛律十五曰鳴纜真十六曰烏鐵甘十七曰特介汗十八曰度賔哀十九曰阿若干樓達二十曰大賢真二十一曰破陳樂小橫吹部曲與大橫吹同六典曰小橫吹夾笛簫觱篥笳桃皮觱篥無節鼓儀衛志云有角其曲失傳郭茂倩疑以為與大橫吹同故不見大射樂章大射皇帝射騶虞二奏王公射貍首一奏迎送皇帝入閣奏太和凡四曲鄉飲酒樂章鄉飲酒鹿鳴三奏南陔一奏嘉魚四奏崇丘一奏關雎五奏鵲巢三奏凡十七曲二禮曲唐用古詩名别製非即用古詩侲子之唱大儺有侲子之唱開元禮所載辭與劉昭志漢辭同蓋沿其舊也凱歌大征伐有功奏凱入其歌曰破陳樂曰應聖期曰賀聖歡曰君臣同慶樂凡四曲樂志云前二曲太常舊有其辭後二曲太和中補造今檢劉禹錫集四曲實並其所撰志難盡據論唐初樂曲散佚初太宗命祖孝孫等定雅樂尋詔褚亮等分製樂章高宗上元中復令太常少卿韋萬石與太史令姚元辨增損當時郊廟燕㑹樂曲逮則天稱制改易典章歌辭多是內出開元中詔中書張說復行釐正上自定聲度說為之辭中間雜用貞觀舊辭為多太常卿韋縚嘗銓敘為五卷付大樂鼓吹兩署習之此一代樂章刋定始末也奈舊史不能考遵前代史例於樂志中祗録郊廟而無朝㑹宴射等曲新志則并郊廟不録其辭因日就亡佚舊史書序云宴樂歌辭太常先有宫商角徴羽五調調各一卷是貞觀中侍中楊仁恭妾趙方等輯近代詞人雜詩為之者韋縚亦嘗令太樂令孫𤣥成整比為七卷以辭多不經不録今考㑹要殿庭元日冬至朝㑹樂章七元日迎送皇帝奏太和開元中源乾曜作羣官行奏舒和上公上壽奏休和皇帝受酒登歌奏昭和顯慶中李義府作中宫朝㑹樂章四東宫朝㑹樂章五亦義府作此固雅樂曲也何以亦不録乎辭之近鄭衛者既盡為之刪其稍近雅者又復不亟存一二唐樂章之挂漏獨甚史家固不能辭其責也唐音癸籖卷十二
