body:
  text: 唐音癸籖卷二十六明胡震亨撰談叢二杜甫詩中每自稱潜夫顧况詩中每自稱悲翁可作對唐詩人别號槩有之如皮日休之間氣布衣不迂乎元次山既號猗玕子矣復四易其號為浪士漫郎漫叟聱叟不太繁乎皆可發一笑者人知老杜官拾遺不知太白亦嘗徵拜拾遺世以草堂屬杜乃李詩亦恰號草堂集兩大家巧合如此李以拾遺徵在殁後故史不著范傳正墓碑記之太白每自比相如少時蘇頲所品目也其薦以玉真公主見魏灝序讒而出以張垍亦見范碑云老杜宴集往往贊人食味如且食雙魚美誰看異味重之類不一而足至華筵直一金直與估價過矣酸窮可憐於法自當得貧蘇渙以盜始以盜終其人何如人哉杜稱為靜者寄詩望其致主堯舜屢讃不已殊可怪湖南後交游益寥落窮途傾蓋許與遂至過濫耳即今漂泊干戈際屢貌尋常行路人豈獨為曹將軍言哉李贈杜止一詩杜憶李有數詩意尤懇至李闊略杜繾綣同調也疑李輕杜者非是大歷才子及接開寶諸公相倡和者未可僂指錢起司空曙之於王維戎昱之於杜甫其尤著者唐人詩譜入樂者初盛王維為多中晚李益白居易為多以時事入詩自杜少陵始以名場事入詩自孟東野始韓退之多悲詩三百六十言哭泣者三十首白樂天多樂詩二千八百言飲酒者九百首方勺云白公好以年幾入詩不止百十處後東坡亦然詩不改不工老杜所謂語不驚人死不休是也今人苐哂白香山詩率易不知其詩亦非草草就者宋張文濳嘗得公詩草真蹟㸃竄多與初作不侔云詩人慕同調挹師資多不勝企羡情昔人以得文友詩敵其適遺形其樂忘老非虛也羅紹威慕羅江東詩用魏人沈任集中作賊語號已詩為偷江東集大是可兒王轂舉生平得意句市人為之罷毆李涉贈相逢莫避詩夜客為之免剽唐愛詩識詩人何多人嗜吟便有一種癡興好以詩舉似人博人贊美雍陶亟揖遊客周朴狂追士人豈伊真昧見罔抑亦聊寄賞懷方采山云詩有態乎哉乃杜有詩態憶吾曹也賦詩新句穩不覺自長吟此其態也歟可也詩成覺有神興來縱筆搖五嶽以此言態態乃慚矣今之態甚乎哉此言有為而發然實中詩人通病詩有偶然到處雖名手極力搜索亦不能加楊汝士不知於此道何如能令白公托言冷淡生活閣筆元笑白善全其名夫豈惟古人之能全其名哉亦其能服善不若今人強顔爭勝甘出醜無忌耳元稹鎮武昌嘗命從事周復唱酬復辭稹某偶以大人往還獲一第實不能詩賦稹嘆曰質實如是賢於能詩逺矣今天下安得有此等人詩未有劉長卿一句已呼阮籍為老兵筆語未有駱賓王一字已罵宋玉為罪人此皇甫湜為元和時人歎也嗟乎今才搦管便罵前輩者多矣湜在當何如致愾余嘗與客品摘唐賢詩客輒以為無庸是此豈欲為死人請正愳我亦以此待彼耳牛僧孺未第時以詩謁劉中山中山為之飛筆㸃竄牛唯唯占謝而心實銜之至作相後才吐中山公愧悔至以之戒子孫王建云人怪考詩嚴此怪字正古今通病也詩非同調豈可浪與言哉晚唐人集多是未第前詩其中非自叙無援之苦即訾他人成事之由名場中鑽營惡態忮懻俗情一一無不寫盡唐士子應舉多遍謁藩鎮州郡丐脂潤至受厭薄不辭如平曽三縑恤旅途之恨張汾二千貫出往還之誇鄙穢種種至所干投行卷半屬讇辭概出贋勦若小說所稱百錢買自書鋪并荆南表丈一時乞取者真堪令人捧腹士風凌夷至此總科舉為之流弊也唐實録載韋執誼從兄夏卿為吏部侍郎執誼為翰林學士受財為人求科第夏卿不應乃探出懷中金以納夏卿袖夏卿擺袖引身而去豈當時鬻科價尚廉可第從懷中齎擕耶然納袖法今竟通行進士科初采名望後滋請托至標榜與請托爭途朋甲共要津分柄如所云欲得命通問瑝嵎都雍等諺更可駭詫矣嗚呼今日得無類之按朋甲唐人有畫圗畫舉子七十八人列二隊指呼紛紜如相嘲競者意諸甲必各有脉路與朝貴通成就人故氣力足以奔走同輩令入隊耳若攪場十惡又是一種無賴舉子禮部得而黜之者非其倫也王弇州譏唐舉子津私禁臠自比優伶關節幸璫身為軍吏豈知更有從朱三乞薦表後復逃去自潔如殷文圭者哉名場險行一至此樂帥子髙雞泊殺王鐸一事李山甫導之也史言山甫數舉進士被黜怨中朝大臣故有此舉考鐸傳咸通典試而小說山甫罷舉亦在咸通中山甫被黜即鐸也豈泛怨哉舉子主司至此塗地盡而唐事亦不可為笑韋莊在中朝時嘗奏詩人不第者十五人殁者贈官存者補賜進士第嗟乎彼謂一第足重人哉莊亦擢是科者耳建僣號而儼然為之相何取進士第劉夢得嘗愛張文昌朝衣暫脫見間身之句及自為詩有云沉舟側畔千帆過病樹前頭萬木春若不勝宦途遲速榮悴之感曲為之擬者嗟乎人所繇不能真脫朝衣長享間者正以此耳思之能無浩嘆嘗謂客曰讀韓滉黃金散盡教歌舞留與他人樂少年聲伎不必蓄讀白樂天多少朱門鎖空宅主人到老不曽歸園亭不必置客曰如此太喫虧了因一笑唐人仕宦每重內輕外如領郡輒無色欲把一麾江海去見諸詩不一至州縣親民吏尤視為輕銓曹不甚加意薛保遜有文云嘗於灞上逆旅見數物象人詰之口輒動皆云江淮嶺表州縣官也嗚呼天子生民為此輩笞撻治之不古此尤其大端歟韋應物答故人見諭詩時風重書札物情敦貨遺機杼十縑單慵疏百函愧嘗負交親責且為一官纍唐時仕路亦蚤復重此事令人以守正為憂私覿行則公道不明禮際盛則剝取必橫以釀亂實隱而大一出縱知邊上事舉朝誰信語堪聽此李涉連雲堡詩也邊上事做不得說不得今古一揆杜詩云任轉江淮粟休添苑囿兵由來貔虎士不滿鳯凰城最曙天下大計矣人主守在四夷區區添兵京城足救緩急乎椓人可畏主兵柄尤可畏唐人諷切及此輩者自况之囝詩居易之司天臺歌李商隱之有感二律外無聞焉即其詩㫖亦靡弗譎而晦也使天下不敢言而猶欲恃之以保危祚何怪乎終為令孜諸奴所誤哉黃巢之亂禮闈試士出至仁伐不仁賦題士子有錯把黃巢比武王之誚而其時主兵出討巢者且擕姬妾行致幕客有夫人北來不如降巢之謔始知末世人心肝大扺多同唐初及第人多從赤尉或幕辟入臺省漸陟樞要非回旋數十年不能致相位逮末季崔昭緯登第七年相桞璨登第四年相矣國事逾亟仕路乃逾捷有國者之殷鑒也世多以歇後鄭五為笑柄鄭五未可笑也渠嘗有詩題中書堂云側坡蛆蜫蜦蟻子競來拖一朝白雨中無鈍無嘍囉言國運且衰旦夕有愚智同盡之禍也若今人處此則一切諱言矣唐有殷安者嘗謔其子堪為宰相曰汝肥頭大面不識今古噇食無意智不作宰相而何我謂肥頭大面能噇食猶盛時有福氣宰相也若末世只無意智不識今古七字勾做宰相矣記僖昭時有白衫舉子乞而歌於市云執板髙歌乞箇錢塵中流浪且隨緣直饒到老長如此猶勝危時弄化權嗟乎使下第舉子寧為乞丐無為宰相天下安得不亡余每讀韓偓臨殁遺所藏召對燭跋及顔蕘朱葆光諸人正旦嶽祠號慟望拜舊闕事為淚落至讀羅昭諌請錢鏐舉兵討梁又不禁髮上衝冠矣當年誤國者不知幾何人亦又不知易面向何處去獨留此數老為忠義碩果亦王澤之猶存而詩教之未盡墜地也唐音癸籖卷二十六
