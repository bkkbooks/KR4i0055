body:
  text: 唐音癸籖卷二十五明胡震亨撰談叢一四子軼事不少概見惟楊盈川有呼朝士為麒麟楦一事當時自謂宗師妙今日唯觀對屬能義山自咏爾時之四子爾曹身與名俱滅不廢江河萬古流杜少陵自咏萬古之四子嘗怪陳射洪以拾遺歸里何至為縣令所殺後讀沈亞之上鄭使君書云武三思疑子昻排擯隂令邑宰拉辱死非命始悟有大力人主使在故至此排擯不知云何子昻故武攸宜幕屬也釁所生必自此始矣遊凶人間得自免故難哉杜必簡未見替人之謔非侮宋也宋與杜差肩交正挹宋深聊戲耳宋祭杜文云君之將亡贈言宛轉命子誡妻既懇且辨其見待之莊實如此延清張仲之一事吾不能為之解雲卿㺯詞丐寵其猶在末減耳兩人者一憯盡一以夀終抑天道有然燕公鉉業且未論如何得士子一聮手題政事堂賞借今宰相有此勝韻否曲江公湞陽峽詩惜此生遐逺誰知造化心讀此欲笑栁子厚一篇小石城山記蚤被此老縮入十箇字中矣栁嘗謂燕公文勝詩曲江詩勝文見采掇素嚮云孟襄陽伴直從牀底出見明皇有諸乎果爾不逮坦率宋五逺矣令人主一見意頓盡何待誦詩始決也宋人以荆公四家詩不選太白嫌其羡説富貴多俗情而近代王弇州亦謂其上皇西巡一歌地轉錦江成渭水等句不異宋人東狩錢塘封事譏論尤切夫白亦詩酒自娛跌宕一生者耳安能顧語忌拘教義為是屑屑者哉詩人各自寫一性情各自成一品局固不得取錦袍豪翰強繩以瘦笠苦藻必同籥吹為善也太白永王璘一事論者不失之刻即曲為諱失之誣惟蔡寬夫之説為衷其言云太白非從人為亂者蓋其學本出從橫以氣俠自任當中原擾攘時欲藉之以立竒功耳其詩曰空名適自誤迫脅上樓船又云南風一掃煙塵淨西入長安到日邊亦可見其志矣大扺才髙意廣如孔北海之徒固未必有成功而知人料事尤其所難議者或責以璘之猖獗而欲仰以立事不能如孔巢父蕭頴士察於未萌斯可矣若其志亦可哀矣斯言也起太白九原儻亦心服杜子美傲好自誇標其詩嘗向鄭虔言之虔猥云汝詩可已疾會虔妻痁作語虔去讀吾子璋髑髏血糢糊手提擲還崔大夫立瘥矣如不瘥讀句某未間更讀句某如又不瘥雖和扁不能為也余每誦此覺此老稱詩豪舉態躍躍目前為絶倒是出語林唐撰也本朝人豈不悉鄭逺謫無從取蜀詩舉似要以借同心期人曲模髙詡生靣正所謂頰添三毛不必有之而愈肖者後人拈公詩氣劘屈賈壘目短蕭劉牆等為公大言自負證太實相那能使吟子得真杜影子看千載僅有杜詩千載僅有杜公詩遘耳凡詩一人有一人本色無天寶一亂鳴候止寫承平無拾遺一官懷忠難入篇什無杜詩矣故論杜詩者論於杜世與身所遘而知天所以佐成其詩者實巧杜陵之依嚴武契分不薄斥武父名一事舊史云不為忤新史云武䘖之欲殺而免新史本唐小説以武貽杜詩有莫倚善題鸚鵡賦之句也洪容齋獨以為武決不肯自比黃祖杜集中詩為武作者幾三十篇意並殷至沒後哭歸櫬及八哀詩尤痛似決無欲殺事不如舊史足據其言甚辨雖然武伉暴人也於幕客他可忍肯并忍其呼父名恬不介意乎言欲殺過言不為忤亦過重以武有殺章彛之事杜嘗依彛梓州最厚且久處其際不尤難言哉荆南追述詩結舌防讒柄探腸有禍胎情稍見矣殺機時動幸不犯殺鋒新史殆非全誣若贈答追挽詩中無一語介介則甫之厚而亦風人之義也王摩詰與儲光羲並有受偽署一事儲不聞昭雪王昭雪後宦路稍亨或以棣蕚故人生一死自難何敢輕議雖然未若李華也華自傷隳節力農甘貧稿終身徵召不起較摩詰知所處矣髙適詩人之達者也其人故不同甫善房琯適議獨與琯左白誤受永王璘辟適獨察璘反萌豫為備二子窮而適達又何疑也岑嘉州罷郡佐幕日正崔寧跋扈杜相委柄時也嗣後鎮帥往往阻命參佐自拔匪易蜀事漸非矣思深哉招蜀客北歸一辭乎蚤智徵焉勸忠寓焉是不當僅以詩人目者王績之詩曰有客談名理無人索地租隱如是可隱也陶潛之詩曰飢來驅我去叩門拙言辭如是隱隱未易言矣白樂天之詩曰冒寵巳三遷歸朝始二年囊中貯餘俸園外買間田如是罷官官亦可罷也韋應物之詩曰政拙欣罷守間居初理生聊租二頃田方課子弟耕罷官如是恐官正未易罷耳韋與陶千古並稱豈獨以其詩哉韋左司身多疾病思田里邑有流亡愧俸錢仁者之言也劉辰翁謂其居官自愧閔閔有恤人之心正味此兩語得之若髙常侍拜迎官長心欲碎鞭撻黎庶令人悲亦似厭作官者但語微帶傲未必真有退心如左司之一向淡耳大歷詩家包佶最有功名德宗西狩日佶領租庸鹽鐵間道遣貢行在王室賴以紓難十才子如司空附元載之門盧綸受韋渠牟之薦錢起李端入郭氏貴主之幕皆不能自逺權勢考劉長卿嘗為鄂嶽觀察吳仲孺誣奏繫獄朝遣御史就推得白仲孺正令公壻豈長卿生素剛婞不屑隨十才子後曵裾令公門下歟亦可微窺諸人之品矣仲孺之為郭氏壻見令公夫人墓志中詩道須前後輩相推引李杜兩大家不曽成就得一箇後輩來殊可惜惟昌黎公有文章官位聲名任得此事公又實以作人迪後擔子一身肩承史稱其奬借後輩稱薦公卿間寒暑不避而會其時所曲成其業與其身名如孟郊李賀賈島其人者又皆間出吟手能偕公翻鬬新異換奪一世心眼傳後以故繼諸人而起者復燈燈相繼續不衰追頌公亦因不衰終唐三百年求文章家一大龍門非公其誰歸韓門詩𣲖之衆且逺詳見宋張洎論張籍格律中或問余退之道學人也史譏其作毛頴傳近戲白樂天謂其病沒繇服丹藥而張籍祭以詩亦有坐出二侍女合彈琵琶筝句似稍蓄聲伎者然歟否耶余曰退之亦文士雄耳近被腐老生因其闢李釋硬推入孔家廡下翻令一步那動不得栁子厚汚王叔文黨坐貶荒逺不得昭雪以死惟范仲淹論之以為觀子厚述作涉道非淺如叔文果狂甚必不交叔文人望輕然傳稱知書好論理道其引劉栁等決事禁中如議罷中人兵權忤俱文珍輩又絶韋臯私請欲斬支使劉闢意非忠乎會順宗病篤臯䘖私恨揣憲宗意請監國而誅叔文子厚輩名為黨人者豈復見雪史書因其成敗書之無所裁正耳此論亦恕亦確然則韓志栁墓何無一言為此事辨乎曰當愈時叔文未可原而其説尚未可盡也李賀之見格進士舉元稹修怨也韓愈之為賀作諱辨以辨者雖才賀實與稹素分徑激而為之説也稹黨李逢吉與裴度左愈受裴度知與稹及逢吉左愈集有刺逢吉詩可考道固不同初稹以詩投賀賀誚明經出身不當言詩因結憾倡犯諱事阻其進事見劇談録陳師道嘗言劉義一生只有兩事作冰柱雪車二詩以遂身後之名取韓退之金以濟生前之困可謂簡而當矣余每讀此欲絶倒孟郊賈島皆以詩窮至死而平生尤自喜為窮苦之辭孟有移居詩云借車載家具家具少於車乃是都無一物耳又謝人惠炭云暖得曲身成直身人謂非其身備嘗之不能道此句也賈云鬢邉雖有絲不堪織寒衣就令堪織能得幾何又其朝飢詩云坐聞西牀琴凍折兩三絃人謂其不止忍飢而已其寒亦何可忍也此歐公語雖近謔寫二子窮態頗盡樂天平生詩文既髙立朝議論忠直而有用為郡守所至有遺愛處謫地不少挫屈於牛李二黨雖與之從遊不為所汚亦不致為所忮賈禍晚年優遊分司有林泉聲伎之奉嘗自敘其樂謂本之於省分知足濟之以家給身間文之以觴詠弦歌飾之以山水風月一皆實録又深明佛理洞究性原而其所得者全名髙夀祿位亦不為不貴是真可慕羡者倪思樂天非不愛官職者每説及富貴不勝津津羡慕之意讀樂天詩使人惜流光輕職業滋頽惰廢放之念非蟋蟀風人無已太康職思其居之義也羅大經合此兩家評足盡白氏矣唐詩人生素享名之盛無如白香山初疑元相白集序所載未盡實後閲豐年録開成中物價至賤村路賣魚肉者俗人買以胡綃半尺士大夫買以樂天詩則所云交酒茗信有之又從酉陽雜爼得劄青事有刺樂天詩意於身詫白舍人行詩圖者是又人體膚且為所涅矣豈但疥牆壁已哉因嘆此老得名至此豈不折盡一生福來隲無他虧而禍酷斬祚將無造物者有意為之缺陷耶夢得靖安佳人怨及白氏太和九年某月日感事詩為武相伯蒼王相廣津作者實並銜宿怨故劉先於叔文時斥武宜武有補郡見格之報白嘗因覆策事救王王固不應下石訐白母大不幸事令白有江州謫也事各有曲直而怨之淺深亦分在風人忠厚之教總不宜有詩然欲為兩人曲諱如坡公之説則政自不必耳劉禹錫妓有為李逄吉奪去請以詩不得者又有是李紳妓贈以詩紳因轉贈者小説非必盡實然以一人詩乾賠既寃白賺亦太幸殊堪盧胡劉禹錫播遷一生晚年洛下間廢與緑野香山諸老優遊詩酒間而精華不衰一時以詩豪見推公亦自有句云莫道桑榆晚為霞尚滿天蓋道其實也公自貞元登第歷順憲穆敬文武凡七朝同人雕落且盡而靈光巋然獨存造物者亦有以償其所不足矣人生得如是何憾哉杜牧之門第既髙神頴復雋感慨時事條畫率中機宜居然具宰相作略顧回翔外郡晚乃升署紫微堤築非遙甑裂先兆亦繇平昔詩酒情深局量微嫌疏躁有相才乏相器故爾自牧之後詩人擅經國譽望者概少唐人材益寥落不振矣紫微與元白待張祜一案幾成詩獄初杜與白論詩不合而祜亦常覓解於白失其意後彭陽公薦祜詩於朝元復左袒白奏罷之紫微守秋浦因激而為祜稱不平與祜交偏厚贈祜詩有不羡人間萬户侯句而於元白盛稱李戡欲用法治其詩之説使諸公仕路相值豈有幸哉獨惜一祜詩受鏑於斯因受盾於斯匪拜詩賜紫微拜詩禍紫微矣歎賢達成心難化至此溫李皆遊令狐相之門交皆不終溫不終以平昔狼籍口語不愼故恨尚淺李不終以其忘家恩受贊皇黨人辟從宦塗門户起見恨較深溫楊子院一訴僅置不理李九日感舊詩至并所題廳閉之不處情可知已士君子出身一有倚托後便去就兩難李錯處不在忘恩正在受恩初耳然亦見當時黨禍之烈其微蔓亦如此溫李詩皆輕豔李集中情詩尤多然妻死府主選樂籍一人贈之自云棲志禪玄不納有謝啓辨生平篇什中無賴事非實信爾當非僅佻達一生者薛大拙在晚雋中自負甚髙名譽亦甚盛但屑屑較量官位有舊將已為三僕射賤身猶是六尚書之歎且自鄙節帥為粗官若不可一日居者嘗令其幼子具櫜鞬見客云與渠消災生當用武之世賤藐武人若爾安得不禍及乎皮陸以萍合唱和吳中因而齊稱是時皮已登第陸尚困舉場然後來皮不免於難陸以散人扁舟五湖三泖間終享隱居之樂所得又視皮孰多也唐音癸籖卷二十五
