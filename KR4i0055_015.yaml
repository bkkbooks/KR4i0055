body:
  text: 唐音癸籤卷十五明胡震亨撰樂通四總論往代之詩樂徵其文觀之其興衰可見也樂之所感微則占於音章則見於詞微於音者聖人察之章於詞者賢人畏之沈亞之詩訖於周離騷訖於楚自後詩之流為賦頌銘贊文誄針詩行咏吟題怨嘆章篇操引謠謳歌曲詞調名二十有四皆詩人六義之餘也繇操而下八名皆起於郊祭軍賓吉凶苦樂之際在音聲者因聲以度調審調以節唱句度短長之數聲韻平上之差莫不繇之准度而又别其在琴瑟者為操引採民氓者為謳謠備曲度者總得謂之歌曲詞調斯皆繇樂以定詞非選詞以配樂也繇詩而下九名皆屬事而作雖題號不同悉謂之為詩後之審樂者往往採取其詞度為歌曲蓋選詞以配樂非繇樂以定詞也元稹古之論樂者一曰古雅樂二曰俗部樂三曰胡部樂古雅樂更秦亂而廢漢世惟采荆楚燕代之謳稍協律吕以合八音之調不復古矣晉宋六代以降南朝之樂多用吳音北國之樂僅襲夷調及隋平江左魏三祖清商等樂存者什四世謂為華夏正聲蓋俗樂也時沛國公鄭譯復因龜兹人白蘇祗婆善胡琵琶而翻七調遂以製樂唐人因而用之以定律吕繇是觀之漢世徒以俗樂定雅樂隋氏以來則復悉以胡樂定雅樂唐至𤣥宗始以法曲與胡部合奏夷音夷舞進之堂上而雅樂之工以坐立伎部不堪者充之過為簡賤至此宜乎正聲淪亡古樂之不可復矣吳萊樂馬端臨云隋唐燕樂西戎之居大半鄭夾漈以為音未有不自西出此固一說愚則以為自晉氏南遷之後劉石亂華如符氏出於氐姚氏出於羌皆西戎也亦既奄有中原而以議禮制度自詭及張氏據河右獨能得華夏之舊音繼以吕光秃髮沮渠之屬又皆西戎也蓋華夏之樂流入於西戎西戎之樂混入於華夏自此始矣隋既混一合南北之樂而為七部伎所謂清商三調者本中華之樂晉室播遷而入於凉州張氏亡而入於秦姚氏亡而入於江南陳亡而復入北其轉折如此則其初固本不盡出西戎也要不可不辨近時樂家多為新聲其音譜傳移類以新竒相勝故古曲多不存頃見一教坊老工言惟大曲不敢增損往往猶是唐本而絃索樂家守之尤嚴言凉州者謂之護索取其音節繁雄言六么者謂之轉關取其聲詞間婉元微之詩云凉州大篇最豪嘈録要散序名蘢撚護索轉關豈所謂豪嘈蘢撚者耶唐起樂皆以絲聲竹聲以之合樂樂家所謂細抹將來者是也故王建宫詞云琵琶先抹緑腰頭小管丁寧側調悠近世以管色起樂而猶存獨抹之語蓋誦襲弗悟爾蔡寬夫詩話詞曲古樂府者詩之旁行也詞曲者古樂府之末造也倚聲製詞起於唐之季世困學紀聞古樂府詩四言五言有一定之句難以入歌中間必添和聲然後可歌如妃呼豨伊何那之類是也唐初歌曲多用五七言絶句律詩亦間有采者想亦有賸字賸句於其間方成腔調其後即以所賸者作為實字填入曲中歌之不復别用和聲則其法愈密而其體不能不入於柔靡矣此填詞所繇興也宋沈括考究所始以為始於王涯又謂前此貞元元和間為之者巳多云遁叟云朱子古樂府只是詩中間却添許多泛聲後來人怕失了那泛聲逐一聲添箇實字遂成長短句今曲子便是荆公云古之歌者皆先有詞後有聲故曰歌永言聲依永如今先撰腔子後填詞却是永依聲也世所盛行宋元詞曲咸以昉於唐末然實陳隋始之蓋齊梁月露之體矜華角麗固巳兆端至陳隋二主並富才情俱湎聲色所為長短歌行率宋人詞中語也煬之春江玉樹等篇尤近至望江南諸闋唐宋元人沿襲至今詞體濫觴實始斯際自文皇以鴻裁碩藻撥六朝餘習而力反之子昂太白相望竝興逮少陵氏作出經入史剗絶淫靡有唐三百年之詩遂屹然羽翼商周驅駕漢魏藉令非數君子砥柱其間則花間草堂將踵接於武德開元之世詎宋元而後顯哉蓋六朝五代一也障其瀾而上則詩盛而為唐襲其流而下則詞盛而為宋余因是知陳李少陵厥功於藝苑甚偉而歐陽王蘇黃秦諸君子弗能弗為三嘆而致惜也胡應麟莊嶽委談詩至於唐而格備亦至於唐而體窮故宋人不得不變而之詞元人不得不變而之曲胡應麟詩藪而王元美云三百篇亡後有騷賦騷賦難入樂而後有古樂府古樂府不入俗而後以唐絶句為樂府絶句少宛轉而後有詞詞不快北耳而後有北曲北曲不諧南耳而後有南曲律調凡樂每調皆具七聲而樂家惟取其起調畢曲之律以名之蓋以起調之字之聲為主中間逗遛曲折雖行乎均內七聲末復歸於本律謂以六聲贊助以成其調其實一聲也朱晦菴拍曲之有拍蓋以為樂節也牛僧孺嘗字之為樂句大為韓公所賞明皇嘗遣黃幡綽造拍板譜於紙上畫兩耳以進云但有耳無定節奏也遁叟叠舊傳陽關三叠然今歌者每句再叠而巳通一首言之又是四叠皆非是或每語三唱以應三叠之說則叢然無復節奏嘗得古本陽關其聲宛轉凄斷不類向之所聞每句皆再唱而第一句不叠樂天詩云相逢且莫推辭醉聽唱陽關第四聲注第四聲勸君更盡一杯酒以此驗之若第一句叠則此句為第五聲今為第四聲則第一句不叠審矣東坡遍曲有大遍有小遍元稹詩逡巡大遍凉州徹所謂大遍者有序引歌㽂嗺哨催攧袞破行中腔踏歌之類凡數十解有數叠者裁截用之則謂之摘遍今人大曲皆是裁用悉非大遍也夢溪筆談破唐人以曲遍中繁聲為入破陳氏樂書以為曲終者非也如水調歌凡十一叠第六叠為入破當是曲半調入急促破其悠長者為繁碎故名破耳起於天寶間有此名卒兆安史亂家國破五行志以為非祥兆然竟不可革云遁叟犯樂府諸曲自古不用犯聲以為不順也唐自天后末年劒氣入渾脫始為犯聲之始劒氣宫調渾脫角調以臣犯君故為犯聲明皇時樂人孫處秀善吹笛好作犯聲時人以為新意而效之因有犯調五行之聲所司為正所欹為旁所針為偏所下為側故正宫之調正犯黃鍾宫旁犯越調偏犯中吕宫側犯越角之類陳暘解自古奏樂曲終更無他變隋煬帝以清樂雅淡曲終復加解音至唐遂多解曲如火鳯用移都師解柘枝用渾脫解甘州用吉了解耶婆娑雞用屈柘急遍解之類古今樂録云傖歌以一句為一解中國以一章為一解王僧䖍云古曰章今曰解作詩有豐約制解有多少是解本章什通名非僅言其卒章之亂也自隋唐曲終解曲盛行遂將解字當卒章字用而章解之解别稱叠稱遍不復更稱解矣遁叟下同唐人樂府不盡譜樂古人詩即是樂其後詩自詩樂府自樂府又其後樂府是詩樂曲方是樂府詩即是樂三百篇是也詩自詩樂府自樂府謂如漢人詩同一五言而行行重行行為詩青青河邊草則為樂府者是也樂府是詩樂曲方是樂府者如六朝而後諸家擬作樂府鐃歌朱鷺艾如張橫吹隴頭出塞等只是詩而吳聲子夜等曲方入樂方為樂府者是也至唐人始則摘取詩句譜樂既則排比聲譜填詞其入樂之辭截然與詩兩途而樂府古題作者以其唱和重復沿襲可厭於是又改六朝擬題之舊别創時事新題杜甫始之元白繼之杜如哀王孫哀江頭兵車麗人等白如七德舞海漫漫華原磬上陽白髮人諷諫等元如田家捉捕紫躑躅山枇杷諸作各自命篇名以寓其諷刺之指於朝政民風多所關切言者不為罪而聞者可以戒嗣後曹鄴劉駕聶夷中蘇拯皮陸之徒相繼有作風流益盛其辭㫖之含鬱委宛雖不必盡如杜陵之盡善無疵然其得詩人詭諷之義則均焉即未嘗譜之於樂同乎先朝入樂詩曲然以比之諸填詞曲子僅佐頌酒賡色之用者自復霄壤有殊郭茂倩云自風雅之作以至於今莫非諷興當時之事以貽後世之審音者儻採歌謠以被聲樂則新樂府其庶幾焉斯論為得之惜無人行用之爾唐音癸籤卷十五
