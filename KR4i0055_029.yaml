body:
  text: 唐音癸籖卷二十九明胡震亨撰談叢五唐人作詩本事諸稗説所載資解頤多矣其間出自傅會借盾可攻者蓋亦有焉爰擲一二左方餘可概云靈隱長明燈下駱宋續吟事人以舉義者不死快信之雖然非實也此無論駱之元有與宋往還詩宋之亦有敘四子之殁文字不至不識面孔宋文載文苑英華祭文類即此詩屬對合掌體拗澀那得宋句在內好事者第偷取駱集冒之宋添作一段話耳但細看本詩自辨戎昱為京兆尹李鑾所知欲妻以女嫌姓僻令改不可而止後憲宗嘗舉其和親詩而忘其人顧左右是姓名稍僻者左右舉昱對帝頷之昱姓固僻然其上崔中丞詩千金未必能移性一諾從來擬殺身求知激切之辭與改姓事無涉也范攄欲傅合為一并易詩中移性為移姓使昱一生作詩下一嫌字不得不大苦乎髙獲對光武臣受性父母不可改之于陛下見范史説者謂王建作宫詞為王守澄所持獻詩末句有不是當家頻向説九重爭得外人知句守澄懼而止今觀詩全篇並敘樞密內庭恩寵祕密事故以是結之益致豔詫意言非自向人説人那得知耳此豈挾制語哉唐時詩人於宫禁事皆儘説無忌楊阿環孟才人尚入篇詠建詞有何嫌必制人以自全也李涉井欄砂贈詩一事或有之至此盜歸而改行八十歲後遇李彚征自署姓名為韋思明備誦涉他詩瀝酒酹涉則雲溪友議所添蛇足也唐人好為小説或空造其事而全無影響或影借其事而更加緣飾即黃巢尚豫一禪師號為偽造一詩實之況此小小夜劫乎小説令狐綯曾以舊事訪溫庭筠庭筠誚其出莊子不知綯怒之卒不登第庭筠詩因知此恨人多積悔讀南華第二篇謂此考庭筠詩原為哭亡友作云終知此恨難消遣辜負南華第二篇嘆已不能齊物如莊周之忘哀也溫之嘗誚令狐相未必虛而此詩則何嘗為令狐發也耶有云曹唐宇江陵寺亭沼間得句水底有天春漠漠人間無路月茫茫明日還坐沼上見素裳女子步詠前句迫訊之遽沒數日唐殂考此乃唐劉阮遊仙詩洞裏有天云云元不説水底人改之以就所云池沼者詩讖故有之然率然自出胸臆故驗可須人點竄代為之歟唐詩人名誤者王績藝文志誤作績紀事又誤以為有此兩人皆非是盧鴻一新唐書本傳去一字單名鴻誤賀朝萬齊融賀萬姓也舊唐書以賀名朝萬而分齊融為姓名誤今從梁肅越州開元寺碑李華潤州鶴林寺碑改正張祜之祜人多作祐字者小説張子小名冬瓜或以譏之答云冬瓜合出瓠子則張之名祜不名祐可知矣喻鳧喻坦之兩人也品彚爵里考以坦之即鳧之字混為一人今考宋陳直齋書録各有其集文苑英華兩人詩亦分載調各不同而謝臯羽睦州詩派載新定之以詩鳴於唐者二人實並列焉尤文獻在本鄉足據者也李白蜀人非今山東人也山東李白之説出於杜詩云山東者乃當時關東海稱戰國䇿頓弱語秦始皇山東戰國有六意白時正寓關東故耳舊史傳白不書郡望援杜句直書為山東人史例之變然實非以其嘗家任城而云山東也齊魯之稱山東自元始於唐此地尚𨽻河南未有今山東稱今東省通志據杜詩徑收白為山東人而蜀楊用修起爭之以白嘗自比謝安稱東山李白并欲改杜詩之山東為東山用概絶東省借白之疑端抑知白東山山東兩稱原各不相蒙者乎韋應物正史無傳賴國史補數語足存其生平為人及官閥之概當時仕只蘇州刺史而止未嘗又别為他官沈明逺為補傳較國史尤詳備而刺蘇而後復有江淮鹽鐵轉運守太僕少卿兼御史中丞一銜則采自劉禹錫舉自代狀其搜補亦云勤矣今考白樂天集有書與元稹論應物云其詩身後人始知貴此書作元和中而劉之狀稱太和六年則應物殁已久矣當另是同姓名一人耳蘇州正不藉卿銜重何庸誣之唐中葉僧道內殿供奉並有法號之賜至末季濫觴極矣偶檢得杜光庭釋貫休兩頭銜録之以資一噱杜光庭銜唐引駕傳真天師特進檢校太傅光祿大夫行尚書戶部侍郎崇真館大學士上柱國彭城郡蔡國公𢎞教大師金門羽客文章應制內殿供奉三教談論廣成先生食邑五千戶實封一千六百戶賜紫某出道藏貫休銜大蜀國龍樓待詔明因辨果功德大師翔麟殿引駕內供奉經律論道門選練教授三教玄逸大師守兩川僧録大師食邑三千戶賜紫大沙門某畫苑靈徹一遊都下飛語被貶廣宣兩入紅樓得罪譴歸貫休在荆州幕為成汭遞放黔中修睦赴偽吳之辟與朱瑾同及於禍齊已附明宗東宫談詩與宫僚高輦善東宫敗幾不保首領畢竟詩為教乘中外學向把茅底隻影苦吟猶恐為梵網所未許可挾之涉世同俗人俱盡乎唐名緇大抵附青雲士始有聞後或賜紫參講禁近階緣可慿青雲士亦復借以自梯如陸希聲韋昭度以徹辨兩師登庸尤其可駭異者君子於此嗟世變巳從來羽士解化未有不以為得仙者其詩亦往往非真如真仙通鑑所載李升與元白共飲詩雲房先生傳亦有之黃損得仙歸所題詩門前鑑湖云云即賀季真詩蓋皆好事者所綴合也嘗疑許遜晉人至唐顯吕巖唐人至宋顯定屬偽托顧舉世信之不能奪耳女子能詩者有矣惟宋尚宫姊妹五人為異下此威光裒三人亦所罕覯恨失其姓尚宫宋之問後裔也見雲溪友議陸暢催粧詩一則內又如吉中孚張氏孟昌期孫氏元稹裴氏杜羔劉氏元載王氏彭伉張氏李拯盧氏並作合有緣無慚對撰尤為人世有數夫婦第未知鏡中影豔雅副韻藻否耳為一笑唐人雜體詩見各集及諸稗説中者有五雜俎始於漢顏真卿與晝公諸人有擬兩頭纖纖漢人有兩頭纖纖月初生古辭唐王建有擬建又有擬古謠一東一西隴頭水亦兩頭纖纖之類盤中詩始漢蘇伯玉妻寄夫詩寫從中央周四角屈曲成文名盤中至竇滔妻蘇氏益衍為璿璣圖天寶二載范陽盧母王氏撰回文詩八百十二字字數與璿璣圖同又會昌中有張暌為邊將不歸妻侯氏作詩繡作龜形寓意上之朝乞夫歸皆盤中之類離合字相拆合成文始漢孔融唐權德輿有離合詩時人多和之回文晉傅咸有回文反覆詩溫嶠有回文虛言詩唐人劉賓客及皮陸倡和並有回文詩集句亦始傅咸昭宗時有同谷子者集五子之歌譏時政風人詩此與藁砧體不同藁砧語如隱謎理資箋解此則以前句比興引喻後句即覆言以證之或取諸物如子夜歌攡門不安橫無復相關意或取之同音如懊儂歌桐樹不結花何由得梧子微旨所寄無假猜榷而知唐人以其近于詩之南箕北斗可備采風故命為風人詩張祜皮陸為多回波詞其詞先以回波二言引端三句句六言始則天朝盛于中宗時佞者歌以丐寵而忠者亦效以寓規焉大言小言了語不了語宋玉有大言小言賦晉人效之為了語危語唐顏真卿有大言小言雍裕之有了語不了語真卿又有樂語饞語滑語醉語諸聯句畫公更有暗思逺意樂意恨意亦此類也縣名州名藥名古人名四氣四色字謎等類縣名起齊竟陵王子良州名起梁范雲唐皮陸有縣名離合詩藥名起齊王融及梁簡文唐張籍皮陸有藥名離合詩古人名詩未詳起于何人唐權德輿及皮陸並有古人名詩四氣亦起王融范雲唐雍裕之有四氣四色等詩字謎起鮑照井字等謎唐蘇頲有尹字謎李太白有許雲封謎又有故犯聲病全篇字皆平聲皆側聲者又一句全平一句全側者全篇雙聲全篇疊韻者律詩有側句并用韻故犯鶴膝者縷舉不盡皮陸有全篇平側詩溫庭筠與皮陸又並有全篇疊韻詩王融園蘅炫紅花湖荇燡黃華梁武帝後牖有朽栁侍臣和云梁王長康強此純用疊音詩也杜子美卑枝低結子接葉暗藏鶯白樂天量大嫌甜酒才高笑小詩此間用疊音隨其語意所到輒就成之者也純用涉于戲間用更于篇法中增一巧詩料入二老神爐中頑鐡無不成金耳上下雙用韻章碣東南路盡一律正韻押天船眠邊上四句又押畔岸看算此正八病中之鶴膝章自號為變體詩云以上並體同俳諧然猶未至俚鄙之甚也其最俚鄙者有賀知章之輕薄祖詠之渾語賀蘭廣鄭涉之詠字蕭昕之寓言李紓之隱語張著之機警李舟張彧之歇後姚峴之訛語影帶李直方獨孤申叔曹著之題目黎瓘之翻韻見國史補及雲溪友議諸書皆古來滑稽餘派欲廢之不得者韻牒始段成式段押句好押窮韻惡韻其平聲好韻不僻者書竹簡稱為韻牒又有遞聯細班竹為之以白金鎖首如茶挾形分客以免互送之煩今韻牌之類是也詩箋始薛濤濤好製小詩惜紙幅長賸命匠狹小為之時謂便因行用其箋染潢作十種色故詩家有十樣蠻箋之語詩筒始元白白官杭州元官越州每和詩入筒中遞之白有詩云為向兩川郵吏道莫辭來去遞詩筒或問詩板始何時余曰名賢題咏人愛重為設板如道林寺宋杜兩公詩初只題壁後却易為板是也又問今名勝處少有宋杜句而此物正不少奈何余曰亦有故事劉禹錫過巫山廟去詩板千留其四薛能蜀路飛泉亭去詩板百留其一有此辣手會見清楚在唐音癸籖卷二十九
