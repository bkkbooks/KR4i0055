body:
  text: 唐音癸籖卷三十二明胡震亨撰集録三詩話在集部與文史同類用以標成法榷往篇備瑣聞一切資長吟功此焉在不可無録第作者篇目泛濫多雜糅小説家言中難以區扸今但據唐宋各志及焦氏國朝經籍志所載詩話一目諸書稍加評隲列後遺者俟博識補焉唐人詩話詩品一卷李嗣真撰評詩格一卷李嶠撰詩格一卷元兢宋約撰又一卷王維撰又二卷詩中密旨一卷並王昌齡撰詩式五卷詩議一卷並皎然撰金針詩格三卷文苑詩格一卷並白居易撰詩格一卷二南密旨一篇凡十五門並賈島撰大中新行詩格一卷王起撰詩例一卷姚合撰亦名極玄律詩例炙轂子詩格一卷玉睿撰文章玄妙一卷任藩言撰緣情手鑑詩格一卷李𢎞宣撰主客圖一卷張為撰立詩家六人為主餘分入室升堂及門為客白居易廣大教化主上入室楊乘入室張祜羊士諤元稹升堂盧同顧況沈亞之及門費冠卿皇甫松殷堯藩施肩吾周元範況元膺徐凝朱可名陳標童翰卿孟雲卿高古奧逸主上入室韋應物入室李賀杜牧李餘劉猛李涉胡幽貞升堂李觀賈馳李宣古曹鄴劉駕孟遲及門陳潤韋楚老李益清奇雅正主上入室蘇郁入室劉畋僧淸塞盧休于鵠楊洵美張籍楊巨源楊敬之僧無可姚合升堂方干馬戴任蕃賈島厲玄項斯薛濤及門僧良乂潘誠于武陵詹雄衛準僧志定喻鳬朱慶餘孟郊清奇僻苦主上入室陳陶周朴及門劉得仁李溟鮑溶博容宏拔主上入室李羣玉入室司馬退之張為武元衡瓌奇美麗主上入室趙嘏長孫佐輔曹唐升堂盧頻陳羽許渾張蕭逺及門張陵章孝標雍陶周祚袁不約各録其詩一二聯如近世所云詩派者然集賈島句圖一卷李洞撰國風正訣一卷鄭谷撰玄機分明要覽一卷風騷指格一卷並僧齊已撰流類手鑑一卷僧虛中撰詩體一卷倪宥撰雅道機要二卷前卷不知何人後卷徐夤撰本事詩唐孟棨撰纂詞人緣情感事之詩敘其本事凡七類為一卷續本事詩二卷偽吳處常子依孟棨類續篇抒情集二卷盧瓌撰以上詩話惟皎師詩式詩議二撰時有妙解餘如李嶠王昌齡白樂天賈島王睿李𢎞宣徐夤及釋齊巳虛中諸撰所論並聲病對偶淺法偽托無疑張為主客一圖妄分流派謬僻尤甚唐人工詩而詩話若此有不可曉者宋元人詩話賓朋宴語三卷丘昶撰昶南唐進士仕宋著此書十五篇敘唐以來詩賦源流風騷要式一卷徐衍述詩格要律一卷王夢簡撰詩格一卷沙門神彧撰處囊訣一卷僧保暹撰詩評一卷僧德淳撰詩中旨格一卷王玄撰亦名擬皎然十九字詩律大格一卷徐蛻撰詩鑑一卷許文貴撰詩式十卷僧辭逺撰楊氏筆苑句圖一卷黃錫編蓋楊億大年所嘗舉者李義山唐彥謙之句為多又續句圖一卷續金針詩格一卷梅堯臣撰吟窗雜詠三十卷莆田蔡傳撰取諸家詩格詩評之類集成之又為吟譜凡魏晉而下能詩之人皆略具本末總為此書今本蒙以陳學士應行之名分五十卷詩苑類格三卷李淑撰詩點化祕術一卷任傳撰風雅拾翠圖一卷僧惟鳯撰詩林句範五卷騷雅式一卷吟體類例一卷律詩洪範一卷徐三極撰風騷格五卷閻東叟撰寡和圖三卷僧定雅撰古今名賢警句圖一卷蔡希蘧撰潛溪詩眼一卷范溫元實撰天厨禁臠三卷惠洪撰韻語陽秋二十卷葛立方撰漁隱叢話六十卷後集四十卷胡仔撰仔自號苕溪漁隱聲律發微一卷胡源撰藝苑雌黃二十卷嚴有翼撰王禹玉詩話一卷王圭撰六一詩話一卷歐陽修撰詩話一卷續詩話一卷並司馬光撰中山詩話三卷劉攽撰東坡詩話二卷蘇軾撰後山詩話二卷陳師道撰歸叟詩話六卷王直方撰石林詩話二卷葉夢得撰許彥周詩話一卷許顗撰南宫詩話一卷葉凱撰艇齋詩話一卷曾季貍撰西清詩話三卷題無名子撰或曰蔡絛使其客為之也環溪詩話一卷吳沆集庚溪詩話二卷葉正則詩話二卷䂬溪詩話十卷黃徹常明撰觀林詩話一卷吳聿撰洪駒父詩話一卷駒父名芻蔡寬夫詩話二卷吕東萊詩話一卷吕祖謙也山陰詩話一卷李兼撰李希聲詩話一卷希聲名錞後村詩話一卷劉克莊撰誠齋詩話一卷楊廷秀撰隱居詩話一卷魏泰撰竹坡詩話一卷周紫芝少隱撰二老堂詩話一卷周必大撰珊瑚鈎詩話三卷張表臣撰續廣本事詩五卷聶奉先撰詩人玉屑二十卷內品藻唐人詩二卷魏慶之撰滄浪詩話一卷嚴羽撰全唐詩話六卷尤延之撰從紀事中摘編者詩話總龜前集四十八卷後集三十卷阮一閲編古今詩話録七十卷李頴撰新集詩話十五卷姓名不知集者唐宋名賢詩話二十卷詩談十五卷吟譜一卷元陳繹曽撰詩林要語一卷范杼德機撰詩學禁臠一卷不知撰人詩家一指一卷古今詩法一卷楊載仲𢎞撰詩法源流一卷劉孟會七家詩評評王維李白孟浩然杜甫韋應物孟郊李賀七家詩宋人詩不如唐詩話勝唐南宋人及元人詩話又勝宋初人如嚴之吟卷劉之詩評解會超矣餘雖不免蕪雜遇所獨得未少起豫片益在胡元瑞評諸家云歐陳率是記事司馬君實大儒是事别論劉貢父滑稽渠率王直方拾人唾涕葉夢得非知詩億或有中吕本中自謂江西衣鉢所記甚寥寥唐子西雖有致語未可盡慿葛常之頭巾亹亹讀之患其難竭許彥周迂腐老生洪覺範誕妄浮屠在彼法當墮無間獄竹坡西清種種蕪脞漁隱總龜玉屑但類次前聞珊瑚鈎獨評已作尤堪抵掌取快譏􅝉則然不乃近于夸酷惟論嚴氏謂如西來一葦剗除荆棘獨暢玄風論辰翁謂其玄鑒邃覽往往絶人雖道越中庸自是教外别傳騷場巨目此則語堪千載我無以易之矣元瑞又云辰翁評詩有妙理如杜日月低秦樹乾坤繞漢宫云此語投贈中有氣若登高覽勝則俗矣王維早朝九天閶闔開宫殿萬國衣冠拜冕旒云帖子語頗不癡重如此類皆有深致余每謂千家注杜猶五臣注選辰翁解杜猶郭象解莊即與作者語意不盡符而玄言玄理往往角出盡拔驪黃牝牡之外昔人苦杜詩難讀辰翁注尤不易省也國朝詩話瞿宗吉詩話三卷冰川詩式四卷都玄敬詩話二卷南溪詩話二卷懷麓堂詩話一卷黃勉之詩法八卷蜩笑集一卷陳石亭拘虛詩談一卷楊升庵詩話二卷又詩話拾遺二卷皇甫汸解頤新語八卷徐昌穀談萟録一卷名賢詩評二十卷王元美萟苑巵言八卷又萟苑巵言四卷以上據焦氏經籍志録入焦志各書頗備于詩話一類獨寥寥豈以本朝人著撰論尚未定不欲濫載耶容更採補胡應麟詩藪內編外編雜編二十卷明興説詩者以博推楊用修以雅推徐昌穀以俊推王弇州用修之書搜隱摘奇往往任胸援引非必盡確後賢訾駁正未已昌穀所論止于五言不及近體習漢魏者之偏撰習唐音者之朴學也弇州巵言通論文筆唐詩特其一二其論初盛諸家儘多解頤至中晚草草塞責矣嘗疑之未敢置喙後見其末年自悔書曰吾為此書時年未四十語不甚切而傷狷未為定論恐誤人乃益爽然服歎此老之未易窺也胡詩藪自騷雅漢魏六朝三唐宋元以迄今代其體無不程其人無不隲其程且隲亦無弗衷唐詩其論詩中之一也而論定于是元美才地高書所腹也元瑞闕書所目也即元美亦稱其上下千古周密無漏而刻深成説詩一家言此可徵矣吾嘗謂近代談詩集大成者無如胡元瑞其别出勝解者惟鄭繼之老杜詩評可與劉辰翁諸家詩評並參前見評彚中吟人從此入庶不誤岐嚮爾弇州自評萟苑巵言語見所書李西涯樂府後其與胡元瑞書又云僕故有萟苑巵言是四十前未定之書于鱗嘗謂中多俊語英雄欺人意似不滿僕亦服之第渠所棄取却未盡快人意得足下詩藪則古今談萟家盡廢矣其言信然唐人詩集多出後人補編故多遺漏其編次之序又各人自為政故本多不同至注釋尤難言之他不暇縷舉即李杜二大集經多手改編并注可商者正夥附志後以例其餘李太白集其存日魏皓有編臨終時又手授李陽冰編次為序至宋朝樂史宋敏求復為之增益白罹永王禍後舊稿散落陽冰序云避地八年著述十喪其九樂與宋從異代搜輯真有功于李者敏求本所增者沿舊目相從是猶存陽冰所次未紊也其後曾南豐校書始取而考其作之先後重為之次陽冰之舊遂不復存太白詩間適遊覽居多罕及時事安能如杜詩一一得其歲月次第之且讀白詩與讀杜詩自各一法舍旃白詩中靈筆妙趣顧作詩時日是求何為曾雖號為文章大家吾未敢韙之至其體例先古風次樂府又仍次古風尤所不解注者有舂陵楊齊賢章貢蕭士斌兩家蕭譏楊事辭不求所本多取唐廣德後事及宋儒詩詞為解乃蕭之解李亦無一字為本詩發明却于詩外旁引傳記纍牘不休注白樂府引鄭夾漈説尤謬鄭于樂府之不可考者概分門類為遺聲李樂府從古題本辭本義妙用奪換而出離合變化顯有源流不遡之此為注乃引鄭勉強不通之説塞白耶此等書第當付之祖龍顧方行世未有議者可嘆也太白集亦大有偽詩攙入東坡以集中歸來乎笑矣乎及贈懷素草書數詩為曾子固所誤入又以所見富陽國清院彭澤唐興院太白所題詩皆非是嚴滄浪亦以白集中少年行淺近浮俗為偽作及文苑英華中望月對雨望夫石歸舊山諸詩皆不類為後人假名坡云太白豪俊語不甚擇往往有臨時卒然之句故使妄庸敢爾雖然白卒就語亦自有不衫不履意在牀頭捉刀人故自有真假托者終不似也杜甫集編自唐人樊晃晃與韋損栁識同時潤州刺史也見高僧朗然傳其後五代孫光憲宋初鄭文寶孫僅各有編今無考寶元初翰林王洙原叔始分古體近體二類考其歲月以次之其合古律為編始自黃長睿及吾邑魯冷齋先生訔冷齋序云騷人雅士同知祖尚少陵同欲模楷聲韻同苦其意律深嚴難讀也余謂少陵老人初不事艱澀左隱以病人其平易處有賤夫老婦所可道者至其深純宏妙千古不可追迹則序事穩實立意渾大遇物寫難狀之景紓情出不説之意借古的確感時深逺若江海浩洋風雲蕩汩蛟龍黿鼉出沒其間而變化莫測風澄雲霽象緯回薄錯峙偉麗細大無不可觀離而序之次其先後時危平俗微惡山川夷險風物明晦公之所寓舒局皆可槩見如陪公杖履而遊四方數百年間猶對面語何患於難讀耶名公巨儒譜敘注釋是不一家用意率過異説如蝟余因舊集略加編次古詩近體一其先後摘諸家之善有考於當時事實及地里歲月與古語之的然者聊注其下若其意律乃詩之六經神會意得隨人所到不敢易而言之敘次既倫讀之者如親罹艱棘虎狼之慘為可驚愕目見當時氓庶被削刻轉塗炭為可憫因感公之流徙始而適中而瘁至於為少年輩侮忽以訖死可傷也嘉泰中建安蔡夢弼據冷齋本為會箋歲月可疑者明著其莫可考附卷後嘉定中臨川黃鶴父子始取分體舊本于題下確定其歲月猶未敢便更其次也元大德中廬陵高楚芳者劉辰翁門下士則直據黃氏并其次盡易之居然不疑今行世本是也初原叔編年第約略詩中語求其時以為次非真有確然可據之歲月中間牽合雖多而闕疑之意尚存自概定于黃鶴紊改于高氏高又附辰翁批評以行于是耳食者奉若杜陵手撰次序顛倒不復知原本為何矣讀杜詩者即不可不稍知其歲月然亦何至每首必定以所作之年強為穿鑿而終失于不可通乎宋徐居仁方溫叟各有門類杜詩一編似厭諸家拘攣為之破除者今傳世亦有編體者不知是其本否惜義例亦未見妥老杜一生詩境遇轉困格律亦轉老其孰為東都長安孰為秦川蜀中孰為夔府湖南明眼人覆卷可按若未到此處且未許看杜詩在與分别時次何益大可省此葛藤也宋人注杜詩者王原叔宋次道崔德符鮑欽止王禹玉王深父薛夢符薛蒼舒蔡天啓蔡致逺蔡伯世王彥輔蘇東坡徐居仁謝任伯吕祖謙高元之趙子櫟趙次翁杜修可杜立之師古師民瞻蔡夢弼郭如達非一家皆無可觀以諸注半出學究手其託名人以行者皆偽也杜集雖編自王原叔而原叔實未嘗注洪駒父云鄧慎思撰內以粲可為詩僧虎頭為僧像可笑者不一東坡杜詩故事乃閩人鄭卬所為造偽古人名偽古人事增減杜詩見句附合之而不能言所自出之書朱晦庵洪容齋嚴滄浪諸公皆詳辨之今行世千家注中尚淘汰未盡祝和父陳晦伯類書中亦誤引一二流傳亂真蓋最可恨者祝事文類聚如學士類蕭梁之碧山學士陳天中記如陶侃之海山使者胡奴不一而足又焦弱侯筆乘亦引阮孚看囊錢崔浩詩瘦等皆偽蘇注所誤也陸務觀云近世注杜詩者數十家無一字一義可取欲注杜詩須去少陵地位不大逺乃可下語今諸家徒欲以口耳之學揣摩得之不如勿注可也此言誠然但吾觀諸家并口耳之學尚未敢言耳注杜律單行有元虞集注實豫章張性所撰也學究氣正同宋人劉將孫曰注杜者謂少陵詩史謂少陵一飯不忘君因深求之字句間強傅以時事曲折第知膚引以為忠愛不自知陷于險薄凡注詩尚意者易蹈此弊而杜集為甚諸後來忌詩妬詩疑詩開詩禍皆起此而莫之悟此不得不為少陵辨者將孫辰翁子也坡公論李杜二集謂杜集較李集偽撰為少此殆不然宋寶元初本杜詩一千四百五篇至皇祐中王介甫竟增入二百餘篇自為序曰豫令鄞客有授豫古之詩所不傳者二百餘篇豫知非人所能為實甫也自洗兵馬而下序而次之云云今其詩皆雜入集中但即看此洗兵馬一篇已較然不可溷真固易鑒别也江南逢李龜年岐王崔五云云岐王薨于開元十四年崔五滌亦卒于開元中時子美方十五歲天寶後子美又未嘗至江南他人詩無疑七言古杜鵑行二篇其一見司空曙集五言律酒渴愛江清見暢當集哭長孫侍御載中興間氣集杜誦作絶句虢國夫人張祜集靈臺之第二篇推此知他集誤入者自復不少杜詩即不無誤字然本無誤而後人以意妄改者亦有之宋蔡興宗者為杜詩正異頗以意改定其字朱晦庵嫌其未盡欲改風吹滄江樹樹字為去鼓角滿天東滿字為漏以漏天對上句燒棧猶可也風吹滄江樹雨灑石壁來正謂風吹樹雨隨來耳若第云吹江去豈復成句哉亦恐天下無此逆風雨也近代楊升庵更好改杜詩如航為艇照為點不一而足後賢因之為然為疑未休用修當年何不以推敲功改已詩暇與此老改詩乎改航為艇説始山谷楊實之直謂見古本如是關山同一照鳥鵲自多驚楊附會坡公詞一點明月窺人句云本之此照與驚偶儷相當孰穩易辨也又如把君詩過目作把君詩過日愁對寒雲雪滿山作愁對寒雲白滿山娟娟戲蝶過間幔作娟娟戲蝶過開幔曾閃朱旗北斗間作曾閃朱旗北斗殷因知貧病人須棄作不知貧病關何事握節漢臣迥作秃節漢臣回新炊間黃粱作新炊聞黃粱諸家欲為此老更絃者甚衆恨無從起此老問之唐詩不可注也詩至唐與選詩大異説眼前景用易見事一注詩味索然反為蛇足耳有兩種不可不注如老杜用意深婉者須發明李賀之譎詭李商隱之深僻及王建宫詞自有當時宫禁故實者並須作注細與箋釋建宫詞正如鄭嵎津陽門詩非嵎注不知當時事今杜詩注既如彼建與賀詩有注與無注同而商隱一集迄無人能下手始知實學之難即注釋一家亦未可輕議也元遺山有詩云望帝春心托杜鵑佳人錦瑟怨華年詩家總愛西崑好獨恨無人作鄭箋蓋謂義山詩用事頗僻惜無人注釋也乃遺山鼓吹一選郝天挺所注義山詩尤蕪謬不通門牆士親受詩教者尚如此可望之他人友人屠用明嘗勸豫為義山集作注以便後學余笑謂用明曰彼自祭魚獺今又欲我拾獺殘耶唐人詩既多出後人補輯以故篇什淆錯一詩至三四見他集中是正為難其顯而易見習誤不察者無如釋廣宣紅樓道場二律之作沈佺期詩錢珝江行絶句百首之混入其祖起集中廣宣之誤始高氏品彚自後歷選者因之錢氏家集之誤則宋錢蒙仲已先為之淆矣舉斯二則可例其餘至老牛歌之稱白樂天佛骨詩之稱鄭司徒五丈夫諸律之出李玫楊太真數絶之出韋瓘毛仙翁送行詩軸徐凝賈島奬褒贈篇非好事而姑為托撰即有為而借以隱名尤難勝紀讀者詳之廣宣元和長慶兩朝並以詩為內供奉詔居安國寺紅樓有詩名紅樓集見白樂天諸家詩題可考故紅樓應制之詩以支遁曇摩為比云自憐深院得翺翔其再入道場紀事則在憲宗晏駕穆宗御極內殿作功德之時故有南方歸去再生天及見闢乾坤新定位等句而以兩朝長在聖人前結之其詩載文苑英華甚明不知何緣近代諸刻盡作沈詹事李于鱗選亦然且紅樓本睿宗在藩舞榭玄宗開元八年捨建安國寺立院詳段成式遊長安諸寺記及程大昌雍録計此時詹事巳前卒矣安得有紅樓題詩乎錢珝起之曾孫也起釋褐校書終尚書考功郎珝官歷中書舍人掌綸誥後坐纍貶撫州司馬其江行絶句百首正赴撫時塗中所作也珝有他文載英華中云夏六月獲譴佐郡秋八月自襄陽浮舟而下今其詩有潤色非東里官曹更建章去指龍沙路徒懸象闕心峴山回首望如别故鄉人及好日當秋半九日自佳節等句其官其謫地其經塗其時日無勿與珝合者起無是也後人重起名借篇貽厥為到公增美耳宋鮑欽止嘗疑起集有珝詩雜入葛立方亦疑集中同程九早入中書和王員外雪晴早朝二律非起作吾謂雪晴早朝聲調還應屬起至早入中書一篇起未為此官與江行百首並當歸珝為是唐音癸籖卷三十二
