body:
  text: 唐音癸籖卷三十明胡震亨撰集録一唐人集見載籍可采據者一曰舊唐書經籍志一曰新唐書藝文志一曰宋史藝文志一曰鄭樵通志藝文略一曰尤氏遂初堂書目一曰馬端臨文獻經籍考端臨所引書又二一曰眺公武讀書志一曰陳直齊書録解題此數書者唐人集目盡之矣今校除重復參合有無依世次先後具列卷目左方備考帝王太宗四十卷高宗八十六卷則天垂拱集一百卷金輪集十卷中宗四十卷睿宗十卷𤣥宗卷亡德宗卷亡濮王泰二十卷初唐陳叔達十五卷竇威十卷禇亮二十卷虞世南三十卷蕭瑀一卷沈齊家集十卷薛收十卷楊師道十卷庾抱十卷孔頴達五卷王績五卷郎楚之三卷魏徵二十卷許敬宗八十卷于志寧四十卷上官儀二十卷李義府四十卷顏師古六十卷岑文本六十卷劉子翼二十卷殷聞禮一卷陸士季十卷劉孝孫三十卷鄭世翼八卷崔君實十卷李百藥三十卷孔紹安五十卷高季輔二十卷溫彥博二十卷李𤣥道十卷謝偃十卷沈叔安二十卷陸楷十卷曹憲三十卷蕭德言二十卷潘求仁三卷殷芊三卷蕭鈞三十卷袁朗十四卷楊續十卷王約一卷許恭十卷任希古十卷淩敬十卷王德儉十卷徐孝德十卷杜之松十卷宋令文十卷陳子良十卷顏顗十卷劉潁十卷司馬僉十卷鄭秀十二卷耿義褎七卷楊元亨五卷劉綱三卷王歸一十卷馬周十卷薛元超三十卷高智周五卷禇遂良二十卷劉禕之七十卷郝處俊十卷崔知悌五卷李安期二十卷唐覲五卷張太素十五卷鄧𤣥挺十卷劉允濟二十卷駱賓王十卷盧照鄰二十卷楊炯盈川集三十卷王勃三十卷狄仁傑十卷李懷遠八卷盧受采二十卷蘇味道十五卷薛耀二十卷王適二十卷喬知之二十卷郎餘慶十卷盧光容二十卷崔融六十卷閻鏡機十卷李嶠五十卷雜咏詩十二卷喬備六卷陳子昂十卷元希聲十卷李適十卷沈佺期十卷徐彥伯前集十卷後集十卷宋之問十卷杜審言十卷谷倚十卷富嘉謨十卷吳少微十卷劉希夷十卷詩集四卷徐鴻詩一卷張柬之十卷桓彥範三卷韋承慶六十卷閭丘均二十卷郭元振二十卷崔湜詩一卷趙彥昭詩一卷魏知古二十卷閻朝隱五卷蘇瓌十卷員半千十卷李乂五卷姚崇十卷丘悅十卷劉子𤣥三十卷盧藏用三十卷令狐德棻三十卷許彥伯十卷劉洎十卷來濟三十卷杜正倫十卷李敬𤣥三十卷裴行儉二十卷崔行功六十卷張文琮二十卷麴崇裕二十卷劉憲三十卷薛稷三十卷武平一詩一卷宋璟十卷蔣儼五卷趙𢎞智二十卷賀德仁二十卷許子儒十卷蔡允恭二十卷張昌齡二十卷杜易簡二十卷顏元孫三十卷姚璹七卷杜元志十卷楊仲昌十五卷崔液十卷蘇頲三十卷外集二卷張說三十卷徐堅三十卷元海十卷李雍七十卷王浣十卷張九齡二十卷康國安十卷孫逖二十卷趙冬曦卷亡毛欽一三卷王助雕蟲集一卷盛唐王維十卷苑咸卷亡康希銑二十卷張均二十卷權若訥十卷白履忠十卷鮮于向十卷康𤣥辨十卷嚴從三卷陶翰卷亡崔國輔卷亡高適二十卷賈至二十卷别集十五卷張孝嵩十卷儲光羲七十卷蘇源明三十卷李白草堂集二十卷杜甫六十卷小集六卷外集一卷補遺五卷又八卷岑參十卷盧象十二卷蕭頴士十卷新集三卷崔皓一卷綦母濳一卷祖詠一卷李頎一卷孟浩然三卷包融一卷李華前集十卷中集二十卷李翰三十卷王昌齡五卷邵說十卷裴倩五卷湓城集五卷元結十卷劉彚三卷丘為卷亡獨孤及毗陵集二十卷顏真卿吳興集十卷廬江臨川集各十卷李峴一卷樊澤十卷崔良佐十卷湯賁十五卷劉迥五卷武就五卷于休烈十卷張謂詩一卷常建詩一卷王季友詩一卷閻防詩一卷劉方平詩一卷中唐元載十卷李泌二十卷崔祐甫三十卷常衮十卷劉太真三十卷于邵四十卷歸崇敬二十卷竇叔向七卷顧況十五卷張繼詩一卷張南史詩一卷蘇渙詩一卷栁郯詩一卷鄭常詩一卷衛準詩一卷陳蛻詩一卷鮑防集五卷雜感詩一卷韋應物詩十卷劉長卿詩十卷錢起詩十二卷李端詩三卷司空曙詩二卷包何詩一卷包佶詩一卷郎士元詩一卷皇甫冉詩一卷皇甫曾詩一卷秦系詩一卷盧綸詩十卷崔峒詩一卷吉中孚詩一卷韓翃詩五卷耿湋詩二卷嚴維詩一卷李嘉祐詩一卷李益詩一卷從軍詩五十首戎昱詩五卷暢當詩二卷許經邦詩一卷楊凝二十卷楊淩卷亡吳德光十卷楊衡詩一卷章八元詩一卷麴信陵詩一卷林藻詩一卷林蘊一卷陳羽詩一卷朱灣詩四卷于鵠詩一卷朱放詩一卷張碧歌行集二卷雍裕之詩一卷長孫佐輔古調集一卷楊炎十卷陸贄二十卷栁渾十卷鄭餘慶五十卷韋牟渠詩十卷張建封集二百三十篇無卷張薦三十卷崔元翰三十卷羅讓三十卷張登詩六卷陳詡詩十卷戴叔倫詩十卷劉商詩十卷陸迅十卷栁冕詩四卷姚南仲十卷鄭絪三十卷李吉甫二十卷李絳二十卷武元衡十卷權德輿五十卷童䝉集十卷裴度二卷令狐楚漆奩集一百三十卷韓愈四十卷張籍詩七卷王建詩十卷孟郊詩十卷盧同玉川子詩一卷劉義詩一卷賈島長江集十卷小集三卷李賀詩五卷歐陽詹十卷李觀三卷李翺十卷樊宗師二百九十一卷皇甫湜三卷栁宗元三十卷吕溫十卷楊巨源詩一卷鮑溶詩五卷韋武十五卷齊抗二十卷劉言史歌詩六卷白居易長慶集七十五卷元稹長慶集一百卷小集十卷劉禹錫四十卷竇常十八卷竇鞏詩一卷穆員十卷羊士諤一卷張仲方三十卷吳武陵詩一卷武儒衡二十五卷韋貫之三十卷符載十四卷郗純六十卷李道古文與三十卷董侹武陵集卷亡溫造八十卷李涉詩一卷陸暢詩一卷劉軻一卷李約詩一卷費冠卿詩一卷施肩吾詩十卷徐凝詩一卷沈亞之九卷殷堯藩詩一卷皇甫鏞十八卷王仲舒十卷李虞仲四卷蔣