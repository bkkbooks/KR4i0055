body:
  text: 唐音癸籖卷七明胡震亨撰評彚三韋蘇州應物五言詩高雅間淡自成一家體今之秉筆者誰能及之白樂天蘇州詩無一字造作直是自在氣象近道其高於王維孟浩然諸人者以無聲色臭味也朱晦庵韋應物居官自愧閔閔有恤人之心其詩如深山採藥飲泉坐石日晏忘歸孟浩然如訪梅問柳遍入幽寺二人意趣相似然入處不同韋詩潤者如石孟詩如雪雖淡無彩色不免有輕盈之意劉須溪子餘評互見柳厚下顧况逸歌長句往往駿發踔厲出意外驚人語為快皇甫湜秦隱君系詩氣過其文遂乏華秀然亦可謂跨俗之致徐獻忠劉長卿最得騷人之興專主情景吟譜長卿自稱五言長城詩體雖不新竒甚能鍊飾大抵十首巳上語意稍同落句尤甚思鈍才窄也其得罪風霜苦全生天地仁可謂傷而不怨足以發揮風雅高仲武長卿詩細淡而不顯煥當緩緩味之不可造次一觀而巳方回錢員外起體格新竒理致淸贍芟削浮遊迥立莫羣如鳥道挂疏雨人家殘夕陽又牛羊上山小煙火隔林疏又長樂鍾聲花外盡龍池柳色雨中深皆特出意表標雅古今又窮達戀明主耕桑亦近郊則禮義克全忠孝兼著足可𢎞長名流為後楷式高仲武下同郎員外士元與錢起齊名自丞相以下出使作牧二公無詩祖餞時論鄙之體調大抵欲同就中郎公稍更間雅如荒城背流水逺雁入寒雲去鳥不知倦逺帆生暮愁又蕭條夜靜邊風吹獨倚營門向秋月可以齊衡古人掩映時輩士元諸詩殊洗鍊有味雖自濃景别有淡意劉辰翁李袁州嘉祐中興高流與錢郎别為一體往往涉於齊梁綺靡婉麗蓋吳均何遜之敵如野渡花爭發春塘水亂流朝霞晴作雨濕氣晚生寒文章之冠冕也劉結體不如錢厚寫韻自婉錢選言似遜劉密樹骨故超郎藻變非富具有錢之遒上李筆勢欲酣終乏劉之沉深當時四子齊名吾謂斥李令粵他自帝存郎附蕞蜀三都可乎遁叟下同二包藝苑連枝何七字餘有片藻佶五排槩多完什皇甫補闕冉巧於文字發調新竒逺出情外巫山詩終篇竒麗獨獲驪珠侍御曾體製清潔華不勝文高仲武大歷十才子並工五言詩盧郎中綸辭情捷麗所作尤工舊史盧詩開朗不作舉止陡發驚彩煥爾觸目篇章亦富埒錢劉以古體未遒屈居二氏亞等遁叟下同李司馬端任胸多疏七字俊語亮節開口欲佳故當以捷成表長韓員外翃詩匠意近於史興致繁富一篇一咏朝士珍之如星河秋一鴈砧杵夜千家又客衣筒布潤山舍荔枝繁又疏簾看雪捲深戶映花關方之前代芙蓉出水未足為多高仲武君平高華之句幾奪右丞之席無奈其使事堆垜堪憎見珍朝士以此見侮後進亦以此遁叟下同司空虞部曙婉雅間淡語近性情抗衡長文不足平視茂政兄弟有餘耿拾遺緯詩舉體欲真家貧僮僕慢官罷友朋疏淺言偏深世情上第五相公八韻宛致可憫時訝其不當作何也崔拾遺洞文彩炳然意思大雅如淸磬度山翠間雲來竹房又流水聲中視公事寒山影裏見人家斯亦披沙鍊金往往見寶高仲武李君虞益生長西涼負才尚氣流落戎旃坎壈世故所作從軍詩悲壯宛轉樂人譜入聲歌至今誦之令人悽斷遁叟張繼詩體清逈有道者風如女停襄邑杼農廢汶陽耕可謂事理雙切又火燎原猶熱風搖海未平比興深矣高仲武世謂五言道喪齊梁以建安不用事齊梁用事也此可言體變不可言道喪大厯中詞人劉長卿李嘉祐兩皇甫等竊占青山白雲春風芳草以為已有吾知詩道初喪正在於此末年諸公改轍蓋知前非也皎然詳大厯諸家風尚大抵厭薄開天舊藻矯入省淨一塗自劉郎皇甫以及司空崔耿一時數賢竅籟即殊于喁非逺命旨貴沈宛有含寫致取淡冷自送玄水一歃羣醲覆杯是其調之同而工於浣濯自艱於振舉風幹衰邊幅狹專詣五言擅場餞送外此無他大篇偉什巋望集中則其所短爾遁叟鄭常省靜婉靡雖未洪深如儒衣荷葉老野飯藥苗肥翩翩然有士氣高仲武嚴維詩時出俊語如柳塘春水慢花塢夕陽遲野燒明山郭寒更出縣樓皆可誦傷馬長篇綜組尤密劉貢父摘柳字尚屬牽補評尤精徐獻忠下同于鵠習隱多高人之意故其詩能有景象山中訪道諸大篇泠泠獨逺不疑世外人作朱灣詩體幽逺興致涵深於詠物尤工如受氣何曾異開花獨自遲所謂哀而不傷國風之深者也高仲武下同戴叔倫骨氣稍輕故詩亦少然廨宇經山火公田沒海潮亦指事造形之工者章八元學詩於嚴維如雪晴山脊見沙淺浪痕交得山水狀貌武相元衡宦逹後工詩雖致理未綿時復露鮮華之度遁叟權文公德輿詩有絶似盛唐者或有似韋蘇州處劉隨州處者嚴滄浪貞元後近體既繁古聲漸杳權相詩先氣格而後詞藻然風候既至藻亦自豐其在開元名手亦堂奧之間徐獻忠韓公愈茹古涵今無有端涯及其酣放豪曲快字凌紙怪發鯨鏗春麗驚耀天下皇甫湜韓吏部歌詩驅駕氣勢若掀雷掣電抉於天地之垠司空圖昌黎博大而文其詩橫騖别驅嶄絶崛強汪洋大肆而莫能止秋懷數首及暮行河堤上等篇風骨頗逮建安但新聲不類蓋正中之變也高柄韓公挺負詩力所少韻致出處既掉運不靈更以儲才獨富故犯惡韻鬬竒不加揀擇遂致叢雜難觀得妙筆汰用瓌珤自出第以為類押韻之文者過遁叟吟王荆公云詩各有所得淸水出芙蓉天然去雕飾此李白所得也或看翡翠蘭苕上未掣鯨鯢碧海中此杜甫所得也橫空盤硬語妥帖力排奡此韓愈所得也揚胡應麟云太白有大家之才而局量稍淺故騰踔飛之意勝沉深典厚之風微昌黎有大家之具而神韻全乖故紛拏叫噪之途開蘊籍陶鎔之義缺杜陵氏差得之孟郊詩思苦奇澀有理致本傳郊詩劌目鉥心神施鬼設間見層出韓公志文東野五言琢削不暇苦吟而成觀隱居詩話孟郊詩憔悴枯稿其氣局促不伸詩道本正大郊自為之艱阻耳又曰高岑之詩悲壯讀之使人感慨孟郊之詩刻苦讀之使人不歡嚴滄浪以按韓公甚重郊詩評者亦盡為韓不及郊獨蘇長公有詩論郊云未足當韓豪後元遺山詩亦云東野悲鳴死不休高天厚地一詩囚江山萬古潮陽筆合臥元龍百尺樓詳二公之指蓋亦論其大局歟不可不知大厯以還樂府不作獨張籍王建二家體製相近稍復古意或舊曲新聲或新題古義詞旨通暢悲歡窮泰慨然有古歌謠之遺亦唐世流風之變而不失其正者高柄張籍祖國風宗漢樂府思難辭易王建似張籍古少今多陳繹曾文章窮於用古矯而用俗如史漢後六朝史之入方言俗語是也籍建詩之用俗亦然王荆公題籍集云看是尋常最奇崛成如容易却艱辛凡俗言俗事入詩較用古更難知兩家詩體大費鑄合在遁叟賈浪仙島産寒苦地立心亦苦如不欲以才力氣勢掩奪情性特於事物理態毫忽體認深者寂入峻者迥出不但人口數聯於劫灰上冷然獨存尋咀餘篇芊蔥佳氣瘦隱秀脈其妙一一徐露無可厭斁方秋崖浪仙誠有警句觀其全篇意思殊餒大抵附於寒澀方可致才亦為體之不備也司空圖李賀辭尚竒詭所得皆驚邁絶去翰墨畦徑本傳賀詩祖騷宗謝反萬物而覆取之吟譜長吉天才奇曠又深於南北朝樂府古詞得其怨鬱博豔之趣故能鏤剔異藻成此變聲使幽蘭未萎竟其大業自鏟詭蕪歸於大雅亦安能定其所詣徐獻忠李長吉師心故爾作怪多有出人意表者然竒過則凡老過則稚此君所謂不可無一不可有二弇州太白仙才長吉鬼才宋景文長吉險怪雖兒語自得然太白亦濫觴一二胡元瑞賀以哀激之思作晦僻之調喜用鬼字泣字死字血字幽冷溪刻法當得夭王思任元輕白俗郊寒島瘦東坡李賀鬼仙郊島寒衲盧同鄉老元瑞吉按自張文昌郊島長以至盧同劉義並一時遊韓公門長聲價公首推郊詩與籍遊宴無間島賀亦指誘勤奬若同與義苐以好奇姑收之爾非真許可若籍輩也宋人取同詩與長吉同評謂天地間欠此體不得亦失其倫矣柳宗元詩與王摩詰韋應物相上下頗有陶家風氣陳氏直齋子厚詩雄深簡淡迥拔流俗至味自高直揖陶謝然似入武庫但覺森嚴西溪詩話柳子厚詩世與韋應物並稱然子厚之工緻乃不若蘇州之蕭散自然劉履韋左司平淡和雅為元和之冠然欲令之配陶凌謝宋人豈知詩者柳州則刻削雖工去之逺矣近體尤卑凡不稱弇州古詩軌轍殊多大要不過二格其一以和平渾厚悲愴婉麗為宗其一以高間曠逸清逺玄妙為宗高間一宗在古則陶在唐則王孟常儲韋柳諸家但其格本一偏體靡兼備宜短章不宜巨什宜古選不宜歌行宜五言律不宜七言律歷考各集靡不然者中惟右丞才高時能旁及至於本調反劣諸子餘雖深造自得然皆守專長而闕全詣將無才之所趨力故難強耶元瑞楊巨源在元和間不為新語體律務實功夫為深趙璘劉言史歌詩美麗恢贍世以比之李賀皮襲美張衆父婉媚綺錯巧用文字時得諷興之要高仲武下同于侍御良史詩清雅工於形似如風兼殘雪起河帶斷冰流吟之未終皎然在目李希仲詩輕靡華勝於實此所謂才力不足務為淸逸然前軍飛鳥落格鬬塵沙昏亦出塞實録白居易諷諭詩長於激間適詩長於遣感傷詩長於切律詩百言而上長於贍古詩百言而下長於情集序樂天善長篇但格製不高局於淺切又不能變風操故讀而易厭東坡而子由嘗舉大雅綿之八九章事文不相屬脈絡自一者最得為文高致樂天拙於紀事寸步不遺猶恐失之由不得詩人遺法附離不以鑿枘也此正大蘇不能變風操之意樂天用語流便使事平妥固其所長少年角靡逞博意在警策痛快晚更作知足語千篇一律輕看最能易人心手弇州元稹少有才名與白居易友善為詩善狀詠風態物色當時稱元白兩人所作號為元白體本傳白詩祖樂府務欲為風俗之用元與白同志白意古詞俗元詞古意俗陳繹曾易按樂府古與俗正可無論患在易曉盡失風人微婉義耳白嘗規元樂府詩意太切理欲稍刪其繁而晦其義亦自知詩病槩然故云元白詩纖豔不逞流於民間疏於屏壁子父女母交口教授淫言媟語冬寒夏熱入人肌骨不可除去非莊人雅士多為其破壞杜牧引李戡語辭按此似指兩家所作豔而言劉禹錫詩以意為主有氣骨吟譜夢得詩雄渾老蒼尤多感慨之句劉後村禹錫有詩豪之目其詩氣該今古詞總華實運用似無甚過人却都愜人意語語可歌真才情之最豪者司空圖嘗言禹錫及楊巨源詩各有勝會兩人格律精切欲同然劉得之易楊却得之難入處迥異爾遁叟竇氏五昆皆能詩友封鞏尤長絶句為元白所稱集序羊士諤風格不落卑調然例之能品亦蕭然微爾徐獻忠李涉為人傾斜無大異井欄君子諸絶間有可觀古風概多疏莽嚴滄浪深取之不知何解遁叟下同李公垂紳追昔遊詩大是宦夢難醒然其攬筆寫興曲備一生窮泰之感亦令披卷者代為憮然陸暢貴主催粧句捷成得譽觀他絶兼亦興豪李存博約貴公子亦豪亦恬雖篇什無多疏野可賞費徵君冠卿高隱九華有長律為兹山寫狀碎金堪摘餘可無譏施肩吾學道西山自詫羣真之一而章句尚豔碩乏韻致未稔何以御風沈亞之意尚新竒風骨未就以當時有學其體者故論之殷堯藩詩有葩豔微嫌肉豐鸛鵲樓一律獨茂碩而婉不愧初盛遺則姚祕監合詩洗濯既淨挺拔欲高得趣於浪仙之僻而運以爽亮取材於籍建之淺而媚以蒨芬殆兼同時數子巧撮其長者但體似尖小味亦微醨故品局中駟爾張承吉祜五言律詩善題目佳境不可刋置他處當時以樂府得名未是定論周賀沉鬱有骨力寫像痛切音旨融變徐獻忠李歙州敬方才力周備興比之間獨與前輩相近顧陶朱慶餘學詩於張籍具體而微旅鴈捉孤島長天下四維猛句亦水部所少遁叟下同章孝標殊有蒨飾七字尤爽朗雲領浮名去鍾撞大夢醒何其偉也顧尉非熊生自桑環隱襲茅岫近體俊婉可諷堊削功似多於真逸翁補竈釡所乏矣李武寧廓宰相子才藻翩翩少年行字字取新冶遊趣事碎小畢備老人讀之亦狂唐音癸籖卷七
