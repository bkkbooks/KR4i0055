body:
  text: 唐音癸籖巻二十明胡震亨撰詁箋五酒名春東坡云唐人酒多以春名今具列一二金陵春李白詩堂上三千珠履客甕中百斛金陵春竹葉春杜甫詩山杯竹葉春麴米春杜聞道雲安麴米春纔傾一盞便醺人抛青春韓愈詩百年未滿不得死且可勤買抛青春梨花春白居易詩青旗沽酒趂梨花注杭人釀酒趂梨花時熟號為梨花春若下春烏程有若下春劉禹錫詩鸚鵡杯中若下春石凍春富平有石凍春鄭谷贈其宰詩云易博連宵醉千缸石凍春土窟春出滎陽燒春出劒南並見唐國史補松醪春見唐裴鉶傳竒銷腸酒鄭谷詩險事消腸酒清歡敵手棊拾遺記張華以西羗蘖漬北胡麥為醇酒大醉不揺蕩令人肝腸爛當時謂之消腸酒鄭詩似用此藍尾酒元日飲屠蘇酒從小者起以至老名藍尾酒唐人多入詩用按時鏡新書晉有問董勛者曰俗以小者得嵗故賀之老者失嵗故罰之意即闌字取闌末之意借用藍耳侯白酒律又言此酒廵匝到末連飲三杯以慰之亦名婪尾唐人河東記載申屠澄遇老翁嫗留飲澄讓曰始自主人翁即廵澄當婪尾則知婪為自謙之辭如俗云貪杯然與藍又另一解矣並方言而各有其義遯叟下同火前白樂天茶詩紅紙一封書後信緑芽十片火前春齊已詩髙人愛惜藏巖裏白甀封題寄火前火前者寒食禁火之前也今世俗多用榖雨前茶稱為雨前學林新編云茶之佳者造在社前其次火前其下則雨前臯盧葉大味苦澁似茗而非南越茶艱致煎此為飲以代之非佳品也皮日休有石盆煎臯盧取其名之僻入句耳詳本草及南越志雲子杜詩飯抄雲子白葛洪丹經用雲子碎雲母今蜀中有碎礫細長而圓者白雲子石也杜以飯粒似之故云許彦周詩話麩炭白樂天詩云日暮半罏麩炭火麩炭語留傳不一北夣𤨏言優人安轡新嘲李茂貞燒京闕云京師但賣麩炭便足一生遯叟下同五粒松松以粒言舊矣唐詩如松暄翠粒新義山翠粒照清露夢得松齋一夜懷貞白霜外空聞五粒風魯望又李賀有五粒小松歌豈古人本其初菩有似乎粒故言粒歟乃亦有稱鬛者按松穗皆雙股栝松三股種傳自髙麗所謂華山松者每穗五股稱五鬛松松穗初生少可言粒多至五亦言粒於體物未愜矣段成式云五粒者當言鬛甚得之非謂凡粒皆可通呼鬛也榿杜集有乞榿木詩又有榿林礙日吟風葉句韻書不収榿字無音鄭氏注曰五來反若然當作獃字嘗見前輩讀若欹韻頗以為疑後見劒南詩有著書増木品搜句覓榿栽又荆公詩云濯錦江邉木有榿小園封殖佇華滋益信欹音為然榿惟蜀有之不才木也或謂即榕云齊東野語木綿樹大可合抱髙數丈花紅似山茶而蕋黃色瓣極厚春初葉未舒時花開滿樹望之爛然如錦又如火之燒空既結實大似酒杯絮茸茸如細毳半吐於杯之口所獲與江南草本嵗藝者異唐王叡詩紙錢飛出木綿花盖其盛開之時正與春社相值又李商隠木綿花飛鷓鴣啼則花盡葉長春已老矣西事珥下同桄榔樹李徳裕詩桄榔樹葉暗蠻溪桄榔身似㯶櫚而色緑似竹亦有絲自裹髙七八丈亭亭直上葉大如掌皆攢於樹之杪甚濃宻其杪抽絲蔓千百條長丈餘垂下如縷㽔㽔可玩南中樹此種形之最異者張九齡詩里樹桄榔出謂其特髙出羣木之表也桂張九齡詩蘭蕋春葳㽔桂花秋皎潔叚成式云桂花三月生黃而不白曲江云桂花秋皎潔妄矣按圖經桂有三種菌桂牡桂及單名桂賓宜韶欽諸州種類亦各不同有三月四月生花全類茱茰者亦有八九月生花者今東南桂皆然其花色黃白之外亦有丹者成式安得據所見遂謂曲江為妄乎遯叟下同牡丹余觀唐人牡丹入詩不但中晚即初盛概有歐公不知何故謂篇什為少此花移植於武后賦句於婉兒譜清平調於太眞有此三名雌為之破天荒雖矢音不多已占盡一代風流矣寧待買栽看到等語出始云盛哉鄭樵謂芍藥見於風雅最古牡丹晚出依芍藥得名故其初曰木芍藥亦如木芙蓉之依芙蓉以為名而為唐人所重貴游競趨至今彌甚遂使芍藥為洛譜衰宗矣玉蕋花唐人甚重玉蕋花唐昌觀花發致僊女下降元白劉夢得張籍王建與嚴復休有唱和詩李徳裕出牧潤州招隠山觀有此花因有憶翰林院玉蕋之作但不詳其花之狀若何後見周益公集有玉蕋辨證一巻云嘗從招隠致得一本條蔓如荼䕷種之冬凋夏茂柘葉紫莖乆之根株合抱成樹花苞初甚㣲經月漸大暮春方八出須如冰綵上綴金粟花心復有碧筒狀類膽瓶其中别抽一英出衆須上散為十餘猶刻玉然花名玉蕋以此益公又以為人多與瓊花㻛花相混瓊花即八僊花瑒花即山礬花亦名米囊花並白而實與玉蕋異云合昏杜子美佳人詩云合昏尚知時鴛鴦不獨宿合昏即合歡葉至暮即合今夜合花是墨莊漫録杜䳌潤州鶴林寺杜鶻今俗名映山紅又名紅躑躅者此花在江東彌山亘野殆與榛莽相仍而説者以為外國僧鉢盂中所移上𤣥命三女下司之巳踰百年終歸閬苑盖物以希見為珍不必果異種也王建宫詞云太儀前日暖房來嘱向昭陽乞藥栽勑賜一窠紅躑躅謝恩未了奏花開雖宫禁中其重如此容齋一筆荳蔲杜牧之詩云娉娉嫋嫋十三餘荳蔲稍頭二月初不解荳蔲之義閲本草荳蔻花作穗嫩葉巻之而生初如芙蓉穗頭深紅色葉漸展花漸出而色微淡南人取其未大開者謂之含胎花言尚小如姙身也姚寛叢語折麻楚詞云折踈麻兮瑶華將以遺兮離居瑤華謂麻之華白也謝靈運詩云瑤華未堪折蘭苕已屢摘路阻莫贈問何以慰離析沿楚辭意用於離居唐人駱賓王思家詩云旅行悲泛梗離恨斷踈麻錢起題輞川詩云折麻定延竚乗月期相尋用並同謝至於起贈趙給事詩乃云不惜瑤華報木桃則以瑤華為玉誤矣韻語陽秋抝花南方謂折花曰抝花唐李賀詩試問酒旗歌板地今朝誰是抝花人又古樂府抝折楊桞枝輟耕録麴塵唐人咏桞如劉禹錫之龍墀遙望麴塵絲使麴塵字者極多禮記月令薦鞠衣於上帝告桑事注云如鞠塵色周禮内司服鞠衣鄭司農云鞠衣黃桑服也色如鞠塵象桑葉始生此用之桞又象其花絮之穗耳姚寛叢語下同栗皺杜甫詩云嘗果栗皺開或作雛字殊不可解集韻雛側尤切革紋蹙也漢上題襟周繇詩云開栗戈之紫雛貫休云新蟬避栗皺又云栗不和皺落即栗蓬也訶梨勒包佶訶梨勒葉詩茗飲慚調氣梧丸喜伐邪按本草訶梨勒樹似木梡花白子似梔子主消痰下氣等疾來自南海舶上廣州亦有之茗亦能下氣此言其功勝茗梧丸謂入用丸如梧子也今醫家所用訶梨勒是其子不聞用葉者應是本草失收耳遯叟相思子筆叢謂唐人骰子近方寸凡四㸃當加緋者或嵌相思子其中溫庭筠詩云􅌑瓏骰子安紅豆入骨相思知也無相思子即今紅豆也愚按嶺南閩中有相思木嵗乆結子色紅如大豆故名相思子毎一樹結子數斛非即紅豆也豈飛卿姑借用耶徐氏筆精紅藍藍説文染青草也所謂青出於藍者是也白樂天詩老絲練緑紅藍染染成紅線紅於藍李益詩藍葉鬱重重藍花石榴色少女歸少年光華自相得此則紅花也本非藍以其葉似藍因名為紅藍本圖草經云遯叟下同蓪草王叡詩蓪草頭花桞葉裙李咸用咏紅薇詩畫出看還欠蓪為揷未輕蓪草作花古已有之矣嘉草栁子厚種白蘘荷詩庶氏有嘉草攻禬事乆冺本草蘘荷葉似初生甘蕉根似薑芽中蠱者服其汁臥其葉即呼蠱主姓名庶氏以嘉草除蠱毒宗懍謂嘉草即此也陳晦伯席萁王建詩單于不向南牧馬席萁遍滿天山下顧非熊詩席萁草斷城池外䕶栁花開帳幕前李長吉秋净見旄頭沙逺席萁秋秦韜玉席萁風𦂳馬豩豪唐人屢用之酉陽雜俎云席萁一名塞蘆生北胡地盖可為簾亦可充馬食者五代史云契丹地有息雞草尤美而本大馬食不過十本而飽意席萁即息雞一物而音訛耳劉㑹孟注賀集以席萁為箕踞之義楊升菴駁之為塞上地名並誤遯叟􅓁簩亦曰簩􅓁舊云出思牢國又一名澀勒質薄而空大者踰二寸澀可挫𤓰乆則以漿水漬之還復快利坡詩倦看澀勒暗蠻村謂此李商隠有射魚詩云思牢弩箭磨青石綉額蠻奴三虎力則此物亦中箭材矣西事珥䮂䮧白居易武丘留别諸妓云清管曲終鸚鵡語紅旗影動䮂䮧嘶廣韻䮂䮧蕃大馬也音薄寒亦有直作薄寒者遯叟下同黒暗杜詩黒暗通蠻貨叚成式以為南人稱象牙白暗犀角黒暗杜盖用方言而不詳暗之義考本草圖經云犀文有倒揷有正揷有腰鼓揷其類極多足為竒異波斯呼犀角為黒暗言難識别耳鷓鴣音嶺南録異云鷓鴣吳楚之野悉有嶺南偏多臆前有白圓㸃背上間紫赤色大如野雞多對啼其鳴自呼鉤輈格磔李羣玉山行聞鷓鴣詩云方穿詰曲﨑嶇路又聽鉤輈格磔聲韋莊集鷓鴣詩懊惱澤家非有恨年年常憶鳯城歸舊注懊惱澤家鷓鴣音有此不同喚起催歸韓退之詩喚起牕全曙催歸日未西無心花裏鳥更與盡情啼山谷曰吾每哦此詩而了不解其意自謫峽川時春晚憶此詩方悟之喚起催歸二鳥名若虛設故人不覺耳喚起聲如絡緯圓轉清亮偏於春曉鳴亦謂之春喚催歸子規鳥也冷齋夜話撥榖太白樂府撥榖飛鳴奈妾何撥榖即布榖牝牡飛鳴以翼相拂佩之夫妻相愛見爾雅注及本草遯叟下同烏鬼杜峽中詩有家家養烏鬼頓頓食黄魚之句解烏鬼者其説不一有引元微之詩病賽烏稱鬼云南人染病競賽烏鬼為杜詩之證似乎為確然於養字終説不去對下聮亦無情至有謂烏鬼為祀神之猪尤可笑畢竟是鸕鷀方與食黄魚可通聮法為合耳若謂今峽中稱鸕鷀無此名因生他辨方言今古不同者多可一槩論耶稚子杜詩笋根稚子無人見姚寛引杜牧詩小蓮娃欲語幽笋稚相擕孔平仲引唐人食笋詩稚子脱錦䙀駢頭玉香滑證稚子為笋然作此解與下鳬雛句亦不成聮法僧贊寧謂竹根有䑕大如猫名竹豚亦名雉子稚即雉字字畫小訛桐江詩話又謂笋生正雉哺子之時言雉子之小在竹間人不能見二説依稀近之雖未必果是然猶不失解詩之法西施魚李義山詩西施因網得又網得西施贈别人考東坡異物志魚有名西施者美人魚也出廣中大海食之令人善媚屠用明篊陸魯望寄吳子華詩到頭江畔尋漁事織作中流萬尺篊篊取魚具也酉陽雜俎晉時錢塘有人作篊年取魚億計號萬尺篊石梁絶水曰洪射洪之得名是也以竹為魚梁從竹為篊此字唐韻不収鄭良孺魚論斗前漢貨殖傳水居千石陂言養魚一嵗收千石唐皮日休釣侣詩一斗霜鱗換濁醪注云吳中賣魚論斗酒乃論觔芥隠筆記鳯子韓偓詩鴻兒唼啑雌黄嘴鳯子輕盈膩粉腰崔豹古今注蛺蝶大者為鳯子西清詩話蟢子權徳輿詩昨夜裙帶解今朝蟢子飛鉛華不可棄莫是藁砧歸韓翃詩少婦比來多逺望應知蟢子上衣巾俗説裙帶解有酒食蟢子縁人衣有喜事其來盖逺東山蠨蛸䟽云蠨蛸小蜘蛛長脚者俗名蟢子荆州河南名喜母着人衣主有親客至乆入三百篇注脚矣遯叟唐音癸籖巻二十
