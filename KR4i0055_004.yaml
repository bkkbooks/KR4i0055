body:
  text: 唐音癸籖卷四明胡震亨撰法微三用字則用句砭儷對事古疵篇法用韻用改章難於造篇易字艱於代句文心雕龍以下用字用字一避詭異謂字體瓌怪如古詩褊心惡訩呶之類二省聯邊謂半字同文如偏旁從山從水之類不獲免可至三接三接外同字林矣三權重出謂同字相犯也詩驗適會若兩字俱要則寧在相犯為文者富於萬篇貧於一字又唐宣宗嘗問中書舍人李藩考試之中重用字如何問孰詩重用字對曰錢起湘靈鼓瑟詩有二不字上誦其詩仍稱善相屬蓋亦知其相避為難云四調單復謂字形之肥瘠也瘠字纍句則纖疏而行劣肥字積文則黯黮而篇暗詩有隱一字而意自見者糾糾葛屨可以履霜言不可也海水知天寒言不知也皆隱一不字在白樂天李長吉咏寒百石強車上河水換冰字作水寒意自躍此用字之最有意者遁叟下同律詩忌犯疊音字固也然杜甫之卑枝接葉何將軍園詩白樂天之嫌甜笑小量大嫌甜酒才高笑小詩李羣玉之﨑嶇詰曲鉤輈格磔﨑嶇詰曲雙聲鉤輈格磔疊韻非故用疊音以示巧乎知用字活法非可一端盡詩用助語字非法也惟排律長篇或間有之如杜老餘力浮於海端憂問彼蒼尚不覺用語助字至王孟暢以沙際鶴兼之雲外山及依止此山門誰能效丘也之類則惡矣豈可妄效體物疊字本之風雅詩所不能無如劉駕之夜夜夜深聞子規吳融之摵摵凄凄葉葉同則多事矣然未有疊至七聯如韓退之南山詩者豈以靑靑河畔草亦用疊字三聯有前例與作法於涼雖漢人吾不能無餘憾云作詩要健字撑拄活字幹旋如紅入桃花嫩靑歸柳葉新弟子貧原憲諸生老伏虔入與歸字貧與老字乃撑拄也生理何顏面憂端且歲時名豈文章著官應老病休何與且字豈與應字乃斡旋也撑拄如屋之有柱斡旋如車之有軸羅大經好詩句法渾涵不可以一字求句中有一字可摘為眼非詩之至也才有此句法便不渾涵昔人謂石之有眼為研之一病余亦謂句中有眼為詩之一病如地坼江帆隱天淸木葉聞故不如地卑荒野大天逺暮江遲也如返照入江翻石壁歸雲擁樹失山村故不如錦江春色來天地玉壘浮雲變古今也此最詩家三昧不可不知胡元瑞鳥又云審言風光新桞報宴賞落花催摩詰興闌啼換坐久落花多皆佳句也然報與催字極精工而意盡語中換與多字覺散緩而韻在言外觀此可知初盛次第又云老杜用字入化者古今獨步中有太竒巧處然巧而不尖竒而不詭猶不失上乘如孤燈然客夢寒杵搗鄉愁則尖矣流星透疏木走月逆行雲則詭矣用字者此二則尤宜合參詩在與人商論深求其疵而去之等間一字放過則不可詩自有穩當字第思之未到耳王貞白嘗以詩謁貫休休指其御溝詩云此波涵聖澤波字未穩王作色而去休度其必來書中字掌中以待王果來云欲更中字如何休展手示之遂定交要當如此乃是唐庚文録云又歐陽公陳舍人從易偶得杜集舊本至送蔡都尉詩身輕一鳥下脫一字陳因與數客各用一字補之或云疾或云落或云起或云下莫能定其後得一善本乃是身輕一鳥過陳大嘆服以為雖一字我輩亦不能到楊用修云孟集有到得重陽日還來就菊花之句刻本脫一就字有擬補者或作醉或作賞或作泛或作對皆不安後得善本是就字蓋出于漢樂府就我求淸酒就字也乃益知其妙以此二則合貞白事觀之知選字故不易言矣三百篇四言定體間出二三五六七言祈父二言振振鷺三言誰謂雀無角五言我姑酌彼金罍六言交交黃鳥止于桑七言亦有八言如我不敢效我友自逸之類西漢詩五言定體間出二三四五六七言甚有至九言者樂府上陵錯用三四五六等言戰城南君馬黃有所思錯用三四五七等言上邪錯用二三四五六七等言始用五七等言成篇陳琳飲馬長城窟始用三五七九等言成篇鮑照擬行路難是也凡句減於三字則喑增於九字則吃遁叟句以下用疊字為句不過合者析之順者倒之便成法如委波金不定合者析之也本言草碧却云碧知湖外草本言獺趂魚而喧却云溪喧獺趂魚所謂順者倒之也舉此可類其餘五字句以上二下三為脈七字句以上四下三為脈其恆也有變五字句上三下二者如元微之庾公樓悵望巴子國生涯孟郊藏千尋布水出十八高僧之類變七字句上三下四者如韓退之落以斧引以墨徽又雖欲悔舌不可捫之類皆蹇吃不足多學只此五七字疊成句萬變無窮如人面只眼耳口鼻四爾不知如何位置來無一相肖者詩人工巧真侔造化哉古人所以有句圖之作令學者觸類而長也然究竟法變非句圖所能盡音律乃人聲之所同對偶亦文勢之必至詩法源流以下儷對或疑今人不及古者病于儷詞余謂不然昔我往矣楊柳依依今我來思雨雪霏霏非儷耶但古人後於語先於意皎然詩式言對為易事對為難正對為劣反對為優雙比空辭為言對並舉人驗為事對事異義同為正對理殊趣合為反對文心雕龍假對如沈雲卿牙緋對齒録杜子美懷君對飲子侍中貂對大司馬杜牧之當時物議朱雲小後代聲名白日懸之類當句對杜小院回廊春寂寂浴鳬飛鷺晚悠悠李嘉祐孤雲獨鳥川光暮萬里千山海氣秋皆當句對也流水對嚴羽卿以劉眘虛滄浪千萬里日夜一孤舟為十字格劉長卿江客不堪頻北望塞鴻何事又南飛為十四字格謂兩句只一意也蓋流水對耳蹉對沈存中以九歌之蕙殽蒸奠桂酒為蹉對之祖唐人七言起結對者多用此法其中聯如劉長卿離心日逺如流水回首川長共落暉亦蹉對之類扇對又謂之隔句對五言律如李白白鷺洲前月天明送客回青龍山後日早出海雲來七言律如鄭谷昔年共照松溪隱松折碑荒僧已無今日還思錦城事雪消花謝夢何如是也排律中尤多有之續句對律詩如老杜待爾嗚烏鵲拋書示鶺鴒枝間喜不去原上急曾經排律如老杜神女峯娟妙昭君宅有無曲留明怨惜夢盡失歡娛之類一順續一倒續又如贈張山人草書應甚苦詩興不無神曹植休前輩張芝更後身數篇吟可老一字買堪貧續至三聯白樂天以為詩有連環文藻隔句相解者起於鮑照之擾擾遊宦子營營市井人懷金近從利負劔逺慈親其來有自云凡詩對下句不妨勝上句古人所云吟詠滋味流於下句是也因情立體即體成勢劉協下同以下篇法規範本體謂之鎔剪截浮詞謂之裁裁則蕪穢不生鎔則綱領昭暢因字生句積句為章積章成篇句之清英字不妄也章之明靡句無玷也篇之彪炳章無疵也啓行之辭逆萌中篇之意絶筆之言追勝前句之旨一詩之中妙在一句為詩之根本根本不凡則花葉自然殊異如君子在位善人皆來詩家一指句中無餘字篇中無長語非善之善者也句中有餘味篇中有餘意善之善者也白石詩説作詩必先命意意正則思生然後擇韻而用如驅奴𨽻此乃以韻承意故首尾有序今人遷意就韻因韻求事所以失之室中語韻以下用劉協云改韻從調所以節文辭氣兩韻輒易則聲韻微燥百句不遷則唇吻告勞七古改韻宜衷此論為裁若五言古畢竟以不轉韻為正漢魏古詩多不轉韻十九首中亦只兩首轉韻耳李靑蓮五古多轉韻每讀至接換處便覺體欠鄭重惟杜少陵雖長篇亦不轉韻如北征六十五韻只一韻到底一韻五言正體轉韻五言變體也遁叟下同近體詩即不得押古韻然欲從事古詩古韻叶自當講求李滄溟云古者字少寧假借必諧聲韻無弗雅者古字自是足用第患不博古耳今之作者限於學之所不精茍而之俚或屈於才之所不健更掉而之險而雅均病然險可使安俚偏纍雅聊用布親串孰與風物自凄緊雲霞肅川漲孰與金壺啓夕淪夫韻歌詩之輪也失之一字全輿有所不行職此故矣柏梁押重韻者人占一句故犯重韻以爭勝也焦仲卿妻重韻為多者長篇敘事無庸簡擇重犯正見滔莽之致也此二詩外有重押者當屬偶誤杜子美飲中八仙歌押二船字二眠字二天字三前字體正類柏梁故重用韻耳若韓退之諸詩以今裁而效往例屢押重韻正如東眉故蹙顰䀶增醜有之益妍則未也退之詩云橫空盤硬語妥貼力排奡蓋言能殺縛事實與意義合也此最用事妙手許彥周詩話以下用事詩自摹景述情外則有用事而巳用事非詩正體然景物有限格調易窮一律千篇祗供厭吐欲觀人筆力材詣全在阿堵中且古體小言姑置可也大篇長律非此何以成章胡元瑞下同用事患不得肯綮得肯綮則一篇之中八句皆用一句之中二事串用亦何不可宛轉淸空了無痕迹縱橫變幻莫測端倪此全在神運筆融猶斫輪甘苦心手自知難以言述世豈有國號國姓可入詩者哉然如人歌小嵗酒花舞大唐春盧照鄰但經春色還秋色不覺楊家是李家李山甫詠隋堤柳非佳句乎觀此事無不可使只巧匠少耳遁叟用事不可著迹只使影子可也雖死事亦當活用楊仲𢎞如杜牧贈李中敏元禮退歸綸氏學江充來見犬臺宮中敏嘗論鄭注以注比江充以中敏之歸潁陽比李膺之歸綸氏教授可謂極切只為綸氏恰屬潁陽反覺死相必易他地才活又如趙嘏雙鶴寄兄詩茅固枕前秋對舞陸雲溪上夜同鳴用三茅君兄弟並乘白鶴人見鶴在帳中及機雲兄弟同遊郊墅聞鶴唳二事也豈不的切然正厭其切耳詩家使事必仍其事之本字其常也然亦不盡然如老杜玉衣晨自舉鐵馬汗常趨非用昭陵石馬汗出事乎却更為鐵馬但使閭閻還揖讓敢論松竹久荒蕪非用陶潛三徑就荒松菊猶存語乎却更為松竹但細讀全篇覺仍之不穩必更之才合者則頰上三毛之謂也於此參究可悟使事活法石字凹鐵字滿得歸茅屋言松竹合言松菊逺在遁叟下同體物用乾坤字最多者杜甫乾坤萬里眼乾坤日夜浮及日月低秦樹乾坤繞漢宮之類用元氣二字最多者劉長卿如登塔之盤梯接元氣洞庭湖之疊浪浮元氣望海之元氣逺相合太陽生其中凡數四見境窮於睫量語亦窮於吻量非此等字不足副之後學用此為襲腐觸此堪反隅詩惟情格並高可稱上品其雖有事非用事者若論其功合入上格至有三字物名之句仗語而成用功殊少如孟浩然云氣蒸雲夢澤波撼嶽陽城自天地二氣初分即有此六字假孟生之才加其四字何功可伐即欲索入上流耶彼情格極高則不可屈若稍下吾請降之於高等之外以懲彼濫又宮闕之句或壯觀可嘉雖有功而情少謂無含蓄之意也宜入直用事中不入上格無作用故也皎然吟家雖忌疏學然如詩料平時收拾太多不能割愛往往病堆垜更不如寡學人作詩有情韻也謂不信者請看篋中集諸公胸中有幾多書在遁叟下同詩家拈教乘中題當即用教乘中語義旁擷外典補湊便非當行在古如支公輩亦有雜用老莊語者至今時則迥然分途取材不可混矣唐諸家教乘中詩合作者多獨老杜殊出入不可為法如慈恩塔一詩高岑終篇皆彼教語杜則雜以望陵寢嘆稻粱等句與法門事全不涉他寺剎及贈僧詩皆然今人作詩必入故事有持清虛之説者謂盛唐詩即景造意何嘗有此是則然矣然亦一家言未盡古今之變也古詩兩漢以來曹子建出而始為宏肆多生情態此一變也自此作者多入史語然不能入經語謝靈運出而易辭莊語無所不為用矣剪裁之妙千古為宗又一變也中間何庾加工沈宋增麗而變態未極七言猶以間雅為致杜子美出而百家稗官都作雅音馬浡牛溲咸成鬱致於是詩之變極矣子美之後而欲令人毁靚妝張空拳以當市肆萬人之觀必不能也其援引不得不日加而繁然病不在用事顧所以用之何如耳善使事者勿為事所使如禪家云轉法華勿為法華轉使事之妙在有而若無實而若虛可意悟不可言傳可力學得不可倉卒得也宋人使事最多而最不善使故詩道衰我朝越宋繼唐正以有豪傑數輩得使事三昧耳苐恐二十年後必有厭而掃除者則其濫觴末弩為之也王敬美學詩者以識為主入門須正立意須高以漢魏晉盛唐為師不作開元天寶以下人物若自退屈即有下劣詩魔入其肺腑之間由立志之不高也行有未至可加工力路頭一差愈騖愈逺由入門之不正也嚴滄浪則以下取古詩三百可以博其源遺篇十九可以約其趣樂府雄高可以厲其氣離騷深永可以禆其思徐禎卿詩云有物有則又曰無聲無臭昔人有步趨華相國者以為形迹之外學之去之彌逺又人學書日臨蘭亭一帖有規之者云此從門而入必不成書道然則情景妙合風格自上不為古役墮蹊徑者最也隨質成分隨分成詣門户既立聲實可觀者次也或名為閏繼實則盜魁外堪皮相中乃膚立以此言家久必敗矣王弇州詩上自蘇李下迄六代漢魏骨氣雖雄而菁華不足晉祖玄虛宋尚條暢齊梁以下但務春華殊欠秋實唯李唐作者可謂大成然貞觀尚習故陋神龍漸變常調開元天寶間神采聲律粲然大備學者故當以是為楷式林鴻元和而後詩道浸晚而人才故自橫絶一時若昌黎之鴻偉柳州之精工夢得之雄竒樂天之浩博皆大家才具也今人槩以中晚束之高閣若根腳堅牢眼目精利泛取讀之亦足充擴襟靈贊助筆力胡元瑞下同宋初諸子多祖樂天元末詩人競師長吉語意勢為三偷語最為鈍賊酇侯造律不暇及詩致使弱手蕪才公行劫掠片言可折此輩無處逃刑其次偷意事雖可罔情不可原若欲一例平反詩教何設其次偷勢才巧意精若無朕迹蓋詩人偷狐白裘於閫域中之手吾亦賞俊從其漏網皎然剽竊模擬詩之大病亦有神與境觸師心獨造偶合古語者如客從逺方來白楊多悲風春水船如天上坐不妨俱美定非竊也其次裒覽既富機鋒亦圓古語口吻間若不自覺間亦有之未致足厭乃至割綴古語痕迹宛然斯醜方極皆不免為盜跖優孟所訾弇州唐明皇令僧教康崑崙琵琶僧云且遣崑崙不近樂器十年使忘其本領然後可教有鄉人請學詩者余以此語之方采山詩有古人所不忌而今人以為病者摘瑕者因而酷詆之將併古人無所容非也然今古寬嚴不同作詩者既知是瑕不妨併去古人詩有誤用重韻重字者皆是失點檢處必不可借以自文又如風雨雲雷有二聯中接用者一二三四有八句中六見者今可以為法邪此等病盛唐常有之獨老杜最少蓋其詩即景後必下意也又其最隱者如雲卿嵩山石淙前聯云行漏香罏次聯云神鼎帝壺俱壓末字岑嘉州雲隨馬雨洗兵花迎蓋柳拂旌四言一法摩詰獨坐悲雙鬢白髮終難變語異意重九成宫避暑三四衣上鏡中林下巖前在彼正自不覺今用之能無受人揶揄至於失嚴之句摩詰嘉州特多殊不妨其美然就至美中亦覺有微缺陷不為可也至於首句出韻晚唐作俑宋人濫觴尤不可學王敬美以下砭疵蘇長公論詩有二語絶得三昧曰作詩必此詩定知非詩人蓋詩惟咏物不可汗漫至於登臨燕集寄憶贈送惟以神韻為上使句格可傳乃為上乘今於登臨則必名其泉石燕集則必紀其園林寄贈則必傳其姓字真所謂田莊牙人點鬼簿粘皮骨者漢唐人何嘗如此最詩家下乘小道即一二大家有之亦偶然耳可為法乎元瑞下同才按詩中用姓即老杜亦不免如贈賈至嚴武云長沙子逺釣瀨客星懸又賈筆論孤憤嚴君賦幾篇又飲張氏隱居杜酒偏勞勸張梨不外求此法今吟人槩用以救急矣嘉隆學杜善矣而猶未盡遷轉五州防禦使起居八坐太夫人本常語而一時模尚遂令大夫使者填塞奚囊太尉中丞類被差遣至不佞扶風漢大藩之類亦後學之前車也詩者人之情性也怨懟忿詬怒鄰罵坐之為也其人抱道而居與時乖逢情所不堪因發於呻吟調笑抒其胸次聞者亦有所勸戒是詩之善也其發於訕謗侵陵引頸以承戈披襟而受矢以快一時之忿而罹詩之禍是失詩之旨非詩之過也山谷詩家雖刺譏中要帶一分含蓄庶不失忠厚之旨杜甫秋興同學少年多不賤五陵衣馬自輕肥著一自字以為怨之可也以為羡之亦可也何等不露王維喜祖三至留宿蚤歲同袍者高車何處歸似乎言同袍者之薄然亦借之以明祖之過我者為厚其意未嘗不婉若使他人為之則露矣直矣雖取快唇吻非所以自占地步也遁叟少陵故多變態其詩有深句有雄句有老句有秀句有麗句有險句有拙句有纍句然無露句其意何嘗不自高自任然其詩曰文章千古事得尖寸心知曰新詩句句好應任老夫傳溫然其辭而自負意隱然言外何嘗有所謂吾道主盟代興哉自少陵逗漏此趣而大智大力者發揮畢盡至使吠聲之徒羣肆撏剝唐音永不可復噫嘻愼之詩藪鄭谷云舉世何人肯自知須逢精鑑定妍蚩若教嫫母臨明鏡也道不勞紅粉施吾謂凡今作詩者宜讀此杜甫云楊王盧駱當時體輕薄為文哂未休爾曹身與名俱滅不廢江河萬古流吾謂今之好譏議前輩詩者宜讀此張祜云等間緝綴間言語誇向時人喚作詩昨日偶拈莊老讀萬尋山上一毫釐吾謂前輩如王李二公惜亦未嘗讀此遁叟唐音癸籖卷四
