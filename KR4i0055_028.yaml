body:
  text: 唐音癸籖巻二十八明胡震亨撰談叢四唐人一時齊名者如富吳嘉謨少微蘇李前味道嶠後頲乂燕許燕國公張說小許公蘇頲蕭李頴士華韓栁愈宗元四傑王楊盧駱四友杜審言李嶠崔融蘇味道稱文章四友三俊元稹李德裕李紳皆兼以文筆為稱其專以詩稱有沈宋佺期之問錢郎起士元時人語前有沈宋後有錢郎是也又錢郎劉李合劉長卿李嘉祐稱之亦時人語鮑謝防良輔元白稹居易劉白合劉禹錫稱溫李商隠庭筠賈喻島鳬出顧雲文皮陸日休龜蒙吳中四士賀知章劉眘虚包融張旭一云無眘虛有張若虛廬山四友楊衡符載崔羣宋濟三舍人王涯令狐楚張仲素大歴十才子盧綸吉中孚韓翃錢起司空曙苗發崔峒耿湋夏侯審李端咸通十哲等目許棠張喬喻坦之劇燕任濤吳罕張蠙周繇鄭谷李栖逺溫憲李昌符謂之十哲實十二人至李杜王孟高岑韋孟王韋韋栁諸合稱則出自後人非當日所定按楊慿有詩云直用天才衆却瞋應欺李杜久為塵慿大歴中人也知兩公身沒未幾世已有並稱矣但至韓公始大定耳王孟以下諸合稱則宋人論詩所定也詩才遲速天分有限賈島三年十字遲自可傳王璘半日萬言速更何取必也捷成為貴楊師道之當筵立搆王子安之覆被起書李太白之頮面四絶溫飛卿之义手八韻敏與工兼才斯稱異爾詩人蚤慧者權德輿三歲能變四聲又四歲能賦詩五歲令狐楚能詞章林傑口占王霸壇詩六歲王勃善文詞楊牢題彈棊局七歲李百藥能屬文駱賓王詠鵞杜甫詠鳯凰李泌知為文李賀以長短之製名動京師八歲劉晏獻封泰山頌楊嗣復知屬文九歲王維知屬辭元稹工屬文十歲李白通詩書十二歲李乂工屬文十三歲楊收善文詠又蘇頲史稱其幼詠死兔及嘲尹字不知是幾何歲白居易生七月卽識之無二字及汪先范氏子之類尤多其或夭折或富貴壽考亦皆不可一律論科名之高者崔元翰京兆解頭禮部狀頭宏詞及制科三等勑頭咸首捷武翊黃府選為解頭及第為狀頭宏詞為勑頭時謂武氏三頭章孝標贈翊黃詩花錦文章開四面天人科第占三頭是也又張又新時亦號三頭詩人年高者賀知章八十六秦系羅隠並八十餘員半千九十四丘為九十六蕭德言九十七而王季文劉商施肩吾陳陶黃損世皆傳其仙去尤不可以年甲計者且未論真否貴穏吟膽使無預愁惟盧昇之師資孫思邈復主其家四十上不免小厄孤負與活神仙相處一番耳胡元瑞嘗考唐人父子兄弟文學並稱及諸家安平遘遇窮達之不同載詩藪外編讀者觀其人而論其世家之盛者固可慕遇之窮者猶可引而自慰也爰稍增訂錄左方父子則薛收薛元超李百藥李安期褚亮褚遂良許叔牙許子儒宋令文宋之問趙武孟趙彥昭敬播敬之𢎞陳子昂陳光沈佺期沈東美賈曾賈至蘇瓌蘇頲李適李季卿崔日用崔宗之蕭嵩蕭華李善李邕張說張均崔良佐崔元翰杜甫杜宗武房融房琯鄭繇鄭審蕭頴士蕭存獨孤及獨孤郁張毅夫張禕郄純郄士美樊澤樊宗師裴倩裴均歸崇敬歸登劉禹錫劉承雍路泌路隨李懷遠李景伯于休烈于肅張薦張又新李端李虞仲韋表微韋蟾韋貫之韋澳段文昌段成式皇甫湜皇甫松苗晉卿苗發李程李廓李泌李繁韋綬韋溫崔羣崔亮楊淩楊敬之崔璩崔渙溫庭筠溫憲章孝標章碣劉迺劉伯芻劉三復劉鄴鄭亞鄭畋李磎李沇又張文琮二子戩錫韋安石二子陟彬包融二子佶何王景三子之咸之賁之渙吕渭四子溫恭儉讓穆寧四子質贊員賞竇叔向五子常羣牟庠鞏劉知幾六子貺餗秩彚迅迥兄弟則孔紹安孔紹新蓋文懿蓋文達馬敬淳馬敬潛秦景通秦煒路紀路鼓崔湜崔液席豫席晉周思茂周思鈞杜易簡杜審言韋承慶韋嗣立來濟來恒崔日知崔日用薛曜薛稷王維王縉皇甫曾皇甫冉崔敏童崔惠童元結元融蔡希周蔡希寂李渤李涉暢當暢諸栁公綽栁公權許康佐許堯佐楊虞卿楊汝士栁中庸栁中行李翰李觀馮宿馮定李遜李建吳通微吳通𤣥鄭仁規鄭仁表栁渾栁識唐臨唐皎周繇周緐三人者自前王之渙兄弟外張文琮張文瓘張文收沈佺期沈全交沈全宇喬知之喬偘喬備李乂李尚一李尚貞楊慿楊淩楊凝韋綬韋纁韋純蘇冕蘇弁蘇衮白居易白敏中白行簡韋述韋迅韋逌四人者自前吕穆二家外楊發楊假楊收楊嚴五人者張知騫知𤣥知晦知泰知黙及前竇氏連珠六人者王劇王勔王勃王助王劼王勸及前劉貺兄弟七人者趙夏日趙冬曦趙和璧趙安貞趙居貞趙頤貞趙艱貞八人者賀德仁賀德基劉知柔劉知幾等闕高陽里此外如崔蒞等兄弟四人闕瑤等闕邠等六人崔琯等八人並載唐史闕兄弟林藻一家兄弟九牧載地志然率以爵位顯大抵齊名聲實相副者三人則巳盛矣四五以上惟王竇二氏庶幾自餘張趙諸人雖當時並有名字亦未必盡然姑録以備數若三羅同姓通譜原非真屬連枝所不槩入祖孫則孔紹安孔日新姚思廉姚璹岑文本岑羲員半千員俶杜審言杜甫張鷟張薦許敬宗許彥伯韋嗣立韋𢎞景杜佑杜牧鄭絪鄭顥唐次唐彥謙殷侑殷盈孫唐臨唐紹馮宿馮㳙高士廉二孫球瑾魏徴謩于志寧休烈狄仁傑兼謨李敬𤣥紳之類以世次稍逺不録父子祖孫三世者徐齊􅔶子堅堅子嶠武平一子就就子元衡儒衡崔融子禹錫禹錫子巨李栖筠子吉甫吉甫子德裕錢起子徽徽子可復可及珝栁芳子冕登登子璟栁公綽子仲郢仲郢子璞璧珪玭鄭餘慶子澣澣子處誨從讜又陸餘慶孫海海孫長源四世者王播子起起子龜龜子蕘盧綸子簡能簡辭𢎞正簡求簡能子知猷簡辭子貽殷𢎞正子䖍灌簡求子汝弼嗣業嗣業子文紀内盧氏尤文彩與官爵同盛史稱鬱為鼎門云開元以前詞人鮮弗達者天寶以後才士鮮弗窮者即間有之然弗數見也第今製作行世則景龍垂拱百不二三大歴元和十嘗五六造物乘除亦巧矣輙據唐人雜說類次數條以見其槩云唐書云太宗以海内漸平鋭意經籍開文學館以待四方才俊與選者杜如晦房𤣥齡虞世南陸德明于志寧蘇世長禇亮姚思廉孔潁達李元道李守蔡允恭顔相時薛收蓋文達蘇旭薛元敬許敬宗後收卒以劉孝孫補之世謂十八學士擬於登瀛洲焉右唐初太宗世顯者天䇿所收顔師古禇遂良等尚不止此又云景龍二年中宗於修文館置大學士四員學士八員直學士十二員李嶠宗楚客趙彦昭韋嗣立為大學士李適劉憲崔湜鄭愔盧藏用李乂岑羲劉子𤣥為學士薛稷馬懷素宋之問武平一杜審言沈佺期閻朝隠韋安石徐堅韋元旦徐彦伯劉允濟為直學士右高和世顯者先是武氏修三敎珠英徵天下文士二十六人徐彦伯為首餘率前諸學士張說王無競富嘉謨亦與焉𤣥宗紀開元元年夏郭元振同三品秋張說為中書令冬以姚崇同三品盧懷慎同平章事四年冬宋璟為黃門監源乾曜蘇頲同平章事八年春張嘉貞十四年夏李元紘二十一年春韓休冬裴耀卿張九齡俱同平章事右𤣥宗開元中宰相至十數人皆文學士也先是又有魏知古等古今詞人之達莫盛此時繼之林甫國忠雖天資險獪然俱以不學稱唐治亂判矣席豫傳云豫與韓休許景先徐安貞孫逖張九齡先後掌綸誥又蘇頲蘇晉賈曾賈至齊澣王丘李乂等並以文學為中書舍人右二則初盛間詞人顯者賀知章傳云神龍中知章與越州賀朝萬齊融揚州張若虚邢巨湖州包融俱以吳越之士文詞俊秀名揚於上京朝萬止山陰尉齊融崑山令若虚兖州兵曹巨監察御史融遇張九齡引為懷州司户集賢直學士數子人間往往傳其文獨知章最貴神龍中有尉氏李澄之善五言詩蹉跌不偶六十餘為㕘軍卒又唐新語云長壽中滎陽鄭蜀賓詩知名年老甫授一尉之官未幾卒二事甚類右初盛間窮而間有達者國史補云開元以後位卑而名著者李北海邕王江寧昌齡李館陶鄭廣文䖍元魯山德秀蕭功曹潁士張長史旭獨孤常州及崔比部梁補闕肅韋蘇州應物右載唐詩紀事崔比部李館陶不列名按是時詩文有重望而不甚顯者崔則崔顥崔曙李則李翰李華舍四人外無赫稱必居二於此明皇雜録云天寶末劉希夷王冷然王昌齡祖詠張若虚張子容孟浩然常建李白劉眘虚崔曙杜甫雖有文章盛名皆流落不偶右二條盛唐詩人窮者李杜古今流落之魁然置諸人中覺猶為顯達也一笑丹陽集云潤州延陵有包融儲光羲曲阿有丁仙芝緱氏主簿蔡隠丘監察御史蔡希周渭南尉蔡希寂處士張彦雄張朝校書郎張暈吏部常選周瑀長洲尉談戭句容有殷遙硤石主簿樊光橫陽主簿沈如筠江寧有右拾遺孫處𤣥處士徐延壽丹徒有江都主簿馬侹武進尉申堂搆十八人皆有詩名右亦多盛唐間人吳楊所產也殷氏敘其履歴但一二稍顯自餘布衣冗秩旁午篇中豈此方當時遂無貴且文者耶盧綸傳云綸與吉中孚韓翃錢起司空曙苗發崔峒耿湋夏侯審李端號大歴十才子綸戸部郎中起考功郎中發都官員外峒右補闕湋右拾遺審侍御史宦俱不甚顯獨中孚侍郎翃知制誥差著而端竟終杭州司馬時秦系劉方平布衣顧況司戸于鵠從事張南史㕘軍厄尤甚焉右中唐詩人之窮者嗣是權武裴元韓白諸公驟顯元和遂以中興繼之郊寒島髠藉盲仝枉二李賀觀歐陽並夭其窮益又甚矣劇談録云自大中咸通之後每歲試春官者千餘人其間有名如何植李玫皇甫松李孺犀梁望毛濤貝庥來鵠賈隨以文章稱溫庭筠鄭瀆何涓周鈐宋耘沈駕周緐以詞賦顯賈島平曾李陶劉得仁喻坦之張喬劇燕許琳陳覺以律詩著張維皇甫川郭鄩劉延暉以古風名皆厄於一第然其間數公麗藻英詞播於海内與虛薄竊聯名級者殆不可同年語矣右晚唐詩人窮者如此其衆又過於前然司馬羅隠輩尚不止是今製作多不傳徒空名寄於簡冊雖頗勝當時華要亦可悲也唐舉子不中第者語林劇談所紀外又有來鵬宋濟嚴惲王璘李洞胡曾張祜江為盧汪孫定許􅀈􅀈後為羽流歐陽澥李山甫司馬禮等大率皆晚唐而盛唐則老杜以不第獻賦其他孟浩然等雖布衣然非舉子也諸人生不成名今紀載又將沒沒余惜而詳著之王弇州嘗為文章九命之說備載古今文人窮者今摘唐詩人稍加訂定録後一貧困杜甫浣花蠶月乞人一絲兩絲鄭䖍履穿四明雪饑拾山陰橡蘇源明爇薪照字垢衣生蘚王季友賣履自給陽城屑榆作粥不干隣里賈島嘆鬢絲如雪不堪織衣孟郊苦寒恨敲石無火盧仝長鬚赤脚濯園自資周朴寄食僧居不能娶婦二嫌忌張九齡李邕蕭潁士見忌李林甫顔真卿見忌元載武元衡見忌王叔文韓愈見忌李逢吉李德裕見忌李宗閚白居易見忌李德裕張祜元白並沮其進溫庭筠李商隠見忌令狐綯韓偓見忌崔㣧三玷缺四傑輕浮沈宋險獪李嶠浮沈致責蘇味道模稜充位張說大肆苞苴賀知章縱心沈湎王維鄭䖍儲光羲李華陷身逆虜柳宗元劉禹錫躁事權臣劉長卿怨懟多忤嚴武驕矜無上李白見辟狂王秦系出妻獲謗崔顥數棄伉偶元稹改節奥援李德裕樹黨掊擊李益感恩藩鎮四偃蹇四傑内盈川僅至令長李杜淪落吳蜀孟浩然以禁中忤㫖放還終老薛令之以苜蓿致嫌奪官蕭潁士及第三十年纔為記室沈千運窮老五十年以死王昌齡詩名滿世棲遲一尉賈島溫飛卿皆以龍鱗魚服顛躓不振孟郊公乘億溫憲劉得仁潘賁之徒老困名塲僅得一第或方鎮一辟憔悴以死至其詩所謂鬢毛如雪心如死猶作長安下第人十上十年皆下第一家一半已成塵一領青衫消不得著朱騎馬是何人又有揶揄路鬼憔悴波臣獮猴騎土牛鮎魚上竹竿之喻噫其窮甚矣五流貶流徙則李義府鄭世翼盧藏用沈佺期宋之問元萬頃閻朝隠郭元振崔液李善李白吳武陵貶削則杜審言杜易簡韋元旦杜甫劉允濟李邕張說張九齡李嶠王勃蘇味道崔日用武平一王翰鄭䖍蕭潁士李華王昌齡劉長卿錢起韓愈栁宗元李紳白居易劉禹錫吕溫陸䞇李德裕牛僧孺楊虞卿李商隠溫庭筠賈島韓偓韓熙載徐鉉六刑辱杜審言為州僚搆繫賴孝子得伸温庭筠被邏卒毆縛訴鎮帥不理劉長卿李太白吳武陵並先就刑囚纔赴貶所王無競李邕盧崇道俱身受勑杖然後殞亡七夭折范攄子七歲能詩十歲卒林傑六歲能文十七歲卒李賀二十六王勃二十九八無終張蘊古劉禕之李福業王劇王勔范履冰苗神客陳子昂王昌齡李邕王涯舒元輿盧仝姚漢衡劇燕路德延汪台符郭昭慶鍾謨潘佑以寃鄭愔宋之問崔湜蕭至忠薛稷蘇渙江為宋齊丘以法駱賓王張巡顏真卿溫庭皓周朴孫晟以義王無競劉希夷以讎薛能皮日休以亂盧照鄰以水伊璠以猛獸九無後楊炯絶後葬兄弟手宋之問有文哀之李太白蕭頴士有子而獨孫女流落俱為俗人妻崔曙一女名星白居易一侄曰龜王維四弟無子陽城三昆不娶崔珏張又新皆有二子而崔子並見法張子並沒于水弇州云古人謂詩能窮人夫貧老愁病流竄滯留人所不謂佳者也然而入詩則佳富貴榮顯人所謂佳者也然而入詩則不佳是一合也泄造化之秘則真宰黙讎擅人羣之譽則衆心未厭故呻佔推琢幾於伐性之斧豪吟縱揮自傅爰書之竹矛刃起於兔鋒羅網布於鴈池是二合也循覽往匠良少完終為之愴然以慨唐音癸籖巻二十八
