body:
  text: 唐音癸籖卷十四眀胡震亨撰樂通三琴曲髙宗白雪曲顯慶中帝以琴曲失傳令有司修習太常丞吕才言琴曲本宜合歌請依琴中舊曲以御製雪詩為白雪歌辭又古今樂府奏正曲後復有送聲亦君唱臣和之義請以羣臣長孫無忌于志寧許敬宗等所和詩為送聲合十六節帝善之乃命太常著於樂府才復撰琴歌白雪等曲帝亦製歌詞十六皆著樂府玄宗金風樂黃鍾羽調曲崇文書目帝有金風樂弄一卷載琴音第一第二第三拍宫調指法又黃鍾羽調一首附卷盧照鄰明月引沈佺期霹靂引張説鳯歸來集稱琴歌不著其名所自李白雉朝飛操雙燕離琴歷河間新歌有其曲名飛龍引山人勸酒幽澗泉顧况幽居弄蔡雍五弄之一也龍宫操况自敘大厯初在滁州大水作劉商胡笳十八拍自序擬董庭蘭胡笳弄作李頎有聽庭蘭彈胡笳歌韓愈拘幽操越裳操岐山操履霜操雉朝飛操猗蘭操將歸操龜山操殘形操别鶴操鮑溶湘妃列女操孟郊列女操李賀走馬引即樗里牧恭所造天馬引淥水辭蔡雍五弄之一劉禹錫飛鳶操李約東杓引約患琴家無角聲乃造東杓引七拍有麟聲繹聲以備五音張祜思歸引即衛賢女邵所造離居操也李羣玉升仙操陳康士琴曲一百章宫調二十章商調十章角調五章徵調七章楚調五章黃鍾二十章離憂七章沈湘七章側蜀七章縵角七章玉女五章康士字安道以善琴知名進士薑阮皮日休皆為序以述其能蕭祜無射商九調祜因胡笳創僧皎然風入松操始嵇康郎大家宋氏宛轉歌王敬伯遇神女所歌曲琴曲在古有五曲九引十二操二十一雜歌作者相繼名目寖繁唐自髙宗製曲以來文士所作操引多擬古曲為名可考見者有此其他名同琴曲非必譜於琴者不概録於時楚漢舊聲傳授猶存一代精此藝者自趙耶利董庭蘭賀若夷若夷文宗時琴待詔文宗嘗聽其曲嘉賞之賜緋人因稱其曲為賜緋調鄭宥以及楊子儒王敬遨之輩不可指數而斫製之妙京師樊路蜀雷郭吳沈張諸氏外汧公之響泉韻磬晉公之大小忽雷尤擅爨焦珍譽聊用附記云羯鼓曲太簇宫曲色俱騰耀日光乞婆娑大勿大通舞山香羅犂羅蘇莫賴耶俱倫僕阿箇盤陀蘇合香藏鈎樂春光好無首羅鷠嶺鹽疏勒女要殺鹽通天樂萬載樂景雲紫雲承天樂順天樂太簇商曲蘇羅奈利梵大借席耶婆色雞堂堂半社渠君王盛神武赫赫君之明大鉢樂背大沙野婆破陳樂黃駿蹛放鷹樂英雄樂思歸憶新院西樓送落月㩧霜風九成樂傾杯樂百歲老壽還城樂打毬樂飲酒樂舞厥麼賦太平樂大酺樂大寶樂聖明樂婆羅門崱加那萬歲樂秋風髙回婆樂夜半擊羌兵香山優婆師匝天樂禪曲渡積破虜回五更囀黃鶯囀大定樂越殿須婆鉢羅背大秋秋鹽栗時突厥鹽踏蹄長太簇角曲大蘇賴耶大春楊柳大東祗羅大郎賴耶即渠沙魚大逹麼支俱倫毗悉利都移都師阿􅬹􅀈鳥歌飛仙楊下採桑西河師子三臺舞石州破勃律徵羽調與胡部失載諸佛曲調九仙道曲盧舍那仙曲御製三元道曲四天王半閣磨奴失波羅辭見柞草堂富羅二曲于門燒香寶頭伽菩薩阿羅地舞曲阿彌陀大師曲大食曲雲居九巴鹿阿彌羅衆僧曲無量壽真安曲雲星曲羅利兒芥老雞散花大燃燈多羅頭尼摩訶鉢婆娑阿彌陀悉馱低大統蔓度大利香積佛帝利龜兹大武僧箇支婆羅樹觀世音居麼尼真陀利大與永寧賢者恆河沙江盤無始具作悉家牟尼大乘毗沙門渴農之文德菩薩緱利陀聖主興地婆拔羅伽南山起雲北山起雨二曲宋璟造按羯鼓龜兹髙昌疏勒天竺部之樂狀如漆桶下承以牙牀用兩杖擊之其聲焦殺鳴烈合太簇一均玄宗素逹音律尤善於此稱之為八音領袖嘗遇春旦初晴柳杏將吐歎曰對此景物豈可不與他判斷取羯鼓縱擊春光好一曲顧柳杏皆已發拆矣笑謂嬪嬙內官此一事不喚我作天公可乎又製秋風髙每至秋風迥徹纖翳不起即奏之必逺風徐來庭葉紛下其妙絶如此時汝陽王璡帝兄寧王子帝愛而以羯鼓授之璡嘗戴砑絹帽打曲上自摘紅槿花一朵置於帽上奏舞山香一曲而花不墜帝誇賞其能蓋羯鼓難在頭項不動宋開府璟嘗與帝論之云頭如青山峯手如白雨點山峯取不動雨點取碎急正此前諸曲調載南卓録內九十二曲帝所親製餘亦並開元天寶時曲緣此樂本出戎羯故以夷語為名者居多大半有聲無辭其譜然也是器所重在棬與杖捲鐵貴精鍊至勻開元供御者人多傳寶亦有養杖朩脊溝中二十年取其絶濕氣復柔膩者一時人主好尚逹官雅士相效求精工至此後曲調寖失傳如務本里樂工打耶婆色雞曲失結尾之類時有之至宋而古曲益不存唯邠州一父老能之中有大合蟬滴滴泉之曲其人死羯鼓遺音遂絶琵琶曲勝蠻奴火鳯傾杯樂貞觀中裴神符作此三曲聲度清美太宗深恱之盛行於時鬱輪袍王維覓解岐王引入公主第彈此曲八十四調賀懷智譜懷智開元梨園弟子連昌宫辭夜半月髙絃索鳴賀老琵琶定場屋西涼州段和尚製即道調涼州也亦謂之新涼州段莊嚴寺僧名善本為唐琵琶第一藝新翻羽調緑腰楓香調貞元中有康崑崙善琵琶因兩市祈雨鬬樂崑崙登東街綵樓彈一曲新翻羽調緑腰必謂無敵街西亦於綵樓上出一女郎抱樂器先云我亦彈是曲兼移在楓香調中下撥妙絶入神崑崙驚愕即拜請為師女郎更衣出乃段師也翌日德宗召入內因令教授崑崙段師奏曰且遣崑崙不近樂器十餘年候忘本態然後可教詔許之後果盡段師之藝玉宸宫調涼州宫調有大遍小遍小者貞元初康崑崙翻入琵琶以初奏玉宸殿故有此名合諸樂即黃鍾宫調也㽔賓調散水調白集謝曹供奉琵琶新調譜寄家妓詩云㽔賓掩抑嬌多怨散水玲瓏峭更清薄媚劉禹錫詩一聽曹剛彈薄媚人生不合出京城楊下採桑昭宗末內供奉關小紅為梁祖強彈之意不得而殂雀啅蛇胡王調胡瓜苑王沂生不解絃管忽旦睡至夜乃寤索琵琶絃之成諸曲人不識聞聽之者莫不流涕其妹清學之總不成事見朝野僉載道調宫玉宸宫夷則宫神林宫㽔賓宫無射宫玄宗宫黃鍾宫散水宫仲吕宫商調獨指泛清商好仙商側商紅綃商抹商玉仙商角調雙調角醉吟角大吕角南吕角中吕角髙大殖角㽔賓角羽調鳯吟羽背風香背南羽背平羽應聖羽玉宫羽玉宸羽風香調大吕調曲涼州伊州胡渭州甘州緑腰莫靼傾盆樂安公子水牯子阿濫泛湘妃怨哭顔回王蜀節使王保義女適荆南髙從誨子保節嘗夢異人授琵琶諸調其曲自涼州下二百餘因刋石以傳事見北夢瑣言意王素善琵琶托諸夢以神之如前王沂耳所異者徵調中有湘妃怨哭顔回世人琵琶多不彈徴調未解為何琵琶始自烏孫公主造馬上彈之自下逆鼓曰琵自上順鼓曰琶舊皆用朩撥貞觀中裴洛兒始廢撥用手所謂搊琵琶者是也開元中賀懷智以鵾雞筋作絃用鐵撥彈之而段師善本亦云用皮絃撥聲如雷自後則曹保有子善才善才有子綱皆習此藝次有裴興奴與綱同時曹善運撥興奴長攏撚詩人多咏之者其琵琶曲調沈存中云懷智有譜以為八十四調內黃鍾太簇林鍾三宫聲絃中彈不出須管色定絃其餘八十一調皆以此三調為凖更不用管色元稹詩有琵琶宫調八十一三調絃中彈不出謂此也今聊録唐人傳記所見曲名備大略云沈云如今之調琴須先用管色合字定宫絃乃以宫絃下生者隔二絃上生者隔一絃取之凡絃聲皆當如此今人茍簡不復以絃管定聲故其髙下無凖出於臨時懷智琵琶譜調格與今樂全不同唐人樂學精深尚有雅律遺法筝曲迎君樂正商調二十八疊槲林歎分絲調四十四疊秦王賞金歌小石調二十八疊廣陵散正商調二十八疊行路難正商調二十八疊上江虹正商調二十八疊晉城仙小石調二十八疊絲竹賞金歌小石調二十八疊紅窗影雙柱調四十疊思歸樂唐善筝者開元中內人薛瓊瓊元和至太和李青青龍佐大中以來有常述本及史從李從周惟曲名不槩見此則大和中廣陵倡崔氏女夢其亡姨􅉅奴所傳者見冥音録豈亦如琵琶夢授故事借託之以神其藝也歟何事之恰符而疊見也笛曲悲風等二十四曲歡樂樹等二十四曲關山月折楊柳落梅花紫雲回明皇逰月宫聞上清樂曲歸而以玉笛寫之因名載樂章令太常刻石阿濫堆驪山有禽名阿濫堆明皇銜玉笛採其聲翻為曲逺近效之張祜詩至今風俗驪山下村笛猶吹阿濫堆是也笛有雅笛羌笛唐所尚殆羌笛也其樂與觱篥簫笳列橫吹部者同有悲風歡樂樹等四十餘曲見前鼓吹曲內乃如關山月折楊柳落梅花唐人咏吹笛多用之而橫吹部曲名獨亡述者知當時笛曲尚多入樂署行用者亦非全耳玄宗雅好斯樂傳記稱其御玉笛為貴妃倚曲者不一事而其時笛工孫處秀始作犯聲人以新異競相效習曲有犯調則曲益繁多當不可復紀矣乃談者獨稱李謨謨嘗吹笛江上寥亮逸發能使微風颯至舟人賈客有怨歎悲泣之聲感蛟龍出聽或有之至謂玄宗按樂上陽謨傍宫墻竊得其譜見元稹及張祜詩稹以謨為長安少年世豈有天家屋垣僅如窗隔能屬耳得聲調宛悉者哉考之謨本教坊子弟隸吹笛第一部明皇嘗召之與永新娘逐曲者樂譜正所有事何須竊聽好事者姑為説詫天上樂不易流傳爾惟謨所論笛一聲出入九息一疊十二節一節十二敲笛材一歲伐過期伐音窒未期伐音泛遇至音必裂為深得笛理可取蓋謨之外孫許雲封為韋刺史應物述云觱篥曲别離難天后朝士人妻作詳見前雜曲內後樂家以其族宫轉器以應律管因譜其音為衆器之首至今鼓吹教坊用之以為頭管雨霖鈴曲明皇造樂工張野狐善觱篥吹之詳見前明皇樂曲內野狐即徽也楊柳枝曲新傾杯曲宣宗善吹觱篥自製此二曲有數拍不均嘗命俳優辛骨􅙡拍不中因瞋目視之骨􅙡憂懼一旦而斃道調懿宗嘗命史敬約吹因撰道調子曲詳見前道調子下勒部羝曲將軍尉遲青素善觱篥時有王麻奴河北推第一手後訪尉遲於髙般涉調中吹勒部羝曲曲終尉遲曰何必髙般涉也即自取銀字管於平般涉中吹之麻奴恭聽愧謝不敢復言音律觱篥一名悲篥以竹為管以蘆為首出於胡中其聲悲人亦稱為蘆管曲名見於唐故實中者止此其餘多與笛同朱崖李相有家僮薛陽陶少精此藝後為小校至咸通猶存淮南李相蔚召試賞之元白及羅昭諫集中皆有其贈詩舞曲軟舞曲垂手羅古舞曲有大垂手小垂手此其遺也蘭陵王回波樂春鶯囀烏夜啼半社渠借席涼州屈柘枝柘枝羽調屈柘枝又是商調也團亂旋一作團圓旋甘州緑腰蘇合香健舞曲拂菻西域國名菻力稔切黃麞柘枝一説云本拓枝訛為柘枝沈亞之有賦似謂戎夷之舞今舞人衣冠類蠻服疑出南蠻諸國也用女童舞胡帽施金鈴繡羅寬袍銀帶白樂天詩帶垂鈿胯花腰重帽轉金鈴雪面回是也其曲為羽調有屈柘枝為角調又有五天柘枝那胡柘枝其舞也先藏女童二蓮花中以鼓招之花拆而後見對舞相占實舞中之雅妙者故唐人詩有云三敲畫鼓聲催急一朵紅蓮出水遲又云白雪慢回拋舊態黃鶯嬌囀唱新詞其舞若歌之大略亦可得矣大渭州逹磨支大杆阿連大杆一作稜大阿遼劍器舞衣五色曲中吕宫段安節云即公孫大娘所舞然唐人用此多有作劍氣者豈字之誤歟胡旋本出康居舞者立毬上旋轉如風胡騰兒出安西珠帽桐布衫雙靴及手義腰應曲節舞李端詩云洛下詞人抄曲與知舞曲非一矣雜舞曲打毬樂舞衣四色窄繡羅襦銀帶簇花折上巾順風腳執毬杖貞觀初魏鄭公奉詔造其調存焉玉兔渾脫舞衣四色繡羅襦銀帶玉兔冠中宗時吕元泰嘗上書諫都市坊邑相率為渾脫駿馬胡服名為蘇莫遮旗鼓相當騰逐喧噪戰爭之象不為雅樂云云潑寒胡戲有蘇莫遮曲豈渾脫舞同出海西亦歌此曲調歟先此武后末年劍氣入渾脫始為犯聲劍氣宫調渾脫角調為以臣犯君也英王石州商調互見中宗樂曲內婆羅門舞舞衣緋紫色執錫環杖開元中西涼節度楊敬述進霓裳羽衣舞明皇夢遊月宫寫天樂作舞曲調黃鍾商韻語陽秋云舞用女人一人齊東野語云奏樂女人三十人每畨十人迭奏樂志云曲凡十二遍他曲終必遽唯此曲將畢引聲益緩白樂天詩云散序六奏未動衣中序擘騞初入拍又云繁音急節十二遍唳鶴曲中長引聲大略可考者此此夢溪筆談云國史補言客有以按樂圖示王維維曰霓裳第三疊第一拍也引工按曲果信此未然霓裳曲凡十二疊前六疊無拍至第七疊方謂之疊遍自此始有拍而舞作故白樂天詩有中序擘騞初入拍之句中序即第九疊也第三疊安得有拍但言第三疊第一拍即其妄矣伊州五天開元教坊記云教坊諸宫人唯舞此二曲宫人內人之辨詳樂署注鼓舞曲開元時邠王家馮正正心兒薛王家髙大山李不藉岐王家江張生俱以善鼓聞以其鼓變輕小取便易調髙聲尖是時宋娘祁娘俱稱善鼓宋能作曲及舞鼓祁工落花吹笛李阿八善鼓架凡棚車上打鼓非火祅即阿遼破也阿遼見前火祅即穆護砂曲凌波曲天寶中女伶謝阿蠻善舞此曲常入宫中楊貴妃遇之甚厚蓮花鋋舞本出北同城岑參詩云慢臉嬌娥纖復穠輕羅金縷花蔥蘢回裾轉袖若飛雪左鋋右鋋生旋風忽作出塞入塞聲翻身入破如有神字舞以舞人亞身於地布成字為字舞合成花字者又為花舞則亦字舞也太和中王建宫詞云羅衫葉葉繡重重金鳯銀蛾各一叢每遇舞頭分兩向太平萬歲字當中自武后聖夀樂舞聖超千古十六字德宗奉聖樂舞南詔奉聖樂五字歷朝製字舞未可詳紀新霓裳羽衣舞文宗時教坊進舞女三百人舞新霓裳羽衣歎百年舞懿宗與郭妃悼念同昌公主李可及為歎百年曲及舞舞人皆盛飾珠翠仍畫魚龍地衣以列之曲終樂闋珠翠覆地調語悽惻聞者流涕上益厚賜之菩薩蠻舞舞衣絳繪窄砌衣卷冠李可及嘗於安國寺作此舞河傳舞乾符中綿竹王俳優能腰背一船船中載十二人舞河傳一曲舞遍最長兒童解紅舞用兩童衣紫緋繡襦銀帶花鳯冠綬帶亦柘枝之類五代和凝有歌唐舞惟文武二舞憲古佾數而歌雅歌自太宗復製七德九功佾數較古有倍而聲容亦漸多可議矣其後歷朝相沿各製樂舞臣下更多撰獻雖名托雅正而事歸矜侈具在前簡概無足譏此則零雜舞名純逺乎雅者然以考其曲題而求其聲度不可廢而無纂其霓裳柘枝二曲唐人多所歌咏故復備釋焉散樂歌舞戲大面一名代面出北齊蘭陵王長恭膽勇善戰以其顔貌無威每入陳即著面具後乃百戰百勝戲者衣紫腰金執鞭唐相沿弄此亦入歌曲鉢頭昔有人父為虎所傷遂上山尋其父尸山有八折故曲有八疊戲者披髮素衣面作啼狀踏謠娘北齊有人姓蘇皰鼻實不仕而自號為郎中嗜飲酗酒每醉輒毆其妻妻銜悲訴於鄰里時人弄之丈夫著婦人衣徐步入場行歌每一疊旁人齊聲和之云踏謠和來踏謠娘苦和來以其且步且歌故謂之踏謠以其稱寃故言苦及其夫至則作毆鬬之狀以為笑樂今則婦人為之遂不呼郎中但云阿叔子調弄又加典庫全失舊旨或呼為談容娘又非蘇中郎後周士人蘇葩嗜酒落魄自號中郎每有歌場輒入獨舞今為戲者著衣戴帽面正赤蓋狀其醉也傀儡子一作窟􅓓子相傳陳平為朩偶美人示冒頓閼氏解平城圍後樂家翻為戲其引歌舞有郭郎者髮正秃善優笑後魏人凡戲場必在俳兒之首也通考云李績破髙麗戲傀儡子戲參軍戲樂府雜録云參軍戲舊説始自漢館陶令石耽有贓犯和帝令遇宴衣白夾衫命優伶戲弄辱之經年釋為參軍誤也開元中李仙鶴善此戲帝授韶州同正參軍以食其祿是以陸鴻漸撰詞言韶州蓋繇此矣按鴻漸少嘗為優人此云撰詞者謂其授官制詞為人所暗譏也用證參軍始於李仙鶴耳假婦人大中以來孫乾飯劉璃瓶郭外春孫有態善弄此戲僖宗幸蜀時有劉貞尤能之後籍教坊弄賈大獵兒樂府雜録載此戲隸清樂部排闥戲昭宗光化中孫德昭之徒刃劉季述帝反正命樂工作樊噲排闥戲以樂焉雜戲天竺斷手足刳剔腸胃伎髙宗惡其驚人嘗勑禁潑寒胡戲冬月為海西胡人裸體寒水潑之自則天末年始中宗嘗因蕃夷入朝作此戲御樓觀之所歌曲即蘇摩遮也倒舞伎睿宗時婆羅門獻樂舞人倒行以足舞於極銛刃鋒倒植於地低目就刃以歷臉中又植於背下吹觱篥者立其腹上終曲而無傷又伏伸其手兩人躡之旋身繞手百轉無巳拔河戲玄宗時嘗作此戲御製詩仍令宰相張説等和説詩略云今歲好拖鈎橫街敞御樓長繩繫日住貫索挽河流俗傳此戲必致年豐故帝命北軍作之以求歲稔竿朩伎明皇時教坊有王大娘善戴百尺竿竿上施朩山狀瀛洲方丈仍令小兒持絳節出入其間而舞不輟時劉晏以神童召嘗令賦詩有樓前百戲競爭新唯有長竿妙入神之句羊頭渾脫九頭獅子弄白馬益錢尋橦跳丸吐火吞刀旋槃斤斗諸戲屬鼓架部史云明皇每賜宴設酺會教坊大陳山車旱船尋橦走索丸劍戲馬鬬雞諸戲其名不一樂書云明皇在藩先有散樂一部平逆韋實賴其力後即位設戲輒分兩朋較優劣使人心意勇亦謂之熱戲焉蹴毬戲唐變古蹴鞠戲為蹴毬其法植兩修竹髙數丈絡網於上為門以度毬毬工分左右朋以角勝負擊踘宣宗特善此戲所御馬趫捷特異每持鞠杖乘勢奔躍運鞠於空中連擊至數百而馬馳不止迅若流電二軍老鞠手咸伏其能角力戲凡陳諸戲畢左右兩軍擂大鼓引壯士裸袒相搏較力以分勝負瞋面戲其戲以手舉足加頸上唐優人劉吃陀奴能不用手而腳自加頸五方獅子每一獅子用十二人執紼弄之名獅子郎屬龜兹部骨鹿舞胡旋舞樂府雜録云夷部樂有此二舞俱於小圓毬子上舞縱橫騰踏兩足終不離於毬子即所謂踏毬戲也舞盤伎以下見通典云前代之伎至唐尚存者長橋伎跳鈴伎擲倒伎跳劒伎舞輪伎透三峽伎髙絙伎獼猴緣竿伎弄碗珠伎右散樂有二種或寫象人物謔弄或逞炫藝絶角劇並俳優所肄非部伍之聲然其陳也必佐以致語篇唱優人辭捷者謂之斫撥則亦皆樂曲之餘不可遺也故復識其目以備考其互見前舞部及後之夷樂部者亦因當時行用之舊兩存云四夷樂東夷四髙麗樂起自後魏得其樂唐仍隋列於十部伎樂器十七色工十八人紫羅帽飾以鳥羽長袖雙雙并立而舞歌曲有芝栖舞曲有歌芝栖武后時尚餘二十五曲貞元末止存一曲百濟樂貞觀中滅其國盡得其樂中宗時工人亡散開元中岐王範復奏置之歌曲入般涉調新羅樂貞觀中嘗遣使獻女樂日本樂大中七年獻南蠻三扶南樂隋有其樂器以天竺樂轉寫之王維有扶南曲南詔樂貞元中南詔異牟尋因西川押雲南八國使韋臯獻夷中歌曲臯因之以作奉聖樂詳前各朝樂內驃國樂貞元中驃國王雍羌因南詔重譯獻其國樂其國與天竺相近故樂多演釋氏經論之詞曲十有二一曰佛印驃云沒馱彌國人及天竺歌以事王也二曰讃娑羅花驃云隴莽第國人以花為衣服能淨其身也三曰白鴿驃云答都美其飛止遂情也四曰白鶴遊驃云蘇謾底哩謂翔則摩空行則徐步也五曰鬬羊勝驃云來乃昔有人見二羊鬪海岸強則見弱者入山時人謂之來乃來乃者勝勢也六曰龍首獨琴驃云彌思彌此一絃而五音備象王一德以畜萬邦也七曰禪定驃云掣覽詩謂離俗寂靜也七曲唱舞皆律應黃鍾商八曰甘蔗王驃云遏思略謂佛教民如蔗之甘皆恱其味也九曰孔雀王驃云桃臺謂毛采光華也十曰野鵝驃云謂飛止必雙徒侣畢會也十一曰宴樂驃云􅀈聰綱摩謂時康宴會嘉也十二曰滌煩亦曰笙舞驃云扈那謂時滌煩暋以此適情也五曲律應黃鍾兩均一黃鍾商伊越調一林鍾商小植調初奏樂有贊者一人先導樂意其舞容隨曲用人或二或六或四或八至十兩兩相對為赴節之狀有類中國柘枝舞焉玉海國史志有驃國樂頌一卷今亡西戎七髙昌樂樂器十二色舞人白襖赤帶紅抹額貞觀中伐其國盡得其樂列於十部伎龜兹樂起自吕光破龜兹因得其聲流傳至隋有西國龜兹齊朝龜兹土龜兹三部唐仍隋列十部伎樂器十五色工二十人其歌曲有善善摩尼解曲有婆伽兒舞曲有小天又有疏勒鹽疏勒樂自後魏通西域得其樂唐仍隋列十部伎樂器十色工十二人歌曲有兀利死讓樂舞曲有逺服解曲有鹽曲曲調有昔昔鹽一臺鹽鵲洪適曰昔昔鹽羽調曲玄怪録載蘧蒢三娘工唱阿鹽又有突厥鹽黃帝鹽白鴿鹽神雀鹽疏勒滿座鹽歸國鹽唐詩媚賴吳娘唱是鹽更奏新聲刮骨鹽然則歌詩謂之鹽者亦如吟行曲引之類爾康國樂起自周代得其樂唐仍隋列十部伎樂器四色工七人歌曲有戢殿農正舞曲有賀蘭鉢鼻始末奚波地農慧鉢鼻始前拔地慧地等四曲其舞急轉如風俗謂之胡旋安國樂後魏通西域得之唐列十部伎樂器十色工十二人歌曲有附薩單時舞曲有末奚解曲有居和祗天竺樂起自張重華據涼州日貢樂後國子為沙門來遊又傳其方音樂器九色工十二人唐仍隋列十部伎隋書云歌曲有沙石強舞曲有朝天曲陳氏樂書云曲調有普光佛曲彌勒佛曲日光明佛曲大威德佛曲如來藏佛曲藥師琉璃光佛曲無威感德佛曲龜兹佛曲並入婆陀調釋迦牟尼佛曲寶花步佛曲觀法會佛曲帝釋幢佛曲妙花佛曲無光意佛曲阿彌陀佛曲燒香佛曲十地佛曲並入乞食調大妙至極曲解曲並入越調摩尼佛曲入雙調蘇密七俱陀佛曲日光騰佛曲入商調邪勒佛曲入徴調觀音佛曲永寧佛曲文德佛曲婆羅樹佛曲入羽調遷星佛曲入般涉調提梵入移風調西京樂起符氏之末吕光沮渠蒙遜等據有涼州變龜兹聲為之號為秦漢伎蓋涼人所傳中國舊樂雜以鄭衛之聲也其樂器聲調並出自西域唐仍隋列十部伎樂器十九種工二十七人其歌曲有楊澤新聲神白馬永世樂解曲有萬世豐舞曲有于置佛曲北狄樂北狄之樂本馬上樂自漢以來總歸鼓吹部後魏樂府始有北歌周隋世與西涼樂雜奏至唐存者五十三章名目可解者六章慕容可汗吐谷渾部落稽巨鹿公主白淨王太子企喻也其不可解者咸多可汗之辭金吾所掌有大角此即後魏世所謂簸邏回者是也其曲亦多可汗之辭北方之俗皆呼主為可汗也開元中歌工長孫元忠自其祖貞觀中受業侯將軍貴昌世習北歌聲調相授雖譯者不能通知其辭義周官鞮鞻氏掌四夷之樂與其聲歌祭祀及燕饗作之門外美德廣之所及也自南北分裂音樂雅俗不分西北降至周隋管絃雜曲多用西涼唐興仍而不改開元之末則更有甚焉今采唐太常所𨽻夷樂附於諸樂曲之後以俟正樂者考焉樂署太常寺其屬有協律郎掌和六律六吕其署曰太樂署掌教樂人調合鍾律曰鼓吹署掌鼓吹梨園院掌俗樂在太常寺內西北內教坊掌俗樂武德末置雲韶府武后改稱左右教坊宜春北院並明皇增置中上精曉音律以太常不應典雜伎更置左右教坊命官為之使教新聲散樂倡優之伎又選坐部子弟三百教於梨園號皇帝梨園弟子院因改名别教院宫女數百亦為梨園弟子居宜春北院梨園法部更置小部音聲三十餘人其雲韶教坊妓女稱宫人宜春妓女稱內人聲色尤殊文宗朝復改雲韶院為仙韶院云唐音癸籤卷十四
