body:
  text: 唐音癸籖卷二明胡震亨撰法微一統論陸機曰詩緣情而綺靡摰虞云詩發乎情止乎禮義假象過大則與類相過逸辭過壯則與事相違辨言過理則與義相失靡麗過美則與情相悖范蔚宗曰情志所托故當以意為主以文傅意以意為主則其㫖必見以文傅意則其辭不流然後抽其芬芳振其金石沈隱侯曰文章當從三易易見事一也易識字二也易誦三也劉協曰怊惆述情必始乎風沉吟鋪辭莫先於骨故辭之待骨如體之樹骸情之含風猶形之包氣若豐藻克贍風骨不飛則振采失鮮負聲無力鍾嶸云文有盡而義有餘興也因物喻志比也直書其事寓言寫物賦也若專用比興則患在意深意深則詞躓但用賦體則患在意浮意浮則文散𢎞斯三義酌而用之幹之以風力潤之以丹彩使味之者無極聞之者動心是詩之至也又云夫屬詞比事乃為通談至乎吟詠情性亦何貴於用事思君如流水既是即目高臺多悲風亦唯所見淸晨登隴首羌無故實明月照積雪詎出經史古今勝語多非補假皆由直尋邇來作者辭不貴竒競須新事牽攣補衲蠧文已甚自然英旨罕遇其人葉石林云詩家妙處正在無所用意猝然與景相遇不假繩削而自成章非常情能到耳嶸數語余每愛其簡切但觀者未嘗留意自唐以後既變以律體固不能無拘局然茍大手筆亦自不妨削鐻於神志之間斫輪於甘苦之外也宋之問云衆轍同遵者擯落羣心不際者探擬王昌齡云為詩在神之於心處心於境視境於心瑩然掌上然後用思了然境象故得形似又云詩思有三搜求於象心入於境神㑹於物因心而得曰取思久用精思未契意象力疲智竭放安神思心偶照境率然而生曰生思尋味前言吟諷古制感而生思曰感思釋皎然云夫詩雖非聖功妙均於聖其作用也放意須險定句須難雖取由我衷而得若神表至如天真挺拔之句與造化爭衡可以意㑹難以言狀非作者不能知也又云或以苦思喪自然之質此不然夫不入虎穴焉得虎子取境之時須至難至險始見竒句成篇之後觀其氣貌有似等閒不思而得此高手也有時意靜神王佳句縱橫若不可遏宛若神助不然蓋由先積精思因神王而得乎氣象氤氲由深于體勢意度盤礴由深于作用用律不滯由深于聲對用事不直由深于義類雖欲廢巧尚直而思致不得置雖欲廢詞尚意而典麗不得遺作者須知復變之道反古曰復不滯曰變若惟復不變則陷于相似之格置于古集之中使弱手視之眩目何異宋人以燕石為玉璞周客胡盧而笑也近代陳子昻復多變少沈宋復少變多餘不能盡舉又復變二門復忌太過變若造微不忌太過茍不失正亦何咎哉戴叔倫云詩家之景如藍田日暖良玉生煙可望而不可置于目睫之間韓愈曰和平之音淡薄而愁思之聲要妙歡愈之辭難工而窮苦之言易好嚴滄浪云唐人好詩多是征戍遷謫行旅離别之作往往能感動激發人意正愈所謂窮思愁苦之易為詩者也白樂天云為詩義在禆益言意皆有所為葛常之曰自古工詩者未嘗無興也觀物有感焉則有興今之作詩者以興近乎訕也故不敢作而詩之一義廢矣作詩者苟知興之與訕異始可以言詩矣劉禹錫曰片言可以明百意坐馳可以役萬景工於詩者能之風雅體變而興同古今調殊而理冥逹於詩者能之工生於才逹生於識二者相為用而後詩道備李德裕曰古人辭高者蓋以言妙而工適情不取於音韻意盡而止成篇不拘於隻耦故篇無定曲詞寡纍句又曰譬如日月終古常見而光景常新皮日休曰詩逮吾唐切於儷偶拘於聲勢易其體為律詩之道盡矣吾又不知千祀之後詩之道止于斯而已耶後有變而作者豫不得以知之夫才之備者猶天地之氣乎氣者止乎一也分而為四時景色各異夫如是豈拘于一哉亦變之而已人之有才者不變則已茍變之豈異於是乎司空圖云古今言詩多矣愚以為辨於味而後可以言詩也醯非不酸止於酸而已鹺非不鹹止於鹹而已人所以充食而遽輟者知其鹹酸之外醇美者有所乏耳詩貫六義則諷諭抑揚渟蓄淵雅皆在其間矣惟近而不浮逺而不盡然後可以言韻外之致耳崔德符答人問作詩之要曰但多讀而勿使斯為善梅聖俞曰詩之工者寫難狀之景如在目前含不盡之意見於言外沈存中云詩雖末技工之不造微不足以名家故唐人皆盡一生之力為之至于字字皆鍊得之甚難而觀者滅裂不知其工若字字皆是無瑕可指語音亦流麗但細論無功景意縱全一讀便盡更無可諷味者此類最易為人激賞乃詩之折楊皇荂也譬若三館楷書作字不可謂不精不麗求其佳處到死無一筆此病最難為醫也劉貢父云管子曰事無終始無務多業此言學者貴能成就也唐人為詩量力致功精思數十年然後名家杜工部云更覺良工用心苦不獨畫手為然葉石林云古今論詩者多矣吾獨愛湯惠休稱謝靈運為初日芙蕖沈約稱王筠為彈丸脫手兩語最當人意初日芙蕖非人力所能為而精彩華妙之意自然見於造化之表靈運諸詩可以當此者亦無幾彈丸脫手雖是輸寫便利動無留礙然其精圓快速發之在手筠亦未能盡也作者審到此地豈復更有餘事韓退之贈張籍云君詩多態度靄靄春空雲司空圖記戴叔倫語云詩人之辭如藍田日暖良玉生煙亦是形似之微妙者但學者不能味其言耳葛立方云詩之有思卒然遇之而莫遏有物敗之則失之矣鄭棨詩思在灞橋風雪中驢背上潘大臨滿城風雨近重陽之句為催租人所敗亦可見詩思之難而敗之甚易也沈約云天機啓則六情自調六情滯則音韻頓舛正此意嚴儀曰詩之法有五曰體製曰格律曰氣象曰興趣曰音節須是本色須是當行下字貴響造語貴圓不必太著題不必多使事又曰詩有别才非關書也詩有别趣非關理也然非多讀書多窮理則不能極其至又曰盛唐諸公惟在興趣羚羊掛角無跡可求故其妙處透徹􅌑瓏不可色相言有盡而意無窮若以文字為詩以才學為詩以議論為詩夫豈不工去之愈逺詩法云唐人以詩為詩宋人以文為詩唐人主性情故於三百篇為近宋人主議論故於三百篇為逺又云論詩如論禪漢魏晉與盛唐之詩則第一義也大厯以還之詩則小乘禪也巳落第二義矣晚唐之詩則聲聞辟支果也學漢魏晉與盛唐詩者臨濟下也學大厯以還之詩者曹洞下也大抵禪道惟在妙悟詩道亦在妙悟然悟有淺深有分限有透徹之悟有但得一知半解之悟漢魏尚矣不假悟也謝靈運至盛唐諸公透徹之悟也他雖有悟者皆非第一義也胡元瑞云禪則一悟之後萬法皆空棒喝怒呵無非至理詩則一悟之後萬象冥㑹呻吟咳唾動觸天真以禪喻詩信有旨然禪必深造而後能悟詩雖悟後仍須深造自昔瑰竒之士往往有識窺上乘業阻半途者楊仲𢎞云詩不可鑿空强作待境而生自工劉須溪云作詩如作字橫眉豎鼻所差幾何而淸俗相去逺甚又云詩在灞橋風雪中驢背上非也尋常景色時時處處妙意皆可拾得然此猶涉假借若平生父子兄弟家人鄰里間意愈近而愈不近著意政難有能率意自道出于孤臣怨女之所不能者隨事紀實足稱名家即名家猶不可得或一二語而止如孟東野慈母手中線歸書但云安極羈旅難言之情李太白昨夜梁園雪弟寒兄不知小夫賤𨽻誰不能道而學士大夫或愧之矣如杜子美問事競挽鬚誰能即嗔喝欲起屢見肘仍嗔問升斗并與聲音笑貌倣佛盡之又如古人于奴婢猥下寫至孤客親僮僕凄然甚矣又云僮僕生新敬則出處世態隱約可見又云犬因無主善則俯仰猶有不忍言者古今甚深密義往往于淺易得之詩眼云作詩不必句句工使其皆工反峭急無古氣詩家一指云詩不歷鍊世故不足名家李空同云以我之情述今之事尺寸古法罔襲其辭古人之作其法雖多端大抵前疏者後必密半闊者半必細一實者必一虛叠景者意必二此所謂圓規而方矩者也何大復云富于材積使神情領㑹天機自流臨景結構不傍形迹佛有筏喻達岸則捨筏矣捨筏則達岸矣胡元瑞云仲默此論直指真源最為喫緊捨筏之云亦以獻吉多擬則前人陳句進規耳非欲人廢法也李何二氏之旨故當並參徐禎卿云因情以發氣因氣以成聲因聲而繪詞因詞而定韻然情實窈渺必因思以窮其奧氣有粗弱必因力以奪其偏詞難妥貼必因才以致其極才易飄揚必因質以定其侈若夫妙騁心機隨方合節或約旨以植義或宏文以盡心或緩發如朱絃或急張如躍括或始迅以中留或既優而後促或慷慨以任壯或悲愴而引泣或因拙以得工或發竒而似易此輪扁之超悟不可得而詳也王弇州曰才生思思生調調生格思即才之用調即思之境格即調之界又曰才騁則馭之以格格定則通之以變氣揚則沉之使實節促則淡之使和又曰詩以專詣為境以饒美為材師匠宜高捃拾宜博胡元瑞云作詩大要不過二端體格聲調興象風神而巳體格聲調有則可循興象風神無方可執故作者但求體正格高聲雄調鬯積習之久矜持盡化形迹俱融興象風神自爾超邁譬則鏡花水月體格聲調水與鏡也興象風神月與花也必水澄鏡朗然後花月宛然詎容昏鑑濁流求覩二者故法所當先而悟弗容强也又曰詩最可貴者清然有格清有調清有思清有才清才清者王孟儲韋之屬是也若格不清則凡調不清則冗思不清則俗王楊之流麗沈宋之豐蔚高岑之悲壯李杜之雄大其才不可槩以清言其格與調與思則無不淸者魏文帝典論云文以氣為主氣之清濁有體不可力强而致其論七子詩與文筆未嘗不並重清云又云曰仙曰禪皆詩中本色惟儒生氣象一毫不得著詩儒者言語一字不可入詩唐音癸籖卷二
