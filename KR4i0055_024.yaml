body:
  text: 唐音癸籖卷二十四明胡震亨撰詁箋九鎮六朝人詩用鎮字唐詩尤多如禇亮莫言春稍晚自有鎮開花之類韻書鎮壓也亦安之也蓋有常之義約略用之代常字令聲俊耳遁叟生李白戲杜甫云借問别來太瘦生只為從前作詩苦太瘦生唐人語也至今猶以生為語助所謂可憐生作么生之類談苑泥俗謂柔言索物曰泥乃計切諺所謂軟纒也杜子美詩忽忽窮愁泥殺人元微之憶內詩泥他沽酒拔金叉非煙傳詩脉脉春情更泥誰楊乘詩晝泥琴聲夜泥書又元鄧文原贈妓詩有銀燈影裏泥人嬌後人用者不一升菴外集踏李賀感諷詩縣官踏飱去簿吏復登堂禮記毋􅀈羮嚃大啜也又說文􅀈啜也若犬之以口取食竝托合切今轉用俗字達合切為踏見暴吏踐躪小民無顧恤之意遁叟下同嗺公宴合樂每酒行一終伶人必唱嗺酒然後樂作此唐人送酒之辭本作碎音今多為平聲文士亦或用之葉石林引王仁裕詩淑景易從風雨去芳樽須用管弦嗺為證然仁裕本集自云淑景即隨風雨去芳樽宜命管弦開而下聮仍有催韻石林不知據何本也底顔師古刋謬正俗云或問俗謂何物為底丁兒反底義何訓答曰此本言何等物其後遂省但直云等物耳等字本音都在反又轉音丁兒反應瑗詩云文章不經國筐篚無尺書用等稱才學往往見歎譽言其用何等才學見歎譽而為官以是知去何而直言等其言已舊今人不詳所本乃作底字老杜文章差底病差底猶何底之意也煞羅鄴詩江似秋嵐不煞流不甚流也殺音近厦今京中諺猶然升菴外集差韓愈詠海詩颶風有時作掀簸真差事韓偓詩而今若有逃名者應被品流呼差人差異化切怪也遁叟依今俗謂相扺曰挨樂天詩坐依桃葉妓日醉依香枕依音烏皆反正挨字野客叢書相杜恰似春風相欺得白為問長安月誰教不相離相思必切讀若瑟今北人皆呼相為厮是也遁叟請白當時綺季不請錢姚合每月請錢共客分叶平聲讀司武元衡惟有白髮張司馬白四十著緋軍司馬並入去聲伺字韻磷論語磨而不磷力刃切杜此道未磷緇但取不磷緇皆作平聲十白緑漲東西南北水紅欄三百九十橋十作平聲讀若諶豫孟浩然送辛大不及日暮獨悲豫用楚辭目眇眇兮愁豫從上聲讀與杜簡鄭廣文賴有蘇司業時時與酒錢與字有四音本音余吕切者讀之不響作於改切讀響黃山谷改作乞字音丘既切讀正不必也中興之中詩蒸民序任賢使能周室中興焉中陸德明釋文張仲反故老杜詩云新數中興年又百年垂死中興時詩人留意音訓如此中酒之中今言中酒之中多以為平聲祖三國志中聖人中賢人之語齊已栁詩曰穠低似中陶潛酒軟極如傷宋玉風按前漢樊噲傳軍士中酒注竹仲反已公或祖此蒲萄白燭淚粘盤纍蒲萄蒲叶入聲讀枇杷白况對東溪野枇杷張祐生摘枇杷酸枇並叶入聲琵琶白四弦不似琵琶聲忽聞水上琵琶聲張祐宫樓一曲琵琶聲琵亦並叶入聲也親家男女兩姻家相謂曰親家俗作去聲呼見唐蕭嵩傳盧綸王駙馬花燭詩人主人臣是親家亦用此音嫖姚霍嫖姚漢史服䖍注音飄颻顔師古注嫖顔妙切姚羊召切唐人入詩多用平聲前此庾信王褒諸人亦俱作平聲用以䖍元有此音故爾然顔音為確按宋景文云古人詩用事簡而當亦不以字害句故音韻清濁隨宜改易直取意順則已至唐人以律格自拘不復敢用惟白樂天往往有之晏丞相殊嘗許之曰詩人乘語俊當知用字讀諸家詩當以宋說參觀忽地王建詩楊栁宫前忽地春忽地猶言忽底蓋以地為助辭遁叟格是樂天詩云江州去日聽筝夜白髮新生不願聞如今格是頭成雪彈到天明亦任君元微之詩云隔是身如夢頻來不為名憐君近南住時得到山行格與隔二字義同格是猶言已是也容齊一筆至竟唐人多言至竟如云到底也杜牧云至竟息亡緣底事至竟江山誰是主之類戒菴漫筆朅來唐人詩多用朅來二字楚辭車既駕兮朅而歸不得見兮心傷悲韻書朅却也去也又發語辭張衡回志朅來從𤣥謀劉向朅來歸耕永自疏與楚辭所用之朅皆去字之義顔延年秋胡詩朅來空復辭兼發語辭用後人入詩多從顔作虛字楊用修引吕氏春秋膠鬲問武王朅去朅至欲作盍字解恐未合遁叟下同匹如白樂天匹如元是九江人匹如猶言比如譬如也後來坡老常用之入小牘及詩遮莫藝苑雌黃云遮莫蓋俚語猶言儘教也自唐以來有之故當時有遮莫你古時五帝何如我今日三郎之說然詞人亦稍有用之者杜詩云久拚野鶴如雙鬢遮莫鄰雞下五更李太白詩遮莫根枝長百尺不如當代多還往遮莫親姻連帝城不如當代自簪纓有用為禁止之辭者誤寧馨唐張謂詩家無阿堵物門有寧馨兒以寧為去聲劉夢得贈日本僧智藏詩為問中華學道者幾人雄猛得寧馨以寧為平聲王衍傳何物老嫗生寧馨兒又南史宋王太后怒廢帝謂侍者取刀來剖我腹那得生寧馨兒今吳人語音尚用寧馨字為問猶言何若也東坡詩六朝文物餘丘壠空使英雄笑寧馨坡與張謂作去聲讀者為是緯略阿那李白萬户垂楊裏君家那阿邉李郢知入笙歌阿那朋阿那猶言若個也遁叟下同裏許戴叔倫秋風裏許杏花開許裏之助辭諸餘王建詩朝回不向諸餘處若教更解諸餘語諸餘猶他也又有用衆諸者意亦略同他時常談以為前日亦可以言後日杜詩今日江南老他時渭北童是也史記異日韓王納地效璽漢書異時算軺車皆指前日言鄭良孺斟酌杜斟酌嫦娥寡天寒奈九秋又經過憶鄭驛斟酌旅情孤斟酌猶約略之意遁叟下同料理杜詩酒尚堪驅使在未須料理白頭人料理出王微之傳六朝歌謠有皂策相料理之語處分唐人用處分二字分去聲今人讀為平聲者誤劉禹錫和令狐楚聞思帝鄉曲滄海西頭舊丞相停杯處分不須吹及白居易處分貧家殘活計可證禁當杜數日不可更禁當禁平聲讀斬新杜斬新花蕊未應飛非斬字不能形容其新在可解不可解之間上番杜無數春笋滿林生柴門密掩斷人行㑹須上番看成竹客至從嗔不出迎番甫患切數也遞也更也似用意屢屢看之猶諺上緊之意見毛晃韻書字本去聲韓退之用作平聲云且歎髙無數庸知上幾番翻案故借别音示巧非真謂當作平聲讀也朣朧古樂府秦女休行朣朧擊鼓赦書下朣朧鼓聲也唐人所用字不同沈佺期籠僮上西鼓栁子厚籠銅鼓報衙第取其音之同耳即秦女本曲見太平御覽者亦作隴橦各異欵乃欵嘆聲也讀若哀烏來切又應聲也讀若靄上聲倚亥切又去聲於代切無襖音乃難辭又繼事之辭無靄音今二字連讀之為棹船相應聲栁子厚詩云欵乃一聲山水緑是也元次山有湖南欵乃歌劉蛻有湖中靄乃歌劉言史瀟湘詩有間歌曖乃深峽裏字異而音則同後人因桞集中有注云一本作襖靄遂即音欵為襖音乃為靄不知彼注自謂别本作襖靄非謂欵乃當音襖靄也黃山谷不加深考從而實之其甥洪駒父又辨為當作靄杜撰尤甚毛晃取入韻中至誤後人沿襲不察靄乃襖靄既有兩本不妨並行豈必比而同之以為一音乎黃公紹韻㑹闌干劉方平詩北斗闌干南斗斜權德輿詩銅壺漏滴斗闌干曹唐詩南斗闌干北斗稀並出曹子建月落參橫北斗闌干韻書欄干橫斜貌象斗之將沒也又苜蓿長闌干玉容寂寞淚闌干亦當以橫斜為解而淚之闌干不但言其橫流更有借用汍瀾之意遁叟溫暾南人方言曰溫暾者乃懷暖也唐王建宫詞新晴草色暖溫暾又白樂天詩池水暖溫暾則古已然矣輟耕録漸又李商隱詩疑穿花逶迤近火溫黁亦暖氣之意鯽溜孫炎作反切俚語數百種謂就為鯽溜謂團曰突欒謂精曰鯽令謂孔曰窟籠不可勝舉唐盧同詩云不鯽溜鈍漢今人言不慧者為不鯽溜此俚人反語也宋景文公筆記夭邪唐詩錢塘蘇小小人道最夭邪又長安女兒雙髻鴉隨風趂蝶學夭邪夭音歪集升菴外乖角猶言乖張也唐人詠焚書坑詩祖龍算事渾乖角將為詩書活得人或云乖角猶乖覺蓋反言之遁叟儓擬李白詩五月造我語知非儓擬人儓擬言癡也祝穆切按史司馬相如賦仡以佁擬丑吏魚吏二又音態礙注不前也雖似俗語其來已久冬烘唐人言冬烘是不了了之語故有主司頭腦太冬烘錯認顔標作魯公之語人以為戲談今蜀人多稱之避暑録話藉在杜白頭無藉在千金翼論云老人之性必恃其老無有藉在如云無賴藉也杜注龍鐘老杜詩何太龍鐘極於今出處妨薛蒼舒注龍鐘竹名謂其年老如竹之枝葉搖曳不自矜持說既可笑唐李濟翁資暇録云鐘即涔蹄足所踐處龍致雨上下所踐之鍾固淋漓濺澱矣尤穿鑿難通惟蘇鶚演義云龍鍾不昌熾不翹首貌如鬟參拉搭觳觫之類似為近之然未有實據考埤蒼躘踵行不進貌古字從省躘因作龍踵又借作鍾此自有正解何煩曲為之說乎遁叟下同龍或云龍鍾潦倒二合音也鍾切癃字潦例切老字麻茶李涉今日顚狂任君笑趂愁得醉眼麻茶似即眼花之意紇梯紇榻崔涯嘲妓詩用紇梯紇榻四字寫其著屐聲此俗語至今有之然亦有所本楚辭卜居將突梯滑稽如脂如韋以潔楹乎晦菴注突梯滑澾貌紇梯蓋即突梯紇榻亦即紇澾也自屈原來巳有此方言矣得得猶特特也王建親故應須得得來貫休萬水千山得得來舉舉韓退之送陸暢舉舉江南子方嵩卿云唐人以人有舉止者為舉舉棖棖王睿棖棖山響答琵琶恰恰王績年光恰恰來杜自在嬌鶯恰恰啼按詩中用俗語皆有所本如困學紀聞所摘分付出漢原涉傳區處出黃霸傳自由出五行志相於出晉后妃傳消息出魏少帝紀鄭重出王莽傳分外出魏程曉上疏婁羅出南史顧歡傳本分出荀子措大出五代漢世家本色出唐劉仁恭傳商量出易卜商兌注傳語出後漢清河王慶傳收拾出光武紀尋思出劉矩傳世情出墨子爾來出孔明出師表阿誰出蜀龎統傳罷休出史記孫武傳安排出莊子如今出枤杜箋可人出雜記年紀出光武紀留連出後漢劉陶傳巳分出魏文帝書新鮮出太𤣥有舉之不能盡者姑識此以例其餘又事有俚俗沿用者附辨於後桃李鄭良孺云世因唐人桃李悉在公門一語遂謂門人為桃李秋若列在門牆者耳不知中有報答之義晉趙簡子謂陽虎曰惟賢者為能報恩不肖者不能植桃李者夏得休息秋得其食植蒺䉫者夏不得休息秋得刺焉今子之所得者蒺藜也唐人刺裴度詩不栽桃李種薔薇荆棘滿庭君始知正用此椿萱王弇州云今人以椿萱擬父母當是元人傳竒起耳大椿以八千嵗為春秋以擬父猶可萱引詩語言樹之背殊不切觀唐元微之詩萱近北堂穿土早宋丁謂之草解忘憂憂底事則唐宋人必不以萱擬母也喬梓所謂喬仰而髙梓俯而畀周公之所以撻伯禽也却久登科之為折桂避暑録云世以登科為折桂此謂郤詵對策東堂自云桂林一枝也自唐以來用之溫庭筠詩云猶喜故人新折桂自憐羈客尚飄蓬其後以月中有桂故又謂之月桂而月中又言有蟾故又改桂為蟾以登科為登蟾宫用郤詵事固已可笑而展轉相訛復爾文士亦或沿襲因之弗悟也又為遷鶯遁叟云詩伐木丁丁鳥鳴嚶嚶出自幽谷遷於喬木鄭箋云嚶嚶兩鳥聲正文與注皆未嘗及黃鶯初唐人韋元旦有遷木早鶯求韋嗣立有多愧春鶯曲相求意獨存孫處𤣥黃鶯詩髙風不借便何處得遷喬於是直以嚶鳴遷木者為黃鶯遞相組織用之登第進士如眼看龍化門前水手放鶯飛谷口春之類不一而足至今猶相沿云兄弟用夜雨對牀遁叟云寧知風雨夜復此對牀眠此韋蘇州示甥詩也後東坡與子由詩引此情至之語後人倣效遂用為兄弟故事至今無異同又如樂天招張司業能來同宿否聽雨對牀眠鄭都官贈僧每思聞净話夜雨對繩牀何嘗只為兄弟用耶僧用碧雲野客叢書云文選有江淹擬湯惠休詩曰日暮碧雲合佳人殊未來今人遂以為真休上人詩用之僧家此誤自唐巳然如韋莊詩曰千斛明珠量不盡惠休虛作碧雲詞許渾送僧南歸詩曰碧雲千里暮愁合白雪一聲秋思長曰湯師不可問江上碧雲深權德輿贈惠上人詩曰支郎有佳思新句凌碧雲孟郊送清逺上人詩曰詩誇碧雲句道證青蓮心張祐贈髙間上人詩曰道心黃蘖長詩思碧雲秋惟韋蘇州贈皎上人詩曰願以碧雲思方君怨别辭似不失本意一西溪叢語云栁子厚聞徹上人亡寄楊侍郎云空花散不知處誰采金花與侍郎蓋用惠休菊問贈鮑侍郎云玳枝兮金英緑葉兮紫莖也劉禹錫送義舟云如蓮半偈心常悟問菊新詩手自擕本此用碧雲似又不如問菊確也唐音癸籖卷二十四
