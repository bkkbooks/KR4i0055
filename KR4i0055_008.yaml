body:
  text: 唐音癸籤卷八明胡震亨撰評彚四杜牧詩主才氣俊思活吟譜杜紫微才高俊邁不羈其詩有氣概非晚唐人所能及陳氏書録牧之詩含思悲凄流情感慨抑揚頓挫之節尤其所長以時風委靡獨持拗峭雖云矯其流弊然持情亦巧矣徐獻忠李義山商隱博學强記儷偶繁縟長於律詩尤精詠史之作後人號為西崑體本傳義山詩用事深僻以其所長成所短然合處信有過人古今詩話義山詩精索羣材包藴密緻味酌之而愈出楊大年世人但稱義山巧麗俗學祗見其皮膚耳高情逺意皆不識也楊用修溫飛卿庭筠與義山齊名詩體麗密槩同筆徑較獨酣捷七言樂府似學長吉第局脈緊慢稍殊彼愁思之言促此淫思之言縱也遁叟下同段成式詩與溫李同號三十六體思龎而貌瘠故厥聲不揚許郢州渾詩覺煙雲風鳥之思揉弄亦已盡態徐獻忠世謂許渾詩不如不做言其無才藻鄙其無教化也孫光憲渾詩工有餘而味不足如人形有餘而韻不足詩豈專在對偶聲病而已方回渾句聨多重用其詩似才得一句便拏捉一句為聨者所以無自然真味又杜牧許渾同時然各為體牧於律中常寓少拗峭以矯時弊渾詩圓穩律切麗密或過杜牧而抑揚頓挫不及也劉後村俊爽若牧之藻綺若庭筠精深若義山整密若丁卯皆晚唐錚錚者其才則許不如李李不如溫溫不如杜今人於唐專論格不論才於近則專論才不論格皆中無定見而任耳之過也元瑞趙渭南嘏才筆欲橫故五字即窘而七字能拓蘸毫濃揭響滿為穩於牧之厚於用晦若加以清英砭其肥癡取冠晚調不難矣為惜倚樓隻句摘賞掩其平生遁叟下同李文山羣玉有才健之目而筆才實拙通卷難覓全瑜雍簡州陶矜負好句為客所窺此公工於造聨奈孱於送結落晚調不振喻鳬五言閒逺朗秀選句功深自稱無羅綺鉛粉殆亦實語方干詩鍊句字字無失固應有高堅峻拔之目但嫌其微帶經籍氣村貌稜稜爾姚居雲鵠吟筆見甄李贊皇如入河殘日鵰西盡又雪壇當醮月孤明清拔不可多得劉威弱調多悲酒無通夜力事滿五更心尤入情馬虞臣戴猿啼洞庭樹人在朩蘭舟風致自絶然未如空流注大荒為氣象七言東谷笑言西谷應下方雲雨上方晴雖得法於右丞各自擅勝但骨力概孱不堪通檢爾項子遷斯與朱可久並見賞張水部清調頗同而朱猶含重項即駛輕中晚分派以此劉得仁詩思深合處儘可味奈筆笨難掉何天子甥為一名終日哀吟何自苦韓成邽琮詠物七字著色巧襯是當行手有同姓喜者與同調皆可誦崔侍御珏與李義山善嶽麓長歌鴛鴦近體分有義山餘豔豈亦三十六體之一耶李楚望郢調亦溜亮不甚弱錢塘西齊一篇置之盧綸李端集中難别涇渭劉滄詩長於懷古悲而不壯語帶秋意衰世之音也歟凡七言律作拗峭語者皆有所不足也杜牧之非拗峭不足振其骨劉藴靈非拗峭不足宕其致材愈降愈借以蓋其短豈惟二子即少陵之拗體亦盛唐之變風大家之降格而非其正也李建州頻詩鬆活似姚監其不全似者意思少更率於選琢也然亦可謂才倩矣于鄴詩小小有致擬項斯馬戴未足方儲嗣宗司馬札有餘晚季以五言古詩鳴者曹鄴劉駕聶夷中于濆邵謁蘇拯數家其源似並出孟東野洗剝到極淨極真不覺成此一體初看殊難入細玩亦各有意在就中鄴才穎較勝夷中語尤關教化駕濆謁三子亦多有愜心句堪擊節惟拯平平為似學究耳李于鱗云唐無古詩而有其古詩為初盛言則過以施此數子恰可薛許昌能末季名手其詩借異色為景寄别興寫情盡廢前規另闢我境而排裊之筆浩蕩之襟復足沛赴之不病雕弱晚調自浪仙一變僻異聲色猶存此則洗剝過淨鄰乎孤孑再進則離斯空界便入魔天措手又難矣山谷嘗言少時曽誦薛能詩云青春背我堂堂去白髮欺人故故生孫莘老問曰此何人詩對曰老杜莘老云杜詩不如此後山谷語傅師云庭堅因莘老之言遂曉老杜詩高雅大體薛陶臣逢殊有寫才不虛俊拔之目長歌似學白氏雖以此得名未如七律多警張喬咸通騎驢之客吟價頗高如聽琴之幽淡送許棠之警聳亦集中翹英許文化棠致語楚楚洞庭一律時人多取以題扇四顧疑無地中流忽有山視老杜乾坤日夜浮愈切愈小李昌符存藻不多四座列吾友滿園花照衣善寫賞席樂興語不在飾樹盡禽棲草冰堅路在河雖未目塞垣者亦頷之曹堯賔唐詩能用多句調頗充偉為復類其儀質邪李山甫求名不遂滿腔怨毒語不忌俚如麻衣盡舉一雙手桂樹只生三十枝既知成事概難何必佐奮雞泊憯刃羅鄴名場無成無一題不以寄怨買栽池館恐無地看到子孫能幾家人以為牡丹警句也那知從忮求本懷中發出來崔塗漸與骨肉逺轉於僮僕親人謂不及王維孤客親僮僕固然然王語雖極簡切入選尚未崔語雖覺支離近體差可要在自得之弇州秦韜玉調似李山甫咏手押髯字詩尤矯癡可喜遁叟下同周朴從苦思中得猛句陡目欲驚其不合者亦多可憎是貫休一流詩皮襲美日休未第前詩尚朴澀無采第後遊松陵如太湖諸篇才筆開橫富有奇豔句矣律體刻畫堆垜諷之無音病在下筆時先詞後情無風骨為之幹也陸魯望龜蒙江湖自放詩興宜饒而墨彩反復黯鈍者當繇多學為纍苦欲以賦料入詩耳陶潛詩胸中若不著一字者𢎞景識字多吮毫彌拙矣參三隱君得失可證林下吟功鄭都官谷詩非不尖鮮無奈骨體太孱以其近人宋初家户習之谷有詩無僧字格還卑之句故其詩入僧字者甚多昔人嘗以為譏然大厯巳後諸公借阿師作吟料久矣吳子華融詩亦太鬆淺與鄭都官同一衰體未易置優劣唐彥謙詩律學溫李下疾不成雙㸃淚斷多難到九回腸何減春蠶蠟燭情藻耶又盆稻篇亦咏物之俊者唐山人球一生苦吟詩思遊厯不出二百里孫光憲李洞瓣香浪仙執而不𢎞捧心過甚空圓蕭散之氣不復少有豈非不善學下惠者耶方秋崖才江雖學賈島要為自具生面所恨刻求新異艱僻良苦耳終南一篇句與韻鬬險中葉來長律僅覯恐閬翁亦未辦也遁叟裴說詩以苦吟難得為工時出意外句聳人觀寄邊衣長歌亦綿宛中情不嫌格下王貞白御溝一律吟家喜談其事亦繇微含比興故佳咏葦排句輕趣可追姚監餘概少快心司空表聖自評其集撑霆裂月劼作者之肝脾誇負不淺此公氣體不類衰末但篇法未甚諳每每意不貫浹如爐金缺火未融坡公云表聖緑樹連村暗黃花入麥稀此句最善又云棊聲花院靜幡影石壇高吾嘗游五老峯入白鶴院松隂滿庭不見一人惟聞碁聲然後知此句之工但恨其寒儉有僧態韓致堯偓冶遊情篇豔奪溫李自是少年時筆翰林及南竄後頓趨淺率矣表聖綸閣舊臣詭隱瞻烏之日致堯閩南逋客完節改玉之秋讀其詩當知其意中别有一事在此等吟人未論工拙要為無負昭陵曹祕書松致語似項斯壯言間似李洞五字如白浪吹亡國秋霜洗太虛盤蹙陵陽壯孤標建業瞻七字如吸回日月過千頃鋪盡星河剩一重城頭早角吹霜盡郭裏殘潮蕩月回㸃綴末運賴此名場一叟五代十國詩家最著者多有唐遺士韋正已莊體近雅正惜出之太易義乏閎深杜彥之荀鶴俚淺以衰調寫衰代事情亦自真切黃文江滔力孱韻清娓娓如與人對語羅昭諫隱酣情飽墨出之幾不可了未少佳篇奈為浮渲所掩然論筆材自在僞國諸吟流上餘即不乏片藻付之自鄶西清詩話云人才高下各有分限少陵太白當險阻艱難流離困躓傑然出語自高至羅隱諸人嚮用偏伯之國誇雕逞竒雖欲高而意未嘗不卑譬之秦武陽氣蓋全燕見秦王則戰掉失色淮南王雖為神仙謁帝猶輕其舉止此豈由素習哉天禀自然不可强力至也釋靈一詩刻意精妙有泉涌階前地雲生户外峯之句高仲武靈徹詩如經來白馬寺僧到赤烏年入作者閫域集序皎然杼山集清機逸響閒淡自如讀之覺别有異味在咀嚼之表當繇雅慕曲江取則不逺爾集中讀曲江集詩可證遁叟下同無可詩與兄島同調亦時出雄句咄咄火攻廣宣應制諸篇氣色高華允哉紫衣名衲尚顔詩不入聲相直以清寂境搆成當時人歎其功妙㫖深非誣也齊己詩清潤平淡亦復高逺冷峭一經都官㸃化白蓮一集駕出雲臺之上可謂智過其師貫休詩奇思奇句一似從天墜得無奈發村忽作惡罵令人不堪受釋子以詩聞世者多出江南靈一導其源護國襲之清江揚其波法振沿之風習漸盛背篋笥懷筆牘挾海泝江獨行山林間翛翛然模狀物態搜伺隱隙悽愴超忽遊其心以求勝語若有程督之者嗜吟憨態幾奪禪誦嗣後轉噉羶名競營供奉集講內殿獻頌壽辰如廣宣栖白子蘭可止之流棲止京國交結重臣品格斯非詩教何取諸衲大厯間獨吳興晝公能備衆體綴六義清英首冠方外文宣之代可公以雅正接緒五代之交已公以清贍繼響篇什並多而益善餘則一聨一什非無可觀概如么絃孤韻瞥入人耳非大音之樂不能縷隲云羽流惟吳筠杜光庭詩較多筠嘗與李白遊史遂云詩亦與白相甲乙殊謬光庭格下尤無足稱宫媛前有上官昭容後有宋若華姊妹五人昭容儀之孫若華之問裔孫詩固有種耶其他閨秀楊盈川姪女臨鏡曉粧詩齊梁遺則吉中孚妻張氏拜月七言古籍建新調尤彤管之錚錚者李冶魚𤣥機薛濤女德正同李逺水浮仙棹寒星伴使車及聽琴一歌並大厯正音薛工絶句無雌聲自壽者相魚最淫蕩詩體亦靡弱其集附見有威光裒三粲句尤姱麗勝魚惜姓里不著又按張說論上官昭容云中宗景龍之際闢修文之館搜英獵俊豫遊宫觀行幸河山雅頌之盛與三代同風豈惟聖后之好文抑亦奧主之協讚然則漢代楚聲得自房中女蘿唐年近律成諸綵樓雌稱事儻有同功難忘始者歟唐音癸籖卷八
