body:
  text: 唐音癸籖卷三十三明胡震亨撰集録四唐人詩見于金石刻及自有真蹟傳世者至宋尚多如宣和內府所收藏載在書譜者真蹟班班可考而金石刻收藏之富無如歐陽文忠趙明誠兩家目録備在南渡後王象之碑目亦具一二當時唐人篇什賴法書以俱存者蓋亦不少矣今按目求之未必能全而斷墨殘行得留遺世間為人所傳寶者當亦未盡堙滅爰取諸書所載詩目備列於後冀好事者共為搜訪補余籖所未備云宣和書譜真蹟太宗禊宴詩行書明皇喜雪詩𨽻書賜裴耀卿等詩送虛已赴蜀川詩春臺望雜言行書代宗南郊口號守歲詩秋日詩重陽詩秋中月夜詩春日雨晴燕諸王詩行書則天后夜宴詩行書禇遂良帝京篇正書顏真卿潘丞竹山書堂詩正書徐浩寶林寺詩正書元稹寄蜀人詩正書陸扆贈䛒光草書歌正書李磎送䛒光詩正書陸希聲贈䛒光詩正書崔遠送䛒光詩正書張顗贈䛒光詩正書一今止存聯鄭賨題經藏詩正書一今止存聯戎昱草梅詩正書許渾今體詩上下正書烏絲欄後按唐人多自書其集傳如韓偓生時嘗手寫所為詩成卷宋嘉祐間裔孫奕出以示人龎頴公為漕奏之因得官事見葉石林集始知不獨用晦然也杜光庭送先輩詩正書盧汝弼贈䛒光詩正書王仁裕送張禹稱詩正書李白詠酒詩草書杜牧張好好詩行書白居易送敏中歸邠寧幕詩行書司空圖贈䛒光草書歌又贈䛒光草書詩行書吳融贈䛒光送别詩贈䛒光草書歌正書徐凝黃鶴樓詩荆巫夢思詩行書薛濤萱草諸詩行書齊已擬嵇康絶交詩謝人惠筆詩懷楚人詩渚宫書懷詩送冰禪姪詩寄冰禪德詩行書廬嶽詩寄明上人詩正書張徐州勸君詩行書五失其名詩篇中皆有勸君二字欲人外形骸輕利名筆力清徑勢若削玉閲之使人起物外之想潘佑書許堅等詩行書孫昭祚陽春曲諸詩竹拄杖諸詩朱陳村諸詩行書吏昭祚五代時中書堂學歐陽詢書法釋應之即事詩行書五應之代時僧筆法學栁公權李後主浩歌行行書元宗草堂諸詩牡丹詩古風詩秋高詩招賢詩樂府三篇臨江仙行書周㠖贈懷素草書歌草書唐譜云㠖天成間作牧泌陽無天成年號疑誤李霄逺隱士詩遠花詩草書栖譜云霄逺莫詳其出處其書類亞在唐有盛譽而放逸實為知書者所病張仲謀赴舉有感詩草書其譜云仲謀亡世貫胡季良題然公山房詩草書大乘寺詩孔山寺詩崑山寺詩行書不譜云季良見史冊懷素草書歌草聖詩早春詩自詠詩寄人詩憶人詩遊山詩題酒樓詩酒船詩勸酒詩狂醉詩醉僧圖詩寄浩公詩論草聖詩夢遊天姥山等歌草書亞栖對御草書歌觀智永草書歌觀懷素草書歌觀高間草書歌山寺詩草書䛒光贈登第詩草書貫休夢遊仙詩行書釋夢龜白蓮歌梁園吟粉團山水歌襄陽曲重陽詩謝馬鞭詩草書東譜云夢龜天復中㝢林寺作顛草張彥遠李將軍征回詩惟山廟詩宿僧院詩山行詩八分書釋靈該種柳歌八分書昌譜云靈該㑹中人歐陽修集古録流杯亭侍宴詩武后久視元年幸臨汝溫湯留宴羣臣應制詩也李嶠序殷仲容書開元十年汝水壞亭碑遂沈廢至貞元中刺史陸長源以為嶠之文仲容之書絶代之寶也乃復立碑造亭又自為記刻其碑陰韓覃幽林思武后時廬山林藪人韓覃撰修為西京留守推官時因遊嵩山得此詩愛其辭翰皆不俗録之𤣥宗謁𤣥元廟詩𤣥宗自書歲月闕世有𤣥宗書鶺鴒頌與此字法正同碑在北邙山上洛陽人謂之老君廟也崔潭龜詩蔡有鄰書天寶五載勒石唐世以八分名家者四人韓擇木蔡有鄰李潮史惟則也有鄰之書頗難得而小字尤佳李陽冰阮客舊居詩詩云阮客身何在仙雲洞口橫人間不到處今日此中行阮客者不見其名氏蓋縉雲之隱者也歲月亦闕崇徽公主手痕詩李山甫撰初僕固懷恩在肅宗時先以二女嫁回紇懷恩上書自陳六罪有云二女遠嫁為國和親是也其後懷恩既反病死靈武從子名臣降唐大歷四年始以懷恩幼女為公主又嫁回紇所謂崇徽公主者即此按公主手痕在陰地關唐人題詠勒石者不止一山甫趙録所收為多神女廟詩貞元十四年李吉甫丘元素李貽孫敬騫等作修貶夷陵令時嘗泛舟黃牛峽至其祠下讀數子之詩愛其辭翰遂録之韓愈送李願歸盤谷詩盤谷在孟州濟源縣貞元中縣令崔刻石後書云昌黎韓愈知名士也當時退之官尚未顯其道未為當世所宗師故但云知名士然當時送願者為不少而獨刻此蓋其文章巳重於時矣游道林嶽麓詩慶歷中沈傳師撰并書題云酬唐侍御姚員外而二人之詩不見不知為何人也獨此詩以字盡傳于世而詩亦自佳傳師書非一體此尤放逸可愛按唐侍御名扶其詩尚存惟姚為無考李文饒平泉山居詩讀山居詩見文饒夢寐不忘於平泉而終不得少償其志者勇決者人之所難而人事固多如此也文饒詩亦云自是功高臨盡處禍來名滅不由人誠哉是言善權寺詩太和元年勒石遊靈巖記辨石鍾山記附覽三子之文皆有幽人之思跡其風尚想見其人至書畫亦皆可喜蓋自唐以前賢傑之士莫不工於字書其殘篇斷藁時得于荒林敗冢埋沒之餘多前世無所知名之人而筆畫有法往往為今人所不及甚可歎也法華寺詩越州刺史李紳撰其後自序題云太和甲寅歲遊寺刻詩于壁詳自序所言似紳自書然以端州題名較之字體不類甲寅太和八年也薛蘋唱和詩太和中勒石馮宿馮定李紳皆唐顯人靈徹以詩名後世皆人所想見者然詩皆不及蘋豈唱者得於自然和者牽於强作耶僧靈徹詩詩云相逢盡道休官去林下何曾見一人世俗相傳以為俚諺慶歷中天章閣待制許元為江淮發運使因修江岸得斯石於池陽江水中始知為靈徹詩也徹以詩稱於唐故其與相唱和者皆當時知名之士包侍郎者佶也徐廣州者浩也玉蕊詩沈傳師李德裕唱和傳師宇文鼎䝉泉詩附歲月未詳䝉泉今在荆門軍修貶夷陵道荆門裴回泉上得二子之詩佳其詞翰遂録之浮槎寺八紀詩自云鴈門釋僧皎字廣明作詩雖非工而所載事蹟皆圖經所無可以資博覽浮槎山在今廬州慎縣其上有泉其味與無錫惠山水相上下而鴻漸茶經及張又新等水記皆不載及得僧皎紀浮槎八事亦無之乃知物之晦顯有時也趙明誠金石録天后少林寺詩王知敬正書永淳二年九月羑原神泉詩韋元旦撰序篆書無姓名垂拱元年四月流杯亭侍宴詩李嶠撰序殷仲容正書久視元年九月栖巖寺詩高宗則天撰韓懷信正書長安二年幸間居寺詩高宗睿宗太平公主詩八分書無姓名武后詩自草書長安四年四月游仙篇武后撰薛曜正書幽林思韓覃撰正書無姓名石淙詩武后諸臣撰薛曜正書六公詠李雍撰胡履虛八分書開元十一年明皇行次成臯詩史敘行書開元十三年十月堯子廟詩于儒卿房自謙撰自謙正書開元十八年三月讀樊丞相傳詩鄭炅之撰胡霈八分書小魯真人仙解謠魯國清述陳錫正書天寶三載七月崔潭龜詩蔡有鄰八分書天寶五載十一月華嶽廟古松詩衛包撰并篆書明皇賜道士蔡守沖詩并謝表批答行書天寶十一載九月李峯途經劒門詩程昂正書天寶十三載明皇上黨宫宴辟臣故老詩行書天寶中立明皇謁𤣥元廟詩行書天寶中立雲門山投龍詩趙居貞撰行書天寶中立崇徽公主手痕詩李山甫等正書大歷四年懷固寂上人詩顔真卿撰并正書大歷十二年十二月題朝陽巖詩李舟撰并正書大歷十三年九月李當牛嵸詩附寶林寺禹廟詩徐浩撰并正書大歷中立麟德殿宴羣臣詩德宗撰皇太子誦行書顔防書渾瑊表附貞元四年六月仙巖四瀑布詩路應等唱和行書貞元七年三月秋日登戲馬臺詩侯莫陳遂等正書無姓名貞元七年六月茶山詩并詩述詩述于頓撰詩袁高撰徐璹正書劉居簡歸鄉拜高廟詩正書貞元十二年十月顧少連張式嵩山聯句正書貞元十二年十二月李吉甫神女祠詩正書貞元十四年正月任要謁夫子廟詩正書貞元十四年十二月送張建封還鎮詩德宗撰太子誦行書貞元十四年韋渠牟步虛詞正書貞元十六年十二月游琅琊山新寺詩栁遂正書無年月錢可復元和四年四月題名附明皇送李雍赴滑州詩柏元封行書元和五年十月題巫山詩蔡穆撰沈幼真行書元和五年十二月崔融題東林寺詩正書無姓名元和十三年二月重刻感化詩竇牟撰正書無姓名元和十五年二月明州南樓詩陳祐撰胡師模八分書元和二年十二月溪堂詩韓愈撰牛僧孺正書題怪石詩世傳李德裕作長慶三年二月蒙泉詩沈傳師正書寶歷二年四月宇文鼎詩太和九年附裴度白居易聯句正書無姓名太和三年十二月秋日望贊皇山詩李德裕撰并八分書太和四年八月桃源詩劉禹錫撰李某書名闕太和四年白居易游濟源詩正書太和五年九月馮宿詩附游王屋詩白居易撰正書太和六年十月李紳法華寺詩正書太和七年三月李紳題少林寺詩正書開成元年七月皇甫曙題石佛谷詩李道夷正書開成元年十月李德裕平泉山居詩李德裕八分書沈傳師嶽麓寺詩行書文宗時作李貽孫神女廟詩正書無姓名㑹昌五年九月立鄭薰雪霽開講詩正書無姓名咸通九年九月宿惠山寺詩王武陵朱宿竇羣正書咸通十二年七月鄭畋謁升仙太子廟詩正書無姓名禧宗乾符四年閏二月冬日陪羣公泛舟詩謫丹陽功曹掾王某名闕行書無年月李陽冰題阮客舊居詩篆書無姓名椒陵陂韋瓘撰正書玉蕊詩唱和沈傳師李德裕正書無姓名夏日登戲馬臺詩鄭遂文盧僎撰八分書楠木歌嚴武史俊行書無姓名郗昂光福寺詩行書無姓名嚴武題龍日寺西龕石壁詩行書無姓名皇甫湜浯溪詩沙門湛然題井陘山壁詩正書無姓名王象之輿地碑記袁高茶山詩湖州之顧渚山歲修茶貢高為之刺史而作是詩其後于頔得之于壞垣為之序而刻之今在安吉州墨妙亭善權寺詩靈巖瀑布記集古録云羊士諤游善權寺詩康仲熊游靈巖瀑布記鄭薰雪霽門講詩附善權寺詩元和十三年刻李飛在常州崔詞謁禹廟詩在紹興元和十一年刻石又宋之問等詩附元威明陽明洞天詩在紹興太和三年立石龍瑞宫白居易陽明洞天詩在紹興太和三年題法華寺詩李紳撰在紹興法華寺詩李紳撰徐浩書以太和八年刻石于紹興薛蘋唱和詩唐薛蘋詩不著書人名氏崔述等凡十七首紹興杜荀鶴及禪月大師貫休留題在衢州龍遊之石壁院石橋詩刻記唐廷評嚴綬撰在衢州題梓府君廟詩在寧國李太白司空圖撰送二王詩在寧國李後主浮槎寺八紀詩集古録云唐沙門僧皎撰不著人名氏凡詩八首不著刻石年月在廬州浮槎山下唐李思聰雞籠山詩在和州小㕔東江心小石詩蛟室圍青草龍堆擁白沙護江蟠古木迎棹舞神鴉破棹南風正收帆畏日斜雲山千萬叠底處上仙槎王直方六此老杜過洞庭湖詩也李希聲云得之于嶽州江心一小石刻潘子真云元豐間有人得此石刻于洞庭湖中而不載名氏或以示山谷曰子美作也今蜀本已收入集而不紀其得詩之由故録其詳于此玉蕊詩在荆門惠泉寺唐沈傅師李德裕唱和也高廟詩碑㑹昌五年立碑在襄陽府治法華寺詩在肇慶府越州刺史李紳撰并書古柏行在成都長慶四年段文昌書開元皇帝送趙仙甫尊師歸蜀詩碑見在崇慶府新津縣之寶珍觀杜子美兩川夔峽諸詩石刻在眉州黃庭堅書鄭餘慶詩刻在順慶金泉山上僞蜀刺史徐光溥詩刻在順慶金泉山王維送楊長史赴果州詩在順慶郡治神女廟詩李吉甫詩一首以貞元十四年刻丘元素一首無刻石年月李貽孫二首㑹昌五年刻敬騫一首元和五年刻沈幼真書其他皆無書人名氏在䕫州巫山界𤣥宗丹霄驛詩刻在昭州詩云驛前南面架危橋久欲登臨畏路遙今日偶然尋得到直從平地上丹霄巫山詩碑金吾衛兵曹參軍沈真撰元和五年建在䕫州杜少陵諸詩石刻少陵遊蜀凡八稔而在夔獨三年平生所賦詩凡千四百六篇而在夔者乃三百六十有一治平中知州賈昌言刻十二石于北園歲久字漫滅建中靖國元年運判王蘧新為十碑今碑在漕司盛山十二題詩在開州唐韋處厚撰韓愈序和者元稹許康佐白居易李景儉嚴武溫造也王徽留題唐僖宗朝丞相王徽未第時曾經閬州次南部合符寺登高念逺因賦詩北山老君影跡詩巴州王望山舊名北山山半石壁隱出老君像唐人為賦北山老君影跡詩南龕題詩石在巴州南二里之廣福寺唐人題詠皆刻之于石唐人題西龕櫻桃詩在巴州西龕其名磨滅嚴侍御暮春五言在巴州西龕寺史俊寄嚴侍御楠木詩在巴州西龕寺郗昂陪嚴使君暮春五言二首在巴州南龕詩甚典麗羊士諤十四詠在巴州東龕流杯十四詠在巴州西龕寺流觴亭唐乾元戊戌嚴鄭公武所創大歷間盜起遂廢開成丙辰刺史唐元封復修蓋取羊士諤流杯十四詠以自序為證云爾凡詩文題鐫碑版者即有凡作鮮僞作縑楮所流傳經飛鳬家手真僞半矣歐陽趙王三録所載唐人詩篇並得自石本真蓋無疑若宣和收藏諸詩真蹟則僞托間有之逮墨刻興僞托尤盛有本無此真蹟猥云從某氏臨摹得者矣好事者不察往往據之編入其人集中大都淺識者所為多存逗漏可摘具眼者一覽瞭然有終不得而淆者李白集天若不愛酒一詩出祕閣帖淳熙中陳氏甲秀堂帖亦載之馬子才僞作也杜甫集過洞庭湖蛟室圍青草律詩人得之江心小石刻黃山谷以為必甫之詩編者遂據之收入集中此二老集尚敢亂真雜入況他乎其逗漏最可笑者如近代董𤣥宰戲鴻堂帖禇遂良書太宗帝京篇截去太宗原序一半冒作遂良語氣云其跡在唐荆川家又有歐陽詬詠古一詩云已惑孔貴嬪又被辭人侮花箋一何榮七字誰曽許不下結綺閣空迷江令語雕戈動地來誤殺陳後主江令總詢父紇友也紇之死詬當從坐總以故人子私養之教以書記得成名恩義不薄載詢傳甚明乃忍出此等語耶作僞者既漫不考而董復信而收之可怪也唐人詩亦有録自畫卷及畫壁者詩班班在諸人集中而畫未必常存畫壽不敵詩壽也相傳唐盧鴻一草堂圖圖各有詩尚在人間𢎞成諸名流嘗論之今觀圖中十詩俗惡無人理又鴻一傳所居室名寧極而此圖與詩標洞𤣥室抑何左耶畫吾不知知此詩之當刪而巳又坡公嘗戲為摩詰之詩以摹寫摩詰之畫編詩紀者認為真摩詰詩採入集中世人無識那可與分辨并志之佐覽者捧腹云東坡跋王維畫云味摩詰之詩詩中有畫觀摩詰之畫畫中有詩詩曰荆溪白日出天寒紅葉稀山路元無雨空翠濕人衣此摩詰之詩也或曰非也好事者以補摩詰之遺此活語被人作死語看摩詰增一首好詩失却一幅好盡矣諸書中惟地志一類載詩為多顧所載每詳于今而略于古或以今人詩冒古人名又或改古人詩題以就其地甚有并其詩句亦稍加潤色者以故詩之僞不可信者十居七八編閲諸志惟江右之袁劉嵩逸選微存浙省之嚴翁洮遺篇略載此外寥寥指難多屈矣舊嘗聞范東生輯有唐詩問之姚叔祥叔祥云見其借地志屹屹鈔寫怪謂姚地志即不可不翻那得真詩寫後見人刻其所編皮日休集有襄志八景詩在內因為浩嘆輯唐詩非捃採難鑒難辨唐音癸籖卷三十三
