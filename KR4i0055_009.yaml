body:
  text: 唐音癸籤卷九明胡震亨撰評彚五柳州之平淮西最章句之合調昌黎之元和聖德亦長篇之偉觀一代四言有此未覺風雅墜緒遁叟古詩浩繁作者至衆雖風格體裁人以代異支流原委譜系具存炎劉之製逺紹國風曹魏之聲近沿枚李陳思而下諸體畢備門户漸開阮籍左思尚存其質陸機潘嶽首播其華靈運之詞淵源潘陸明逺之步馳驟太沖有唐一代拾遺草創實阮前蹤太白縱橫亦鮑近矱少陵才具無施不可而憲章漢魏融冶六朝洵風雅之大宗藝林之正朔已其他諸家亦概多合作截長潔短上方魏晉不足下視齊梁有餘猥云唐無五言未是定論元瑞下同唐初五言古殊少佳者王楊沈宋集中一二僅存皆非合作無論漢魏逺却齊梁此時古意垂燼而律體驟開諸子當強弩之末鼎革之初故自不得超也唐初承襲梁隋陳子昂獨開古雅之源張子壽首創清淡之派盛唐繼起孟浩然王維儲光羲常建韋應物本曲江之清淡而益以風神者也高適岑參王昌齡李頎孟雲卿本子昂之古雅而加以氣骨者也常侍五言古深婉有致而格調音節時有參差嘉州清新奇逸大是俊才質力造詣皆出高上然高黯淡之內古意尤存岑英發之中唐體大著仲默云右丞他詩甚長獨古作不逮讀其集大篇句語俊拔殊乏完章小言結搆清新所少風骨孟五言秀雅不及王而間淡頗自成局孟詩淡而不幽時雜流麗間而匪逺頗覺輕揚可取者一味自然常建清晨入古寺松際露微月幽矣王維清川帶長薄中歲頗好道逺矣古詩自有音節陸謝體極排偶然音節與唐律迥不同唐人李杜外惟嘉州最合襄陽常侍雖意調高逺至音節時入近體矣儲光羲間婉真至農家者流往往出王孟上常建語極幽玄讀之使人泠然如出塵表然過此則鬼語矣韋左司大是六朝餘韻宋人目為流麗者得之儀曹清峭有餘間婉全乏自是唐人古體大蘇謂勝韋非也五言至元和後幾絶響矣破瞑别續幽燈吾愛東野傾家快鬬碎寶吾并存昌黎餘子無庸齒已遁叟樂府則太白擅奇古今少陵嗣迹風雅蜀道難逺别離等篇出鬼入神惝恍莫測石壕吏新婚别哀王孫等作述情陳事懇惻如見張籍王建卑淺相矜長吉庭筠怪麗不典所謂差之釐毫謬於千里元瑞太白於樂府最深古題無一弗擬或用其本意或翻案另出新意合而若離離而實合曲盡擬古之妙嘗謂讀太白樂府者有三難不先明古題辭義源委不知奪換所自不參按白身世遘遇之概不知其因事傅題借題抒情之本指不讀盡古人書精熟離騷選賦及厯代諸家詩集無繇得其所伐之材與巧鑄靈運之作略今人第謂太白天才不知其留意樂府自有如許功力在非草草任筆性懸合者不可不為拈出遁叟下同擬古樂府至太白幾無憾以為樂府第一手矣誰知又有杜少陵出來嫌模擬古題為贅賸别製新題詠見事以合風人刺美時政之義盡跳出前人圈子另換一番鉗鎚覺在古題中翻弄者仍落古人窠臼未為好手盡道胡鬚赤又有赤鬚胡兩公之謂矣籍建長吉之不能追李杜固也但在少陵後仍詠見事諷刺則詩為謗訕時政之具矣此白氏諷諫愈多愈不足珍也所以張文昌只得就世俗俚淺事做題目不敢及其他仲初亦然文昌樂府只傷歌行咏京兆楊憑者是時事建集并無至長吉又總不及時事仍咏古題稍易本題字就新如長歌行改為浩歌公無渡河改為公無出門之類及將古人事創為新題便覺煥然有異如秦王飲酒金銅仙人辭漢歌之類遞相救不得不然英雄各自有見也燕歌初起魏文實祖柏梁體白苧詞因之皆平韻也至梁元帝燕趙佳人本自多遼東少婦學春歌黃龍戍北花如錦玄兔城頭月似蛾音調始協蕭子顯王子淵制作浸繁但通章尚用平韻轉聲七字成句故讀之尤未大暢至王楊諸子歌行韻則平仄互換句則三五錯綜而又加以開合傅以神情宏以風藻七言之體自是大備要惟長篇巨什敘述為宜用之短歌紆緩寡態於是高岑王李出而格又一變矣元瑞下同唐七言歌行垂拱四子詞極藻豔然未脫梁陳也張李沈宋稍汰浮華漸趨平實唐體肇矣然而未暢也高岑王李音節鮮明情致委折濃纎修短得衷合度暢矣然而未大也太白少陵化而大矣能事畢矣降而錢劉神情未逺氣骨頓衰元相白傅起而振之敷演有餘步驟不足昌黎而下門户競開張籍王建之真淡李賀之幽奇變風猶未失古盧同之拙朴馬異之庸猥劉義之狂譎旁蹊更傷大雅下至庭筠之流綺繪漸入詩餘貫休之輩俚鄙幾同俗諺古意於焉盡矣初唐七言古以才藻勝盛唐以風神勝李杜以氣槩勝而才藻風神稱之又加以變化靈異故遂為大家于鱗嘗評太白七古強弩之末出長句為英雄欺人愚謂句之有長短始自三百篇及楚騷漢樂府鐃歌相和等曲白亦用古法有所本也其長句日出入行錯用篇中蜀道難突用篇首何嘗盡出弩末于鱗意在防濫則可若以論白非衷歌行太白多近騷王楊多近賦子美多近史王勃滕王閣衛萬吳宫怨自是初唐短歌婉麗和平極可師法中唐繼作頗多第八句為章平仄相半軌轍一定毫不可逾殆似歌行律體矣古詩窘於格調近體束於聲律惟歌行大小短長錯綜闔闢素無定體故極能發人才思李杜之才不盡於古詩而盡於歌行孟襄陽輩才短故歌行無復佳者五言律體兆自梁陳唐初四子靡縟相矜時或拗澀未堪正始神龍以還卓然成調沈宋蘇李合軌於先王孟高岑並馳於後新製迭出古體攸分實詞章改革之大機氣運推遷之一會也子昂野戍荒煙斷深山古朩平城分蒼野外樹斷白雲隈等句平淡間逺王孟二家之祖審言楚山橫地出漢水接天回飛霜遙渡海殘月迥臨邊等句閎逸渾雄少陵家法宛然宋人掇其牽風紫蔓小語以為杜所自出陋哉二張五言律大槩相似於沈宋陳杜景物藻繪中稍加以情致劑以清空學者間參則無冗雜之嫌有雋永之味然氣象便覺少隘骨體便覺稍卑品望之雌職此故耶孟五言不甚拘偶者自是六朝短古加以聲律便覺神韻超然此其占便宜處英雄欺人要領未易勘也五言律體極盛於唐要其大端亦有二格陳杜沈宋典麗精工王孟儲韋清空間逺此其概也然右丞贈送諸什往往闌入高岑鹿門蘇州雖自成趣終非大手太白風華逸宕特過諸人而後之學者才匪天仙多流率意惟工部諸作氣象巍峩規模宏逺當其神來境詣錯綜幻化不可端倪千古以還一人而巳飛星過水白落月動沙虛吳均何遜之精思春色浮山外天河宿殿隂庾信徐陵之妙境山河扶繡户日月近雕梁碧瓦初簷外金莖一氣旁高華秀傑楊盧下風冠冕通南極文章落上台詔從三殿去碑到百蠻開典重冠裳沈宋退舍耕鑿安時論衣冠與世同在家嘗早起憂國願年豐寓神奇於古淡儲孟莫能為前片雲天共逺永夜月同孤落日心猶壯秋風病欲蘇含闊大於沈深高岑瞪乎其後退朝花底散歸院柳邊迷花動朱樓雪城凝碧樹煙王右丞失其穠麗地平江動蜀天闊樹浮秦日月低秦樹乾坤繞漢宫李太白遜其豪雄至岸花飛送客檣燕語留人則錢劉圓暢之祖兩行秦樹直萬點蜀山尖則元白平易之宗兩邊山朩合終日子規啼盧同馬異之渾成山寒青兕呌江晚白鷗飢孟郊李賀之瑰僻凍泉依細石晴雪落長松島可幽微所從出竹齋燒藥竈花嶼讀書牀籍建淺顯所自來雨拋金鎖甲苔卧緑沈槍義山之組織纖新圓荷浮小葉細麥落輕花用晦之推敲密切杜集大成五言律尤可見者山隨平野闊江入大荒流太白壯語也杜星垂平野闊月湧大江流骨力過之九衢寒霧斂萬井曙鐘多右丞壯語也杜星臨萬户動月傍九霄多精彩過之氣蒸雲夢澤波撼嶽陽城浩然壯語也杜吳楚東南坼乾坤日夜浮氣象過之弓抱關西月旗翻渭北風嘉州壯語也杜北風隨爽氣南斗避文星風神過之讀唐諸家至杜輒令人自失唐五言多對起沈宋王李冠裳鴻整初學法門然未免繩削之拘要其極至無出老杜如國破山河在城春草朩深戰哭多新鬼愁吟獨老翁冠冕通南極文章落上台死去憑誰報歸來始自憐城晚通雲霧亭深到芰荷秋月仍圓夜江村獨老身四更山吐月殘夜水明樓江漢思歸客乾坤一腐儒路出雙林外亭窺萬井中滿目悲生事因人作逺遊之類對偶未常不精而縱橫變幻盡越陳規濃淡淺深動奪天巧百代而下當無復繼唐音癸籖卷九
