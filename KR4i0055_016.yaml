body:
  text: 唐音癸籤卷十六明胡震亨撰詁箋一蔚藍度人經諸天名也隱語無義理可解非青藍之藍杜甫梓州金華道觀詩涪右衆山內金華紫崔巍上有蔚藍天垂光抱瓊臺借作顔色字為蘂宫寫貌遁叟下同十枝初唐人咏日用十枝字謂扶桑九日居下枝一日居上枝也出山海經扶桑嚴忌哀時命作搏桑音同李白詩游搏桑兮挂左袂黃雲沈佺期改年觀赦詩六甲迎黃氣三元降紫泥望氣經云黃雲四出主赦黃氣黃雲也華蓋象雲六甲乃華蓋杠傍星名故用之景雲孝經援神契天子孝景雲出遊崔融則天挽歌空餘天子孝松上景雲飛濯枝雨蘇味道單于川對雨詩還從濯枝後來應洗兵辰風土記六月大雨為濯枝雨洗兵用六韜周伐殷遇雨事香雲香雨雨未嘗有香也而李賀詩依微香雨青氛氲元微之詩雨香雲淡覺微和雲未嘗有香而盧象詩云雲氣香流水此楊用修語也陳晦伯駁之謂雲雨未嘗無香引拾遺記員嶠山石燒之成香雲遍潤成香雨為證詩人寫物正不必問其有出處與否若以員嶠有香雲香雨方敢用之則詩亦大拙鈍矣晦伯何足以難用修乎鯉魚風李賀詩門前流水江陵道鯉魚風起芙蓉老九月風也石尤風陳子昂寧知巴峽路辛苦石尤風戴叔倫知君未得去慚愧石尤風司空文明無將故人酒不及石尤風唐人屢用之而無其解洪容齊意其為打頭逆風今觀宋孝武丁督護歌願作石尤風四面斷行旅則亦如嶺嶠颶風四面俱具之類非僅打頭逆風明矣格澤儲光羲詩格澤為君駕大人賦建格澤之長竿注云格澤氣如炎火狀起地上至天詳漢書天文志中和節唐以正月晦日為一節孝和朝有晦日行幸諸詩後德宗以前世上巳九日皆大宴集而寒食多與上巳同時欲於二月立節於是李泌請廢正月晦以二月朔為中和節帝乃著令與上巳九日為三令節中外皆賜緡錢宴㑹君臣賡賦為多重三張說三月三日詩暮春三月日重三五月五日曰重五九月九日曰重九則三月三日亦宜曰重三也鄭良孺下同耗磨日張說有耗日飲酒詩耗磨傳兹日又云流傳耗磨辰俗謂正月十六日為耗磨日是日官司不開倉庫故說詩有還將不事事語小歲日過臘一日俗謂小歲日行拜賀禮見崔實月令盧照鄰人歌小歲酒此也五更㸃夜更五五相遞為二十五㸃唐李郢詩二十五聲秋㸃長是也韓退之詩雞三號更五㸃尤末更足五㸃之證今更㸃去末更之二并去初更之二配之起宋世避寒在五更頭之讖而然不足二十五㸃之舊矣北斗城三輔黃圖長安故城城南為南斗形城北為北斗形故號斗城何遜咸陽詩城斗疑連漢杜秦城近斗杓秦城北斗邊北斗故臨秦以此芥隱筆記蝦蟆陵唐人屢用入詩白樂天自言本是京城女家在蝦蟆陵下住謝良輔取酒蝦蟆陵下家家守歲傳巵齊巳翠樓春酒蝦蟆陵長安少年皆共矜其地在長安城東南與曲江近為妓女及名酒所出之處長安志曰常樂坊內家東有大塜俗呼為蝦蟆陵曲中出美酒長安稱之相傳是董仲舒墓門人至此下馬故名一云漢武幸芙蓉園至此下馬諺訛為蝦蟆陵矣詳國史補遁叟下同漢武泉趙嘏有經漢武泉詩芙蓉池苑起清秋漢武泉聲落御溝漢武泉者即曲江之源在長安城南東滙為曲江隋惡曲之名稱芙蓉池至唐引黃渠之水漲曲江復故名别於其南起芙蓉苑而泉為濱江農家湮塞遂不著宋程大昌撰雍録最詳核於曲江獨遺此泉惟張禮遊城南記備其本末云中南文苑英華太宗有望中南山詩或疑終南之誤非也毛詩秦風終南注終南山即周之中南山潘嶽關中記云以其山在天之中居都之南故曰中南彭叔夏辨證東䝉峯杜詩云故人昔隱東䝉峯巳佩含景蒼精龍故人今居子午谷獨在隂崖結茅屋東䝉乃終南山峯名种明逸東䝉新居詩亦云登遍終南峯東䝉最孤秀南士不知故注杜詩者妄引顓臾為東䝉主以為魯地稗海巏嵍山唐末盧龍幕客馬彧與鎮州幕客韓定辭以學問相試彧贈定辭詩别後巏嵍山上望羡君時復見王喬巏嵍山地志無考今按顔氏家訓柏人城北有一孤山古書無載者唯闞駰十三州志以為舜納于大麓即此山今猶有堯祠在焉俗或呼為宣務山或呼為虗無山莫知所出趙郡土族有李穆叔季節兄弟及李普濟為有學問並不能定鄉邑此山余嘗為趙州佐見太原王邵讀柏人城西古碑碑是漢桓帝時柏人縣民為縣令徐整所立銘曰土有巏務山王喬所仙方知此巏務山也巏字無所出務字依諸字書即旄丘之旄也旄字字林一音亡付反今依附俗名當音權務耳入鄴為魏收說之收大嘉歎值其為趙州莊嚴寺碑銘曰權務之精即用此也今彧詩作巏嵍與家訓異考韻書堥嵍􅀢務通作旄前髙後下丘名也謨袍耳由亡付三切俱通遁叟下同五松山在南陵銅井西初不知何名李白以其山有松一本五幹蒼翠異恆題今名詩云徵古絶遺老因名五松山人皆知白改九子為九華不知更有改五松事盧龍山圖經金陵城西北有獅子山臨大江晉中宗以形勢同塞上盧龍易名為盧龍山李白三山望金陵詩盧龍霜氣冷鳷鵲月光寒正指此也元人注李集以此盧龍為北平郡山殊可笑昭代王弇州登金陵盧龍山詩似聞司馬江東日分得盧龍塞上山西塞山有兩西塞山西塞山前白鷺飛桃花流水鱖魚肥此吳興之西塞也勢從千里奔直入江中斷嵐橫秋塞雄地束江流滿此韋江州所咏武昌之西塞也絶不相混宋陸游誤合為一王弇州復曲為之說云武昌西塞峭壁洪濤不類志和詞中景色其北岸遙山人家處故當於此漁釣不知志和生平室居在越州舟居多在苕霅間未聞其從楚江泛宅也本傳所載甚明兩公顧弗考耳吳興西塞即今慈湖鎮道山磯是女墳湖白樂天詩女墳湖北武丘西文苑英華辨證云女墳真娘墓也此非是皮陸女墳湖詩自注吳王葬女之所按吳越春秋闔閭葬女閶門西郭舞白鶴市中令萬人隨觀即其事也向吳亭在潤州官舍杜牧之潤州詩向吳亭東千里秋陸龜䝉詩秋來懶上向吳亭今刻牧之集者改為句吳亭失之矣孔氏雜說御亭庾信詩御亭一回望風塵千里昏王維送元中丞東南御亭上莫問有風塵蓋翻庾詩也御亭吳大帝所建在晉陵後太守李襲譽用庾詩望字改為望亭李嘉祐有自蘇臺至望亭驛詩遁叟萬歲樓孟浩然王昌齡皇甫冉俱有登萬歲樓詩京口子城西南月觀在城上者或云即萬歲樓土人以為南唐時節度使每登此樓西望金陵嵩呼遙拜其實非也京口記云晉王恭所作稗海三河唐詩天子三河募少年又節使三河募年少謂河內河東河西近長安畿輔地也楊用修以黃河析支河湟中河解之逺矣此三河那得有少年募弇州五津蜀江自湔縣至犍為有五津曰白華津萬里津江首津涉頭津江南津出華陽國志王勃送杜少府之任蜀州風煙望五津用此楊用修陵陽城冢記吳太子和陵在吳興郡城北西陵山故吳興舊有陵陽之稱許渾霅溪宴别云誰堪從此去雲樹滿陵陽李涉在維揚見吳興劉全白員外之愛姬名宋態者作詩云陵陽夜宴使君筵解語花枝在眼前皆指此宋牟巘寓居吳興因名其詩曰陵陽集今人多不知之遁叟雲根杜詩穿水忽雲根錢起竒石雲根淺賈島移石動雲根詩人多以雲根名石以雲觸石而生也六朝人先用之宋孝武登樂山詩屯烟擾風穴積水溺雲根陳晦伯槽今黃河舟子稱水落為歸槽槽本馬槽象渠形言之也白詩江鋪滿槽水元詩江流初滿槽元自注槽為楚語遁叟下同沓潮劉禹錫連州詩屯門積日無回飈滄波不歸成沓潮轟如鞭石矻且搖亘空欲駕黿鼉橋番禺記兩水相合曰沓潮蓋風駕前潮不得去後潮之應候者復至則為沓潮海不能容而溢吾鄉亦有此諺云市暨杜市暨瀼西巔市井泊船處夔人呼為市暨水橫通山谷處䕫人謂之瀼杜有瀼西寒望詩亥市顧况詩云亥市風烟接張籍詩云江村亥日長為市按洪氏隆興職方乘云嶺南村落有市謂之虗以其不常㑹多虗日也西蜀曰痎言如痎疾間而復作江南惡以疾稱因止曰亥獨徐筠水志云荆吳俗以寅申巳亥日集於市故名亥市其說較洪氏為雅金潾張籍蠻中詩銅柱南邊毒草春行人幾日到金潾今本潾作麟誤也金潾乃交趾地名水經注所謂金潾清渚是也唐音癸籤卷十六
