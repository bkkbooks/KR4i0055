body:
  text: 唐音癸籖巻二十一明胡震亨撰詁箋六楊炯祅星六丈出沴氣七重懸上句用天文書五殘六賊司詭咸漢四星竝去地可六丈所出非其方其下有兵衝不利下句用緯書春秋文耀鉤楚有蒼雲如蜺圍軫七盤又漢髙困平城亦有月暈圍參畢七重之事二月河魁將三千太乙軍上句用六壬占六壬十二月將二月夘合戍將曰河魁下句用太乙占太乙星天帝神主知兵革漢武嘗畫鏠旗奉之指所伐國藝文志有其兵法駱賓王送人入蜀海客乗槎渡僊童馭竹廻上用嚴君平卜肆事下用介象令人騎竹自吳往蜀事曹能始蜀中詩話以馭竹為費長房葛陂事引寰字記葛陂在蜀溫雙間為據按後漢書長房傳注葛陂在豫州新蔡境與蜀無渉代郭氏答盧照鄰迢迢芋路望芝田𣺌𣺌函關限蜀川芋是蜀事芝是商洛事時盧在秦中郭在蜀中二語當句作對言相望情誤本芋作芊改者愈謬遂不可通楊用修以宕渠古賨國姓芊改為芊合芝田不成句矣蹲䲭又增一餉羊帖乎陳子昻乞推禄命詩非同墨翟問空滯殺龍川事出墨子墨子之齊日者語之曰帝今日殺龍北方先生之色墨不可以北墨子果不遂而反又贈暉上人詩四十九變化一十三死生一出法華經一出道徳經雖算博士未如其工也法華經隨喜分第五十人義三藏四門衆四十八人合最初最後五十人最後第五十人但自解不化陀其四十九人師弟子展轉相授自行化陀杜審言送李嗣眞使河東詩子月開階統房星受命年時則天改唐為周遣使故所用皆姬周受命事子月周正朔周興五星聚房出春秋元命苞天子必有神靈符紀開階立隧孔演圖之文沈佺期贈韋舍人詩一經書舊徳五字擢英材上用韋氏事下用晉中書郎虞松事五字用之中舍唐人尤多獄中咏燕不如黃雀語能雪冶長猜似以治長縲絏之釋繇鳥語與論語正義不同正義云舊説冶長解鳥語故繋之縲絏今以其不經去之海録引舊䟽止載鳥語餘不詳無從證佺期異同之故記之俟博洽者宋之問宿雲門寺詩樵路鄭州北學井阿巖東州疑作洲學井疑是舜井孔靈符㑹稽記鄭𢎞于若耶溪遇神人以溪中採薪為難願朝南風暮北風後果然周處風俗記餘姚舜之餘族所封也故有歴山舜井宋詩用鄭洲舜井蹉句對法李嶠還洛詩將交洛城雨稍逺長安日交字用東京賦總風雨之所交陶甄荷吹萬頌歎歸明一用荀子明一者皇中宗降誕日長寕公主滿月侍宴詩大火乗天正明珠對月圓中宗以十月生是月日躔大火之次日君象故以為比人但知下句之工不知上句之大史稱中宗十一月誕似誤内殿栢梁體詩題稱十月誕辰可證祚新金篋裏用虞舜金繩玉柙符命事初復辟故云新歌奏玉筐前用有娀氏女玉筐覆燕遺二卵事本娥女作歌此借為侍宴者奏歌又使事家㸃合之妙嶠與李乂皆有送沙門𤣥奘三僧還荆門應制詩此是江陵白馬寺𤣥奘中宗時與景俊二師同召至京歸鄉終本寺非貞觀中求法奘師也詳髙僧傳鄭愔長寧公主東莊詩公門襲漢環主第稱秦玉主嫁𢎞農楊愼交用先世太尉公事今本環為瓌誤張九齡和御製送張説赴朔方詩為奏薰琴倡仍題瑤劒名薫倡故為帝言然考是時實炎月題劒用漢肅宗賜尚書韓稜等寳劒事時説正官尚書其精切如此王維櫻桃詩中使頻傾赤玉盤用拾遺録漢明帝宴羣臣大官進櫻桃以赤瑛為盤事老將行耻令越甲鳴吾君本説苑齊雍門狄語説苑云越甲至齊雍門狄請死之曰昔者王田於囿左轂鳴車左請死之曰吾見其鳴吾君也今越甲至其鳴君豈左轂之下哉維自用成語也有改為鳴吾軍者妄送楊長史赴果州詩官橋祭酒客山木女郎祠蜀道艱險行必有禱祈女郎其叢祠之神客即禱神之行客也合兩句讀之深無限逺宦跋涉之感有辨女郎為何許人者都是説夢元人注女郎為女仙謝自然曹能始以自然貞元間人不合謂是張魯女更以祭酒字信客為魯如此解詩詩何可通輞川詩來者復為誰空悲昔人有輞川舊為宋之問别業摩詰後得之為莊昔人似指之問非為昔人悲悲後人誰居此耳總達者之言孟浩然陪張始興泛江洗幘豈獨古濯纓良在兹幘壊水洗傅墨雖良刺史事後漢揚州刺史巴祇然用以喚濯纓作對亦大費紐合矣孟不善用實乃爾李頎題璿公山池云逺公遯跡廬山岑開山幽居祇樹林弇州公以開山聲調不協欲改為開士此元人郝天挺唐詩鼓吹注中説也吾謂逺公即指璿公開山即就上廬山衍下做到山池上意義實然雖不叶不可改也不然一人耳既擬之逺公矣復泛稱為開士可乎李白贈潘侍御論錢少陽雖無二十五老者且有一翁錢少陽用介子推事説苑介子推年十五相荆仲尼使人往視廊下有二十五俊士堂上有二十五老人越女詞東陽素足女㑹稽素舸郎相看月未墮白地斷肝腸月墮狎語比語也出謝監逸詩謝東陽溪中贈詩明月在雲間迢迢不可得答云但問情若何月就雲中墮梁甫吟手接飛猱搏彫虎側足焦原未言苦出張衡思𤣥賦賦又出尸子賦云執彫虎而試象兮阽焦原而跟止尸子云中黄伯曰余左執太行之獶而右搏彫虎唯象之未與試焉又曰莒國有石焦原者廣五十步臨百仞之谿莒國莫敢近有以勇見莒子者獨却行齊踵焉草大還篇髣髴明牕塵死灰同至寂𢷬冶入赤色十二周律歴赫然稱大還與道本無隔竝用參同契語參同契云嵗月將欲終毁性傷夀年形體為灰土狀若明牕塵𢷬冶并合之馳入赤色門又云周旋十二節節盡更須親色轉更為紫赫然成還丹白有邯鄲才人嫁為厮養卒婦詩此謝眺舊題也盖設為其事寓臣妾淪擲之感耳楊用修以為此卒即御趙王武臣歸者果此卒也才人亦不枉矣何詩為正陽辨之未及此總固哉説詩者太白秦女巻衣即梁吳均秦王巻衣題也其事莫詳吾謂此非嬴秦或苻秦耳晉載記秦苻堅滅燕得慕容冲有龍陽姿愛幸之與其姊清河公主竝寵宫人莫進長安引一雌復一雄雙飛入紫宫歌之均本辭秦帝捲衣裳持此贈龍陽白所擬亦云顧無紫宫寵敢拂黄金牀似皆謂此若嬴秦安得有男寵事白亦不應作天子居未央語矣記之俟通識者後羅隠秦望山詩有覇主巻衣纔二世晚末人傳誤不足慿白丁都護歌所詠雲陽水道舟行艱礙之苦盖為齊澣所開新河作也按潤州舊不通江澣開元中為刺史始移漕路京口塘下直達於江立埭收課江北𤓰步亦開新河但𤓰步岸庳入江為易白嘗有詩美之京口岸髙水淺濁用牛曵舟為難故白有此歌以言其苦其名丁都䕶歌者初宋髙祖即京口開東府有女其夫見殺呼督䕶丁旿問收殯事毎問輒嘆息呼之人因寫為歌白感其土俗之事即用其土之古歌名以為歌也舊注全不知此特備拈出本歌稱督護白改云都護者宋書樂志亦稱旿為直都䕶可通用耳太白蜀道難一詩新史謂嚴武鎮蜀放恣白危房琯杜甫而作盖採自范攄友議沈存中洪駒父駁其説謂為章仇兼瓊作蕭士贇注又謂諷幸蜀之非説不一按白此詩見賞賀監在天寳入都之初乃𤣥宗幸蜀嚴武出鎭之前嵗月不合而兼瓊在蜀著功吐蕃亦無據險跋扈之跡可當此詩皆傅㑹不足據蜀道難自是古曲梁陳作者止言其險而不及其他白則兼採張載劒閣銘一人荷㦸萬夫趦趄形勝之地匪親弗居等語用之為恃險割據與羈留佐逆者著戒惟其海説事理故苞括大而有合樂府諷世立教本㫖若苐取一時一人事實之反失之細而不足味矣諸解者惡足語此太白古風六十首第一首自咏詩業志在删述第二首蟾蜍薄太清即咏𤣥宗寵武妃廢王皇后事殊覺不倫及讀結語沈嘆終永夕感我涕沾衣始知白自有深指在彼盖謂當世相如是我賦長門悟主我事耳作是觀吟脉纔有倫次又按古風六十篇中言僊者十有二其九自言遊僊其三則譏人主求僊不應通蔽互殊乃爾白之自謂可僊亦借以抒其曠思豈眞謂世有神僊哉他詩云此人古之僊羽化竟何在意自可見是則雖言遊僊未嘗不與譏求僊者合也時𤣥宗方用兵吐蕃南詔而受籙投龍崇尚𤣥學不廢大類秦皇漢武之為故白之譏求僊者亦多借秦漢為喻白他詩又云窮兵黷武今如此鼎湖飛龍安可乗其本指也歟山人勸酒琴曲咏四皓出佐太子事末云浩歌望嵩嶽意氣遙相傾嵩嶽非商顔地用此者明皇時盧鴻一王希夷諸人皆隠居嵩山時蒙徵召顧問太子瑛之廢諸人竝無一言救止如四皓致不滿意耳古豫章行咏白楊生豫章山秋至為人所伐太白亦有此辭中間止着白楊秋月苦早落豫章山兩句首尾俱作軍旅喪敗語竝不及白楊片字讀者多為之茫然今詳味之如所云呉兵照海雪及老母與子别呼天野草間樓船若鯨飛波蕩落星灣皆永王璘兵敗事也盖白在廬山受璘辟及璘舟師鄱湖潰散白坐繋尋陽獄竝豫章地故以白楊之生落於豫章者自况用志璘之傷敗及已身名隳壞之痛耳其借題畧㸃白楊正用筆之妙巧於擬古得樂府深意者蕭楊二家注何曽道着一字來唐音癸籖巻二十一
