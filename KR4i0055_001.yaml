body:
  text: 唐音癸籖巻一明胡震亨撰體凡詩自風雅頌以降一變有離騷再變為西漢五言詩三變有歌行雜體四變為唐之律詩詩至唐體大備矣今考唐人集錄所標體名凡傚漢魏以下詩聲律未叶者名往體其所變詩體則聲律之叶者不論長句絶句槪名為律詩為近體而七言古詩于往體外另為一目又或名歌行舉其大凡不過此三者為之區分而巳至宋元編錄唐人總集始于古律二體中備析五七等言為次于是流委秩然可得具論一曰四言古詩有古章句及韋孟長篇二體唐作者不多一曰五言古詩唐初體沿六朝陳子昂始盡革之復漢魏舊一曰七言古詩一曰長短句全篇七字始魏文間雜長句始鮑明逺唐人承之體變尤為不一當與後歌行諸類互參一曰五言律詩唐人因梁陳五言四韻之偶對者而變一曰五言排律因梁陳五言長篇而變一曰七言律詩又因梁陳七言四韻而變者也唐一代詩之盛尤以此諸律體云一曰七言排律唐作者亦不多聊備一體一曰五言絶句一曰七言絶句絶句卽六朝人所名斷句也五言絶始漢人小詩而盛于齊梁七言絶起自齊梁間至唐初四傑後始成調又唐人多以絶句為樂曲詳後樂通内外古體有三字詩李賀鄴城童子謠六字詩牧䕶歌三五七言詩始鄭世翼李白繼作一字至七字詩張南史及元白等集有之以題為韻偶對成聯又鮑防嚴維多至九字騷體雜言詩此種本當入騷如李之鳴臯歌杜之桃竹杖引相沿入詩例難芟漏律體有五言小律七言小律嚴滄浪以唐人六句詩合律者稱三韻律詩昭代王弇州始名之為小律云又六言律詩劉長卿集有之及六言絶句王維集有而諸詩内又有詩與樂府之别樂府内又有往題新題之别往題者漢魏以下陳隋以上樂府古題唐人所擬作也諸家槩有而李白所擬為多皆仍樂府舊名李賀擬古樂府多别為之名而變其舊新題者古樂府所無唐人新製為樂府題者也始于杜甫盛于元白張籍王建諸家元微之嘗有云後人沿襲古題唱和重複不如寓意古題刺美見事為得詩人諷興之義者此也詳後樂通内其題或名歌亦或名行或兼名歌行歌曲之總名衍其事而歌之曰行歌最古行與歌行皆始漢唐人因之又有曰引者曰曲者曰謠者曰辭者曰篇者抽其意為引導其情為曲合乎俗曰謠進乎文為辭又衍而盛焉為篇皆以其詞為名者也有曰咏者曰吟者曰嘆者曰唱者曰弄者咏以永其言吟以呻其欝嘆以抒其傷唱則吐于喉吻弄則被諸絲管此皆以其聲為名者也復有曰思者曰怨者曰悲若哀者曰樂者如李白之靜夜思王翰之蛾睂怨杜甫之悲陳陶哀江頭哀王孫樂則如杜審言之大酺樂白居易之太平樂張祜之千秋樂又皆以情為其名者也凡此多屬之樂府然非必盡譜之于樂譜之樂者自有大樂郊廟之樂章梨園敎坊所歌之絶句所變之長短塡詞以及琴操琵琶箏笛胡笳拍彈等曲其體不一而民間之歌謠又不在其數竝詳樂通唐詩體名庶盡乎此矣自古詩漸作偶對音節亦漸叶而諧宮體而降其風彌盛徐庾陰何以及張正見江總持之流或數聯獨調或全篇通穩雖未有律之名已寖具律之體四子承之尚餘抝澁神龍而後音對俱諧諸家槩有合作沈宋尤為擅塲就中五字之諧差先故珠英前彦蚤逗流美之徑七字之諧差晚故開元右丞猶存失粘之疵若乃律旣踵古以成律則古自應追古以存古故沈宋未作于孝和之日射洪巳興于天后之朝是尤氣機有先情籟自啓匪人惟天一變自不得不盡變者也律體雖成於唐實權輿沈約聲病之說今錄之備考四聲音韻之學至齊梁寖備沈約撰切韻之書名四聲譜後隋仁夀中陸法言等嘗加纂次唐儀鳯後郭知𤣥又附益之號切韻天寶末陳州司法孫愐復加刋正名為唐韻皆宗約之舊宋景德以及元祐先後重修名禮部韻畧今承用者是也宋濓云唐以詩賦設科益嚴聲律之禁有宋因之以禮部之掌貢舉名韻書曰禮部韻畧毫髪弗敢違背雖中經二三大儒且謂承襲之久不欲變更焉雙聲疊韻宋謝莊傳王𤣥謨問莊何者為雙聲何者為疊韻答曰互䕶為雙聲磝碻為疊韻學林新編云古人以四聲為切紐以雙聲疊韻必以五音為定喉㗁舌齒唇配宮商角徴羽為五音人聲之出有漸聲始出於喉直上出為宮再出到㗁聲上騰為商又再出到舌中聲平出為角又再出到齒聲斜降出為徵又降出到唇為羽雙聲者同音而不同韻者也疊韻者同音而又同韻者也互䕶同唇音而二字不同韻故謂之雙聲磝碻同為牙音而二字又同韻故謂之疊韻廣韻曰章灼良畧是雙聲灼畧章良是疊韻又曰斤剔靈歷是雙聲剔歷斤靈是疊韻舉此例則諸音皆自此而紐之可以定矣八病一曰平頭二曰上尾三曰蜂腰四曰鶴膝五曰大韻六曰小韻七曰旁紐八曰正紐平頭謂第一字與第六字同聲第二字與第七字同聲第上尾謂第五字與第十字同聲之蜂腰謂第二字與四字同聲犯在一句内如蜂身中細之鶴膝謂第五字與第十五字同聲兩對同犯如鶴膝竝大大韻謂與韻相犯也如五言詩以新字為韻者九字内更着津字人字等為犯大韻如小韻除韻外但九字中有相犯同聲者是旁紐謂十字中巳有田字不得着寅延字有正紐如壬衽任入四字為一紐一句之中巳壬字更不得安衽任字南史畧云初汝南周顒善識聲韻永明中呉興沈約陳郡謝朓瑯琊王融以氣類相推轂為文皆用宮商不可增减顒著四聲切韻約撰四聲譜又以雙聲疊韻分辨作詩八病于謝靈運傳著論云夫五色相宣八音恊暢由乎𤣥黄律呂各適物宜欲使宮羽相變低昻舛節若前有浮聲則後須切響一簡之内音韻盡殊兩句之中輕重悉異自靈均以來多歷年代雖文體稍精此祕未覩妙逹斯旨始可言文按史稱約論四聲妙有詮辨乃當時陸厥嘗作書辨之以為情物文之所急美惡猶且相半何獨宮商律呂必責其如一鍾嶸亦謂文製本須諷讀不可蹇礙但令淸濁流通口吻調利斯為足矣務為精宻襞積細微使文多拘忌傷其眞美而約自有言云八病惟上尾鶴膝最忌餘病皆通所賦亦往往與聲韻乖是則此論不可盡拘明矣然有唐近律自從聲病回忌肇體應復具遡其說以善用夫變通王弇州云休文之拘滯正與古體相反惟近律有關耳然亦不免商君之酷誠哉是言唐音癸籖巻一
