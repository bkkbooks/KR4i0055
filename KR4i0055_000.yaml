body:
  text: 唐音癸籖詩文評類提要臣等謹案唐音癸籖三十三卷明胡震亨撰震亨字孝轅海鹽人萬厯丁丑舉人官定州知州擢兵部員外郎所撰唐音統籖凡十集此其第十集也九集皆録唐詩此集則録唐詩話舊無刋板至國朝康熙戊戌江寧書肆乃得鈔本刻行為目有七一曰體凡一卷論詩體二曰法微凡三卷分二十四子目自格律以及字句聲調無不備論三曰評彚凡七卷集諸家之評論四曰樂通凡四卷論樂府五曰詁箋凡九卷訓釋名物典故六曰談叢凡五卷採擷逸事七曰集録凡三卷首録唐集卷數次唐選各總集次金石墨迹震亨搜括唐詩用力最劇九籖之中惟戊籖有刻而所録不出御定全唐詩之外亦不甚行獨詩話採擷大備為全唐詩所未收雖多録明人議論未可盡為定評而三百年之源流正變犂然可按實于談藝有禆特録存之庶不沒其搜輯之勤焉乾隆四十三年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:6e2ac409fa30217464b1514ba6cafef365528b152010e55bac48c65b16fdb36e
