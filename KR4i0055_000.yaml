body:
  text: 唐音癸籖詩文評類提要臣等謹案唐音癸籖三十三巻明胡震亨撰震亨字孝轅海鹽人萬厯丁丑舉人官定州知州擢兵部員外郎所撰唐音統籖凡十集此其第十集也九集皆録唐詩此集則録唐詩話舊無刋板至國朝康熙戊戌江寧書肆乃得鈔本刻行為目有七一曰體凡一巻論詩體二曰法微凡三巻分二十四子目自格律以及字句聲調無不備論三曰評彚凡七巻集諸家之評論四曰樂通凡四巻論樂府五曰詁箋凡九巻訓釋名物典故六曰談叢凡五巻採擷逸事七曰集録凡三巻首録唐集巻數次唐選各總集次金石墨蹟震亨蒐括唐詩用力最劇九籖之中惟戊籖有刻而所録不出御定全唐詩之外亦不甚行獨詩話採擷大備為全唐詩所未収雖多録明人議論未可盡為定評而三百年之源流正變犂然可按實于談藝有禆特録存之庶不没其蒐輯之勤焉乾隆四十三年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:95b110f3c9539c6326ef8189948c8f2e7c30442d631c8d1f30c44d339cac8fbe
