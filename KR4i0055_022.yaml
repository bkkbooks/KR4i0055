body:
  text: 唐音癸籖卷二十二明胡震亨撰詁箋七杜子美龍門奉先寺天闕象緯逼雲卧衣裳冷宋人以闕為實字屬對不切欲改為閲又有欲改為窺者龍門號雙闕自有據此古詩何論對法乎介甫諸公枉費雌黃到此宴王使君宅留歡卜夜間或謂間為杜公家諱必闌字之誤如失韻何考宋卞氏本自作上夜關蓋投轄之意合上泛愛容霜鬢讀之殊穩帖北征天吳及紫鳯顚倒在短褐劉子威以天吳九鳯同出山海經欲改紫為九又引王中行説吳當作􅰠以字書無此字為疑中行字知復宋人以博學聞按詩不吳不敖之吳空胡切説文徐注云作音華者謬則世故有讀作華者矣王所云音􅰠當作華字或筆誤或古自有此别體耳詩第取聲律可諷吳字作空胡切讀欠響讀若華即響用紫鳯響用九鳯抑又欠響然則紫鳯自可無改而吳之讀為華王説亦儘自有會可無疑也掖垣竹埤梧十尋洞門對雪長隂隂黃山谷以下有青春深句不宜有雪當是畫壁上雪既牽強張伯成以西北地寒積隂處深春雪間未消又認做真雪説不去此雪字自為梧竹清隂下耳送李祕書赴蜀幕石出倒聽楓葉下櫓搖背指菊花開下句注者多不得其解今按十道記荆州有菊潭芳菊被涯所謂飲其水者多夀即此也李從荆州上峽故云背指又櫓搖用荆州故事令貼切非泛泛言時物也倒聽句既竒非此背指險絶語對之不稱十四字具許大神力豈容草草讀過竹橋天寒白鶴歸華表日落青龍見水中異苑太康二年冬大雪南州人見二白鶴語橋下曰今兹寒不減堯崩年也舊注作丁令威化鶴事誤橋可稱龍出楚辭麾蛟龍以梁津本竹橋故又用費長房葛陂竹化為龍事云龍見水中也出峽詩五雲髙太甲六月曠摶扶五雲太甲出王勃華蓋西臨藏五雲於太甲益州夫子廟堂碑語黃帝象五色雲作華蓋星之有華蓋以象華蓋名之其柱旁六星曰六甲文人筆藻尊名之為太甲凡雲西行不雨言西臨言藏者勃以華蓋當雲言雲之不雨喻夫子道之不行也杜用此蓋即借為蜀中故事若云回望西蜀五雲空髙况已之不得志於蜀而去耳下句是言此去南徙未有摶扶風力可借一言蜀一言出蜀後用事雖實而調故靈活此其所以為老杜歟按勃華蓋二語假成式以為張燕公嘗問僧一行不能解王伯厚雖有杠旁之解而不敢決太甲之即六甲皆緣從星象中生解不悟其雖言星實言雲也通讀勃碑下文雷兩句意義自明而杜所以引用之旨亦豁然矣劉貢父詩話以杜詩功曹非復漢蕭何為誤用王定國引髙祖紀孟康注蕭何為主吏主吏功曹也葉石林甚韙之然詩如此亦僻矣杜修可曰吳志虞翻為孫策功曹策曰孤有征討事卿復以功曹為吾蕭何守會稽耳時子美有京兆功曹之命故以之自况杜位宅守嵗詩稱位為阿戎按阮籍與王戎父渾為友嘗謂渾曰共卿語不如與阿戎談後人以位為甫從弟不應用父子事妄改阿戎為阿咸此必宋初人所改東坡與子由詩便有欲喚阿咸來守嵗之句矣正不知呼人為阿戎必父前可呼想其時位恰有父在故云此自可意而得何以疑而改為杜公蜀中答裴迪逄早梅見憶詩東閣觀梅動詩興還如何遜在揚州梁書建安王偉刺揚州遜為水曹行參軍兼記室遜集有揚州法曹梅花盛開詩時迪在蜀依王侍郎杜有詩與迪云風物悲遊子登臨憶侍郎自注王侍郎時為蜀牧東閣云者擬王也裴依王何依建安而何恰有梅詩故用相比今人咏梅輒曰何水部豈知老杜初拈出時切確不可移易如此昜州非今昜州廣陵志因偽蘇注收為彼地故實襲誤久矣古揚州治建業其治廣陵者南兖州也附識子美贈重表姪王評事詩言已之曽老姑嫁為王之髙祖尚書婦與房杜交識秦王潛龍時反覆數百言甚備尚書疑指王圭然史自言圭母李房杜微時知其必貴耳非杜亦非妻也更圭初為太子僚與秦王水火長流後召用廷臣猶加以仇讎之目元非太宗素交此必另一人雖顯貴史失傳耳古今從龍勳舊為史傳所漏者多矣何獨此飲中八仙內蘇晉無一事可考舊注云蘇珦子又云許公之子許公止一子名善珦子即同名彼讜直有時譽不聞嗜酒且前卒總非也當從闕疑焦遂止袁郊甘澤謠載其與陶峴諸人為山水遊一事餘無見舊注偽造醉吃一則云出唐史拾遺近天中記亦誤收入酒部不可不辨賀沈東美除膳部郎詩內稱沈為通家又有禮同諸父等語舊注以東美為沈既濟之子杜氏與既濟家無舊契此必雲卿之與甫祖必簡同官修文者可當耳久懷此説未敢決後讀太平廣記東美家有狐怪事一則注云太子詹事佺期之子益為豁然廣記四首四十八卷寄劉使君伯華敘其先世當是劉憲後人憲仕天后朝以推按來俊臣貶俊臣敗轉鳯閣舍人故云翠虛捎魍魎丹極上鵾鵬景龍中憲選直修文館學士時文館寵賚甚盛故又有雕章五色筆紫殿九華燈宴引春壺酒恩分夏簟冰等句劉辰翁既不悉其為憲即亦不憶有景龍文館記內事浪讀冰字為凝欲改酒字為滿對之殊太妄率天育驃騎歌伊昔太僕張景順考牧攻駒閲清峻遂令大奴字天育别養驥子憐神駿舊注以大奴為王毛仲非也景順官太僕少卿秦州監牧都副使毛仲即起自奴𨽻時以霍國公領內外間廄景順實為之屬嘗對玄宗云臣稟仲之令其語見張説監牧頌德碑中可考此大奴第牧馬監奴耳一辭故國十經秋每見秋瓜憶故丘今日南湖採薇蕨何人為覓鄭瓜州自注鄭祕監審劉辰翁以瓜州為金陵瓜步此非郡望可呼人乎况審繇之子鄭州人非升州人也審嘗仕為袁州刺史或又刺隴右之瓜州史失載耳然因瓜憶瓜州退宦亦太謔非詩之正答楊梓州悶到楊公池水頭坐逄楊子鎮東州却向清溪不相見回船應載阿戎遊楊子謂梓州也阿戎謂梓州之子公到梓州不得見楊聊與其子遊因寄楊此詩耳楊公池定是古迹以與梓州姓同取巧用之或疑楊公必梓州父既可笑或又欲改楊公池為房公池合讀之何味舊注皆夢説也麗人行楊花雪落覆白蘋青鳥飛去􅔷紅巾注者作春遊景色解大憒憒此詩紀楊氏諸姨與國忠同遊事非茍作也廣雅楊花入水化為萍爾雅翼蘋根生水底不若小浮萍無根漂浮國忠實張易之之子冒楊姓乃與虢國通不避雄狐之誚是無根之楊花落而覆有根之白蘋也又楊白花飄蕩落南家為北魏淫詞用之真切於比者青鳥西王毋使者飛去銜紅巾則幾於感帨矣詠時事不得不隱晦其詞然意義自明惜從來無與發覆者哀江頭一箭正墜雙飛翼諸家不得其解如黃山谷楊用修射雉等説皆可笑之極不知雙飛翼正指上苐一人之同輦者而言謂貴妃也本繇軍士逼縊而托之隨輦才人箭射而墮總不敢斥言其事而為之辭詩為君父咏應如是也讀下句即接明眸皓齒今何在云云其義自明何假多説乎唐制巡幸宫人扈從者騎而挾弓矢見武宗朝王才人傳想明皇時蚤已然蓋實有其事而借用之黃昏胡騎塵滿城欲往城南望城北有作忘城北又有作忘南北者訖無定本今按曲江在都城東南兩京新記云其地最髙四望寬敞靈武行在正在長安之北公自言往城南濳行曲江者欲望城北冀王師之至耳他詩都人回面向北啼日夜更望官軍至即此意若用忘字第作迷所之解有何意義且曲江已是城南矣欲更往城南何之乎哀王孫起語長安城頭頭白烏夜飛延秋門上呼延秋門帝西幸所出門也梁侯景克建業修朱雀等門人心不忘梁有童謠云白頭烏拂朱雀還與吳引用正寓復興之望烏得云呼者説文烏孝鳥也孔子白烏盱呼也取其助氣故以為烏呼劉孝威咏烏生八九子云氄毛不自暖張翼強相呼杜詩無一字無來歷如此鄜州省家逺愧梁江總還家尚黑頭舊注及劉辰翁評注皆云總梁臣後歷陳入隋放還江都杜以其仕三朝失節揭梁字愧之今考總放還時年已七十餘故其詩亦自有白首入轘轅之句何言黑頭此自就總初陷侯景時事自比耳按總傳初總年少仕梁有名景陷臺城避難﨑嶇還會稽郡山隂都陽里公遘祿山難已近五十歎已亂後還家不及總尚是黑頭時為可愧非以總為堪愧下梁字學春秋筆法也杜之去國以救房琯琯之貶雖以陳濤之敗實因諸王分鎮之策深中肅宗之忌為才者所搆而致集中詩為琯傷者不一傷琯正傷已也而尤莫詳於荆南述懷之三十韻中間盤石圭多剪為琯之建策原凶門轂少推又若為琯之自將咎最一篇警策所在其漢庭和異域晉史坼中台霸業尋常體宗臣忌諱災等語似又舉和親回紇事較分鎮抑揚論之若曰琯去位始有和親事國體損而宗臣以忌諱斥矣無非宛轉為琯出脫明已之救琯者未為不是生平出處一大關目莫備此篇無一字不深厚悱惻讀之如起少陵與之晤語向來諸家句句錯解埋沒至寶到今殊可太息代宗避吐蕃幸陜倉卒中百官少有至者杜咏其事有狼狽風塵裏羣臣安在哉之句公意中大有昔年靈武追駕之感言隨主患難者少以嘆已之嘗效忠未蒙報禮若僅為當日羣臣刺諷有何意味唐音癸籖卷二十二
