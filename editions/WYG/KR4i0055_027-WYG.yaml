body:
  text: 唐音癸籖巻二十七明胡震亨撰談叢三有唐吟業之盛導源有自文皇英姿間出表麗縟於先程𤣥宗材藝兼該通風婉於時格是用古體再變律調一新朝野景從謠習寖廣重以德宣諸主天藻並工賡歌時繼上好下甚風偃化移固宜于喁徧於羣倫爽籟襲於異代矣中間機紐更在孝和一朝于時文館旣集多材内庭又依奧主游讌以興其篇奬賞以激其價誰鬯律宗可遺功首雖猥狎見譏尤作興有屬者焉太宗作詩每使虞世南和世南死卽靈座焚之開元帝製春雪春臺望等詩舍人蔡孚稱美請示百僚編國史孚撰偃松篇帝亦令羣臣盡和之後德宗作詩每示韋綬嘗示以黃菊歌綬方疾遽和進勑令頤養勿復爾人主尚急知音如此文宗宸藻不知何如稗史稱其嘗以所製示鄭相覃覃奏乞留聖慮萬機意不悅覃出復示李相宗閔宗閔歎服不已一句一拜懷而出之上笑謂之曰勿令適來阿父子見始知此道受諛不受砭明知面謾總不著惱雖天子正與人同爾歴朝諸帝與羣下賡唱篇目正史不槩具今從實録㑹要類要文館集賢兩京等記遺事語林及冊府元龜玉海諸類書抄綴於後備考用見風之本自上云神堯翠華殿賦詩武德七年四月宴王公親屬内殿賦詩八年五月宴五品以上及外戚太宗中華殿賦詩貞觀二年十二月宴突利可汗及三品以上兩儀殿賦栢梁體五年破突厥宴突利可汗幸慶善宫賦詩六年閏八月宴三品以上宴又九月從臣積翠池賦詩十一年十月宴五品以上各賦一事帝得尚書定州賦詩十九年征遼班師至州賦幸靈州賦詩二十年八月時北荒悉平詩勒石又𤣥武門宴羣臣正日臨朝太原守歲經戰地幸陜還陜並有詩羣臣屬和高宗安樂川賦詩顯慶五年十二月校獵宴侍臣蕃客狩陸渾賦詩龍朔元年十月咸亨殿賦栢梁體儀鳯三年七月宴近臣諸親又七夕𤣥圃宴重九宴並有詩中宗景龍二年七夕兩儀殿九日登慈恩塔閏月九日登總持浮圖十月幸三㑹寺十一月十五日誕辰二十一日安樂公主出降十二月幸薦福寺立春宴二十一日幸臨渭亭三十日幸長安故城三年人日清暉閣登高晦日幸昆明池二月八日送沙門𤣥奘等歸荆州十一日幸太平公主南莊七月幸望春宫送節度張亶八月幸安樂公主西莊九日幸臨渭亭十一月安樂公主入新宅十五日誕辰長寧公主滿月十二月十二日幸溫泉宫十四日幸韋嗣立山莊十五日幸白鹿觀十八日幸秦始皇陵四年正月五日蓬萊宫宴吐蕃使人日重宴大明宫八日立春内殿賜綵花晦日幸滻水二月一日送金城公主三日幸司農王光輔莊二十一日宴桃花園三月一日清明幸梨園拔河戲三日祓禊渭濱十一日宴昭容院四月一日幸長寧公主莊六日幸興慶池觀競渡過竇希玠宅以上並賦詩命侍臣和或止命侍臣賦𤣥宗開元初麗正院賜學士宴十年送道士司馬承禎十三年登封禮畢洛城酺宴宴兩相禮官麗正學士送許景先等為各州刺史及送裴寛蕭嵩張嘉貞崔日知宇文融王晙張說諸重臣并採訪朝集等使十四年幸寧王宅十五年端午宴武成殿十二月登驪山石甕寺十七年左相張說右相宋璟太子少傅源乾曜上官宴東堂又同宴樂遊園又御春明樓臨右相園亭十八年八月五日千秋節御花蕚樓受賀二十三年張守珪獻捷飲至二十五年花蕚樓設宴天寶二載送太子賓客賀知章又送張暐還鄕四載幸朝元閣又花蕚樓宴毗伽可汗妻十載御朝元閣觀慶雲十四載宴羣臣勤政樓並賦詩肅宗餞李光弼鎮泗州賦詩乾元二年德宗宴麟德殿貞元四年三月中和節宴麟德殿十四年中和節賜宴曲江六年又十七年上巳賜宴曲江亭六年九日賜宴曲江亭四年十年十一年十三年十八年又九月十八日追賞重陽幸章敬寺餞張建封歸鎮並賦詩文宗幸龍首池賦喜雨詩開成元年夏日與五學士聯句三年上巳宴曲江賜裴度詩四年宣宗重陽宴羣臣詩太液亭餞宰臣崔鉉鎮淮南詩唐才人藝士行巻歌篇不知何緣多得傳徹禁掖如韓翃馮定戎昱錢起諸詩句之類人主往往能舉之豈一代崇尚在此嘗私采之外庭資乙覽故耶興起詩敎又不獨在情洽賡歌一節也唐人詩集多出人主下詔編進如王右丞盧允言諸人之在朝籍者無論吳興晝公闕釋子耳亦下勑徵其詩集置延閣更可異者駱賓王上官婉兒身旣見法仍詔撰其集傳後命大臣作序不冺其名重詩人如此詩道安得不昌徴畫公集牒云勑浙西觀察使牒湖州當州皎然禪師集牒得集賢殿御書院牒前件集庫無本交闕進奉牒使請速寫送院訖垂報者牒州寫送使者故牒貞元八年正月十日牒載宋刻畫公集後可證唐試士初重䇿兼重經後乃觭重詩賦中葉後人主至親為披閲翹足吟咏所撰歎惜移時或復微行諮訪名譽袖納行巻予階緣士益競趨名塲殫工韻律詩之日盛尤其一大關鍵唐時風習豪奢如上元山棚誕節舞馬賜酺縱觀萬衆同樂更民間愛重節序好修故事綵縷達於王公籹粔不廢俚賤文人紀賞年華槩入歌詠乂其待臣下法禁頗寛恩禮從厚凡曹司休假例得尋勝地讌樂謂之旬假每月有之遇逢諸節尤以晦日上巳重陽為重後改晦日立二月朔為中和節並稱三大節所游地推曲江最勝本秦之隑洲開元中疏鑿開成太和間更加淘治南有紫雲樓芙蓉苑西有杏園慈恩寺環池烟水明媚中有綵舟夾岸栁陰四合入夏則紅蕖彌望凡此三節百官游讌多是長安萬年兩縣有司供設或徑賜金錢給費選妓攜觴幄幕雲合綺羅雜沓車馬駢闐飄香墮翠盈滿於路朝士詞人有賦翼日卽畱傳京師當時倡酬之多詩篇之盛此亦其一助也唐詞人自禁林外節鎮幕府為盛如高適之依哥舒翰岑參之依高仙芝杜甫之依嚴武比比而是中葉後尤多蓋唐制新及第人例就辟外幕而布衣流落才士更多因緣幕府躡級進身要視其主之好文何如然後同調萃唱和廣摭言稱李固言在成都有李珪郭圓袁不約來擇諸詩人從公為一時蓮幕之盛惜其詩不傳惟裴度開淮西幕有韓愈李正封郾城闕商帥襄陽有周繇段成式韋蟾溫庭皓漢上題襟詩集崔璞領吳郡皮日休為從事有吳士陸龜蒙司馬都鄭璧魏朴顔闕隴西李縠南陽張賁共撰松陵集尚有存者闕故掌籖之遺秩其詩亦應敎之緒篇也歟唐朝士文㑹之盛有楊師道安德山池宴集預宴賦詩外有岑文本劉洎褚遂良許敬宗上官儀及師道兄續于志寧宴羣公於宅其時有岑文本杜正倫令狐德棻祖孝孫許敬宗封行高各賦一字高正臣晦日置酒林亭晦日重宴及上元夜效小庾體等詩晦日置酒有陳子昻王勔張錫解琬長孫正隠崔知賢高紹高球郎餘令王茂時周思鈞周彥暉周彥昭弓嗣初高嶠劉友賢徐皓陳嘉言韓仲宣高瑾二十人同用華字重宴思鈞彦暉嗣初嘉言仲宣嶠瑾七人同用池字上元夜知賢嘉言仲宣瑾同用春字並吟流之佳賞承平之勝事師道尚桂陽主官侍中主亦工為詩志寧天䇿學士後入相愛賓客好接引後進正臣官衛尉卿善書陳子昂為其晦日詩序稱為渤海宗英平陽貴戚其豪盛可知開元天寶間寧薛諸王駙馬豪貴家多好客時王維詩名為盛無不拂席迎之肅代而後勲績富貴稱郭令公元和以來裴令公尤為烜赫郭少子瞹尚代宗女昇平主賢明有才思尤喜詩人錢起李端十才子俱以能詩出入其門每宴集賦詩主坐視簾中詩之美者賞百縑端中宴詩成有荀令何郎之句衆稱絶妙或謂宿搆起請以已姓為韻試之復有金埓銅山之句瞹大喜出名馬金帛為贈裴居守洛都築園名堂綠野時出家樂與白居易劉禹錫李紳張籍崔羣諸詩人游讌聯句纒錦旣奢箋霞尤麗所云昔日蘭亭無豔質此時金谷有高人者至今可追想其盛他林泉社㑹文字雅飲雖詩篇同詫而人地非匹未足為豪羌可無綴唐至開元而海内稱盛盛而亂亂而復至元和又盛前有青蓮少陵後有昌黎香山皆為其時鳴盛者也咸通而後奢靡極釁孽兆世衰而詩亦因之氣萎語偷聲繁調急甚者忿目褊􅝉如㦸手交罵者有之王化習俗上下交喪而心聲隨焉豈獨士子罪哉王弇州云靈武囘天功推李郭椒香犯蹕禍始田崔是則然矣不知僖昭困蜀鳯時溫李許鄭輩得少陵太白一語否有治世音有亂世音有亡國音故曰聲音之道與政通也大力者為之故足挽囘頽運沈幾者知之亦堪高蹈逺引㫖哉言矣唐音癸籖巻二十七
