body:
  text: 唐音癸籤巻十八明胡震亨撰詁箋三麻紙唐中書制詔有四封拜勅書用簡以竹為之畫旨而施行者曰發日勅用黃麻紙承旨而行者曰勅牒用黄藤紙赦書皆用絹黄紙始貞觀間或曰取其不蠧也紙以麻為上藤次之用此為重輕之辨又將相除徙内出制不繇中書獨用白麻紙因謂之白麻杜詩黄麻似六經舉其槩而言石林燕語緋魚白樂天為中書舍人六品着緑其詩有白頭猶未著緋衫後與元微之同加朝散登五品始易緋贈元詩有青衫脫早差三品白髮生遲校二年其自江州司馬除忠州刺史借服色緋魚有詩魚綴白金隨歩躍鶻銜瑞草繞身飛後除尚書郎復有脫刺史緋詩云便留朱紱還鈴閣却著青袍侍玉除無奈嬌癡三歲女繞腰啼哭覓銀魚唐百官服色視階官之品宋視職事官此為異蔡寛夫蜜印權德輿哭劉尚書詩命賜龍泉重追榮蜜印陳蜜印者謂贈官刻蠟為印懸綬以賜也不知起何時始見晉山濤傳濤薨勑贈司徒蜜印紫綬侍中貂蟬新沓侯蜜印青朱綬唐人文筆中亦多用此劉禹錫為人謝追贈表云紫書忽降於九重蜜印加榮於後夜有改作密者誤遯叟衙今監司郡守初上事既受官吏參謁至晡時僚屬復伺於客次胥吏列立庭下通刺曰衙以聽進退之命禮不知起何時岑參為虢州上佐有衙郡守詩此也洪邁玉帳杜子美送嚴公入朝云空留玉帳術愁殺錦城人又送盧十四侍御云但促銀壺箭休添玉帳旂玉帳乃兵家厭勝方位其法出黄帝遁甲以月建前三位取之如正月建寅則已為玉帳於此置軍帳堅不可犯主將宜居雲谷襍記東選南選唐貞觀初以京師米貴令東人選者集洛州謂之東選髙宗時以嶺南五管黔中都督府得即任土人而官或非其才乃遣郎官御史為選補使謂之南選其後江南淮南福建因歲水旱亦時遣選補使就選廢置不恒老杜送魏司直詩選曹分五嶺使者歴三湘謂魏充南選也銓選何事可便宜越萬里外行乎杜戒魏雅節在周防又云嫌疑陸賈裝則一時掌南選使概可知矣遯叟下同進士科故實唐進士初止試策調露中始試帖經經通試雜文謂有韻律之文即詩賦也雜文又通試策凡三塲其後先試雜文次試論試策試帖經為四塲第一塲雜文放者始得試二三四塲其四塲帖經被落仍許詩贖謂之贖帖至於制舉試策元以羅非常之才乃問策外亦試詩賦其觭重如此唐試士重詩賦者以䇿論惟𠞰舊文帖經祗抄義條不若詩賦可以盡才又世俗偷薄上下交疑此則按其聲病可塞有司之責雖知為文華少實捨是益汗漫無所守耳説詳選舉志今代重經義亦此意也舉塲每歲開於二月每秋七月士子從府州覓解紛紛故其時有槐花黄舉子忙之諺府州解送最重京兆同華京兆解送上十人謂之等第多成名不則徃徃牒貢院請放落之由同華解首送者亦無不捷咸通中李建州頻為京兆參軍主試出月中桂詩張喬擅塲頻以許棠老於塲屋改薦棠為首棠因而登第國史補云外府不試而解謂之拔解京兆蓋試而升者其時雖有國子監郡縣學而人不為重𤣥宗嘗勑天下罷鄉貢悉繇國子監郡縣學舉送然竟不能改咸通中温飛卿任太學博士主秋試以邵謁詩為工榜於堂仍請之禮部謁竟不得第而死太學解送成事之難與外府無異舉子麻衣通刺稱鄉貢繇户部關禮部各投公巻亦投行巻於諸公卿間舊嘗投今復投者曰温巻禮部例得采名望收録凡造請權要謂之關節激揚聲價謂之徃還士成名多以此按麻衣色白故其時稱舉子為白衣公卿宋朝制同今代洪武初亦然後乃稍易玉色七修類稿云試塲在都省亦稱都堂及稱東堂試夜給燭三條韋承貽都堂紀事三條燭盡鐘初動九轉丹成鼎未開榜放於禮部南院張院東别牆陳標詩所云春官南院粉牆東者是也歲每三十人為率李山甫詩麻衣盡舉一雙手桂樹只生三十枝言得者之少而難如此東都舉永泰及太和初元亦一行據杜紫微東都登第詩三十三人走馬迴合兩都又當六十餘人矣蓋間舉之事詩家詠登第多用淡墨榜事指榜頭禮部貢院四字也或云文皇以飛帛書之或云象隂注陽受之狀或云值書史醉字體濃淡相間反致其妍後遂相沿衆說不一關試吏部試也進士放榜勑下後禮部始關吏部吏部試判兩節授春關謂之關試始屬吏部守選其讌集之名凡九以關試後曲江亭聞喜一宴為盛放榜後稱新及第進士關試後稱前進士唐進士今鄉貢之稱前進士乃今進士稱也摭言云進士及第後知聞或遇未及第時題名處則為添前字故唐人登第詩有名曾題處添前字送出城人乞舊衣之句乞衣亦見張籍詩當時下第舉子丐利市猥習可憫笑者先輩原以稱及第者觀諸家詩集中題有下第獻新先輩詩可見後乃以為應試舉子通稱又有必先之稱乾􅍧子載閻濟美與盧景莊同應舉閻稱盧云必先聲價振京洛雲溪友議劉禹錫納牛僧孺巻曰必先期至矣太平廣記鄭光業入試有一人突入舖欲其相容呼必先必先不置必先似云名第必居先與先輩同一推敬意韓儀與關試後新人詩有休把新銜惱必先句此必先又謂下第同人也家慶唐人與親别而復歸謂之拜家慶盧象詩云上堂家慶畢顧與親恩邇孟浩然詩云明朝拜家慶須著老萊衣韻語陽秋傳席今人家娶婦輿轎迎至大門則傳席以入弗令履地然唐人巳爾樂天春深娶婦家詩云青衣轉氊褥錦繡一條斜輟耕録下同煖屋今之入宅與遷居者鄰里醵金治具過主人飲謂之曰煖屋或曰煖房王建宫詞大儀前日煖房來則暖屋之禮其來尚矣勝常王廣津宫詞云新睡起來思舊夢見人忘却道勝常勝常猶今婦人言萬福也前輩尺牘有云尊候勝常者勝字當平聲讀老學菴筆記秩白公詩巳開第七秩飽食仍安眠又年開第七秩屈指幾多人年六十二所作其行開第八秩詩自注俗謂七十以上為開第八秩蓋以十年為一秩云秩字于古無考禮年九十日有秩豈所本歟芥隱筆記門子儲光羲貽太學張筠詩璧池忝門子門子嫡子之將代父當門者蓋公子也見選補亡詩引周禮鄭註鄭良孺􅐴兒髙崇文詩那箇􅐴兒射雁落鄙語呼人曰骸兒也北夢瑣言丫頭吳中呼女子之賤者為丫頭劉賓客寄贈小樊詩花面丫頭十三四春來綽約向人時輟耕録練師唐六典道士有三號曰法師曰威儀師曰律師其徳髙思精者謂之練師女道士亦同今諸家詩題止稱女道士為練師不知何故遯叟下同莫徭盧亭顧况酬漳州張使君詩薛鹿莫徭洞網魚盧亭洲地理志莫徭夷蜒名自云其先祖有功常免徭役故以為名薛鹿即殺鹿集韻躠與殺同音同義此省為薛也盧亭者居海島赤身無衣常下海捕魚能伏水中三四日不死相傳為盧循子孫亦名盧餘漳郡唐初所開固當以此入詠龍户馬人韓退之詩衙時龍户集上日馬人來龍户在儋耳珠崖其人目睛皆青碧善伏水蓋即所謂崑崙奴也馬人者馬文淵遺兵居對銅柱言語飲食與中華同號曰馬留事見俞益期牋恐即此宛委餘編白題史記功臣表頴隂侯斬胡白題將一人服䖍注白題胡名梁有白題國入貢裴子野引以證人服其博識白題出處止此欲求其所以名白題無說也杜秦州詩馬驕朱汗落胡舞白題斜借為題額之題屬對意指當時胡旋等舞入自秦西北桐衫珠㡌有似白額者而言正詩家使字巧法非真謂白題當如此解也讀者善㑹其意始得宋注紛紛曲證失之逺矣遯叟唐音癸籤巻十八
