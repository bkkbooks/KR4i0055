body:
  text: 唐音癸籖巻六明胡震亨撰評彚二李白脫屣軒冕釋羈韁鏁自放宇宙間飲酒非嗜其酣樂取其昏以自穢好神仙非慕其輕舉欲耗壯心遣餘年作詩非事其文律取其吟咏以自適范傳正太白耻作鄭衞語其言多似天仙之辭凡所著述每多諷興自風騷之後馳驅屈宋鞭撻楊馬千載獨步唯太白一人李陽冰白性倜儻善賦詩尤工古歌才調逸邁徃徃興㑹屬辭古人之善詩者亦不逮劉全白李白才逸氣高其論詩云興寄深微五言不如四言七言又其靡也况使束於聲調俳優哉又稱梁陳以來豔薄斯極沈休文又尚以聲律將復古道非我而誰故其集律詩殊少孟棨李白詩祖風騷宗漢魏下至徐庾楊王亦時用之善掉弄造出竒怪驚動心目忽然撇出妙入無聲其詩家之仙者乎格高於杜變化不及陳繹曾讀太白詩者要識眞太白處太白天才豪逸語多率然而成者學者於每篇中要識其安身立命處可也嚴滄浪杜子美上薄風騷下該沈宋言奪蘇李氣吞曹劉掩顏謝之孤高雜徐庾之流麗盡得古今之體勢兼人人之所獨專詩人已來未有如子美者元稹唐興詩人承陳隋風流浮靡相矜至宋之問沈佺期等研揣聲音浮切不差而號律詩競相襲沿逮開元間稍裁以雅正然恃華者質反好麗者壯違人得一槩皆自名所長至甫渾涵汪茫千彚萬狀兼古今而有之他人不足甫乃厭餘殘膏賸馥沾丐後人多矣甫又善陳時事律切精深至千言不少衰世稱詩史宋祁詩按孟棨本事云杜甫逢祿山之難流離隴蜀畢陳於詩推見至隱殆無遺事當時以為詩史知詩史之評原出唐人也杜子美大篇江河轉怪不測雖太白退之天才罕及至五言七言律微有拙處然時時得風雨鬼神之助不在可解若七言宏麗或更入於古野而不為俚亦惟作者自知雖大家數不能評也此筆絶於世久紛紛一花一葉飾姿弄鬢徒亂人意劉須溪杜詩正而能變變而能化化而不失本調不失本調而兼得衆調故絶不可及元瑞下同大槩杜有三難極盛難繼首創難工遘衰難挽漢魏至唐詩家能事都盡杜後起集其大成一也排律近體前人未備伐山導源為百世師二也開元旣徃大厯系興砥柱其間唐以復振三也盛唐一味秀麗雄渾杜則精粗鉅細巧拙新陳險易淺深濃淡肥瘦靡不畢具參其格調實與盛唐大别其能㑹萃前人在此濫觴後世亦在此且言理近經敘事兼史尤詩家絶覩其集不可不讀亦殊不易讀近體盛唐至矣充實輝光種種備美所少者曰大曰化耳故能事必老杜而後極杜公諸作眞所謂正中有變大而能化者今其體調之正規模之大人所共知惟變化二端勘覈未徹故自宋以來學杜者什九失之不知變主格化主境格易見境難窺變則標竒越險不主故常化則神動天隨從心所欲宋以後諸人競相師襲者皆其變也然化境殊不在此子美詩妙處在無意而意已至非廣之以國風雅頌深之以離騷九歌安能咀嚼其意味闖入其閫閾後生輩自求之則得之深矣彼喜穿鑿者棄其大旨取其發興於所遇林泉人物草朩魚蟲以為物物皆有所託如世間商度隱語者則子美之詩委地矣黄山谷賦胡元瑞云唐人興多而比少惟杜則比時時有之然杜所以勝諸家殊不在此後人穿鑿附㑹動發笑端杜少陵平生之詩千四百五篇以年譜考之四十獻賦之前傳者少矣詩信非老不工也李卓吾人多說杜子美䕫州詩好此不可曉夔州却說得鄭重煩絮不如他中前有一節詩好今人只見魯直說好便都說好如矮人看塲耳朱晦庵凡詩初年多骨格未成晚年則意態橫放故惟中歲工力並到神情俱茂興象諧合之際可嘉賞如老杜之入蜀篇篇合作語語當行初學所當法也夔峽以後過於奔放視其中年精華雄傑如出二手蓋或視之太易或求之太深或情隨事遷或力因年減雖大家不免世反以是為工者非余所敢知也元瑞下同元微之以杜之鋪陳終始排比故實大或千言小猶數百為非李所及白樂天亦云杜詩貫穿古今靦覼格律盡善盡美過於李二公蓋專以排律及五言大篇定李杜優劣不知杜句律之高自在才具兼該筆力變化亦不專在排比鋪陳貫穿靦覼也深於杜者要自得之元遺山有詩云排比鋪張特一途藩籬如此亦區區少陵自有連城璧爭柰微之識碔砆此論所自出也長篇最難晉魏以前詩無過十韻者葢嘗使人以意逆志初不以序事傾盡為工至老杜述懐北征諸篇窮極筆力如太史公紀傳此固古今絶唱然八哀八篇本非集中高作世多尊稱之不敢議此乃揣骨聽聲耳其病盖傷於多也其中累句須痛刋去方盡善然此語不可為不知者言之葉石林止按杜八哀源出顔延年五君詠顏篇四韻張說傚顔詠五君亦止五韻以促節寄哀思語不及長也試並閲利鈍自見鄭善夫有批點杜詩其指摘疵纇不遺餘力然實子美之知巳餘子議論雖多直觀塲之見耳嘗記其數則一云詩之妙處不必說到盡不必寫到眞而其欲說欲寫者自宛然可想雖可想而又不可道斯得風人之義杜公徃徃要到眞處盡處所以失之一云長篇沈著頓挫指事陳情有根節骨格此杜老獨擅之能唐人皆出其下然詩正不以此為貴但可以為難而已宋人學之徃往以文為詩雅道大壞由杜老啟之也一云杜陵只欲脫去唐人工麗之體而獨占高古蓋意在自成一家不肯隨塲作劇也然詩終以興致為宗而氣格反為病善夫之詩本出子美而其持論如此正子瞻所謂知其所長而又知其敝者也焦氏筆乘李杜二公正不當優劣太白有一二妙處子美不能道子美有一二妙處太白不能作子美不能為太白之飄逸太白不能為子美之沉鬱太白夢遊天姥吟逺離别等子美不能道子美北征等篇太白不能作少陵詩法如孫呉太白詩法如李廣李杜二人如金翅擘海香象渡河下視郊島輩直蟲吟草間耳嚴滄浪楊誠齋論李杜謂無待者神於詩有待而未嘗有待者聖於詩余謂比之於文太白則史記少陵則漢書也楊用修李杜光燄千古人人知之滄浪並極推尊而不能致辨元微之獨重子美宋人以為談柄近時楊用修為李左袒輕俊之士往往傅耳要其所得俱影響之間五言古選體及七言歌行太白以氣為主以自然為宗以俊逸高暢為貴子美以意為主以獨造為宗以竒拔沉雄為貴其歌行之妙咏之使人飄揚欲仙者太白也使人慷慨激烈歔欷欲絶者子美也選體太白多露語率語子美多穉語累語置之陶謝間便覺面目有異乃欲使之奪曹氏父子位耶五言律七言歌行子美神矣七言律聖矣五七言絶太白神矣七言歌行聖矣五言次之太白之七言律子美之七言絶皆變體間為之可耳不足多法也弇州下同十首以前少陵較難入百首以後靑蓮較易厭揚之則高華抑之則沉實有色有聲有氣有骨有味有態濃淡深淺竒正開闔各極其則吾不能不服膺少陵唐人才超一代者李也體兼一代者杜也李如星懸日揭照耀太虛杜若地負海涵包羅萬彚李惟超出一代故高華莫並色相難求杜惟兼總一代故利鈍雜陳巨細兼畜元瑞下同李杜二家其才本無優劣但工部體裁明宻有法可尋青蓮興㑹標舉非學可至又唐人特長近體青蓮缺焉故詩流習杜者衆也太白筆力變化極於歌行少陵筆力變化極於近體李變化在調與詞杜變化在意與格然歌行無常矱易於錯綜近體有定規難於伸縮調詞超逸驟如駭耳索之易窮意格精深始若無奇繹之難盡此其稍不同者也偏精獨詣名家也具範兼鎔大家也然又當視其才具短長格調高下規模宏隘閫域淺深有衆體皆工而不免為名家者右丞嘉州是也有律絶微减而不失為大家者少陵太白是也清新秀逸冲逺和平流麗精工莊嚴竒峭名家所擅大家之所兼浩瀚汪洋錯綜變幻渾雄豪宕閡廓沉深大家所長名家之所短元瑞唐音癸籖巻六
