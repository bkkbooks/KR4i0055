body:
  text: 唐音癸籖巻十三明胡震亨撰樂通二唐各朝樂太宗神功破陣樂初太宗為秦王破劉武周軍中相與作秦王破陣樂曲及即位宴㑹必奏之示不忘本因製舞圖左圓右方先偏後伍交錯屈伸以象魚麗鵞鸛用樂工百二十八人披銀甲執㦸而舞凡三變每變為四陣象擊刺徃來歌者和曰秦王破陣樂後令魏徴褚亮虞世南李百藥等更製歌辭名七徳舞永徽中更名為神功破陣樂功成慶善樂太宗生武功慶善宴宫貞觀六年幸之從臣賞賜閭里帝歡甚賦詩命吕才按律被之管絃名曰功成慶善樂以童兒二十四人冠進徳冠紫袴褶長褏漆髻屣履而舞名九功之舞進蹈安徐以象文徳洽而天下安樂也初太宗時凡至正享讌及國有大慶二舞偕奏于庭髙宗時用之郊廟代治康凱安尋以神功破陣樂不入雅樂功成慶善樂不可降神復用治康凱安舊舞而二舞罷髙宗上元舞其樂有上元二儀三才四時五行六律七政八風九宫十洲得一慶雲等十四曲皆帝自製舞用百八十人衣畫雲五色衣以象元氣大祠享皆用之後詔惟郊廟用餘皆罷一戎大定樂帝將伐髙麗燕洛陽城門觀屯營教舞按親征用武之勢名曰一戎大定樂舞者百四十人被五采甲持槊而舞歌者和之曰八紘同軌樂象髙麗平而天下大定也六合還淳舞調露二年幸洛陽城南樓宴羣臣太常嘗奏此舞其容制不傳景雲河清讌樂初貞觀中景雲見河水清張丈收采古誼為景雲河清歌髙宗即位製樂上之其樂二十五色每工一人歌二人舞者二十人分四部一景雲舞八人二慶善舞四人三破陣舞四人四承天舞四人名曰讌樂元㑹第一奏之杜佑云近惟景雲舞存餘亡唐按唐讌樂有二十部伎之讌樂隋舊樂也此讌樂則之新樂後列坐部伎中玉海疑以為一誤武后聖壽樂舞用百四十人製聖超千古道泰百王皇帝萬年寶祚彌昌十六字舞之行列每變成一字凡十六變而畢天授樂天授年造舞四人神宫大樂長壽二年正月享萬象神宫后自製此樂舞用九百人長壽樂亦長壽年造舞十二人鳥歌萬歲樂時宫中養鳥能人言又常稱萬歲因為樂象之舞三人畫冠為鳥像聖主回鑾舞大足元年天后幸京師同州刺史蘇瓌進命編之樂府中宗桑條歌樂永徽後人唱桑條韋也之歌神龍中佞者以為韋后之應作桑條歌樂辭十餘首以進皆被之樂府𤣥宗龍池樂帝為平王時賜第隆慶坊之南坊人所居忽變為池望氣者異焉後正位以坊為宫池水逾大瀰漫數里名其池曰龍池命羣臣為龍池樂十章歌其祥以祀龍神舞用七十二人小破陣樂生於太宗之破陣樂舞四人金甲胄文成樂帝作此與小破陣樂更奏光聖樂舞八十人鳥冠五綵畫衣兼似上元聖夀之容以歌王業所興又分前代及本朝樂為二部立部伎八安樂太平樂破陣樂慶善樂大定樂上元樂聖壽樂光聖樂坐部伎六讌樂長壽樂天授樂鳥歌萬歲樂龍池樂小破陣樂安樂舞亦名城舞用八十人作羌胡狀行列方正象城郭太平樂亦名五方師子舞依方色為師子習弄用百四十人作崑崙象舞太平樂曲並周隋遺音也餘樂唐本朝及帝所自製詳前立部伎堂下立奏坐部伎堂上坐奏太常閱樂坐部伎無性識者退入立部伎立部伎無性識者退入雅樂部代宗寶應長寧樂帝繇廣平王復二京梨園供奉官劉日進作以獻十八曲宫調廣平太一樂大厯元年司馬滔作以進徳宗定難樂河東節度馬燧作以獻本紀貞元三年上御文徳殿試定難樂曲其後方鎮多製樂以獻者繼天誕聖樂天長節昭義節度王䖍休獻其曲以宫為調表五音之奉君以土為德知五運之居中也凡二十五遍法二十四氣而足成一嵗每遍一十六拍象八元八凱之登庸於朝中和樂帝改二月一日為中和節貞元十四年是節製中和樂舞舞中成八卦其樂辭帝御撰㑹要云因繼天誕聖樂而作奉聖樂初韋臯節度劍南南詔異牟尋請獻夷中歌曲臯因之作南詔奉聖樂以獻用正律黄鍾之均宫徴一變角羽終變舞六成序曲二十八疊舞南字歌聖主無為化舞詔字歌南詔朝天樂舞奉字歌海宇修文化舞聖字歌雨露覃無外舞樂字歌闢土丁零塞皆一章三疊而成字舞畢又舞闢四門之舞遽舞入徧兩疊舞終又舞億萬壽之舞歌天南滇越俗四章歌舞七疊六成而終順聖樂山南節度使于頔獻其樂令女妓為佾舞聲態雄俊又號孫武順聖樂頔因韋臯獻奉聖樂作此進韋樂中有丈夫一人獨舞頔樂曲將半行綴皆伏亦一人舞于中時幕客韋綬觀之笑曰何用窮兵獨舞雖詼諧亦有為也按唐樂惟十二和二舞為雅樂自太宗以功德之盛復造破陣慶善二樂舞於是後世相循競製樂以侈觀聽舞佾制度各以意為増减不合古經而臣下亦復撰樂獻媚女倡夷舞同俳優戲劇之觀則已漸流為散樂而逺雅益甚矣諸樂曲疊非一馬氏端臨用髙氏緯畧之說誤以一樂為一曲總計為五十有五曲當時韋萬石請奏上元等舞有二十九雅者有五十二雅者有五十雅者而韋臯奉聖一樂曲之多尤備載正史固未可數計也今第總述樂名稍為之疏釋存大凡云唐曲三臺急三臺古今解三臺者不一馮鑑續事始曰漢蔡邕三日之間周歴三臺樂府以邕曉音律為製此曲劉禹錫嘉話録鄴中有曹公銅雀金虎冰井三臺北齊髙洋毁之更築金風聖應崇光三臺宫人拍手呼上臺送酒因名其曲為三臺李氏資暇録曰三臺三十拍促曲名昔鄴中有三臺石季龍常為宴逰之所而造此曲以促飲今按諸說李氏說似可據樂苑云唐三臺羽調曲調笑詞轉應詞宫中調笑詞三曲與三臺同一調有此異名白樂天云調笑令乃抛打曲也有詩云打嫌調笑易飲訝巻波遲宫中三臺江南三臺上皇三臺怨陵三臺突厥三臺大曲廣陵散本嵇叔夜琴操名後人以為曲采桑晉清商西曲羽調唐有大曲楊下采桑出于采桑烏夜啼杜佑云本宋臨川王義慶所作今所傳歌似非義慶本旨敎坊謝大善歌此眀皇嘗親御箜篌和之舞媚娘大舞媚娘舞亦作武並羽調曲永徽後民間多歌此曲史以為天后之讖今按隋李綱傳有諫止太子勇奏舞媚娘曲事梁庾信陳後主並有舞媚娘辭則曲名本不作武字意後來讖家為妖瞾獻諛改作武媚娘耳長相思古曲梁張率始以長相思三字為句發端陳後主及徐陵江總輩襲其調益工之唐李白諸家多有作采蓮子梁清商曲江南弄有采蓮曲唐曲本此曲和聲曰舉棹年少茱萸女梁簡文咏采茱茰女為人所挑大抵與陌上桑同唐萬楚有其曲玉樹後庭花陳後主作唐有大曲後庭花小曲阿嚲迴本北魏阿那瓌曲阿那瓌者蠕蠕國主名用為曲後訛為阿嚲迴唐沿之為名那乃可切嚲典可切瓌即瑰姑囘切以音相近故訛顔真卿詩莫唱阿嚲迴應云夜半樂是也楊用修以為即笛曲之阿濫堆此自明皇時曲失之逺矣蘭陵王北齊蘭陵王長恭以假面威敵後人因以入歌唐有此曲名伴侣北齊後主作音韻窈窕極於哀思唐有大曲太平樂即五方師子樂曲周隋間遺音聖明樂大聖明樂初隋開皇中髙昌獻此樂曲文帝令知音者竊聽番使至先奏之大驚後唐開元中太常樂工馬順兕復造此並商調曲也行天貞觀中侯尚書妾方等善唱之後有郝三寶者亦能歌此自謂不及考隋樂志太廟送神五言象行天知為舊曲矣七夕子隋煬帝有七夕相逢樂唐曲七夕子疑本此安公子隋煬帝幸揚州樂工王令言聞其子彈新翻安公子曲流涕曰此曲宫聲徃不返宫為君爾不須扈從大駕必不回矣巳而果然唐有安公子大曲河傳水調歌新水調脞說水調河傳隋煬帝幸江都時所製曲成奏之聲韻怨切王令言聞而知其不返海録碎事云隋煬帝開汴河自造水調按水調及新水調並商調曲也唐曲凡十一疊前五疊為歌後六疊為入破其歌第五疊五言調聲最為怨切故白居易詩云五言一遍最慇懃調少情多似有因不㑹當時翻曲意此聲腸斷為何人明皇幸蜀有聽歌水調山川滿目淚沾衣之辭問知為李嶠作感歎事見本事詩泛龍舟隋煬帝作唐有泛龍舟大曲望江南海山記隋煬帝為西苑鑿池汎龍鳯舸製望江南八闋後唐李德裕用其句拍改為謝秋娘劉白亦有作詳後摩多樓子郭茂倩樂府載有古詞似北朝及隋時邊塞曲難定為何代唐李白有其詞亦見李賀集堂堂隋樂府有堂堂曲明唐再受命也調露初民間有側堂堂撓堂堂之謡側不正撓不安故武后戕宗室易唐為周而孝和復反正為唐樂苑曰唐堂堂曲角調也右前三十七曲並周隋以前之曲在唐猶盛行者史稱唐時清商舊曲存者止四十四曲今自烏夜啼采桑玉樹後庭花堂堂泛龍舟五曲在存目重複之内餘三十二曲則史所未載也豈古曲行用于唐尚多史或未盡收乎用首録之以存樂曲之舊太和樂府載有七言五疊郭茂倩以為羽調曲蓋即十二和中之太和以為行節者是也破陣樂破陣子唐人樂曲多名子後遂名曲子敎坊俗語然小秦王即小破陣樂也上元子大定樂奉聖樂十二時萬宇清月重輪以上樂曲出前雅樂及各朝樂中而十二時以下三曲亦含元殿熊羆部十二按所奏雅樂也故别著之合凡十曲云傾盃曲樂社樂曲英雄樂曲太宗内宴詔長孫無忌製傾盃曲魏徴製樂社樂曲虞世南製英雄樂曲並宫調黄驄疊曲太宗破竇建德乗馬名黄驄驃及征髙麗死于道頗哀惜之命樂工製黄驄疊曲四曲宫調黄驄疊曲後一名急曲子打毬樂魏徵製大酺樂商調曲張文收造火鳯真火鳯並羽調始貞觀初穆䕶子即穆䕶砂也犯角姚寛叢語云波斯國奉火祅神貞觀初有傳法穆䕶何録以其敎入長安作歌祀祅祠其賽神曲也崇文書目有李燕牧䕶詞傳燈録有蘇溪和尚穆䕶歌並六言又黄山谷云黔中聞賽神者夜歌五七十語初云聽說農家牧䕶末云奠酒燒錢歸去長短不同道調曲髙宗自以李氏為老子之後命樂工製祈僊曲望僊曲翹僊曲髙宗敬禮嵩山道士潘師正造此諸曲春鶯囀帝曉音律晨坐聞鶯聲命樂工白明逹寫為此曲夷來賓曲遼東平李勣作之以獻寶慶曲章懐太子作李嗣貞聞之謂人曰宫不召商君臣乖也角與徵戾父子疑也死聲多且哀若國家無事太子任其咎俄而太子廢越古長年曲則天延載元年作如意娘曲商調蓋闔辭也宋張君房以為如意年中后為淫毒男子作說近俚不取挈苾兒垂拱後京都唱此歌皆淫辭後張易之兄弟並内侍易之小字挈苾云突厥鹽龍朔來里歌有此後則天遣閻知微入突厥突厥挟之入冦為突厥鹽之應黄麞如意年巳來唱黄麞歌無幾曹仁師等與契丹戰覆師于硤石黄麞谷離别難武后朝有一士人陷寃獄籍其家妻配入掖庭善吹觱篥撰此曲以寄哀情初名大郎神蓋取良人第行也畏人知三易其名曰悲切子終號怨回鶻石州中宗景龍初知太史事迦葉志忠表稱受命之初天下先歌英王石州石州商調曲也桃花行景龍四年春宴桃花園羣臣畢從學士李嶠等各獻桃花詩上令宫女歌之辭既清婉歌仍妙絶獻詩者舞蹈稱萬歲上勑太常簡二十篇入樂府號曰桃花行回波詞商調曲蓋出於曲水引流泛觴後為舞曲中宗朝内宴羣臣多撰此詞獻佞及自要榮位最盛行然考朝野僉載楊廷玉一詞則天時巳先有之矣敎坊記又有大曲回波詞合生歌中宗宴内殿胡人襪子何懿等唱此歌或言妃主情貌或列王公名質詞至穢媟武平一諫宜禁止不納夜半樂曲還京樂曲𤣥宗初自潞州還京師舉兵夜半誅韋后製此二曲君臣相遇樂曲商調太常卿韋縚作千秋子千秋樂大曲元𤣥宗八月五日生開十七年是日賜宴花蕚樓下百僚表請以每年是日為千秋節王公以下獻鏡及承露囊天下請咸令讌樂著為令曲名以此舞馬傾盃曲𤣥宗嘗命敎舞馬四百蹄各為左右分部目衣以文繡絡以金珠每千秋節舞于勤政樓下賜讌設酺其曲謂之傾盃樂凡數十疊馬聞聲奮首鼓尾縱横應節又施三層板牀乗馬而上抃轉如飛或命壯士舉榻馬舞其上歲以為常踏歌繚踏歌並元夕歌名𤣥宗嘗命張說撰元夕御前踏歌詞蘇摩遮潑寒胡戲所歌亦張說撰進詳後舞曲下感皇恩南部新書天寶十三載始改金風調蘇莫遮為感皇恩于蔿𤣥宗在東洛大酺命三百里内守令率聲樂赴闕下較勝負魯山令元德秀遣樂工數十人聨袂歌于蒍其所自為曲也帝歎以為仁人之言得寶子得鞛子胡鞛子國史補云𤣥宗得太真謂宫人曰朕得貴妃如得至寶乃製曲子曰得寶子自是六宫無復進幸者樂府雜録云曲一名胡鞛子海録碎事云又名得鞛子鞛方孔反得至寶康老子樂府雜録云長安富家子名康老子落魄不事生計常與國樂游處家蕩盡偶得一舊錦褥波斯胡識是氷蠶所織酬之千萬還與國樂追歡不經年復盡尋卒樂人嗟惜之遂製此曲名得至寶亦名康老子也淂体歌得寶歌先是民間多唱淂体歌有潭裏船車閙揚州銅器多之句及陜州得寶符又歌𢎞農得寶後天寶初轉運使韋堅穿廣運潭通吳楚諸郡貨陜縣尉崔成甫乃翻之為歌其辭用淂体其曲名用得寶于船頭唱之𤣥宗臨觀大悅下詔褒賞淂傍从水丁紇反体从人从本都董反事見正史其按得寶子得鞛子胡鞛子得至寶康老子與得寶歌源似皆起於淂体歌正史可據國史補樂府雜録所解俚鄙姑存之備考荔枝香𤣥宗幸驪山楊貴妃生日命小部張樂長生殿因奏新曲未有名㑹南方進荔枝因名曰荔枝香清平調帝與貴妃幸興慶宫沉香亭㑹木芍藥初開棃園弟子奏樂上曰賞名花對妃子焉用舊曲宣李白進清平調三章令李龜年等約畧調撫絲竹上自吹玉笛倚曲清平調為三調中之清調平調古房中遺聲也宫中行樂詞亦命李白撰一斛珠初梅妃極承寵愛後為太真所奪遷上陽宫妃怨慕帝亦每念之一日有夷使貢珠命封一斛賜之妃不受獻詩上覽之悵然令樂府以新聲度其詩號一斛珠曲春光好明皇製互見羯鼓内金華洞真流芳菲㑹要天寶十三載改諸樂名有此諸曲立石刋太常寺王昭君五更轉萬歲長生飲酒鬬百草思歸樂商調亦犯角曲㑹要太常梨園别敎院法有此六曲赤白桃李花望瀛府獻仙音聽龍吟碧天鴈獻天花按明皇嘗製法曲四十餘以上六曲見陳氏樂書法曲本隋樂其音清而近雅煬帝厭其聲澹曲終復加解音明皇酷愛之選子弟敎之梨園當時稱梨園法曲也婆羅門商調曲開元中西凉府節度楊敬述進霓裳羽衣曲樂苑𤣥宗製霓裳羽衣曲十二遍凡曲終必遽唯霓裳羽衣曲將畢引聲益緩霓逸史帝與術士羅公逺逰月宫見仙女數百皆素練裳羽衣舞問其曲曰霓裳羽衣帝黙記其音而還故作是曲寫鄭嵎津陽門詩注帝月宫聞仙樂但記其半於笛中之㑹西凉進婆羅門曲與其聲調相符遂以月中所聞為之散序用敬述所進曲作為腔名霓裳羽衣曲云望月婆羅門拂霓裳二曲見敎坊記凉州宫調大曲有大遍小遍西凉府都督郭知運撰進初凉州進新曲明皇命諸王於便殿觀之曲終諸王皆稱萬歲獨寧王不賀明皇詢其故寧王曰夫曲者始于宫散于商成于角徵羽臣見此曲宫離而少微商亂而加暴宫者君也商者臣也宫不勝則君體卑商有餘則臣事僭臣恐異日臣下有悖亂之事陛下有播越之禍兆于斯曲矣其先見如此伊州商調大曲前五疊入破五疊開元中西凉節度蓋嘉運進甘州子甘州大曲羽調胡渭州商調曲唐有兩渭州一屬闗内一屬隴右此出隴右渭州為近邊地故以胡渭州别之開元中樂工李龜年鶴年兄弟尤妙製渭州入五行志云天寶樂曲多以邊地為名其曲遍繁聲名破安史亂西幸後其地盡為吐蕃所沒破乃其兆也五洪容齋曰今樂府所傳大曲皆出于唐而以州名者伊凉熙石渭也凉州今轉為梁州唐人巳多誤用州按唐地理志凉州屬隴右道盡古雍梁二之境用之非誤陸州曲有大遍小遍又有簇拍陸州朔按唐邊地無陸州嶺南雖有其州名與此不合惟寧境所置降胡州魯麗含塞依契時稱為六胡州陸字或六之誤也宋人警曲用六州大遍疑即此俟博識者審之𤣥真道曲大羅天曲紫清上聖道曲景雲曲九真曲紫極曲小長壽曲承天樂曲順天樂曲𤣥宗末年寖好神仙之事詔道士司馬承禎製𤣥真道曲茅山道士李㑹元製大羅天曲工部侍郎賀知章製紫清上聖道曲太清宫成太常韋縚又製景雲等六樂曲凌波曲太平廣記𤣥宗東都晝寢夢凌波池中龍女拜牀下帝為鼓胡琴拾新舊之聲為凌波曲龍女再拜而去及覺命禁樂習而翻之奏池上龍女復見因置廟歲祀之者按此似附㑹興慶祀龍池之事說未可據姑存備考謫仙怨𤣥宗幸蜀行次駱谷謂髙力士曰吾不用張九齡之言至此索長笛吹一曲澘然流涕後有司録成譜以進且請曲名上曰吾因思九齡可名此曲為謫仙怨其音怨切諸曲莫比人自西川傳得者無由知其本事但呼為劍南神曲雨霖鈴帝幸蜀入斜谷棧道屬霖雨彌旬聞鈴聲與山相應悼念貴妃因採其聲為雨霖鈴曲以寄恨時獨梨園善觱篥樂工張徽從至蜀都以其曲授之洎至德中復幸華清宫從官嬪御皆非昔人帝於望京樓令徽奏此曲不覺悽愴流涕後入法部有大曲渭城陽關本王維送人使安西詩後被于歌所云更與慇懃唱渭城與聽唱陽關第四聲是也想夫憐羽調曲白居易詩嘗愛夫憐第二句倩君重唱夕陽開王維秦川一半夕陽開是也又有簇拍想夫憐國史補云司空于頔以樂曲有想夫憐其名不雅將改之客曰南朝相府曾有瑞蓮故歌為相府蓮後人語譌耳樂府解題遂用其說按此亦客之曲逢頔指妄為之說耳假果名相府蓮豈不尤為不雅乎山鷓鴣韻語陽秋李白有聽此曲詩清風動牕竹越鳥起相呼蓋其曲效鷓鴣之聲為之九曲詞營州歌並髙適作歌塞上事九曲取黄河九曲為名漢李尤晉傅𤣥九曲歌七言二句者大指自歎年歲晚暮非適詞所本也河滿子河一作何白樂天云開元中滄州何滿犯罪繫獄撰此曲進四辭八疊其聲哀斷鞠獄者為奏明皇不許竟坐刑元㣲之何滿子歌云何滿能歌能宛轉天寶年中世稱罕嬰刑繫在囹圄間下調哀音歌憤懣梨園弟子奏𤣥宗一唱承恩羈網緩便將何滿為曲名御譜親題樂府纂與白說稍殊長命女羽調曲亦名長命西河女大厯中有樂工加减其節奏為新聲將軍韋青令家姬張紅紅暗記其拍紅紅後入宜春院宫中號記曲娘子聞青死慟絶漁父引𤣥真子張志和作欸乃曲欸音哀乃如字讀棹船相應聲元次山有欸乃曲永新婦御史娘柳青娘桂苑叢集云國樂有永新婦御史娘栁青娘皆一時之妙今按永新乃開元中宜春院内人許和子御史娘乃貞元時宫中御史娘子田順皆以善歌聞詳見樂府雜録栁青娘者豈亦歌妓之名後遂沿為曲名歟章臺柳韓翃從辟淄青姬柳氏置都下值盗覆兩京數歲翃遣使間行求之以練囊盛金題此詞為寄柳亦和其詞酬栁後陷身番將沙吒利翃入朝復取得完聚成德樂大厯中王表有其詞樂世急樂世六么樂世羽調曲歌初唐人賀朝詩有上客無勞散聽樂世娘張說集亦有樂世詞唐初貞元中樂工進曲德宗命録出要者因名為録要書所謂録要襍曲是也後語譌為緑腰又作六么白樂天聽六么詩云管急絲繁拍漸稠六么宛轉曲終頭誠知樂世聲聲樂老病人聽未免愁觀此知樂世亦録要中一曲也團雪散雪曲貞元中駙馬王士平與義陽主反目帝兩幽之不令相見舉子蔡南史獨孤申叔為義陽子歌詞有二曲言其離處之狀上聞而惡之欲罷科舉後流南史而止拜新月吉中孚妻張氏有詞皇帝感敎坊記有此曲名盧綸集有皇帝感詞天長地久詞亦見盧綸集其和聲云天長久萬年昌萬歲樂曲憲宗朝汴州劉𢎞撰聖朝萬歲樂譜三百首進金縷衣李錡常唱此詞楊柳枝即古之折楊柳段安節以為始于白傅者以其詞至白盛行也白詩云六么水調家家唱白雪梅花處處吹古歌舊曲君休聽聽取新翻楊柳枝而永豐一闋至逹禁中為尤著云桂華曲居易感蘇州東城古桂作音韻怨切聽輒動人浪淘沙居易與劉禹錫並有作捲白波居易云飲酒曲也掃市舞楊虞卿善歌此詞白樂天哭之有何日重聞掃市歌之句宋潘閬謫信州戲為掃市舞詞云出砒霜價錢可贏得撥灰兼弄火暢殺我其遺調也羅嗊曲一名望夫歌建羅嗊古樓名陳後主所元稹廉問浙東有妓女劉采春自淮甸而來能唱此曲閨婦行人聞者莫不漣泣竹枝子竹枝本出巴渝其音協黄鍾羽末如吳聲有和聲七字為句破四字和云竹枝破三字又和云女兒後元和中劉禹錫謫其地為新詞更盛行焉三閣詞劉禹錫作詠陳後主起臨春結綺望仙三閣置三妃嬪事吳聲曲杜韋娘敎坊記有其曲名劉禹錫詩春風一曲杜韋娘言妓人歌杜韋娘曲非指妓人名也抛毬樂酒筵中抛毬為令其所唱之詞也禹錫亦有作紇那曲亦見禹錫集按紇那樂府不著所出今考天寶中崔成甫所翻淂体歌有淂体紇那也紇囊淂体那之句豈其所本歟文敘子長慶中俗講僧文敘善吟經其聲宛暢感動里人樂工黄米飯狀其念四聲觀世音菩薩乃撰此曲思帝鄉令狐楚有坐中聞思帝鄉有感詩花遊曲李賀集寒食日諸王妓遊賀賦此曲與妓彈唱按賀本傳樂府數十篇雲韶諸工皆合之絃管是知賀曲辭入樂為多惜不能明姑録此以例其餘刮骨鹽權德輿詩含羞斂態勸君住更奏新聲刮骨鹽按鹽曲自六朝人有昔昔鹽後曲稱鹽者不一詳後西戎樂注仙韶法曲上雲自然真仙明闕難思平珠無為有道調元立政獻壽髙明聞天儀鳯同和閑雅多稼金鏡文宗好雅樂鄙鄭衛之音嘗采開元雅樂製雲韶樂章上雲等二十曲及霓裳羽衣舞曲後改雲韶院為仙韶院曲亦以仙韶名嘗按樂謂大臣曰笙磬同音沈唫忘味不圖為樂一至于斯自是臣下功髙者輒賜之憶秦郎憶秦娥一名秦樓月一名雙荷葉吾文宗宫人阿翹善歌出宫嫁金衛長史秦誠誠出使新羅翹思念撰小詞名憶秦郎誠亦於是夜夢傳其曲拍歸日合之無異後有憶秦娥或即出此太莊嶽委談云詩餘中憶秦娥菩薩蠻稱最古以詞出白也余謂太白在當時直以風雅自任即近體盛行七言律鄙不肯為寧屑事此且二詞雖工麗而氣衰颯於太白超然之致不啻穹壤殆晚唐人詞嫁名于白耳菩薩蠻見後萬斯年曲㑹昌初宰相李徳裕製獻即天仙子調也謝秋娘夢江南憶江南江南好李徳裕鎮浙日悼亡妓謝秋娘用隋煬所作望江南調撰謝秋娘曲後仍從本名亦曰夢江南白樂天作此詞改為憶江南後人又因樂天首句以江南好名之劉禹錫亦有作凡曲名逓改換多如此閑中好㑹昌中段成式與鄭符張希復遊長安永夀寺嘗同作此詞播皇猷曲蔥嶺西曲新霓裳羽衣曲泰邊陲曲宣宗妙音律内殿賜讌多自裁新曲俾禁中女伶逓相教授有曰播皇猷者率髙冠方履褒衣博帶趨走俯仰皆合規矩于于然有唐虞之風焉有曰蔥西士女踏歌隊者率言蔥嶺之士樂河湟故地歸國復為唐民也霓裳曲者皆執節幡被羽服態度凝澹飄飄然有翔雲舞鶴見左右如是數十曲流傳民間泰邊陲曲有辭云海岳晏咸通後懿宗繼統年號適紀咸通人以其為讖云菩薩蠻杜陽雜編云大中初女蠻國入貢其人危髻金冠瓔珞被體人謂之菩薩蠻當時倡優遂製菩薩蠻曲文士亦徃徃聲其詞温庭筠傳亦有宣宗愛唱菩薩蠻之說知此詞出于唐之晚季今李太白集有其詞後人妄托也按杜陽謂倡優見菩薩蠻製曲其說亦未盡當是用其聲音節奏耳考南蠻驃國嘗貢其國樂其樂人冠金冠左右珥璫絛貫花鬘珥雙簪散以毳如女飾而其國亦在女王蠻西南故當時或以為女蠻且其曲多佛曲具在後簡夷樂部則其稱為菩薩蠻尤可信凡曲名有稱女王國穿心蠻八拍蠻者皆出蠻中曲調以意求之可得此詞後一名重疊金一名子夜歌新添聲楊栁枝温庭筠作時飲筵競歌獨女優周德華以聲太浮豔不取感恩多李羣玉詩惟有管絃知客意分明唱出感恩多道調子懿宗解音律一日命樂工吹觱篥初弄道調上謂是曲誤拍之樂工乃依其節奏撰曲名為道調子歎百年曲懿宗篤愛同昌公主薨後思念不巳伶人李可及造此曲餘詳舞曲内别趙十憶趙十李可及能歌别趙十憶趙十可及轉喉為新聲須㬰變態百數京師效之呼為拍彈昇平樂商調見薛能集金鎻曲僖宗朝内製袍千領賜塞外吏士神策將軍馬直於袍中絮得金鎻一枝詩一首為人所告奏聞帝令直赴闕以宫人賜為妻有情者為金鎻曲流於世讚成功曲昭宗劉季述之變鹽州雄毅軍使孫德昭有反正功光化四年正月宴保寧殿上自製此曲以褒之永遇樂杜祕書工小詞鄰女酥香能諷才人歌曲悅而奔之事發杜流河朔述此决别女持紙三唱而死見錦繡萬花谷唐人附百年歌五代史晉王克用破孟方立還置酒三垂崗伶人奏百年歌至于衰老之際聲辭甚悲坐上皆悽愴克用慨然捋鬚指其子存朂而歎後二十年其能代我戰於此乎後存朂果于三垂崗破梁軍凱旋告廟如夢令唐莊宗修内苑掘得斷碑有詞云曾宴桃源深洞一曲舞鸞歌鳯長記别伊時和淚出門相送如夢如夢殘月落花烟重名宴桃源莊宗使樂工入律歌之又使翰林作數篇後人改為如夢令之按莊宗知音能度曲自為優名曰李天下至今汾晉俗徃徃能歌其聲通謂之御製曲檀來歌周世宗伐南唐軍中製念家山念家山破邀醉舞破恨來遲破南唐後主翻舊曲為念家山破其音焦殺名尤不祥識者以為亡徵后周氏尤善音復作邀醉舞恨來遲新破皆行于時嵇康江南曲後主所製國亡後有薛九能歌之見王銍侍兒小名録醉粧詞蜀後主衍宫中裹小巾其尖如錐宫妓多衣道服簪蓮花冠施胭脂夾臉號醉粧作此詞銀漢曲衍舟巡閬中自製水調銀漢曲命工歌之又嘗自製甘州詞令宫人歌之其詞哀怨聞者悽愴還鄉歌吳越錢鏐游衣錦軍製道家步虚詞唐以前多五言其破為長短句自李德裕始并附以上大小曲一百七十九曲有年代題義可攷畧著其說如右袚褉曲歎疆場宫調濮陽女羽調回紇商調柘枝引羽調柘枝大曲團亂旋三曲互見舞曲内戎渾塞姑鎮西樂鎮西子蓋羅縫蓋一作合雙帶子崑崙子金殿樂牆頭花戰勝樂劍南臣征步郎水鼓子鼔一作沾浣沙女醉公子一片子南歌子八拍蠻逹摩支鳯歸雲以上曲名見樂府詩集和風栁美唐風透碧空巫山女度春江衆仙樂龍飛樂長慶樂慶雲樂繞殿樂泛舟樂放鷹樂放鶻樂天下樂大明樂同心樂黄鍾樂賀聖朝泛玉池迎春花鳯樓春負陽春帝臺春繞池春滿園春栁含烟替楊栁倒垂栁浣溪沙撒金沙紗牕恨金簔嶺隔簾聽恨無媒望梅花好郎君紅羅襖摘得新北門西煮羊頭河瀆神二郎神醉鄉遊醉花間燈下見醉思鄉太白星剪春羅㑹嘉賓當庭月歸國遥戀皇恩憶先皇聖無憂戀情歡戀情深憶漢月定風波朩蘭花更漏長破南蠻芳草洞守陵宫臨江仙虞美人映山紅獻忠心卧沙堆怨黄沙遐方怨怨胡天送征衣送行人望梅愁阮郎迷牧羊怨羅裙帶同心結一捻鹽阿也黄劫家雞緑頭鴨下水船留客住喜長新羌心怨女王國天外閒賀皇化五雲仙滿堂花南天竺定西番西國朝天荷葉杯感庭秋月遮樓西江月上行杯喜春鶯大獻壽鵲踏枝萬年歡曲玉管謁金門巫山一段雲西河獅子西河劍氣儒士謁金門武士朝金闕操工不下麥秀兩岐摭言載朱梁封舜卿使蜀好唱麥秀兩岐事亦不言何調金雀兒滻水吟玉搔頭鸚鵡杯路逢花初漏滿相見歡遊春苑訴衷情折紅蓮洞仙歌喜回鑾喜秋天靜戎烟普恩光蘇合香七星管朝天天竺伎有朝天舞曲不知即此否看月宫宫人怨駐征遊泛濤溪胡相問帝歸京喜還京遊春夢畱諸錯黄羊兒花黄發望逺行思友人唐四姐上韻中韻下韻朩笪八拍子漁歌子十拍子措大子風流子吳吟子生查子胡醉子山花子水仙子綠鈿子金錢子赤棗子心事子胡蝶子沙磧子酒泉子迷神子得蓬子剉碓子麻婆子紅娘子歴刺子北庭子劍器子獅子女冠子仙鶴子贊普子蕃將子回戈子帶竿子摸魚子南鄉子大吕子南浦子撥棹子曹大子引角子隊踏子化生子金娥子捨麥子多利子毘砂子西溪子劍閣子嵇琴子闕唐音癸籖巻十三
