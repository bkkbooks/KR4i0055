  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0055_WYG_003-1a, image: WYG1482/WYG1482-0529a.png}
body:
  text: 唐音癸籖巻三明胡震亨撰法微二通論各體詩四言言五言古言七言古律樂府律五律七律排絶句和韻詠史聯句詠物諧體雜俳四言正體雅潤為本五言流調淸麗居宗文心雕龍各以下通論體興寄深微五言不如四言七言又其靡也况束之以聲調俳優哉李白七言律詩難於五言律詩五言絶句難於七言絶句嚴滄浪匠詩藪云五言絶調易古七言絶調易卑五言絶卽拙易於掩瑕七言絶雖高手難於中的可與此互參古樂府選體歌行有可入律者有不可入律者句法字法皆然惟近體必不可入古耳王弇州風雅之規典則居要離騷之致深永為宗古詩之妙專求意象歌行之暢必由才氣近體之攻務先法律絶句之構獨主風神胡元瑞下同七言律於五言律猶七言古於五言古也五言古銜轡有程步驟難展至七言古錯綜開闔頓挫抑揚古風之變始極五言律宮商甫協節奏未舒至七言律暢達悠揚紆徐委折近體之妙始窮七言古差易於五言古七言律顧難於五言律何也五言古意象渾融非造詣深者難於凑泊七言古體裁磊落稍材情贍者輙易發舒五言律規模簡重卽家數小者結構易工七言律字句繁靡縱才具宏者推􅒱難合自五言古律以至五七言絶槩以溫雅和平為尚惟七言歌行近體不然歌行自樂府語巳峭峻李杜大篇窮極筆力若但以平調行之何能自拔七言律聲長語縱體旣近靡字櫛句聯格尤易下材富力强猶或難之清空文弱可登此壇乎律詩句有必不可入古者古詩字有必不可為律者然不多熟古詩未有能以律詩高天下者也初學輩不知苦辣徃徃謂五言古詩易就率爾成篇因自詫好古薄後世律不為不知律尚不工豈能工古徒為兩失而巳詞人拈筆成律如左右逢源一遇古體竟日吟哦常恐失却本相樂府兩字到老搖手不敢輕道李西涯楊鐵崖都曾做過何嘗是來王敬美四言詩須本風雅間及韋曹然各自為體勿得相雜弇州四言四言簡質句短而調未舒七言靡浮文繁而聲易雜折繁簡之𠂻居文質之要蓋莫尚于五言故兩漢以還文人藝士平生精力咸萃斯道胡元瑞下同以下五言古五言古先熟讀國風離騷源流洞徹乃盡取兩漢襍詩陳王全集及子桓公幹仲宣佳者枕籍諷詠工深日逺神動機流一旦吮毫天真自露骨格旣定然後􅆓洄阮左以窮其趣頏頡陸謝以采其華傍及陶韋以澹其思博考李杜以極其變超乘而上可以掩迹千秋循轍而趨無忝名家一代作古詩先須辨體無論兩漢難至苦心模倣時隔一塵卽為建安不可墮落六朝一語為三謝縱極俳麗不可雜入唐音小詩欲作王韋長篇欲作老杜便應全用其體亦不得他雜詞曲家非當家本色雖麗語博學無用况此道乎王敬美擬古樂府擬漢不可涉魏擬魏不可涉六朝擬六朝不可涉唐用本題事而不失本曲調上也調不失而題小舛次也題甚合而調或乖則失之千里矣胡元瑞府以下樂樂府詩妙在可解不可解之間一涉議論便是鬼道弇州七言古詩要鋪敘要有開合有風度迢逓險怪雄俊鏗鏘忌庸俗軟腐須是波瀾開合如江海之波一波未平一波復起又如兵家之陣方以為正又復為竒方以為奇忽復是正出入變化不可紀極備此法者唯李杜也開合燦然音韻鏗然法度森然神思悠然學問充然議論超然楊仲𢎞古以下七言七言歌行靡非樂府然至唐始暢其發也如千鈞之弩一舉透革縱之則文漪落霞舒巻絢爛一入促節則凄風急雨窈㝠變幻轉折頓挫如天驥下坂明珠走盤收之則如柝聲一擊萬騎忽歛寂然無聲王弇州下同歌行有三難起調一也轉節二也收結三也惟收結為尤難如作平調舒徐綿麗者結須為雅詞勿使不足令有一唱三歎意奔騰洶湧驅突而來者須一截便住勿留有餘中作竒語峻奪人魄者須令上下脉相顧一起一伏一頓一挫有力無迹方成篇法長歌但㸔其通篇大勢中間偶有拙句不失大體着一巧句最害正氣謝茂秦凡詩諸皆有繩墨惟歌行出自離騷樂府故極散漫縱橫初學當擇唐人名篇脉絡分明句調婉暢易下手者模彷成家後博取李杜大篇合變出奇窮高極逺又上之兩漢樂府又上之楚人離騷以求其源本進于神化胡元瑞律傷嚴近寡恩大凡立意之初必有難易二塗學者不能强所劣徃徃舎難而取易文章罕工每坐此也唐子西以下律詩律詩全在音節格調風神盡具音節中胡元瑞律詩第二字側入為正格如鳯律軒轅紀龍飛四十春之類第二字平入為偏格如四更山吐月殘夜水明樓之類唐名家詩多用正格用偏格者槪少沈存中三百篇以比興置篇首律詩則置在篇中如景聯所摹物色或興而賦或賦而實比皆其義也范德機參律詩不可多用虛字兩聯塡實方好用唐以下事便不古趙孟頫對句好可得結句好難得發句好尤難得發端忌作舉止收拾貴在出塲嚴滄浪五言如四十箇賢人著一箇屠沽輩不得覓句者若掘得玉合有盖必有底但精心求之必得其寶劉昭禹言以下五律李夢陽云叠景者意必二濶大者半必細此最律詩三昧如杜詔從三殿去碑到百蠻開野館濃花發春帆細雨来前半濶大後半工細也浮雲連海岱平野入靑徐孤嶂秦碑在荒城魯殿餘前景寓目後景感懷也唐法律甚嚴惟杜變化莫測亦惟杜胡元瑞下同作詩不過情景二端如五言律體前起後結中四句二言景二言情此通例也唐初多於首二句言景對起止結二句言情雖豐碩徃徃失之繁雜唐晚則第三四句多作一串雖流動徃徃失之輕儇俱非正體惟沈宋李王諸子格調莊嚴氣象閎麗最為可法第中四句大率言景不善學者凑砌堆叠多無足觀老杜諸篇雖中聯言景不少大率以情間之故習杜者句語或有枯燥之嫌體裁絶無靡冗之病此初學入門第一義不可不知若老手大筆則情景混融錯綜惟意又不可專泥此論學五言律毋習王楊以前毋窺元白以後先取沈宋陳杜蘇李諸集朝夕臨摹則風骨高華句語宏贍音節雄亮比偶精嚴次及盛唐王岑孟李永之以風神暢之以才氣和之以眞澹錯之以清新然後歸宿杜陵究竟絶軌極深研幾窮神知化五言律法盡矣五言律差易得雄渾加以二字便覺費力雖曼聲可聽而古色漸稀七字為句字皆調美八句為篇句皆穩暢雖復盛唐代不數人人不數首弇州言以下七律七言律有起有承有轉有合起為破題或對景興起或比起或引事起或就題起要突兀高逺如蘋風初發勢欲捲浪承為頷聯或寫意或寫景或書事或用事引證要接破題如驪龍之珠抱而不脱轉為頸聯或寫意寫景書事用事引證與前聯之意相應相避要變化不窮如魚龍出沒豗濤觀者無不神聳合為結句或就題結或開一步或繳前聯之意或用事必放一句作散塲如截奔馬辭意俱盡如臨水送將歸辭盡意不盡知此則七律思過半矣楊仲𢎞參七言律不難中二聯難在發端及結句耳發端盛唐人無不佳者結頗有之然亦無轉入他調及收頓不住之病篇法有起有束有放有斂有喚有應大抵一開則一闔一揚則一抑一象則一意無偏用者句法有直下者有倒揷者倒揷最難非老杜不能也字法有虛有實有沈有響虛響易工沈實難至五十六字如魏明帝凌雲臺材朩銖兩悉配乃可耳篇法之妙有不見句法者句法之妙有不見字法者此是法極無迹人能之至境與天㑹未易求也有俱屬象而妙者有俱屬意而妙者有俱作高調而妙者有直下不偶對而妙者皆興與境詣神合氣完使之然五言可耳七言恐未易能也勿和韻勿拈險韻勿起結用傍韻勿偏枯勿求理勿搜僻勿用六朝强造語勿用大厯以後事此詩家魔障愼之愼之弇州七言律對不屬則偏枯太屬則板弱二聯之中必使極精切而極渾成極工宻而極古雅極嚴整而極流動廼為上則然二者理雖相成體實相反故古今文士難之要之人力茍竭天眞必露非蕩思八荒㳺神萬古功深百鍊才具千鈞不易語也胡元瑞下同古詩之難莫難于五言古近體之難莫難于七言律五十六字之中意若貫珠言如合璧其貫珠也如夜光走盤而不失迴旋曲折之妙其合璧也如玉匣有盖而絶無參差扭揑之痕纂組錦繡相鮮以為色宮商角徴互合以成聲思欲深厚有餘而不可失之晦情欲纒綿不迫而不可失之流肉不可使勝骨而骨又不可太露詞不可使勝氣而氣又不可太揚莊嚴則清廟明堂沉著則萬鈞九鼎高華則朗月繁星雄大則泰山喬嶽圓暢則流水行雲變幻則凄風急雨一篇之中必數者兼備迺稱全美故名流哲匠自古難之高岑明凈整齊所乏遠韻王李精華秀朗時覺小疵學者步高岑之高調含王李之風神更加以工部之雄深變幻庻盡七言能事爾作七言拗體者必以意興發端神情傅合渾融疎秀不見穿鑿之跡頓挫抑揚自出宮商之表可耳雖老杜以歌行入律亦是變風不宜多作作則傷境弇州詩一題一首自為起合無論其一題數首者則合數首為起合易而置之便不可蓋起句在前首而合句在後首故也范德機作排律法虛韻不如實韻堪押順聯不如逆聯有情遯叟排以下律作排律先熟讀宋駱沈杜諸篇倣其布格措詞則體裁平整句調精嚴益以摩詰之風神太白之氣槩旣奄有諸家美善咸備然後究極杜陵擴之以閎大濬之以沉深鼓之以變化胡元瑞七言排律創自老杜然亦不得佳盖七字為句束以聲偶氣力已盡矣又欲衍之使長調高則難續而傷篇調卑則易冗而傷句合璧猶可貫珠益艱弇州絶句固自難五言尤甚離首即尾離尾即首而腰腹亦自不可少妙在愈小而大愈促而緩吾嘗讀維摩經得此法一丈室中置恒河沙諸天寶座丈室不增諸天不減又一刹那定作六十小劫須如是乃得弇州句以下絶顧華玉云五言絶以調古為上乘以情眞為得體調古則韻高情眞則意逺華玉標此二者則雄竒俊亮皆所不貴論雖稍偏自是五言絶第一義胡元瑞下同七言絶語半於近體同其句格宛順節促於歌行倍夫意味長永七絶盛唐諸公用韻最嚴無旁出者命意得句以韻發端突然而起意到辭工不假雕飾通首自混成無跡宋人專重轉合刻意精鍊或難於起句借用旁韻牽强成章此所以不同也謝茂秦五言絶尚眞切質多勝文七言絶尚高華文多勝質五言絶昉於兩漢七言絶起自六朝源流迥别體製自殊至意當含蓄語務舂容則二者一律也胡元瑞下同對結者須意盡如王之渙欲窮千里目更上一層樓高達夫故鄕今夜思千里霜鬢明朝又一年添著一語不得乃可永嘉薛韶云老杜詩雖多至百韻亦首尾相應無間斷絶句或不然四句句各為對不貫穿者為多另是一體不足多學絶句之法要婉曲回環刪蕪就簡句絶而意不絶多以第三句為主而第四句發之有實接有虛接承接之間開與合相關反與正相依順與逆相應一呼一吸宮商自諧大抵起承二句固難然不過平直敘起為佳從容承之為是至如宛轉變化工夫全在第三句若於此轉變得好則第四句如順流之舟矣楊仲𢎞詩人詠史最難妙在不增一語而情感自深若在作史者不到處别生眼目固自好然尚是第二義也詩法咏史詠物固要逼眞但恐注精㸃寫閑澹之氣易至偏失要在不相謀而兩得始佳方秋崖物以下咏詩固忌用巧太過然緣情體物自有天然工妙雖巧而不見刻削之痕老杜細雨魚兒出微風燕子斜及穿花蛺蝶深深見㸃水蜻蜓款款飛等語讀之渾然全似未嘗用力此所以不礙其氣格超勝與晚唐諸家之體物者迥别也咏物者宜于此細參雨細着水面為漚魚常上浮而唸若大雨則伏而不出矣燕體輕弱風猛則不能勝惟微風乃受以為勢故又有輕燕受風斜之語此十字殆無一字虛設至蛺蝶蜻蜓一聯又妙在穿字㸃字若深深無穿字款款無㸃字亦不能喚出如此精微來葉石林詩固有以切為工者不傷格不貶調乃可咏物着題亦自無嫌于切第單欲其切亦易易耳不切而切切而不覺其切此一關前人不輕拈破也胡元瑞物坡公云詩人有寫之功桑之未落其葉沃若他木殆不可以當此林逋梅花詩云疎影橫斜水淸淺暗香浮動月黃昏决非桃李詩皮日休白蓮詩云無情有恨何人見月冷風清欲墜時决非紅蓮詩此乃寫物之功若石曼卿紅梅詩云認桃無綠葉辨杏有靑枝此村學中至陋語也和韻聯句皆易為詩害而無大益偶一為之可也然和韻在於押字渾成聯句在於才力均敵聲華情實中不露本等面目乃為貴耳弇州韓聯句始栢梁人賦一句至唐愈孟郊有錯賦上句博下句聯對者和詩用來詩之韻曰用韻依來詩之韻盡押之不必以次曰依韻并依其先後而次之曰次韻盛唐人和詩不和韻晚唐人至有次韻者洪邁曰古人酬和詩必答其來意非如今人為次韻所局也如高適寄杜云草𤣥今已畢此外更何求杜和云草𤣥吾豈敢賦或似相如韋迢寄杜云相憶無南鴈何時有報章杜和云雖無南去鴈看取北來魚只以其來意往覆趣味自深何嘗和韻至大歴中李端盧綸野寺病居酬答始有次韻後元白二公次韻益多皮陸則更盛矣今人倣傚至往返數四不止詩以道性情一拘韻脚性情果可得而見耶句和韻聯雜詩自孔融離合鮑照建除溫嶠迴文傅咸集句而下字謎人名鳥獸花木摹倣日煩不可勝數至唐人乃有以婢僕詩登第孩兒詩取禍者詩文不朽大業學者雕心刻骨窮晝夜致功猶懼弗窺奧眇暇役志及此皆詩道之下流學人之大戒也胡元瑞體雜俳諧唐音癸籖巻三
