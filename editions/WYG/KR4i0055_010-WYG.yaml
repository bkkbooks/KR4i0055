body:
  text: 唐音癸籤巻十明胡震亨撰評彚六自景龍始剏七律諸學士所製大都鋪揚景物宣詡讌遊以富麗競工亡論體變未極聲病亦多未調開元以還喆匠迭興研揣備至於是後調彌純前美益鬯字虛實互用體正抝畢攝七言能事始盡所以遡龍門之派者必求端沈宋窮滄海之觀者還歸大杜陵遯叟下同宫闕星河低拂樹殿庭燈燭上薫天必簡之宏槩也然已有梅花落處疑殘雪柳葉開時任好風之閒婉矣風射蛟冰千片斷氣衝魚鑰九關開雲卿之穠采也然巳有山出盡如鳴鳳嶺池成不讓飲龍川之澂朗矣初年盡帖宜春勝長命先浮獻壽杯廷碩之莊調也然已有雲山一一看皆美竹樹蕭蕭畫不成之疎野矣至忽排花上遊天苑却坐雲邊看帝京之寫景空活當軒半落天河水遶徑全低月樹枝之用事渾融黄鶯未解林間囀紅蘂先從殿裏開之屬對圓貼雖椎輪初斲而仍几巳雕睠此先程允資後躅已盛唐名家稱王孟高岑獨七言律祧孟進李頎應稱王李岑高云七言律獨取王李而絀老杜者李于鱗也夷王李于岑高而大家老杜者高廷禮也尊老杜而謂王不如李者胡元瑞也謂老杜即不無利鈍終是上國武庫又謂摩詰堪敵老杜他皆莫及者王弇州也意見互殊幾成諍論雖然吾終以弇州公之言為衷王以高華勝李以韶令勝李如瓊蕊浥露含質故鮮王如翠嶺冠霞占地特貴王間有失嚴無心内游衍自如李即無落調有意中補凑可摘不獨觔兩微懸正復色香亦别聞梵頷聨之偏枯寄盧司勲通篇之春事璿公山池之一起綦母李回之二結皆李之補凑處也岑詞勝意句格壯麗而神韻未揚高意勝詞情致纒綿而筋骨不逮岑之敗句猶不失盛唐高之合調時隠逗中唐王風調正似雲卿岑茂采堪追廷碩李存藻不多既同考功高裁體欲變亦類左相以盛配初約畧不逺惟杜子美無一家不備亦無一家可方爾杜公七律正以其負力之大寄悰之深能直抒胸臆廣酬事物之變而無礙為不屑屑色聲香味間取媚人觀耳中間儘有渉於倨誕隣於憤懟入於俚鄙者要皆偶趂機緒以吐噏精神材料一無揀擇義諦總歸情性令人乍讀覺面貌可疑久咀嘆意味無盡其奪愛王李生異論以此雖有異論竟不淆千古定論亦以此或問杜公律句何者為人所不能道余曰是詎易悉數哉聊舉一聨二儀清濁還高下三伏炎蒸定有無登樓者試擬來看少陵七律與諸家異者有五篇製多一也一題數首不盡二也好作抝體三也詩料無所不入四也好自標榜即以詩入詩五也此皆諸家所無其他作法之變更難盡數不善學者多岐為惑每至失歩善學者一體各占儘足成家早朝四詩名手彚此一題覺右丞擅塲嘉州稱亞獨老杜為滯鈍無色富貴題出語自關福相於此可占諸人終身窮達又不當以詩論者胡元瑞云岑作精工整密字字天成景聨絢爛鮮明蚤朝意宛然在目獨頷聨雖絶壯麗而氣勢廹促遂致全篇音韻微乖王起語意偏不若岑之大體結語思窘不若岑之自然景聨甚活終未若岑之駢切獨頷聨高華博大而冠冕和平前後映帶寛舒遂令全首改色稱最當時但服色太多為病不小而岑之重兩春字及曙光曉鐘之再見不無微纇信七律全璧之難開元七律自前數公外其可舉數者亦無多如賈曾之春苑矚目崔顥之行經華隂祖詠之望薊門崔曙之九日望仙臺張謂之别韋郞中其最著也餘如太白孟浩然並非其長太白僅得鸚鵡洲及送賀監二結孟僅得春晴除夜登安陽城樓三結耳李鸚鵡洲結實效顰黄鶴樓王敬美以為崔下使字穏李下使字似添入較勘最為入細吾更愛萬楚五日一結情語不妨險諢似從沈佺期獨不見結意得來弇州公怪于鱗嚴刻不應收此詩此非詩家外道實六朝正法眼藏也于鱗安得不收王敬美云日暮鄉關煙波江上本無指着登臨者自生愁耳故曰使人愁煙波使之愁也浮雲蔽日長安不見逐客自應愁寧須使之乎七言律壓巻迄無定論宋嚴滄浪推崔顥黄鶴樓近代何仲黙薛君采推沈佺期盧家少婦王弇州則謂當從老杜風急天高老去悲秋玉露凋傷昆明池水四章中求之今觀崔詩自是歌行短章律體之未成者安得以太白嘗傚之遂取壓巻沈詩篇題原名獨不見一結翻題取巧六朝樂府變聲非律詩正格也不應借材取冠兹體若杜四律更尤可議風急天高篇無論結語膇重即起處鳥飛迴三字亦勉强屬對無意味老去悲秋篇本一落帽事又生冠字為對無此用事法藍水一聨尤乏生韻類許用晦塞白語僅一結思深耳可因之便浪推耶玉露凋傷篇較前二作似勻稱然觔兩自薄況一繫對兩開一字甚無着落為瑕不小昆明池水前四語故自絶奈頸聨肥重墜粉紅尤俗況律詩凡一題數篇者前後皆有微度脈絡此秋興八首首咏䕫府二三從䕫府漸入京華四方槩言長安五六七八又各言長安一景八首只作一首若相次相引者通讀之始知其命篇之意與一切貫穿暎帶之法未有于中獨摘其第一首及第六首能悉其妙可詫為壓巻者取及此尤無謂也吾謂好詩自多要在明眼畧定等差不誤所趨足耳轉益多師是汝師何必取宗一篇效痴人作此生活七言律以才藻論則初唐必首雲卿盛唐當推摩詰中唐莫過文房晚唐無出中山不但七言律也諸體皆然繇其才特高耳詩藪下同劉長卿獻淮寧節度一篇如家散萬金酬士死身留一劒答君恩李端韓翃之先鞭也漁陽老將多迴席魯國諸生半在門王建張籍之鼻祖也結語更得王維李頎風調起語亦自大體幾欲上薄盛唐然細按之自是中唐詩錢員外輕寒不入宮中樹佳氣常浮仗外峯當是其最得意句然上句秀而過巧下句寛而不稱弇州錢長信宜春句於晴雪妙極形容膾炙人口其源得之初唐然從初竟落中唐了不與盛唐相關何者愈巧則愈逺秇圃擷餘七言難於氣象雄渾句中有力而紆徐不失言外之意自老杜後韓退之筆力最為傑出然每苦意與語俱盡賀裴晉公破蔡州回所謂將軍舊壓三司貴相國新兼五等崇非不壯也然意亦盡於此矣不若劉禹錫賀裴晉公留守東都云天子旌旗分一半八方風雨㑹中州逺而得大體也葉石林初唐體質濃厚格調整齊時有近拙近板處盛唐氣象渾成神韻軒舉時有太實太繁處中唐淘洗清空寫送瀏亮七言律至是殆於無指摘而體格漸卑氣韻日薄衰態未免畢露詩藪唐七言律自杜審言沈佺期首創工密至崔顥李白時出古意一變也高岑王李風格大備又一變也杜陵雄深浩蕩超忽縱横又一變也錢劉稍加流暢降為中唐又一變也大厯十才子中唐體備又一變也樂天才具泛瀾夢得骨力豪勁在中晩間自為一格又一變也張籍王建畧去葩藻求取情實漸入晚唐又一變也嗣後温李之競事組織薛能之過為芟刋杜牧劉滄之時作抝峭韋莊羅隠之務趨條暢皮日休陸龜蒙之填塞古事鄭都官杜荀鶴之不避俚俗變又難可悉紀律體愈趨愈下而唐祚亦告訖矣參沈宋前排律殊寡惟駱賓王篇什獨盛流麗雄渾獨歩一時初唐四十韻惟杜審言送李大夫作實自少陵家法杜八哀李北海云次及吾家詩慷慨嗣真作是也沈宋雖並稱沈排律工者不過三數篇宋集中篇篇平正典重贍麗精嚴不獨昆明一什勝沈也初學入門所當熟習右丞韻度過之而典重不如少陵閎大有加而精嚴畧遜初唐沈宋外蘇李諸子未見大篇獨曲江諸作含清拔於綺繪之中寓神俊於莊嚴之内如度蒲關登太行和許給事酬趙侍御等作同時燕許皆莫及排律沈宋二氏藻贍精工太白右丞明秀高爽然皆不過十韻且體在繩墨之中調非畦逕之外惟杜陵大篇鉅什雄偉神奇闔闢馳驟如飛龍行雲鱗鬛爪甲自中矩度又如淮隂用兵百萬掌握變化無方雖時有險朴無害大家讀盛唐時排律延清摩詰等作真如入萬花春谷光景爛漫令人應接不暇賞玩忘歸太白軒爽雄麗如明堂黼黻冠葢輝煌武庫甲兵旌旗飛動少陵變幻閎深如陟崑崙泛溟渤千峯羅列萬彚汪洋常侍篇什空澹不及王李之秀麗豪爽而信安王幕府三十韻典麗整齊精工贍逸特為高作嘉州格調整嚴音節宏亮而集中排律甚稀襄陽時得大篇清空雅淡逸趣翩翩然自是孟一家學之必無精采凡排律起句極宜冠裳雄渾不得作小家語唐人可法者盧照隣地道巴陵北天山弱水東駱賓王二庭歸望斷萬里客心愁杜審言六位乾坤動三微厯數遷沈佺期閶闔連雲起巖廊拂霧開𤣥宗鐘鼓嚴更曙山河野望通張說禮樂逢明主韜鈐用老臣李白獨坐清天下專征出海隅高適雲紀軒皇代星高太白年此類最為得體次則過接為難駱賓王邊城懷京邑篇季月炎初盡邊庭草早枯沈佺期扈從出長安篇是節嚴隂始寒郊散野蓬初唐轉接法不過如是逮老杜法乃益精如述懷入往事云得喪初難識榮枯劃易該贈人入自敘云勛業青㝠上交親氣槩中融洽中兼之頓挫又不知費幾許鑪錘矣至結語關鎖全篇尤為喫𦂳亦惟杜盡善諸篇不作鄭重語收煞即作灑逸語送之似先揀下好韻留為押尾者細參自見遯叟大槩中唐以後稍厭精華漸趨澹靜故五七言律清空流暢時有可觀至排律亦倣此則躓矣排律自楊盧以至王李靡不豐碩渾雄蓋其體製應爾惟老杜大篇時作蒼古然其才力異常學問淵博述情陳事錯綜變化轉自不窮中唐無杜材力學問欲以一二致語撑拄其間庸詎可乎元瑞唐大厯後五七言律尚可接翅開元惟排律大不競錢劉以降氣味總薄元白中興鋪敘轉凡所見中唐楊巨源晚唐李商隠李洞陸龜蒙三家楊則短韻不失前矱三家則長什尤饒新藻將無此體限於材即難曙於法亦自易乎惟深於詩者知之遯叟七言排律唐人不多見如太白别山僧高適宿田家等作雖聨對精密而律調未純終是古詩體段惟崔融從軍行言從字順音響沖和堪備一體高棅唐人之詩樂府本效古體而意反近絶句本自近體而意實逺故求風雅之㑂佛者莫如絶句唐人之所偏長獨至而後人力追莫嗣者也擅塲則王江寧驂乘則李彰明偏美則劉中山遺響則杜樊川少陵雖號大家不能兼善以拘於對偶且汩於典故乏性情爾楊升菴府按唐樂五言絶句法齊梁然體製自别七言亦有作樂府體者然如宫詞從軍出塞等雖用樂府題自是唐人絶句與六朝不同唐初五言絶子安諸作巳入妙境七言初變梁陳音律未諧韻度尚乏惟杜審言渡湘江贈蘇綰二首結皆作對而工緻天然風味可掬至張說巴陵之什王翰出塞之吟句格成就漸入盛唐矣元瑞太白五七言絶句實唐三百年一人蓋以不用意得之即太白不自知其所至而工者顧失焉李于鱗七言絶句王江寧與太白爭勝毫釐俱是神品王弇州太白諸絶句信口而成所謂無意於工而無不工者少伯深厚有餘優柔不廹怨而不怒麗而不淫余嘗謂古詩樂府後惟太白諸絶近之國風離騷後惟少伯諸絶近之體若相懸調可黙㑹元瑞五言無名氏打起黄鶯兒不惟語意高妙其篇法圓𦂳中間増一字不得着一意不得起結極斬絶而中自紆緩無餘法而有餘味弇州太白五言如靜夜思玉階怨等妙絶古今然齊梁體格他作視七言絶句覺神韻小減縁句短逸氣未舒耳右丞輞川諸作却是自出機軸名言兩忘色相俱冺另是一家體裁元瑞王少伯七絶宫詞閨怨儘多詣極之作若邊詞秦時明月一絶發端句雖奇而後勁尚屬中駟于鱗遽取壓巻尚須商㩁遯叟峩眉山月半輪秋影入平羌江水流夜發清溪向三峽思君不見下渝州二十八字中有峩睂山平羌江清溪三峽渝州使後人為之不勝痕跡矣益見此老鑪錘之妙弇州自少陵絶句對結詩家率以半律譏之然絶句自有此體特杜非當行耳如岑參凱歌丈夫鵲印揺邊月大將龍旗掣海雲排兵魚海雲迎陣秣馬龍堆月照營等句皆雄渾高華後世咸所取法即半律何傷若杜審言紅粉樓中應計日燕支山下莫經年獨憐京國人南竄不似湘江水北流則詞竭意盡雖對猶不對也元瑞下同七言絶開元之下便當以李益為第一如從軍諸篇皆可與太白龍標競爽非中唐所得有也又張仲素秋閨曲夢裏分明見關塞不知何處向金微欲寄征人問消息居延城外又移軍皆去龍標不甚逺中唐絶如劉長卿韓翃李益劉禹錫尚多可諷詠晚唐則李義山温庭筠杜牧許渾鄭谷然途軌紛出漸入宋元多岐亾羊信哉盛唐絶句興象玲瓏句意深婉無工可見無跡可尋中唐遽減風神晚唐太露筋骨晩唐詩萎薾無足言獨七言絶句膾炙人口其妙至欲勝盛唐愚謂絶句覺妙正是晩唐未妙處其勝盛唐乃其所以不及盛唐也絶句之源出於樂府貴有風人之致其聲可歌其趣在有意無意之間使人莫可捉著盛唐惟青蓮龍標二家詣極李更自然故居王上晩唐快心露骨便非本色議論高處逗宋詩之徑聲調卑處開大石之門秇圃擷餘一將功成萬骨枯是疏語可憐無定河邊骨是詞語又如公道世間惟白髮只有春風不世情爭似堯階三尺高劉項原來不讀書等句攙入議論皆僅去張打油一間人皆盛稱為工受誤不淺元瑞七言絶句盛唐主氣氣完而意不盡工中晚唐主意意工而氣不甚完然各有至者未可以時代槩訾之弇州聨句詩唐惟顔真卿韓退之為多顔雜恢諧韓與孟郊為敵手各極才思語多奇崛尤可喜遯叟唐音癸籖巻十
