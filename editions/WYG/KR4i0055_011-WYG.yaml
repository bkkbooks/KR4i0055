body:
  text: 唐音癸籤巻十一明胡震亨撰評彚七老杜詩好用自字如寒城菊自花故園花自發風月自清夜之類不一而足受字修竹不受暑吹面受和風輕燕受風斜野航恰受兩三人進字樹濕風涼進山谷進風涼逗字如殘生逗江漢逺逗錦江波隂鏗詩有行舟逗逺樹其所本也俯字傲睨俯峭壁展席俯長流杖藜俯沙渚此邦俯要衝四顧俯層巔旄頭俯澗瀍層臺俯風渚游目俯大江江檻俯鴛鴦懸江路熟俯青郊凡十數處坐字楓樹坐猿深又黄鶯並坐交愁濕螢火簾疎巧入坐人衣以坐字體物頗奇然北齊劉逖詩無由似𤣥豹縱意坐山中張說詩樹坐參猿嘯沙行入鷺羣皆本漢樂府烏生八九子端坐秦氏桂樹間非始杜也遯叟下同杜又用俗字葛常明云數物一箇謂食為喫甚近鄙獨杜屢用峽口驚猿聞一箇兩箇黄鸝鳴翠柳却遶井邊添箇箇臨岐意頗切對酒不能喫樓頭喫酒樓下卧但使殘年飽喫飯梅熟許同朱老喫篇中大槩奇特用俗字更可暎帶益妍耳用方言里諺孫季昭云杜子美善以方言里諺㸃化入詩句中如云吾家老孫子質朴古人風客睡何曾著秋天不肯明棗熟從人打葵荒欲自鋤一夜水高二尺强數日不可更禁當不分桃花紅勝錦生憎柳絮白於綿負鹽出井此溪女打皷發船何處郞此類尤多不可殫述太白詩押宜字韻者凡五見而韻致俱勝如山將落日去水與晴空宜月色望不盡空天交相宜謔浪偏相宜置酒正相宜春風與醉客今日乃相宜劉夢得云為詩用僻字須有來處宋考功云馬上逢寒食春來不見餳帝疑之因讀毛詩鄭箋說吹簫處注云即今賣餳者所吹六經惟此中有餳字吾縁明日重陽欲押一糕字詩尋思六經竟未有糕字不敢為之按夢得亦有餳字詩厯陽書事湖魚香勝肉官酒重於餳蓋傚宋也較宋押得更穏又按隋書五行志載謡語有八月刈禾傷早九月食糕正好糕字入詩始見此詩有出自可用何必盡本之六經耶王弇州云劉用字謹嚴如此然其答樂天有筆底心猶毒杯前膽不豩豩呼關切此何謂也元微之贈周先生詩云寥寥空山岑冷冷風松林流月垂鱗光懸泉揚高音希夷周先生燒香調琴心神功盈三千誰能還黄金四十字用平聲字至三十九古有四聲詩純用平聲者此則偶然犯之而調叶步虚殊鏘然可誦韓愈最重字學詩多用古韻如元和聖德及此日足可惜詩全篇一韻皆古叶兼用其贈張籍詩云時來問形聲知籍亦留心韻學者乃籍詩獨不甚用古韻惟祭愈詩七陽用至八十三韻古韻幾於用盡却無一韻不押得穏帖視愈之每每强押者過之宋吳才老推韓愈為唐一代字學冠下及白傅柳州而未滿於籍夫識字貴善用耳籍用古韻即僅此一篇韻學之深可知矣才老或未足語此也九日用茱萸杜子美云醉把茱萸仔細看王右丞云遍揷茱茰少一人朱倣云學他年少揷茱茰劉夢得以為更三詩人道之子美為優一菊詩也陳叔達云但令逢採摘寧辭獨晩榮婉厚乃爾朱灣云受氣何曽異開花獨自遲費較量矣李山甫云栽處不容依玉砌要時還許上金罇更似毒口罵將來豈非時代為之僧與鳥自浪仙後幾成一副應急對子諸家槩有惟姚合夜鐘催鳥絶積雪阻僧期差不落夾前逢錦車使都䕶在樓蘭虞世南用為起句殊未安不若王摩詰蕭關逢候吏都䕶在燕然改作結句較妥也上官儀􅍎飛山月曉蟬噪野風秋率爾出風致語佳耳張說雁飛江月冷猿嘯野風秋似有意學之那得佳歐公力擬温飛卿警聨不及亦同此王維積水不可極安知滄海東亦可謂工於發端矣謝靈運登海口盤嶼山詩莫辨洪波極誰知大壑東良自有本皇甫子循太白人分千里外興在一杯中達夫功名萬里外心事一杯中似皆從庾抱之悲生萬里外恨起一杯中來而達夫較厚太白較逸並未易軒輊遯叟下同孟浩然萬壑歸於漢千峯劃彼蒼杜子美餘力浮於海端憂問彼蒼對法正同王昌齡龍潭詩百泉勢相蕩巨石皆却立昏為蛟龍怒清見雲雨入杜甫萬丈潭詩前臨洪濤寛却立蒼石大黒知灣澴底清見光炯碎語不襲而肖而通篇杜尤雄拔盡善名家大家之分也子昂古朩生雲際歸帆出霧中即𤣥暉天際識歸舟雲中辨江樹也子美薄雲巖際宿孤月浪中翻即仲言白雲巖際出清月波中上也四語並極精工卒難優劣然何謝古體入此漸啓唐風陳杜近體出此乃更古意不可不知元瑞下同又杜山青花欲燃出沈約山櫻花欲燃江流靜猶湧出隂鏗大江靜猶浪繡段裝簷額金花帖皷腰出庾信細縷纒鐘格圓花釘皷牀春水船如天上坐老年花似霧中看出沈佺期人如天上坐魚似鏡中懸沈復出陳釋慧標舟如空裏泛人似鏡中行冰藍遞有從來韋蘇州對殘燈詩云獨照碧牕久欲隨寒燼滅幽人將遽眠解帶翻成結梁沈氏滿願殘燈詩云殘燈猶未滅將盡更揚輝惟餘一兩燄猶得解羅衣韋詩實出於沈然韋有幽意而沈淫矣升菴外集司空曙乍見翻疑夢相悲各問年戴叔倫一年將盡夜萬里未歸人一則久别乍逢一則客中改歲之絶唱也李益問姓驚初見稱名憶舊容絶類司空崔塗亂山殘雪夜孤燭異鄉人絶類戴作皆可亞之元瑞梁按戴句元出簡文一年夜將盡萬里人未歸但顛倒用之而字無一易劉文房已是洞庭人猶看灞陵月孟東野長安日下影又落江湖中語意相似皆寓戀闕之意而劉為藴藉楊升菴白香山醉貌如霜葉雖紅不是春出尹式衰顔倚酒紅尹悲歎有含蓄白故是翻案佳語氣則索然矣閲耕餘録讀姚少監侯門月色少於燈句每嘆富貴家光景真復如此俗耶然王摩詰山池夜讌詩山月少燈光先已道過矣遯叟下同盧仝月蝕詩生於李白之古朗月行李白古朗月行生於天問夜光何德死則又育厥利維何顧莬在腹數語始則微詞含寄終至破口發村靈均氏亦何料到此杜甫有句云詩盡人間興兼須入海求非深於搜索者無此想頭李克恭弔孟郊詩海底也應搜得盡正祖此意韋莊詩靜極却嫌流水閙閒多翻笑野雲忙本於老杜之水流心不競雲在意俱遲但多着一嫌字笑字覺非真閒真靜耳白居易咏老柳樹但見半衰臨此路不知初種是何人羅隠咏長明燈不知初㸃人何在祗見當年火至今語似祖述而用法一順一倒不同劉長卿餘干旅舍云揺落暮天迥丹楓霜葉稀孤城向水閉獨鳥背人飛渡口月初上鄰家漁未歸鄉心正欲絶何處搗征衣張籍宿江上館云楚驛南渡口夜深來客稀月明見潮上江靜覺鷗飛旅宿今已逺此行殊未歸離家久無信又聽搗寒衣兩詩韻同而意調亦同詩話總龜韓退之贈張道士詩臣有平賊策狂童不難治恨無一尺箠為國笞羌夷臣有膽與氣不忍死茆茨天空日月高下照理不遺寧當不竣報歸袖風披披霜天熟斾栗收拾不可遲杜牧亦有書懷詩云北虜壞亭障聞屯千里師牽連久不解他盜恐旁窺臣實有長策彼可徐鞭笞如蒙一召議食肉寢其皮斯乃廟堂事爾微非爾知向來躐等語長作陷身機行當臘欲破酒齊不可遲且想春候暖甕間傾一巵並以排調語抒孤憤意象如一未知紫微有意相祖述抑或偶爾暗合也紫微弔趙將軍落句誰知我亦輕生者不得君王丈二殳與前恨無一尺箠意亦正同遯叟下同信惟餓隸布實黥徒班固史贊語也王維詩有亥為屠肆鼓刀人嬴乃夷門抱闗者慨然嘆曰道固不同潘岳誄辭也李白詩有秦人相謂曰我屬可去矣雖未必相模倣而語格恰同詩即有韻之文在所善用耳諸家懐古感舊之作如年年春色為誰來惟見江流去不回惟有年年秋雁飛秪今惟有西江月曽照吳王宫裏人等句非不膾炙人口奈詞意易為倣傚竟成悲弔海語不足貴矣諸賢生今不知又作如何洗刷余友姚叔祥嘗語余云余行黄河始知孤村幾歲臨伊岸一雁初晴下朔風之為真景也余家海上每客過聞海唑聲必怪問進海味有疑而不下箸者益知潮聲偏懼初來客海味惟甘久住人二語之確切人足跡不出門能悉門外許許盡拈為錦囊用乎唑方言比海聲如人囂聲也長孫正隠高氏林亭細雨猶開日深池不漲沙上句人皆能領其景下句則非北人習風土者不能知其妙也薛能詩有池中水是前秋雨陌上風驚自古塵二句之妙亦非北人不能知盛唐詩以文常㑹友惟德自為隣今以為頭巾語非知者也而學此等句未有不頭巾者也其得失乃在作者寸心知耳方采山遊魚逆水上宿鳥向風栖最詩之識物理者魚逆水鱗順鳥向風羽順也然一說破則似爾雅詁不復似詩遯叟下同詩亦要占些地歩退之贈李愿云往取將相酬恩讐達夫贈王徹云吾知十年後季子多黄金豈理耶惟杜老有斟酌此等語不肯輕下然如何日霑微禄歸山買薄田等亦未能陶洗淨盡為有識者所微窺云扈從應制詩自有體王維早朝詩仍聞遣方士東海訪蓬瀛明以秦皇漢武譏其君矣不若宗楚客幸覩八龍遊閬苑無勞萬里訪蓬瀛為有含蓄杜長安城頭頭白烏云云乘輿西出不堪紀此最得體又霑衣問行在亦自好煙塵暨御道耆舊把天衣雖略做不妨遥聞出巡狩早晚徧遐荒過矣下殿走尤不可奪馬悲公主登車泣貴嬪不堪敘嵇紹血太甚方采山老杜北征咏馬嵬事云憶昔狼狽初事與古先别姦臣竟葅醢同惡隨蕩析不聞夏商衰中自誅褒妲若明皇鑒夏殷事畏天悔禍自賜楊妃死官軍無預者可謂深識君臣大體劉禹錫乃云官軍誅佞幸天子捨妖姬白樂天云六軍不發無奈何宛轉蛾眉馬前死此則為明皇不得已誅貴妃雖曰紀其實豈臣子所忍言所宜言魏泰之至德初岑參與子美同為諫職子美詩避人焚諫草騎馬欲雞栖又明朝有封事數問夜如何參詩則云聖朝無闕事自覺諫書稀時安史之亂未夷上皇在蜀朝野騷然可云無闕事耶亦語病也老杜補遺或問長恨歌與連昌宫詞孰勝余曰元之詞微著其荒縱之跡而卒章乃不忘箴諷若白作止敘情語顛末誦之雖柔情欲斷何益勸戒乎墨莊漫録殿宋王楙又云歌中有夕螢飛思悄然孤燈挑盡未成眠句興慶宫中夜不㸃燭明皇自挑燈耶觀此更可發一笑今世所道俗語多唐以來人詩當時原說得太俚後來便作俗諺相舉如公道世間惟白髮不知辛苦為誰甜之類難悉舉陸游宋人以王季友觀壁畫山水詩于公大笑向予說小弟丹青能爾為等語為淺陋類兒童幼學者一拈出便欲噴飯唐初題畫詩未鑿竅故以此等語為工今則老杜語亦稍稍退位矣下筆正難遯叟趙嘏一千里色中秋月十萬軍聲半夜潮唐人稱壯而蘇公以為寒儉楊蟠八十丈虹晴卧影一千頃玉碧無瑕宋人推壯而歐公以為粗豪二公雖此道未徹此等議論自具眼然粗豪易見寒儉難知學者細思之元瑞杜甫武侯廟栢詩云霜皮溜雨四十圍黛色參天二千尺沈存中以四十圍乃是徑七尺譏此栢無乃太細長此猶鄭康成注毛詩一一要合周禮也昔文與可為東坡畫竹有掃取寒梢萬丈長之句坡戲謂與可竹長萬丈當用絹二百五十疋巳復從而實之曰世間亦有千尋竹月落空庭影許長與可㑹坡意即寫修竹數竿遺坡曰此竹數尺耳而有萬丈之勢觀二公談笑之語如此可黙㑹詩人之意矣存中惡足知之耶陳善新語自宋有田莊牙人之說詩流往往惑之此大不解事者盛唐牕中三楚盡林外九江平中唐東屯滄海濶南瀼洞庭寛晚唐到江吳地盡隔岸越山多皆一時警句杜如地利西通蜀天文北照秦尤不勝數何用為嫌惟近時作者粘帶皮骨太甚乃反覺有味斯言耳元瑞下同唐輕薄子彈摘人詩句若衞子鷓鴣失猫尋母之類至今笑端余謂此不必泥顧其句何如耳數詩淺俗鄙夷即與所譏不類寧免大雅盧胡如孟浩然春眠不覺曉二十字清新婉約縱輕薄姍侮萬端亦何害其美耶無名子以浩然春眠一絶為盲子詩唐詩須分三節看盛唐主辭情中唐主辭意晚唐主辭律詩譜盛唐詩格極高調極美但不能多不足以酬物而盡變所以又有中晩詩弇州大厯以前分明别是一副言語晩唐分明别是一副言語盛唐人詩亦有一二濫觴晩唐者晚唐人詩亦有一二可入盛唐者要當論其大槩耳大厯詩高者尚未失盛唐下者漸入晩唐矣晚唐之下者間亦墮野狐外道鬼窟中嚴滄浪唐律初盛中晚時代聲調故自必不可同然亦有初而逗盛盛而逗中中而逗晩者何也逗者變之漸非逗故無繇變也如四詩之有變風變雅便是離騷逺祖子美七言律之有抝體非即猶四詩之有變風變雅乎唐律之繇盛而中極是盛衰之介然王維錢起實相倡酬子美全集半是大厯以後所作逗漏實有可言今觀諸家如右丞明到衡山篇嘉州函谷磻溪句隠隠錢劉盧李間矣至於大厯十才子其間豈無盛唐之句蓋聲氣猶未相隔也學者固當嚴於格調然必謂盛唐人無一語落中中唐人無一語入盛則亦固哉其言詩矣王敬美兩漢以質勝六朝以文勝魏稍文所以遜兩漢唐稍質所以過六朝胡元瑞下同古體至陳本質亾矣隋之才不若陳之麗而稍知尚質故隋末諸臣即為唐風正始近體至宋性情泯矣元之才不若宋之高而稍復縁情故元季諸子即為昭代先鞭漢魏六朝遞變其體為唐而唐體迄於今自如譬之水三百篇崑崙也漢魏六朝龍門積石也唐則溟渤尾閭矣安所取益故後唐而詩衰莫如宋有出於中晚之下後唐而詩盛莫如明亦無加於初盛之上李本寧唐音癸籖巻十一
