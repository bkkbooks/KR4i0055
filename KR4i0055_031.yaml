body:
  text: 唐音癸籖巻三十一明胡震亨撰集録二唐人選唐詩其合前代選者有續古今詩苑英華集唐僧惠淨輯自梁至唐初劉孝孫止十巻麗則集集文選以後至唐開元詞人詩唐李氏撰不著名五巻詩人秀句總章中元思敬撰二巻古今詩人秀句吳兢同越僧𤣥監撰二巻皎然訾其所選不精多采浮淺之言無益詩敎玉臺後集天寶中李康成續徐陵玉臺新詠自陳隋至唐初沈宋四傑而下附以己作十巻選初唐有正聲集孫季良撰三巻唐新語云以劉希夷詩為集中之最奇章集録李林甫至崔湜百餘家詩奇警者不知撰人姓名四巻搜玉集自四傑至沈宋三十七人詩六十三篇不詳撰人名一巻合選初盛唐有國秀集國子進士苪挺章撰所載李嶠沈宋訖祖詠嚴維九十人詩二百二十篇三巻樓穎序稱其譴謫蕪穢登納菁英成一家之言選盛唐有河嶽英靈集殷璠撰三巻上巻常建李白王維劉眘虚張謂王季友陶翰李頎高適中巻岑參崔顥薛據綦母潜孟浩然崔國輔儲光羲王昌齡賀蘭進明下巻崔曙王灣祖詠盧象李嶷閻防二十四人詩二百三十四首品藻各冠篇額自序諸人皆河嶽英靈故便以為號如名不副實才不合道縱權壓梁竇終無取焉篋中集元結撰結以近代詩人拘限聲病惟吳興沈千運獨挺流俗能與人異取其詩及同時相效者五六人為編一巻起予集大歴中曹恩撰五巻選中唐有南薰集竇常集韓翃至皎然三十人詩分西掖南宫外臺為目人各繫事繫贊三百六十篇三巻御覽詩憲宗勑學士令狐楚纂進一巻又名選進集所載代德兩朝曁元和初諸家凡三十人詩三百餘首内惟李益盧綸楊凝居多其詩皆妍豔短章原題亦多以嫌諱有所改易取資宸矚非允藝裁中興間氣集高仲武集二巻起自至德元年終大歴末年錢劉而下二十六人五言詩一百四十首七言附之倣河嶽英靈人各冠之以評自序但體格風雅理致清新則朝野通載格律兼收云極𤣥集姚合撰二巻所載大歴才子及劉長卿郎士元等十五人衲子皎然等四人詩而冠以王維祖詠凡二十一人詩一百首自題云此皆詩家射鵰手也合選則唐詩類選大中時太子校書顧陶集序云國朝以來杜李挺生莫得而間其亞則昌齡伯玉雲卿千運應物益適建況鵠當光羲郊愈籍合十數子得蘇李劉謝之風骨抑退浮偽流豔之辭其律體切語對絶聲病則有沈宋燕公九齡嚴劉錢孟司空曙李端二皇甫之流皆妙于新韻守章句不失其正還凡一千二百三十二首二十巻又𤣥集光化中韋莊撰序云自國朝大手名人至今之作者或百篇内紀一章或全集中徵數首金盤飲露唯采沆瀣之精花界食珍但享醍醐之味一百五十人詩三百首三巻文章龜鑑倪宥集前人律詩巻亡五代人選唐詩有國風總類王仁裕五十巻擬𤣥集十巻詩纂三巻並梁陳康圖集續正聲集後唐王貞範編五巻續又𤣥集南唐劉吉編十巻煙花集蜀後主王衍集豔詩二百篇五巻名賢才調集蜀監察御史韋穀編唐人詩一千首每一百首為一巻隨手成編無倫次其所宗者雖李青蓮及元白而晩唐人詩十居其七八備遺綴英偽蜀王承範集二十巻外有李戡詩選三巻檀溪子聯璧詩集三十二巻無名氏正風集十巻垂風集十巻張籍等詩名賢絶句詩一巻以上四集並未詳何代人撰附記右唐人自選一代詩其鑒裁亦往往不同殷璠酷以聲病為拘獨取風骨高渤海歴詆英華玉臺珠英三選并訾璠丹陽之狹于收似又耑主韻調姚監因之頗與高合大指並較殷為殊詳諸家每出新撰未有不矯前撰為之說者然亦非其好為異若此詩自蕭氏選後豔藻日富律體因開非耑重風骨裁甄將何淨滌餘疵肇成一代雅體逮乎肄習旣壹多迺徵賤自復華碩謝旺閒婉代興不得不移風骨之賞于情致衡韻調為去取此間氣與極𤣥眂英靈所載各一選法雖體氣觔兩大難相追亦時運為之非高姚兩氏過也觀當日詭異寖盛晩調將作二集都未有收于通變之中先型仍復不失則猶斤斤禀殷氏律令其相矯實用相救爾鄭谷嘗有詩云殷璠裁鑒英靈集頗覺同才得契深何事後來高仲武品題間氣未公心似非深知仲武者然正見唐人于詩選重此兩編故獨舉為評㩁凡撰述愜人意必久傳他選亡佚有間此數選獨行世可推已業吟者將求端唐選定趨盍尚論于斯胡元瑞云芮挺章國秀不取李頎七言律姚武功極𤣥不錄王維五言絶殷璠河嶽英靈不稱龍標七言絶當時月旦迺爾愚謂諸家選豈必盡允要論其去取大凡窺唐人指趣耳元錄徒繩其細至宋人以諸選多不載杜甫李白為有意尊之此又非也國秀成于天寶三載白入長安未久甫則漂泊東都齊魯間名尚未起何從知而尊之英靈之選稍後故有白仍無甫他南薰御覽間氣極𤣥例皆選中葉之詩盛時諸家多不入不獨李杜也惟顧陶類選則取冠李杜韋糓才調更有李無杜纔若有意獨尊之者蓋議論久始有定而其初不可以是槪矣自宋至今唐詩總集有選家又有編輯家唐詩至後代多亡佚故有編輯家也兹録其稍著者宋文苑英華太平興國中學士李昉等奉詔撰一千巻内詩二百三十巻六朝人居其一唐人居其九平南周氏謂中晚唐如權德輿李商隠羅隠顧雲等有全巻收入者楊文公以為出楊㣲之之手唐人詩得傳實藉此書為多樂府詩集鄆州郭茂倩輯自漢魏訖唐樂府其唐人擬古題皆以類附題之昉于唐者特為近代曲詞新樂府詞二目括之合百巻唐實居其大半矣萬首唐人絶句洪邁編五言二十五巻七言七十五巻每巻百首共百巻上夀皇重華宫賜札褒美洪意存務博隨得隨錄不暇詮次宋人詩如李九齡李慎言郭震滕白玉嵒韓浦王初之屬多渾入其尤不深考者梁何遜稱其字仲言亦列于内為昔人所譏然唐人絶句一體詩較復多存此公搜採功不可廢也唐詩紀事臨卬計敏夫編八十一巻序云唐人以詩名家滅沒失傳不可勝數尋訪三百年間文集雜說傳記遺史碑記石刻宦遊四方殘篇遺墨一聯一句悉收採繕錄凡一千一百五十家篇什之外其人可考卽畧紀大節庶讀其詩知其人云按計氏此書雖詩與事跡評論並載似乎詩話之流然所重在録詩故當是編輯家一巨撰收採之博考據之詳有功于唐詩不細外如王棨莊南傑季善夷李咸用諸並有集詩李康成殷璠苪挺章高仲武之工品藻而李芮亦自有詩並皆遺漏又如李元採之為隋李孝貞字漫附開元中僧隠丘琪樹詩之為丹陽集中蔡隠丘詩誤去蔡字作僧晉釋帛道猷詩誤作曇翼列僧中皆當是正亦其編錄浩繁故偶爾失檢不足為疵也國朝百家唐詩華亭朱警刋初唐二十一家盛唐十家中唐二十七家晚唐四十二家警自序先人藏有宋刻成遺志翻刻行世而以徐獻忠所撰詩品冠其端初唐詩紀黃德水編十六巻吳琯補成六十巻盛唐詩紀吳琯編一百十巻初德水將編唐詩紀續馮惟訥漢魏六朝詩紀纔首事初唐而亡琯新安富室寓白下客吳江俞安期江都陸弼同郡謝陛得黃遺稿勸琯補成全唐僅成初盛而不克終客散去草草付梓唐人詩有單存隻簡亦有巨帙尚完者多寡不倫難用馮氏前例以世代詮紀雖琯欲終之固知諸客未易卒業至于遺漏之多開巻即失一高祖詩他何論此皆唐詩編輯家之巨者他編叢雜不具論選詩宋唐百家詩選王荆公選二十巻初宋敏求嘗取其家所藏唐人一百八家詩擇其佳者一千二百四十六首為一編荆公因再有所去取遂行世嚴滄浪云荆公百家詩選蓋本于唐人英靈間氣集其明皇德宗薛稷劉希夷韋述之詩無少增損次序亦同孟浩然止増其數篇儲光羲後方是荆公自去取前巻讀之甚佳非其選擇之精蓋盛唐人詩無不可觀者至於大歴以後其去取深不滿人意又如李杜韓栁以家有其集不載可也沈宋王楊盧駱陳拾遺張燕公張曲江賈至王維獨孤及韋應物孫逖祖詠劉眘虚綦母潜劉長卿李長吉諸公皆大名家而此集無之荆公當時所選當據宋之所有耳其序乃言觀唐詩者觀此足矣豈不誣哉今人但以荆公所選斂袵而莫敢議可嘆也荆公又有杜韓歐李四家詩選以韓次杜又入本代歐陽公置青蓮之前識者怪其不倫文粹姚鉉選内詩十三巻又皆古體也選唐賦遺律賦選唐詩遺律詩强以古繩今未為通鑒金元唐詩鼓吹金元好問選唐七言律九十五人五百八十餘篇十巻以聲調宏壯震厲同軍樂之有鼓吹故名内初盛唐僅張說崔顥王維李頎高適岑參數篇餘並元和以後人詩杜牧之李義山陸魯望及五代譚用之獨多而宋人胡宿詩亦誤入意遺山偶録以備檢閲鄉人郝㕘政天挺尊事遺山遂注釋行世耳郝注尤蕪謬不堪讀瀛奎律髓元初歙人方囘取唐五七言律詩合宋人所作分門類每門一巻共四十九巻并加注釋中間評搉引證亦有合者但分門各冠小引及以瀛奎為兩代取義總痴絶人勾當爾三體唐詩元周伯㢸選唐人五律七律絶句三體詩二十巻内晚唐為多其論絶句有實接虛接前對後對抝體側體論律詩以景物為實情思為虚有一實一虛有四實四虚前虚後實易諧前實後虚難繼說亦似近之要種種自學究事其注出高安釋圓至較注鼔吹者畧勝云唐音元楊士𢎞選十五巻始音一巻正音十四巻餘響附之内五言古詩獨取盛唐七言古詩五言律絶兼取中唐七言律絶兼有晚唐序云自六朝來正音流靡四子一變而開唐音之端然其律調初變未能皆純故列為唐詩始音又云唐詩至開元天寶間始渾然大備遂成一代之風是編專取盛唐者欲以見其音律之純係乎世道之盛故自大歴以降雖有卓然成家或淪于恠或迫于險或近于庸俗或窮于寒苦或流于靡麗或過於刻削皆不及錄其遣風之變而僅存者畧附焉國朝唐詩品彚洪武中新寧高棅選九十巻初棅以楊氏唐音分始音正音餘響獨得唐人三尺遂因其目又詳分之為正始正宗大家名家羽翼接武正變餘響傍流一體之中各以此九目區辨其人敘次其詩大抵正始為唐初四子與其前後諸人之詩與楊之始音同正宗則五古為陳子昂李白七古亦李白五律為李孟王岑高七律李孟王岑高外有崔顥賈至李頎祖詠張謂五絶李王孟外有崔國輔七絶李與王昌齡而諸體皆以杜甫為大家開元大歴諸賢不入正宗者皆為名家及為羽翼皆楊之所謂正音而貞元後多為接武元和開成後多為餘響正變一目則五古為韓愈孟郊七古為愈與王建張籍李賀五律為賈島姚合許渾李商隠李頻馬戴七律亦商隠渾及劉滄傍流則釋道宫閨詩各立序論以弁其端多於楊選數倍又為拾遺十巻附後唐詩正聲棅編品彚得詩五千七百六十九首慮博而寡要襍而不純又拔其尤一千十首彚是編自序聲律純完世外自然之奇寶唐詩選李攀龍選十三巻序云唐無五言古詩而有其古詩陳子昂以其古詩為古詩弗取也七言古詩惟杜子美不失初唐氣格而縱横有之太白縱橫往往彊弩之末間雜長語英雄欺人耳至如五七言絶句實唐三百年一人蓋以不用意得之即太白亦不自知其所至而工者顧失焉五言律排律諸家槩多佳句七言律體諸家所難王維李頎頗臻其妙即子美篇什雖衆憒焉自放矣作者自苦亦惟天實生才不盡後之君子乃兹集以盡唐詩而唐詩盡于此外選家尚多兹亦不具自宋以還選唐詩者迄無定論大抵宋失穿鑿元失猥襍而其病總在畧盛唐詳晚唐至楊伯謙氏始揭盛唐為主得其要領復出四子為始音以便區分可稱千古偉識惟是所稱正音餘響者于前多有所遺于後微有所濫而李杜大家猥云示尊未敢并隲豈非唐篇一大闕典高廷禮巧用楊法别益巳裁分各體以統類立九目以馭體因其時以得其變盡其變以收其詳斯則流委旣復不紊條理亦得全該求大成于唐調此其克集之者矣高又自病其繁有正聲之選而二百年後李于鱗一編復興學者尤宗之詳李選與正聲皆從品彚中采出亦云得其精華但高選主于純完頗多下駟謬入李選刻求精美幸無􅎓寶誤收王弇州以為于鱗以意輕退作者有之舍格輕進作者無是也良為篤論顧欲以是盡唐侈言此外無詩則過矣宜有識者之不無遺議爾夫盡唐宜何如亦惟用品彚之例稍潤色焉而可詩在唐一代體數變矣取數變之體統列一巻之内自衰盛相形妍醜互眩兩存旣嫌尾或穢貂盡棄又惜灺堪續月故必各自為域庶兩無奪倫此品彚之分編者卽繁襍得奏全勲而諸選之合輯者縱精嚴難免觭弊也高所詮九目强半允愜惟律詩正變一目内許渾李頻馬戴平調不足稱變或尚有杜牧薛能李洞諸人足擇五古則夷中鄴駕輩似亦可附郊愈末以終變風斯皆可商者其最陋五言排律連巻錄省試詩何所取義而大謬在選中晚必繩以盛唐格調槪取其膚立僅似之篇而晚末人真正本色一無所收李杜兩家尤多為宋人之論所囿不能别出手眼有所去取藥此衆病更于初盛十去二三益如之于中唐十去四五益二三于晚唐十去七八益三四唐選其有定本乎假我數年亮可卒業唐音癸籖巻三十一
