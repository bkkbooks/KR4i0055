  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0055_WYG_005-1a, image: WYG1482/WYG1482-0546a.png}
body:
  text: 唐音癸籖卷五明胡震亨撰評彚一太宗文武間出首闢吟源宸藻概主豐麗觀集中有詩斆庾信體宗嚮微㫖可窺然如一朝辭此地四海遂為家昔乘匹馬去今驅萬乘來與風起雲揚之歌同其雄盻自是帝者氣象不侔遁叟唐初惟文皇帝京篇藻贍精華最為傑作視梁陳神韻少減而富麗過之無論大略即雄才自當驅走一世然使三百年中律有餘古不足已兆端此矣胡元瑞明皇藻豔不過文皇而骨氣勝之語象則春來津樹合月落戍樓空語境則馬色分朝景雞聲逐曉風語氣則翠屏千仞合丹嶂五丁開語致則豈不惜賢達其如高尚心雖使燕許草創沈宋潤色亦不過此弇州德宗詩尚雅正松院靜苔色竹房深磬聲最有稱逺則王籍耶溪近則常建破山可與論其幽致而氣體自穆故非吟士可倫遁叟虞永興世南師資野王嗜好徐庾而意存砥柱擬浣宮豔之舊故其詩洗濯浮夸興寄獨逺雖藻彩縈紆不乏雅道治世之音先人而興者也徐獻忠李安平百藥藻思沈鬱尤長五言如柳色迎三月梅花隔二年含巧於碩才壯意新真不虛人主品目遁叟下同貞觀永徽吟賢禇亮楊師道李義府許敬宗上官儀其最也吉光片羽僅傳人口儀鵲飛山月曙蟬噪野風秋音響清越韻度飄揚齊梁諸子咸當斂袵矣四傑詞㫖華靡沿陳隋之遺氣骨翩翩意象老境故超然勝之五言遂為律家正始弇州王子安雖不廢藻飾如璞含珠媚自然發其彩光盈川視王微加澄汰清骨明姿居然大雅范陽較楊微豐喜其領韻疏拔時有一往任筆不拘整對之意義烏富有才情兼深組織正以太整且豐之故得擅長什之譽將無風骨有可窺乎當年四子先後品序就文筆通論要亦其詩之定評也歟遁叟陳子昻初變齊梁之弊一返雅正其詩以理勝情以氣勝辭吟譜子昻卓立千古橫制頺波天下翕然質文一變感遇之篇感激頓挫微顯闡幽庶幾見變化之朕以接乎天人之際盧藏用唐人推重子昻自盧黃門後不一而足如杜子美則云有才繼騷雅名與日月懸韓退之則云國朝盛文章子昂始高蹈獨顏真卿有異論真卿嘗云沈隱侯之論謝康樂也乃云靈均巳來此祕未覩盧黃門之序陳拾遺也而云道喪五百歲而得陳君若激昂頺波雖無害過正榷其中論亦傷於厚誣僧皎然采而著之詩式近代李于鱗加貶尤劇于鱗序唐詩云唐無五言古詩而有其古詩陳子昂以其古詩為古詩弗取也余謂諸賢軒輕各有深意子昂自以復古反正於有唐一代詩功為大耳正如夥涉為王殿屋非必沈沈但大澤一呼為羣雄驅先自不得不取冠漢史王弇州云陳正字淘洗六朝鉛華都盡托寄大阮微加斷裁第天韻不及胡元瑞云子昂削浮靡而振古雅雖不能逺追魏晉然在唐初自是傑出斯兩言良為折𠂻矣遁叟唐初無七言律五言亦未超然二體之妙杜審言實為首倡五言則行止皆無地獨有宦遊人排律則六位乾坤動北地寒應苦七言則季冬除夜毗陵震澤皆極高華雄整少陵繼起百代模楷有自來矣元瑞魏建安後訖江左詩律屢變自沈約庾信以音韻相婉附屬對精密及沈佺期宋之問又加靡麗回忌聲病約句凖篇如錦繡成文學者宗之號為沈宋唐書漢魏之間雖已朴散為器作者猶質有餘而文不足以今揆昔則有朱絃疏越太羮遺味之嘆沈詹事宋考功始裁成六律彰施五彩使言之而中倫歌之而成聲緣情綺靡之功至是始備雖去雅寖逺其利有過於古亦猶路鼗出於土鼓篆籒生於鳥跡獨孤及沈七言律高華勝宋宋五言排律精碩過沈元瑞下同按之問本傳云其善五言詩佺期本傳云尤長七言之作二家定評久矣沈宋固是竝驅然沈視宋稍偏枮宋視沈較縝密沈製作亦不如宋之繁富漢稱蘇李唐亦曰蘇李嶠味道乂頲以今論之巨山五言槩多典麗將味道難為蘇廷碩七言尤富風華亦復乂難為李耳遁叟下同張燕公說詩率意多拙但生態不癡律體變沈宋典整前則開高岑淸矯後規張曲江九齡五言以興寄為主而結體簡貴選言淸冷如玉磬含風晶盤盛露故當於塵外置賞開元彩筆無過燕許許之應制七言宏麗有色而他篇不及李嶠燕之嶽陽以後感槩多工而實際不如始興弇州王灣詞翰蚤著海日生殘夜江春入舊年詩人已來少有此句張燕公手題政事堂示楷式又搗衣篇云月華照杵空隨妾風響傳砧不到君非張蔡之曾見覺顔謝之彌逺殷璠下同崔皓少年為詩屬意浮豔名陷輕薄晚節忽變常體風骨凛然一窺塞垣為戎旅間語壯采欲埒鮑家徐獻忠云皓風格竒俊大有佳篇太白雖極推黃鶴樓未足列於上駟儲光羲詩格高調逸趣逺情深削盡常言挾風雅之道得浩然之氣儲詩高處似陶淵明平處似王摩詰蘇子由王昌齡詩饒有風骨與儲光羲氣同體别而王稍聲俊多驚耳駭目之句殷璠少伯天才流麗音唱疏越七言絶句幾與太白比肩當時樂府采録無出其右徐獻患王右丞維詞秀調雅意新理愜在泉成珠著璧成繪一句一字皆出常境殷璠摩詰以淳古淡泊之音寫山林閒適之趣如輞川諸詩真一片水墨不著色畫及其鋪張國家之盛如九天閶闔開宫殿萬國衣冠拜冕旒雲裏帝城雙鳯闕雨中春樹萬人家又何其偉麗也震澤長語右丞詩自有二派綺麗精工者沈宋合調幽閒古淡者儲孟同聲元瑞孟浩然詩祖建安宗淵明冲淡中有壯逸之氣吟譜浩然詩彩䒠茸半遵雅調全削凡體至如衆山遙對酒孤嶼共題詩無論氣象兼復故實又氣蒸雲夢澤波憾嶽陽城亦為高唱殷璠中按孟氏洞庭一聯皎然論詩降居駟良有深指見前法微之三浩然詩遇思入詠不鉤奇抉異齷齪束人口若公輸氏當巧而不巧者蕭慤有芙蓉露下落楊柳月中疏孟則有微雲淡河漢疏雨滴梧桐謝朓有露濕寒塘草月映淸淮流孟則有荷風送香氣竹露滴淸聲與古人爭勝毫釐皮日休襄陽氣象清逺心悰孤寂故其出語灑落洗脫凡近讀之渾然省淨真彩自復內映雖藻思不及李翰林秀調不及王右丞而間淡疏豁翛翛自得之趣亦有獨長徐獻忠浩然韻高而才短如造內法酒手而無材料東坡浩然四十字詩後四句率覺氣索如嶽陽樓歲莫歸南山之類陸放翁孟襄陽才不足半摩詰特善用短耳其景色恆傅情而發故小勝也其氣先志而索故大不勝也然偏師而出者猶輕當於衆志而膾炙藝林弇州高常侍適性拓落不拘小節其詩多胸臆語兼有風骨故朝野通賞其文殷璠常侍詩氣骨琅然詞峯峻上感賞之情殆出常表徐獻忠下同岑嘉州參以風骨為主故體裁峻整語多造竒高岑一時不易上下岑氣骨不如達夫遒上而婉縟過之選體時時入古岑尤陡健歌行磊落竒俊高一起一復取是而已尤為正宗弇州高適詩尚質主理岑參詩尚巧主景吟譜王孟閒淡自得高岑悲壯為宗詩藪常建詩似初發通莊却尋野徑百里之外方歸大道所以其旨逺其興僻佳句輒來唯論意表如松際露微月淸光猶為君又山光悅鳥性潭影空人心此例十數句並可稱為警策殷璠下同李頎詩發調既新修辭亦秀雜歌咸善𤣥理最長論其數家往往高於衆作劉眘虛情幽興逺思苦語竒忽有所得便驚衆聽唯氣骨稍不逮諸公惜其不永天年隕碎國寶陶翰既多興象復備風骨盧象雅而平素得國士之風祖詠剪刻省淨用思尤苦氣雖不高調頗凌俗崔國輔詩婉孌淸楚深宜諷味樂府數章古人不及崔曙詩多歎詞要妙情意悲凉送别登樓俱堪淚下綦母拾遺濳詩舉體清秀蕭蕭跨俗桑門之役於巳獨能至如松覆山殿冷不可多得又如鍾聲和白雲歷代未有借使若人加氣質減雕飾則高視三百年外也張謂代北州老翁答及湖中對酒行並在物情之外但衆人未曾說耳亦何必歷遐逺探古迹然後始為冥搜薛據為人骨鯁有氣魄其文亦爾自傷不早逹怨憤頗深如寒風吹長林白日原上沒可謂曠代佳句元次山結詩辭義幽約譬古鍾磬不諧里耳而有可尋玩朝公武沈千運刋落文言冷然獨寫真意元次山甚推重之其同調有王季友于逖孟雲卿張彪趙微明元融數人而季友雲卿尤勝遁叟季友詩愛竒務險逺出常情之外觀畫一篇甚有新意殷璠雲卿詩祖述沈千運調氣傷苦怨者之流如虎豹不相食哀哉人食人方於七哀路有饑婦人抱子棄草間則雲卿深矣雖較之陳沈才能升堂猶未入室然當今古調無出其右者高仲武篇杜甫稱雲卿云一飯未嘗留俗客數今見古人詩觀集中哀哉行古挽歌途中寄友諸篇允愜杜句唐音癸籖卷五
