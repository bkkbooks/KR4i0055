body:
  text: 唐音癸籖卷十九明胡震亨撰詁箋四上頭今世女子初笄曰上頭花蕊夫人宫詞年初十五最風流新賜雲鬟使上頭入詩遂為雅語遁叟下同入月黃帝內經月事以時下謂天癸也史記程姬有所避不願進注天子諸侯羣妾以次進御有月事止不御更不口説以丹注面目的的為識令女史見之王建宫詞密奏君王知入月喚人相伴洗裙裾語雖情致但天家何至自洗裙裾密奏云云更不諳丹的故事矣時世粧唐婦人粧名時世頭因話録西平王治家整肅不許時世粧梳白樂天時世粧歌圓鬟無鬢堆髻樣斜紅不暈頳面狀然亦有作時勢者權德輿詩叢鬢愁眉時勢新元微之教閨人粧束詩人人總解爭時勢都大須看各自宜豈時人避廟諱改世為勢乎抑以鬆鬢危髻取勢頗髙改勢字貌之乎正不如作時世為雅切耳男子拜世謂婦人立拜起於武后其實不然周天元時命內外命婦拜天臺皆執笏俯伏如男子可見以前婦人無俯伏者惟下手立拜耳王建宫詞有云臨上馬時齊賜酒男兒跽拜謝君王知當時宫女不作男子拜矣本朝命婦入朝贊行四拜皆下手立拜惟謝拜賜時一跪叩頭遵古禮也于愼行筆塵云古者婦人肅拜兩膝齊作虛坐手至地而頭不下今以古婦人之拜為揖故加之拳曲而跪靨飾説文靨頰輔也洛神賦明目善睞靨輔承權自吳宫有獺髓補痕之事唐韋固妻少時為盜刃所刺以翠掩之女粧遂有靨飾其字二音一音琰一音葉溫飛卿詞繡衫遮笑靨煙草雙飛蝶此音葉又云粉心黃蕊花靨眉山兩點此音琰楊升菴纒足張邦基墨莊漫録云婦人之纒足傳記皆無所出獨齊東昏有鑿金為蓮花帖地令潘妃行其上一事見南史而不言其足若何又云古樂府六朝詞人體狀婦人眉目唇口腰肢手指無不有獨無一言稱纒足唐之杜牧李商隱之徒亦然僅韓偓香奩集有詠屧子一詩六寸膚圓光緻緻唐尺短以今校之亦自小然亦不言其弓也惟道山新聞云李後主宫嬪窅娘纖麗善舞後主作金蓮髙六尺蓮中作品色瑞蓮令窅娘以帛繞腳令纎小屈上作新月狀著素襪舞其中回旋有凌雲之態唐鎬咏之曰蓮中花更好雲裏月長新繇是人皆效之以纎弓為妙以此知札腳自五代始也輟耕録愚謂纒足事始雖不見史傳然善讀史者自當以意求之從來婦人足履之制惟晉書之五行志附見兩言云男子屐方頭婦人圓頭而唐車服志為尤詳其言云后妃大禮著舄燕見用履命婦服用舄履亦同而民俗不盡遵用武德初婦人曳線鞾開元中用線鞋侍兒則著履夫鞋鞾同圓頭之式圓頭適足小之用而履舄之方而貴者反令賤者躡之詳繹時風纒足自寓亦何必明白言之始謂史書有載哉大扺有男女來便分男女體態婀娜細步纎小玉趺古人定蚤鑿此竅不待今日其漸變漸妍或至五代始作弓樣則有之若謂纒束非始古人待古人亦太村且拙矣鈿尺裁量減四分纖纖玉笋褁輕雲五陵年少欺他醉笑把花前出畫裙杜牧有詩新羅繡行纒足趺如春妍見晉清商曲纎纎作細步精妙世無雙見漢焦仲卿妻詩云古無詩亦失考遁叟寶祙祙女人脅衣也隋煬帝詩錦袖淮南舞寶祙楚宫腰盧照鄰詩倡家寶祙蛟龍被謝偃詩細風吹寶祙輕露濕紅紗是也或謂起自楊妃小説偽書不可信崔豹古今注謂之腰綵注引左傳衵服謂日日近身衣也知古已有之矣升菴詩話輕容紗之至輕者有所謂輕容出唐類苑云輕容無花薄紗也王建宫詞云嫌羅不著愛輕容元微之有寄白樂天白輕容樂天製而為衣而詩中容字乃為流俗妄改為庸又作庸榕蓋不知其所出齊東野語屠蘇周王褎詩飛甍雕翡翠繡桷畫屠蘇屠蘇本草名畫於屋上因草名以名屋杜詩云願隨金騕裊走置錦屠蘇此屠蘇屋名也後人又借屋名以名酒孫思邈有屠蘇酒方又大帽形類屋亦名屠蘇南史謠云屠蘇障日覆兩耳是也升菴詩話補遺榮韓退之詩前榮饌賓親沈括云禮洗當東榮屋翼謂之榮東西注屋則有之未知前榮何在今考文選王元長曲水詩序注榮為屋簷簷一名摘一名宇即屋之四垂也又謂之楣又謂之梠則屋凡有簷處皆可謂之榮矣故李華含元殿賦有風交四榮之説張祐法雲檜詩謝家雙植本南榮南榮正前榮耳藝苑雌黃參勾欄韻書木為之在階際古今注漢顧成廟槐樹設扶老鉤欄其始也王建宫詞李長吉宫娃歌俱用為宫禁華飾自晚唐李商隱輩用之倡家情詞如簾輕幕重金鈎欄之類宋人相沿遂專以名教坊不復他用漢書注賣𨽻妾納闌中以為曲中麗飾稱可以為寓簡賤意專稱亦可遁叟屈戍今人家窗户設鉸具或鐵或銅名曰環紐即古金鋪之遺意北方謂之屈戍其稱甚古梁簡文詩織成屏風金屈戍李商隱詩鎖香金屈戍李賀詩屈膝銅鋪鎖阿甄屈膝當是屈戍輟耕録葳㽔鎖韓翃詩春樓不閉葳㽔鎖緑水回通宛轉橋封禪書紛綸葳㽔張楫曰亂貌録異傳載建安中河間鬼婦遺葳㽔鎖與人别其鎖以金縷相屈伸古樂府烏夜啼歡下葳㽔鎖交儂那得住陳晦伯泥窗蜀人謂糊窗為泥窗花蕊夫人宫詞云紅錦泥窗繞四廊非曽遊蜀亦所不解老學菴筆記緑沉杜甫詩雨拋金鎖甲苔臥緑沉槍薛蒼舒注引車頻秦書云苻堅造金銀緑沉細鎧以緑沉為精鐵按北史隋文帝嘗賜張奫緑沉甲獸文貝裝武庫賦云緑沉之槍唐鄭槩聮句有亭亭孤笋緑沉槍之句續齊諧記云王敬伯夜見一女命婢取酒提一緑沉漆盒王羲之筆經有人以緑沉漆竹管見遺亦可愛玩蕭子雲詩云緑沉弓項縱紫艾刀橫拔恐緑沉如今以漆調雌黃之類若調緑漆之其色深沉故謂之緑沉非精鐵也姚寬叢語或楊升菴云鄴中記石虎造象牙桃枝扇或緑沉色木雞色或紫紺色或鬱金色蓋畫工設色名也退紅唐有一種色謂之退紅王建牡丹詩云粉光深紫膩肉色退紅嬌王貞白倡樓行云龍腦香調水教人染退紅花間集牀上小薰籠昭州新退紅蓋退紅若今之粉紅髹器亦有作此色者今無之矣紹興末縑帛有一等似皂而淡者謂之不肯紅亦退紅之類也老學菴續筆記瓊可為白謝惠連雪賦庭列瑤階林挺瓊樹善注瓊赤玉也瓊樹恐誤按瓊之為赤玉見説文但毛詩傳言瓊非一惟云玉之美者非以為玉色名詩傳在説文前尤可據謝蓋用詩傳不用説文耳陳張正見雎陽生玉樹雲夢起瓊田隋王衡璧臺如始搆瓊樹似新栽以及李賀白天碎碎墮瓊芳李義山巳隨江令誇瓊樹又入盧家妬玉堂並從謝作白用似不為誤遁叟隱囊古人呼車􅀈之俗名顔師古曰􅀈韋囊在車中人所馮伏也今謂之隱囊王右丞詩隱囊紗帽坐彈棋蓋取車中􅀈為坐彈棊耳顔氏家訓曰梁全盛日貴遊子弟駕長簷車跟髙齒屐坐棊子方褥馮班絲隱囊名之曰囊意其物視褥為髙故用之馮亦用之坐也鄭良孺尼師壇張希復與假成式同賦宣律師袈裟云共覆三衣中夜寒披時不鎮尼師壇無因蓋得龍宫地畦裏塵飛葉相殘梵語尼師壇此云隨坐衣唐言坐具也翻譯名義云元佛初度五人及迦葉兄弟並製袈裟左臂坐具在袈裟下後度諸衆徒侣漸多年少比丘儀容端美入城乞食多為女愛由是製衣角在左肩後為風飄聽以尼師壇鎮上此覆中夜外鎮也遁叟越窑許渾詩沉水越瓶寒又越瓶秋水澄陸龜蒙詩九秋風露越窑開奪得千峯翠色來越窑為諸窑之冠至錢王時愈精臣庶不得通用謂之秋色即所謂柴窑者是俗云若要看柴窑雨過青天色與許陸詩正同留青日札暖簧笙簧必用髙麗銅為之靘以緑臘簧暖則字正而聲清越故必用焙而後可陸天隨詩曰妾思冷如簧時時望君暖樂府亦有簧暖笙清之語齊東野語蝦蟆更周遵道豹隱紀談內樓五更絶梆鼓交作謂之蝦蟆更外方謂之攢點郝天挺云江南以木柝警夜曰蝦蟆更張蠙錢塘夜宴詩觱篥調髙山閣迥蝦蟆更促海城寒詳詩意郝説為近遁叟下同夜半鍾張繼夜半鐘聲到客船歐公以半夜非鳴鐘時為語病庚溪詩話謂于鵠詩定知别後宫中作遙聽緱山半夜鐘溫庭筠悠然旅榜頻回首無復松窗半夜鐘皇甫冉夜半隔山鐘陳羽隔水悠悠午夜鐘唐人屢用詩眼引南史齊武帝景陽樓有三更五更鐘丘仲孚讀書以中宵鐘為限阮景仲為吳興守禁夜半鐘云實有半夜鐘用之不妨愚謂繼詩特言其早見行役勞耳胡元瑞云詩流借景立言惟在聲律之調興象之合區區事實彼豈暇計無論夜半是非即鐘聲聞否未可知也尤為得解三翼元微之詩光隂三翼過越絶書及水戰兵法內經有大翼中翼小翼舟名蓋戰船之輕捷者張景陽七命浮三翼戲中沚梁元帝白華三翼舸三翼自相追張正見三翼木蘭船並用此鄭良孺五兩太白扁舟敬亭下五兩先飄颻權德輿曉風搖五兩張祜南風吹五兩王維惡説南風五兩輕出郭景純江賦覘五兩之動靜凡候風以雞羽重五兩繫五丈旗顚立軍營中綄船上候之楚謂之五兩留青日札歡帆余生長澤國每聞舟子呼造帆曰歡稱牽船之索曰彈平聲子使風之帆為去聲意謂俗諺耳及觀唐樂府有詩云蒲帆猶未織爭得一歡成而鍾會呼捉船索為百丈趙氏注云百丈者牽船篾內地謂之宣音彈韓昌黎詩云無因帆江水而韻書去聲內亦有扶帆切者是知方言俗語皆有所據陸放翁入蜀聞舟人祠神方悟杜詩長年三老攤錢之語亦此類也齊東野語活船白太傅詩暑退衣服乾潮生船舫活吳中以水長船動為船活采入詩中便成佳句閲耕餘録彈棊戲之有彈棊始漢武以代蹴踘之勞其法用石為局中隆外庳黑白棊各六枚先列棊相當下呼上擊之以中者為勝李頎彈棊歌藍田美石青如砥黑白相分十二子聮翩百中皆造微魏文手巾不足比緣邉度隴未可嘉鳥跂星懸正復斜回飈轉指速飛電拂四取五旋風花按魏文帝彈棊賦緣邊間造長斜迭取丁廙賦風馳火燎令牟取五梁元帝謝彈棊局啓鳯峙鷹揚信難議擬鳥跂星懸何曽倣佛頎詩多本此魏文善此技用手巾拂之無不中唐順宗在春宫日甚好之時多名手至長慶末好事家猶見有局尚多解者今則不傳矣遁叟六赤葉子李洞有贈龍州李郎中先夢六赤後打葉子詩六赤古之瓊畟今之骰子也葉子者如今之册葉唐人藏書皆作卷軸後苦卷軸難數卷舒多以葉子寫之如吳彩鸞唐韻李郤彩選之類是也骰子格本備檢用故亦以葉子寫之因以為名唐世士人宴聚盛行葉子格五代宋初猶然後漸廢不傳見歐陽歸田録楊用修以葉子為紙牌失之矣陳晦伯唐音癸籖卷十九
